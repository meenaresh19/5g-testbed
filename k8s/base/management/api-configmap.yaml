apiVersion: v1
kind: ConfigMap
metadata:
  name: testbed-api-config
  namespace: 5g-testbed
data:
  # Updated testbed-api.js for K8s (uses @kubernetes/client-node instead of dockerode)
  api-server.js: |
    const express = require('express');
    const cors = require('cors');
    const k8s = require('@kubernetes/client-node');
    const { spawn } = require('child_process');
    const bcrypt = require('bcryptjs');
    const jwt    = require('jsonwebtoken');

    const app = express();
    app.use(cors());
    app.use(express.json());

    // K8s client setup (reads KUBECONFIG or in-cluster config)
    const kc = new k8s.KubeConfig();
    kc.loadFromCluster();  // Loads /var/run/secrets/kubernetes.io/serviceaccount/* from pod
    const k8sApi = kc.makeApiClient(k8s.CoreV1Api);
    const appsApi = kc.makeApiClient(k8s.AppsV1Api);
    const metricsApi = new k8s.Metrics(kc);
    const execApi = new k8s.Exec(kc);

    const NAMESPACE = 'default';  // Override with env var
    const ns = process.env.K8S_NAMESPACE || '5g-testbed';
    const JWT_SECRET      = process.env.JWT_SECRET      || 'testbed-dev-secret-change-in-prod';
    const ADMIN_PASSWORD  = process.env.ADMIN_PASSWORD  || 'admin123';

    // Helper: Get pod by NF name
    async function getPodByNf(nfId) {
      try {
        const res = await k8sApi.listNamespacedPod(ns, undefined, undefined, undefined, undefined, `app=${nfId}`);
        if (res.body.items.length === 0) throw new Error(`NF ${nfId} not found`);
        return res.body.items[0];  // First pod matching app=nfId
      } catch (e) {
        throw new Error(`Failed to get pod for ${nfId}: ${e.message}`);
      }
    }

    // Helper: Get all NFs (Deployments)
    async function getAllNfs() {
      try {
        const res = await appsApi.listNamespacedDeployment(ns);
        return res.body.items.map(dep => ({
          id: dep.metadata.name,
          replicas: dep.status.replicas || 0,
          ready: dep.status.readyReplicas || 0,
          status: dep.status.readyReplicas === dep.spec.replicas ? 'Running' : 'Pending',
          image: dep.spec.template.spec.containers[0]?.image || 'unknown'
        }));
      } catch (e) {
        throw new Error(`Failed to list deployments: ${e.message}`);
      }
    }

    // Helper: Scale deployment
    async function scaleNf(nfId, replicas) {
      try {
        const patch = { spec: { replicas } };
        await appsApi.patchNamespacedDeployment(nfId, ns, patch, undefined, undefined, undefined, { headers: { 'Content-Type': 'application/merge-patch+json' } });
        return { success: true, message: `${nfId} scaled to ${replicas} replicas` };
      } catch (e) {
        throw new Error(`Failed to scale ${nfId}: ${e.message}`);
      }
    }

    // Routes

    // GET /status - List all NFs and their status (no auth — used by K8s readiness probe)
    app.get('/status', async (req, res) => {
      try {
        const nfs = await getAllNfs();
        res.json({
          status: 'ok',
          timestamp: new Date().toISOString(),
          nfs: nfs
        });
      } catch (e) {
        res.status(500).json({ status: 'error', error: e.message });
      }
    });

    // POST /nf/:id/start - Scale up NF to 1 replica
    app.post('/nf/:id/start', authenticateToken, requireAdmin, async (req, res) => {
      try {
        const { id } = req.params;
        const result = await scaleNf(id, 1);
        res.json(result);
      } catch (e) {
        res.status(500).json({ error: e.message });
      }
    });

    // POST /nf/:id/stop - Scale down NF to 0 replicas
    app.post('/nf/:id/stop', authenticateToken, requireAdmin, async (req, res) => {
      try {
        const { id } = req.params;
        const result = await scaleNf(id, 0);
        res.json(result);
      } catch (e) {
        res.status(500).json({ error: e.message });
      }
    });

    // GET /nf/:id/logs - Get logs from NF pod
    app.get('/nf/:id/logs', authenticateToken, async (req, res) => {
      try {
        const { id } = req.params;
        const { lines = 100 } = req.query;
        const pod = await getPodByNf(id);

        // Use kubectl exec to get logs (k8s client doesn't expose log endpoint easily)
        const logs = await new Promise((resolve, reject) => {
          const proc = spawn('kubectl', [
            'logs',
            pod.metadata.name,
            `-n`, ns,
            `--tail=${lines}`
          ]);
          let stdout = '';
          proc.stdout.on('data', data => stdout += data);
          proc.on('close', code => {
            if (code === 0) resolve(stdout);
            else reject(new Error(`kubectl logs failed with code ${code}`));
          });
        });

        res.json({ nf: id, logs: logs });
      } catch (e) {
        res.status(500).json({ error: e.message });
      }
    });

    // GET /nf/:id/config - Get NF config from ConfigMap
    app.get('/nf/:id/config', async (req, res) => {
      try {
        const { id } = req.params;
        const cm = await k8sApi.readNamespacedConfigMap(`open5gs-config`, ns);
        const config = cm.body.data[`${id}.yaml`] || 'Not found';
        res.json({ nf: id, config: config });
      } catch (e) {
        res.status(500).json({ error: e.message });
      }
    });

    // Prometheus proxy endpoints (for metrics queries)
    app.get('/metrics/query', authenticateToken, async (req, res) => {
      try {
        const { query } = req.query;
        if (!query) return res.status(400).json({ error: 'query param required' });

        const PROMETHEUS_URL = process.env.PROMETHEUS_URL || 'http://prometheus:9090';
        const url = `${PROMETHEUS_URL}/api/v1/query?query=${encodeURIComponent(query)}`;
        const r = await fetch(url, { signal: AbortSignal.timeout(6000) });
        res.json(await r.json());
      } catch (e) {
        res.status(503).json({ status: 'error', error: `Prometheus unreachable: ${e.message}` });
      }
    });

    app.get('/metrics/query_range', authenticateToken, async (req, res) => {
      try {
        const { query, minutes = 30, step = 30 } = req.query;
        if (!query) return res.status(400).json({ error: 'query param required' });

        const endTime = Math.floor(Date.now() / 1000);
        const startTime = endTime - (parseInt(minutes) * 60);

        const PROMETHEUS_URL = process.env.PROMETHEUS_URL || 'http://prometheus:9090';
        const url = `${PROMETHEUS_URL}/api/v1/query_range?query=${encodeURIComponent(query)}&start=${startTime}&end=${endTime}&step=${step}s`;
        const r = await fetch(url, { signal: AbortSignal.timeout(6000) });
        res.json(await r.json());
      } catch (e) {
        res.status(503).json({ status: 'error', error: `Prometheus unreachable: ${e.message}` });
      }
    });

    // MongoDB client setup (for UE management)
    const { MongoClient } = require('mongodb');
    const MONGO_URI = process.env.MONGO_URI || 'mongodb://mongodb.5g-testbed.svc.cluster.local:27017';
    const MONGO_DB = 'open5gs';
    let mongoClient = null;
    let db = null;

    // Connect to MongoDB
    async function connectMongo() {
      try {
        mongoClient = new MongoClient(MONGO_URI);
        await mongoClient.connect();
        db = mongoClient.db(MONGO_DB);
        console.log('[testbed-api] Connected to MongoDB');
      } catch (e) {
        console.error('[testbed-api] MongoDB connection failed:', e.message);
        db = null;
      }
    }

    connectMongo();

    async function seedAdminUser() {
      try {
        if (!db) return;
        const users = db.collection('testbed_users');
        const existing = await users.findOne({ username: 'admin' });
        if (!existing) {
          const hash = bcrypt.hashSync(ADMIN_PASSWORD, 10);
          await users.insertOne({
            username: 'admin',
            passwordHash: hash,
            role: 'admin',
            createdAt: new Date().toISOString()
          });
          console.log('[AUTH] Admin user seeded (username: admin)');
        }
      } catch (e) {
        console.error('[AUTH] Seed error:', e.message);
      }
    }
    setTimeout(seedAdminUser, 3000); // wait for mongo connection

    // JWT auth middleware
    function authenticateToken(req, res, next) {
      const token = (req.headers['authorization'] || '').split(' ')[1];
      if (!token) return res.status(401).json({ error: 'Authentication required' });
      try {
        req.user = jwt.verify(token, JWT_SECRET);
        next();
      } catch (e) {
        res.status(401).json({ error: 'Invalid or expired token' });
      }
    }

    function requireAdmin(req, res, next) {
      if (req.user?.role !== 'admin') return res.status(403).json({ error: 'Admin access required' });
      next();
    }

    // ── Auth & User Management ─────────────────────────────────

    // POST /auth/login
    app.post('/auth/login', async (req, res) => {
      try {
        const { username, password } = req.body || {};
        if (!username || !password) return res.status(400).json({ error: 'username and password required' });
        if (!db) return res.status(503).json({ error: 'Database not ready' });
        const users = db.collection('testbed_users');
        const user = await users.findOne({ username });
        if (!user || !bcrypt.compareSync(password, user.passwordHash))
          return res.status(401).json({ error: 'Invalid credentials' });
        const token = jwt.sign(
          { id: user._id.toString(), username: user.username, role: user.role },
          JWT_SECRET,
          { expiresIn: '24h' }
        );
        res.json({ token, user: { id: user._id.toString(), username: user.username, role: user.role } });
      } catch (e) {
        res.status(500).json({ error: e.message });
      }
    });

    // GET /auth/me
    app.get('/auth/me', authenticateToken, (req, res) => {
      res.json({ user: req.user });
    });

    // GET /users (admin only)
    app.get('/users', authenticateToken, requireAdmin, async (req, res) => {
      try {
        const users = db.collection('testbed_users');
        const list = await users.find({}).toArray();
        res.json(list.map(u => ({ id: u._id.toString(), username: u.username, role: u.role, createdAt: u.createdAt })));
      } catch (e) {
        res.status(500).json({ error: e.message });
      }
    });

    // POST /users (admin only)
    app.post('/users', authenticateToken, requireAdmin, async (req, res) => {
      try {
        const { username, password, role = 'researcher' } = req.body || {};
        if (!username || !password) return res.status(400).json({ error: 'username and password required' });
        const users = db.collection('testbed_users');
        if (await users.findOne({ username })) return res.status(409).json({ error: 'Username already exists' });
        const hash = bcrypt.hashSync(password, 10);
        const result = await users.insertOne({ username, passwordHash: hash, role, createdAt: new Date().toISOString() });
        res.json({ id: result.insertedId.toString(), username, role });
      } catch (e) {
        res.status(500).json({ error: e.message });
      }
    });

    // DELETE /users/:id (admin only, cannot delete self)
    app.delete('/users/:id', authenticateToken, requireAdmin, async (req, res) => {
      try {
        const { ObjectId } = require('mongodb');
        if (req.params.id === req.user.id) return res.status(400).json({ error: 'Cannot delete your own account' });
        const users = db.collection('testbed_users');
        const user = await users.findOne({ _id: new ObjectId(req.params.id) });
        if (!user) return res.status(404).json({ error: 'User not found' });
        if (user.username === 'admin') return res.status(400).json({ error: 'Cannot delete the admin account' });
        await users.deleteOne({ _id: new ObjectId(req.params.id) });
        res.json({ success: true });
      } catch (e) {
        res.status(500).json({ error: e.message });
      }
    });

    // PUT /auth/password (self-service password change)
    app.put('/auth/password', authenticateToken, async (req, res) => {
      try {
        const { currentPassword, newPassword } = req.body || {};
        if (!currentPassword || !newPassword) return res.status(400).json({ error: 'currentPassword and newPassword required' });
        const { ObjectId } = require('mongodb');
        const users = db.collection('testbed_users');
        const user = await users.findOne({ _id: new ObjectId(req.user.id) });
        if (!user || !bcrypt.compareSync(currentPassword, user.passwordHash))
          return res.status(401).json({ error: 'Current password incorrect' });
        await users.updateOne({ _id: new ObjectId(req.user.id) }, { $set: { passwordHash: bcrypt.hashSync(newPassword, 10) } });
        res.json({ success: true });
      } catch (e) {
        res.status(500).json({ error: e.message });
      }
    });

    // ═══════════════════════════════════════════════════════════
    // UE STORE (testbed_ues) — local config, register, provision
    // ═══════════════════════════════════════════════════════════

    function ueDefaults(imsi) {
      return {
        imsi,
        k: 'fec86ba6eb707ed08ce33ae45b4a0fba',
        opc: 'c42449363464e2e4fa8adca3063168ca',
        amf: '8000',
        dnn: 'internet',
        sst: 1,
        sd: null,
        ambrDl: 1,
        ambrUl: 1,
        label: `UE-${imsi.slice(-4)}`,
        registered: false,
        provisioned: false,
        createdAt: new Date().toISOString(),
      };
    }

    // Helper: exec command in a pod via K8s Exec API, return stdout as string
    const { PassThrough } = require('stream');
    async function execPodCmd(podName, containerName, cmd) {
      const cmdArr = Array.isArray(cmd) ? cmd : ['sh', '-c', cmd];
      return new Promise(async (resolve, reject) => {
        const stdout = new PassThrough(), stderr = new PassThrough();
        let out = '', err = '';
        stdout.on('data', d => out += d);
        stderr.on('data', d => err += d);
        try {
          await execApi.exec(ns, podName, containerName || undefined, cmdArr, stdout, stderr, null, false,
            (status) => { resolve((out || err).trim()); }
          );
        } catch (e) { reject(e); }
      });
    }

    // Helper: find running UE pod by IMSI label
    async function getUePod(imsi) {
      const pods = await k8sApi.listNamespacedPod(ns, undefined, undefined, undefined, undefined, `app=ueransim-ue,imsi=${imsi}`);
      const pod = pods.body.items.find(p => p.status?.phase === 'Running');
      if (!pod) throw new Error(`No running pod for IMSI ${imsi}`);
      return pod;
    }

    // Helper: get uesimtun0 IP from UE pod
    async function getUeTunIp(podName, container) {
      try {
        return (await execPodCmd(podName, container,
          "ip addr show | grep -oE 'inet [0-9.]+' | grep -v '127.0.0' | head -1 | awk '{print $2}'")) || null;
      } catch { return null; }
    }

    // Helper: build Open5GS subscriber document
    function buildSubscriberDoc(ue) {
      const { Long } = require('mongodb');
      return {
        imsi: ue.imsi, msisdn: [], imeisv: '4370816125816151',
        mme_host: [], mme_realm: [], purge_flag: [],
        security: { k: ue.k, op: null, opc: ue.opc, amf: ue.amf || '8000', sqn: Long.fromNumber(0) },
        ambr: { downlink: { value: ue.ambrDl || 1, unit: 3 }, uplink: { value: ue.ambrUl || 1, unit: 3 } },
        slice: [{ sst: ue.sst || 1, default_indicator: true, session: [{
          name: ue.dnn || 'internet', type: 3,
          qos: { index: 9, arp: { priority_level: 8, pre_emption_capability: 1, pre_emption_vulnerability: 1 } },
          ambr: { downlink: { value: ue.ambrDl || 1, unit: 3 }, uplink: { value: ue.ambrUl || 1, unit: 3 } }
        }] }],
        access_restriction_data: 32, subscriber_status: 0, network_access_mode: 0,
        subscribed_rau_tau_timer: 12, __v: 0
      };
    }

    // Helper: build UERANSIM ue.yaml config
    function buildUeYaml(ue) {
      return [
        `supi: 'imsi-${ue.imsi}'`, "mcc: '001'", "mnc: '01'",
        `key: '${ue.k}'`, `op: '${ue.opc}'`, "opType: 'OPC'",
        `amf: '${ue.amf || '8000'}'`, "imei: '356938035643803'", "imeiSv: '4370816125816151'",
        "gnbSearchList:", "- ueransim-gnb.5g-testbed.svc.cluster.local",
        "uacAic:", "  mps: false", "  mcs: false",
        "uacAcc:", "  normalClass: 0", "  class11: false", "  class12: false",
        "  class13: false", "  class14: false", "  class15: false",
        "sessions:", "- type: 'IPv4'", `  apn: '${ue.dnn || 'internet'}'`, "  slice:",
        `    sst: ${ue.sst || 1}`,
        ...(ue.sd ? [`    sd: '${ue.sd}'`] : []),
        "configured-nssai:", `- sst: ${ue.sst || 1}`,
        ...(ue.sd ? [`  sd: '${ue.sd}'`] : []),
        "default-nssai:", `- sst: ${ue.sst || 1}`,
        ...(ue.sd ? [`  sd: '${ue.sd}'`] : []),
        "integrity:", "  IA1: true", "  IA2: true", "  IA3: true",
        "ciphering:", "  EA0: true", "  EA1: true", "  EA2: true", "  EA3: true",
        "integrityMaxRate:", "  uplink: 'full'", "  downlink: 'full'",
      ].join('\n');
    }

    // Parse UERANSIM ps-list output into [{psi, state, type, dnn, ip}]
    function parsePsList(raw) {
      const sessions = [];
      const blocks = raw.split(/(?=PDU Session\s*\[?\d+\]?)/i);
      for (const block of blocks) {
        const psiM = block.match(/PDU Session\s*\[?(\d+)\]?/i);
        if (!psiM) continue;
        const get = (keys) => {
          for (const k of keys) {
            const m = block.match(new RegExp(`${k}\\s*[:\\[\\s]\\s*([^\\]\\n]+)`, 'i'));
            if (m) return m[1].replace(/\].*/, '').trim();
          }
          return null;
        };
        sessions.push({
          psi: parseInt(psiM[1]), state: get(['State', 'status']),
          type: get(['Session Type', 'session-type', 'Type']),
          dnn: get(['APN/DNN', 'DNN', 'apn']), ip: get(['Address', 'PDU address', 'IP', 'IPv4']),
        });
      }
      return sessions;
    }

    // Parse UERANSIM UE status output
    function parseNasStatus(raw) {
      const get = (keys) => {
        for (const k of keys) {
          const m = raw.match(new RegExp(`${k}\\s*[:\\[\\s]\\s*([^\\]\\n]+)`, 'i'));
          if (m) return m[1].replace(/\].*/, '').trim();
        }
        return null;
      };
      return {
        cmState: get(['cm-state', 'CM-STATE']),
        mmState: get(['mm-state', '5GMM-STATE', '5gmm-state']),
        rmState: get(['rm-state', 'RM-STATE']),
      };
    }

    // GET /ue — list UEs (admin: all, user: own)
    app.get('/ue', authenticateToken, async (req, res) => {
      try {
        if (!db) return res.status(503).json({ error: 'MongoDB not connected' });
        const query = req.user.role === 'admin' ? {} : { owner: req.user.id };
        const ues = await db.collection('testbed_ues').find(query).sort({ createdAt: 1 }).toArray();
        res.json(ues.map(({ _id, ...u }) => u));
      } catch (e) { res.status(500).json({ error: e.message }); }
    });

    // POST /ue — add UE to store
    app.post('/ue', authenticateToken, async (req, res) => {
      try {
        if (!db) return res.status(503).json({ error: 'MongoDB not connected' });
        const { imsi } = req.body;
        if (!imsi || !/^\d{15}$/.test(imsi))
          return res.status(400).json({ error: 'imsi must be exactly 15 digits' });
        const col = db.collection('testbed_ues');
        if (await col.findOne({ imsi })) return res.status(409).json({ error: 'IMSI already exists' });
        const { _id, ...ue } = { ...ueDefaults(imsi), ...req.body, imsi, registered: false, provisioned: false, owner: req.user.id };
        await col.insertOne(ue);
        res.json(ue);
      } catch (e) { res.status(500).json({ error: e.message }); }
    });

    // GET /ue/inventory — merged: store + K8s pods + Open5GS MongoDB
    app.get('/ue/inventory', authenticateToken, async (req, res) => {
      try {
        if (!db) return res.status(503).json({ error: 'MongoDB not connected' });
        const query = req.user.role === 'admin' ? {} : { owner: req.user.id };
        const storeUes = await db.collection('testbed_ues').find(query).sort({ createdAt: 1 }).toArray();
        const podsRes = await k8sApi.listNamespacedPod(ns, undefined, undefined, undefined, undefined, 'app=ueransim-ue');
        const pods = podsRes.body.items;
        const mongoImsis = new Set(
          (await db.collection('subscribers').find({}, { projection: { imsi: 1 } }).toArray()).map(s => s.imsi)
        );
        const result = await Promise.all(storeUes.map(async ({ _id, ...ue }) => {
          const pod = pods.find(p => p.metadata?.labels?.imsi === ue.imsi);
          let tunIp = null, podRunning = false, podPhase = 'none';
          if (pod) {
            podPhase = pod.status?.phase || 'Unknown';
            podRunning = podPhase === 'Running' &&
              pod.status?.conditions?.find(c => c.type === 'Ready')?.status === 'True';
            if (podRunning) tunIp = await getUeTunIp(pod.metadata.name, pod.spec.containers[0].name);
          }
          return { ...ue, inMongo: mongoImsis.has(ue.imsi), podName: pod?.metadata?.name || null,
            podPhase, podRunning, tunIp, hasPduSession: !!tunIp };
        }));
        res.json(result);
      } catch (e) { res.status(500).json({ error: e.message }); }
    });

    // PUT /ue/:imsi — update editable fields
    app.put('/ue/:imsi', authenticateToken, async (req, res) => {
      try {
        if (!db) return res.status(503).json({ error: 'MongoDB not connected' });
        const col = db.collection('testbed_ues');
        const ue = await col.findOne({ imsi: req.params.imsi });
        if (!ue) return res.status(404).json({ error: 'UE not found' });
        if (req.user.role !== 'admin' && ue.owner !== req.user.id) return res.status(403).json({ error: 'Access denied' });
        const { imsi: _i, registered: _r, provisioned: _p, createdAt: _c, owner: _o, _id: _x, ...editable } = req.body;
        await col.updateOne({ imsi: req.params.imsi }, { $set: { ...editable, updatedAt: new Date().toISOString() } });
        const { _id, ...updated } = await col.findOne({ imsi: req.params.imsi });
        res.json(updated);
      } catch (e) { res.status(500).json({ error: e.message }); }
    });

    // DELETE /ue/:imsi — remove from store only (does not deregister/deprovision)
    app.delete('/ue/:imsi', authenticateToken, async (req, res) => {
      try {
        if (!db) return res.status(503).json({ error: 'MongoDB not connected' });
        const col = db.collection('testbed_ues');
        const ue = await col.findOne({ imsi: req.params.imsi });
        if (!ue) return res.status(404).json({ error: 'UE not found' });
        if (req.user.role !== 'admin' && ue.owner !== req.user.id) return res.status(403).json({ error: 'Access denied' });
        await col.deleteOne({ imsi: req.params.imsi });
        res.json({ ok: true });
      } catch (e) { res.status(500).json({ error: e.message }); }
    });

    // POST /ue/:imsi/register — insert subscriber into Open5GS MongoDB
    app.post('/ue/:imsi/register', authenticateToken, async (req, res) => {
      try {
        if (!db) return res.status(503).json({ error: 'MongoDB not connected' });
        const col = db.collection('testbed_ues');
        const ue = await col.findOne({ imsi: req.params.imsi });
        if (!ue) return res.status(404).json({ error: 'UE not found in store' });
        if (req.user.role !== 'admin' && ue.owner !== req.user.id) return res.status(403).json({ error: 'Access denied' });
        const subs = db.collection('subscribers');
        if (!await subs.findOne({ imsi: ue.imsi })) await subs.insertOne(buildSubscriberDoc(ue));
        await col.updateOne({ imsi: ue.imsi }, { $set: { registered: true, registeredAt: new Date().toISOString() } });
        res.json({ ok: true, message: `${ue.imsi} registered in Open5GS` });
      } catch (e) { res.status(500).json({ error: e.message }); }
    });

    // DELETE /ue/:imsi/register — remove subscriber from Open5GS MongoDB
    app.delete('/ue/:imsi/register', authenticateToken, async (req, res) => {
      try {
        if (!db) return res.status(503).json({ error: 'MongoDB not connected' });
        const col = db.collection('testbed_ues');
        const ue = await col.findOne({ imsi: req.params.imsi });
        if (!ue) return res.status(404).json({ error: 'UE not found' });
        if (req.user.role !== 'admin' && ue.owner !== req.user.id) return res.status(403).json({ error: 'Access denied' });
        await db.collection('subscribers').deleteOne({ imsi: ue.imsi });
        await col.updateOne({ imsi: ue.imsi }, { $set: { registered: false, registeredAt: null } });
        res.json({ ok: true });
      } catch (e) { res.status(500).json({ error: e.message }); }
    });

    // POST /ue/:imsi/provision — create K8s Deployment + ConfigMap
    app.post('/ue/:imsi/provision', authenticateToken, async (req, res) => {
      try {
        if (!db) return res.status(503).json({ error: 'MongoDB not connected' });
        const col = db.collection('testbed_ues');
        const ue = await col.findOne({ imsi: req.params.imsi });
        if (!ue) return res.status(404).json({ error: 'UE not found in store' });
        if (req.user.role !== 'admin' && ue.owner !== req.user.id) return res.status(403).json({ error: 'Access denied' });
        const depName = `ue-${ue.imsi}`, cmName = `ue-config-${ue.imsi}`;
        const configMap = {
          apiVersion: 'v1', kind: 'ConfigMap',
          metadata: { name: cmName, namespace: ns, labels: { app: 'ueransim-ue', imsi: ue.imsi } },
          data: { 'ue.yaml': buildUeYaml(ue) }
        };
        const deployment = {
          apiVersion: 'apps/v1', kind: 'Deployment',
          metadata: { name: depName, namespace: ns, labels: { app: 'ueransim-ue', imsi: ue.imsi } },
          spec: {
            replicas: 1,
            selector: { matchLabels: { app: 'ueransim-ue', imsi: ue.imsi } },
            template: {
              metadata: { labels: { app: 'ueransim-ue', imsi: ue.imsi } },
              spec: {
                containers: [{
                  name: 'ue', image: 'gradiant/ueransim:3.2.6',
                  command: ['nr-ue', '-c', '/etc/ueransim/ue.yaml'],
                  securityContext: { capabilities: { add: ['NET_ADMIN'] } },
                  volumeMounts: [{ name: 'config', mountPath: '/etc/ueransim', readOnly: true }],
                  resources: { requests: { cpu: '100m', memory: '128Mi' }, limits: { cpu: '200m', memory: '256Mi' } }
                }],
                volumes: [{ name: 'config', configMap: { name: cmName, items: [{ key: 'ue.yaml', path: 'ue.yaml' }] } }]
              }
            }
          }
        };
        await k8sApi.createNamespacedConfigMap(ns, configMap);
        await appsApi.createNamespacedDeployment(ns, deployment);
        await col.updateOne({ imsi: ue.imsi }, { $set: { provisioned: true, provisionedAt: new Date().toISOString() } });
        res.json({ ok: true, containerName: depName });
      } catch (e) { res.status(500).json({ error: e.message }); }
    });

    // DELETE /ue/:imsi/deprovision — delete K8s Deployment + ConfigMap
    app.delete('/ue/:imsi/deprovision', authenticateToken, async (req, res) => {
      try {
        if (!db) return res.status(503).json({ error: 'MongoDB not connected' });
        const col = db.collection('testbed_ues');
        const ue = await col.findOne({ imsi: req.params.imsi });
        if (!ue) return res.status(404).json({ error: 'UE not found' });
        if (req.user.role !== 'admin' && ue.owner !== req.user.id) return res.status(403).json({ error: 'Access denied' });
        try { await appsApi.deleteNamespacedDeployment(`ue-${ue.imsi}`, ns); } catch (_) {}
        try { await k8sApi.deleteNamespacedConfigMap(`ue-config-${ue.imsi}`, ns); } catch (_) {}
        await col.updateOne({ imsi: ue.imsi }, { $set: { provisioned: false, provisionedAt: null } });
        res.json({ ok: true });
      } catch (e) { res.status(500).json({ error: e.message }); }
    });

    // GET /ue/:imsi/status — pod phase + tunnel IP + inMongo
    app.get('/ue/:imsi/status', authenticateToken, async (req, res) => {
      try {
        const { imsi } = req.params;
        const pods = await k8sApi.listNamespacedPod(ns, undefined, undefined, undefined, undefined, `app=ueransim-ue,imsi=${imsi}`);
        const pod = pods.body.items[0];
        if (!pod) return res.json({ imsi, containerName: null, containerRunning: false, tunIp: null, hasPduSession: false, inMongo: false });
        const podRunning = pod.status?.phase === 'Running' &&
          pod.status?.conditions?.find(c => c.type === 'Ready')?.status === 'True';
        const tunIp = podRunning ? await getUeTunIp(pod.metadata.name, pod.spec.containers[0].name) : null;
        const inMongo = !!(db && await db.collection('subscribers').findOne({ imsi }, { projection: { imsi: 1 } }));
        res.json({ imsi, containerName: pod.metadata.name, containerState: pod.status?.phase || 'Unknown',
          containerRunning: podRunning, tunIp, hasPduSession: !!tunIp, inMongo });
      } catch (e) { res.status(500).json({ error: e.message }); }
    });

    // GET /ue/:imsi/sessions — list PDU sessions via nr-cli
    app.get('/ue/:imsi/sessions', authenticateToken, async (req, res) => {
      try {
        const pod = await getUePod(req.params.imsi);
        const output = await execPodCmd(pod.metadata.name, pod.spec.containers[0].name,
          `nr-cli imsi-${req.params.imsi} --exec 'ps-list' 2>&1 || true`);
        res.json({ ok: true, output, sessions: parsePsList(output) });
      } catch (e) { res.status(500).json({ error: e.message }); }
    });

    // POST /ue/:imsi/sessions — establish PDU session
    app.post('/ue/:imsi/sessions', authenticateToken, async (req, res) => {
      try {
        const { type = 'IPv4', dnn, sst, sd } = req.body || {};
        const pod = await getUePod(req.params.imsi);
        let cmd = `ps-establish ${type}`;
        if (sst) cmd += ` --sst ${Number(sst)}`;
        if (sd)  cmd += ` --sd ${sd.replace(/^0x/i, '')}`;
        if (dnn) cmd += ` --dnn ${dnn}`;
        const output = await execPodCmd(pod.metadata.name, pod.spec.containers[0].name,
          `nr-cli imsi-${req.params.imsi} --exec '${cmd}' 2>&1 || true`);
        res.json({ ok: true, output, cmd });
      } catch (e) { res.status(500).json({ error: e.message }); }
    });

    // DELETE /ue/:imsi/sessions — release all PDU sessions
    app.delete('/ue/:imsi/sessions', authenticateToken, async (req, res) => {
      try {
        const pod = await getUePod(req.params.imsi);
        const output = await execPodCmd(pod.metadata.name, pod.spec.containers[0].name,
          `nr-cli imsi-${req.params.imsi} --exec 'ps-release-all' 2>&1 || true`);
        res.json({ ok: true, output });
      } catch (e) { res.status(500).json({ error: e.message }); }
    });

    // DELETE /ue/:imsi/sessions/:psi — release specific PDU session
    app.delete('/ue/:imsi/sessions/:psi', authenticateToken, async (req, res) => {
      try {
        const { imsi, psi } = req.params;
        const pod = await getUePod(imsi);
        const output = await execPodCmd(pod.metadata.name, pod.spec.containers[0].name,
          `nr-cli imsi-${imsi} --exec 'ps-release ${psi}' 2>&1 || true`);
        res.json({ ok: true, output });
      } catch (e) { res.status(500).json({ error: e.message }); }
    });

    // GET /ue/:imsi/nas-status — NAS state via nr-cli status
    app.get('/ue/:imsi/nas-status', authenticateToken, async (req, res) => {
      try {
        const pod = await getUePod(req.params.imsi);
        const output = await execPodCmd(pod.metadata.name, pod.spec.containers[0].name,
          `nr-cli imsi-${req.params.imsi} --exec 'status' 2>&1 || true`);
        res.json({ ok: true, output, parsed: parseNasStatus(output) });
      } catch (e) { res.status(500).json({ error: e.message }); }
    });

    // POST /ue/:imsi/nas-deregister — NAS de-registration via nr-cli
    app.post('/ue/:imsi/nas-deregister', authenticateToken, async (req, res) => {
      try {
        const type = ['normal', 'switch-off', 'disable-5g'].includes(req.body?.type) ? req.body.type : 'normal';
        const pod = await getUePod(req.params.imsi);
        const output = await execPodCmd(pod.metadata.name, pod.spec.containers[0].name,
          `nr-cli imsi-${req.params.imsi} --exec 'deregister ${type}' 2>&1 || true`);
        res.json({ ok: true, output, type });
      } catch (e) { res.status(500).json({ error: e.message }); }
    });

    // POST /ue/:imsi/ping — ICMP ping via PDU session tunnel
    app.post('/ue/:imsi/ping', authenticateToken, async (req, res) => {
      try {
        const { target = '8.8.8.8', count = 4 } = req.body || {};
        const pod = await getUePod(req.params.imsi);
        const tunIp = await getUeTunIp(pod.metadata.name, pod.spec.containers[0].name);
        if (!tunIp) return res.status(400).json({ error: 'No PDU session tunnel active' });
        const out = await execPodCmd(pod.metadata.name, pod.spec.containers[0].name,
          `ping -c ${Math.min(Number(count), 10)} -W 2 -I ${tunIp} ${target} 2>&1`);
        res.json({ ok: true, output: out, tunIp, target });
      } catch (e) { res.status(500).json({ error: e.message }); }
    });

    // GET /subscribers - List all subscribers with pagination/search
    app.get('/subscribers', authenticateToken, async (req, res) => {
      try {
        if (!db) return res.status(503).json({ error: 'MongoDB not connected' });

        const { search = '', page = 1, limit = 50 } = req.query;
        const skip = (parseInt(page) - 1) * parseInt(limit);

        const subscribers = db.collection('subscribers');

        // Build query for search
        const query = search ? { imsi: { $regex: search, $options: 'i' } } : {};

        const data = await subscribers
          .find(query)
          .skip(skip)
          .limit(parseInt(limit))
          .toArray();

        const total = await subscribers.countDocuments(query);

        res.json({
          status: 'ok',
          total,
          page: parseInt(page),
          limit: parseInt(limit),
          pages: Math.ceil(total / parseInt(limit)),
          data: data.map(s => ({
            imsi: s.imsi,
            plmn: s.plmn || { mcc: '001', mnc: '01' },
            subscribed_rau_tau_timer: s.subscribed_rau_tau_timer || 12,
            slice: s.slice || [],
            ambr: s.ambr || { uplink: 1000000, downlink: 1000000 },
            security: s.security ? { k: s.security.k, opc: s.security.opc, amf: s.security.amf } : {},
            pdn: s.pdn || []
          }))
        });
      } catch (e) {
        res.status(500).json({ error: e.message });
      }
    });

    // POST /subscribers/export - Export subscribers as JSON
    app.get('/subscribers/export', authenticateToken, async (req, res) => {
      try {
        if (!db) return res.status(503).json({ error: 'MongoDB not connected' });

        const subscribers = db.collection('subscribers');
        const data = await subscribers.find({}).toArray();

        res.setHeader('Content-Type', 'application/json');
        res.setHeader('Content-Disposition', 'attachment; filename=subscribers.json');
        res.json(data);
      } catch (e) {
        res.status(500).json({ error: e.message });
      }
    });

    // POST /subscribers/import - Bulk import subscribers
    app.post('/subscribers/import', authenticateToken, async (req, res) => {
      try {
        if (!db) return res.status(503).json({ error: 'MongoDB not connected' });

        const { subscribers: subs } = req.body;
        if (!Array.isArray(subs)) {
          return res.status(400).json({ error: 'subscribers must be an array' });
        }

        const subscribers = db.collection('subscribers');
        const results = [];

        for (const sub of subs) {
          try {
            if (!sub.imsi) throw new Error('IMSI required');

            // Ensure proper schema
            const docToInsert = {
              imsi: sub.imsi,
              pdn: sub.pdn || [{ type: 0, apn: 'internet', slice: [{ sst: 1, sd: '000000' }] }],
              slice: sub.slice || [{ sst: 1, sd: '000000' }],
              security: {
                k: sub.security?.k || sub.k || 'fec86ba6eb707ed08ce33ae45b4a0fba',
                opc: sub.security?.opc || sub.opc || 'c42449363464e2e4fa8adca3063168ca',
                amf: sub.security?.amf || sub.amf || 'c3d4'
              },
              ambr: sub.ambr || { uplink: 1000000, downlink: 1000000 },
              subscribed_rau_tau_timer: sub.subscribed_rau_tau_timer || 12,
              plmn: sub.plmn || { mcc: '001', mnc: '01' }
            };

            const existing = await subscribers.findOne({ imsi: sub.imsi });
            if (existing) {
              results.push({ imsi: sub.imsi, status: 'skipped', reason: 'already exists' });
            } else {
              await subscribers.insertOne(docToInsert);
              results.push({ imsi: sub.imsi, status: 'success' });
            }
          } catch (err) {
            results.push({ imsi: sub.imsi, status: 'failed', reason: err.message });
          }
        }

        res.json({
          status: 'ok',
          imported: results.filter(r => r.status === 'success').length,
          skipped: results.filter(r => r.status === 'skipped').length,
          failed: results.filter(r => r.status === 'failed').length,
          results
        });
      } catch (e) {
        res.status(500).json({ error: e.message });
      }
    });

    // UE routes above handle provisioning and operations

    // ============================================
    // PCAP TRACING (Traffic Capture)
    // ============================================

    const PCAP_DIR = '/tmp/pcaps';
    const MAX_SESSIONS_PER_TYPE = 10;
    let captureSessions = [];

    const { mkdirSync, createWriteStream, existsSync, unlinkSync } = require('fs');
    try { mkdirSync(PCAP_DIR, { recursive: true }); } catch (e) {}

    // Helper: start one tcpdump capture on a pod, throttle oldest completed if at limit
    async function startOneCapture(podName, containerName, iface, filter, duration, type) {
      const ofType = captureSessions.filter(s => s.type === type);
      if (ofType.length >= MAX_SESSIONS_PER_TYPE) {
        const oldest = ofType.find(s => s.status !== 'running');
        if (oldest) {
          if (oldest.timeout) clearTimeout(oldest.timeout);
          try { if (existsSync(oldest.filePath)) unlinkSync(oldest.filePath); } catch (e) {}
          captureSessions = captureSessions.filter(s => s.id !== oldest.id);
        }
      }
      const sessionId = Math.random().toString(36).substr(2, 9);
      const filePath = `${PCAP_DIR}/${sessionId}.pcap`;
      const session = {
        id: sessionId, type,
        pod: podName, container: containerName || '',
        interface: iface, filter,
        startTime: new Date().toISOString(),
        status: 'running', filePath,
      };
      captureSessions.push(session);

      const fileStream = createWriteStream(filePath);
      const cmd = ['tcpdump', '-i', iface, '-w', '-', '-U'];
      if (filter) cmd.push(...filter.trim().split(/\s+/).filter(Boolean));

      execApi.exec(ns, podName, containerName || undefined, cmd, fileStream, null, null, false,
        (status) => {
          fileStream.end();
          const s = captureSessions.find(s => s.id === sessionId);
          if (s) {
            s.status = status.status === 'Success' ? 'stopped' : 'error';
            s.stopTime = new Date().toISOString();
            if (status.message) s.error = status.message;
          }
        }
      ).then(ws => {
        const s = captureSessions.find(s => s.id === sessionId);
        if (s) {
          s.ws = ws;
          s.timeout = setTimeout(() => { try { ws.close(); } catch(e){} }, duration * 1000);
        }
      }).catch(e => {
        fileStream.end();
        const s = captureSessions.find(s => s.id === sessionId);
        if (s) { s.status = 'error'; s.error = e.message; }
      });

      return { id: sessionId, pod: podName, status: 'started' };
    }

    // GET /pcap/pods - List pods available for capture
    app.get('/pcap/pods', authenticateToken, async (req, res) => {
      try {
        const pods = await k8sApi.listNamespacedPod(ns, undefined, undefined, undefined, undefined);
        const result = pods.body.items
          .filter(p => p.status?.phase === 'Running')
          .map(p => ({
            name: p.metadata?.name,
            app: p.metadata?.labels?.app,
            namespace: p.metadata?.namespace,
            podIP: p.status?.podIP,
            containers: p.spec?.containers?.map(c => c.name) || []
          }));
        res.json(result);
      } catch (e) {
        res.status(500).json({ error: e.message });
      }
    });

    // GET /pcap/sessions - List sessions (filter by ?type=interface|pod)
    app.get('/pcap/sessions', authenticateToken, (req, res) => {
      const { type } = req.query;
      const result = type ? captureSessions.filter(s => s.type === type) : captureSessions;
      res.json({ sessions: result.map(({ ws, timeout, ...safe }) => safe) });
    });

    // POST /pcap/start - Start capture (single interface session or multiple pod sessions)
    app.post('/pcap/start', authenticateToken, async (req, res) => {
      try {
        let { type = 'pod', pod, container, pods: podsList,
              interface: iface = 'any', filter = '', duration = 60 } = req.body;

        // Interface Capture: auto-select AMF pod
        if (type === 'interface') {
          const amfPods = await k8sApi.listNamespacedPod(ns, undefined, undefined, undefined, undefined, 'app=open5gs-amf');
          const amfPod = amfPods.body.items.find(p => p.status?.phase === 'Running');
          if (!amfPod) return res.status(503).json({ error: 'AMF pod not ready' });
          const result = await startOneCapture(
            amfPod.metadata.name, amfPod.spec.containers[0].name,
            iface, filter, duration, 'interface'
          );
          return res.json({ sessions: [result], message: `Interface capture started on ${amfPod.metadata.name}` });
        }

        // Pod Capture: accept pods array or single pod (backward compat)
        const targets = podsList && podsList.length > 0
          ? podsList
          : (pod ? [{ pod, container }] : []);
        if (targets.length === 0) return res.status(400).json({ error: 'Select at least one pod' });

        const results = await Promise.all(
          targets.map(t => startOneCapture(t.pod, t.container || '', iface, filter, duration, 'pod'))
        );
        res.json({ sessions: results, message: `Started ${results.length} capture(s)` });
      } catch (e) {
        res.status(500).json({ error: e.message });
      }
    });

    // POST /pcap/stop/:id - Stop a capture session
    app.post('/pcap/stop/:id', authenticateToken, (req, res) => {
      const session = captureSessions.find(s => s.id === req.params.id);
      if (!session) return res.status(404).json({ error: 'Session not found' });
      try {
        if (session.timeout) clearTimeout(session.timeout);
        if (session.ws) session.ws.close();
        session.status = 'stopped';
        session.stopTime = new Date().toISOString();
        const { ws, timeout, ...safe } = session;
        res.json({ success: true, session: safe });
      } catch (e) {
        res.status(500).json({ error: e.message });
      }
    });

    // GET /pcap/download/:id - Download PCAP file
    app.get('/pcap/download/:id', authenticateToken, (req, res) => {
      const session = captureSessions.find(s => s.id === req.params.id);
      if (!session) return res.status(404).json({ error: 'Session not found' });
      if (!existsSync(session.filePath)) return res.status(404).json({ error: 'PCAP file not found' });
      res.download(session.filePath, `capture-${session.id}.pcap`);
    });

    // DELETE /pcap/sessions/:id - Delete a session
    app.delete('/pcap/sessions/:id', authenticateToken, (req, res) => {
      const session = captureSessions.find(s => s.id === req.params.id);
      if (!session) return res.status(404).json({ error: 'Session not found' });
      try {
        if (session.timeout) clearTimeout(session.timeout);
        if (session.ws) session.ws.close();
        try { if (existsSync(session.filePath)) unlinkSync(session.filePath); } catch (e) {}
        captureSessions = captureSessions.filter(s => s.id !== req.params.id);
        res.json({ success: true });
      } catch (e) {
        res.status(500).json({ error: e.message });
      }
    });

    // Health check
    app.get('/health', (req, res) => {
      res.json({ status: 'ok', timestamp: new Date().toISOString() });
    });

    const PORT = process.env.PORT || 5000;
    app.listen(PORT, () => {
      console.log(`[testbed-api] Listening on port ${PORT}`);
      console.log(`[testbed-api] K8s namespace: ${ns}`);
      console.log(`[testbed-api] Connected to K8s cluster`);
      console.log(`[testbed-api] UE management endpoints ready at /ue`);
    });

  # package.json for testbed-api
  package.json: |
    {
      "name": "testbed-api-k8s",
      "version": "1.0.0",
      "description": "5G Testbed API for K8s management",
      "main": "api-server.js",
      "scripts": {
        "start": "node api-server.js"
      },
      "dependencies": {
        "express": "^4.18.2",
        "cors": "^2.8.5",
        "@kubernetes/client-node": "^0.20.0",
        "mongodb": "^5.9.0",
        "bcryptjs": "^2.4.3",
        "jsonwebtoken": "^9.0.2"
      }
    }
