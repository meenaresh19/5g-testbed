    // Helper: tun interface index for a given IMSI within its owner's block
    async function getTunIface(imsi) {
      const owner = await getUserForImsi(imsi);
      if (!owner) throw new Error(`No user owns IMSI ${imsi}`);
      const idx = parseInt(imsi) - parseInt(owner.imsiStart);
      return `uesimtun${idx}`;
    }

    // POST /ue/:imsi/socks/start — start microsocks bound to uesimtunX inside the pod
    app.post('/ue/:imsi/socks/start', authenticateToken, async (req, res) => {
      try {
        const { port = 1080 } = req.body || {};
        const p = Math.min(Math.max(parseInt(port) || 1080, 1024), 65535);
        const pod = await getUePod(req.params.imsi);
        const podName = pod.metadata.name;
        const container = pod.spec.containers[0].name;
        const tun = await getTunIface(req.params.imsi);
        // Install microsocks if missing, get TUN IP, start via bash nr-binder (no exec bit)
        // Use setsid + nohup to survive exec session close; join with \n to avoid & && syntax error
        // Start command: shell must exit immediately after forking — no sleep!
        // Keeping exec session alive with sleep causes SIGTERM on close
        // Kill existing microsocks in separate exec (avoids SIGTERM on pkill exit code)
        await execPodCmd(podName, container, 'pkill -f microsocks 2>/dev/null; true');
        await new Promise(r => setTimeout(r, 300));
        const cmd = [
          'which microsocks >/dev/null 2>&1 || apt-get install -y -qq microsocks',
          'TUN_IP=$(ip addr show ' + tun + ' 2>/dev/null | grep "inet " | awk \'{print $2}\' | cut -d/ -f1)',
          '[ -z "$TUN_IP" ] && exit 1',
          'cd /usr/local/bin',
          'bash nr-binder "$TUN_IP" microsocks -p ' + p + ' > /tmp/socks-' + p + '.log 2>&1 &',
        ].join('\n');
        await execPodCmd(podName, container, cmd);
        // Wait in API then verify via port listen check (not pgrep — zombies confuse it)
        await new Promise(r => setTimeout(r, 1200));
        const checkOut = await execPodCmd(podName, container,
          'ss -tlnp 2>/dev/null | grep -q ":' + p + ' " && echo "listening" || echo "not-listening"');
        const running = checkOut.includes('listening');
        // Get tun IP separately if needed
        const tunIpOut = await execPodCmd(podName, container,
          'ip addr show ' + tun + ' 2>/dev/null | grep "inet " | awk \'{print $2}\' | cut -d/ -f1');
        const tunIp = tunIpOut.trim() || null;
        const owner = await getUserForImsi(req.params.imsi);
        const ueHostNet = await resolveUeHostNetwork(owner.username);
        res.json({ ok: running, podName, tun, tunIp, port: p,
          hostNetwork: ueHostNet,
          portForwardCmd: `kubectl port-forward -n 5g-testbed pod/${podName} ${p}:${p}`,
          hostCmd: `nr-binder ${tunIp} curl -s ifconfig.me  # replace curl with your app` });
      } catch (e) { res.status(500).json({ error: e.message }); }
    });

    // GET /ue/:imsi/socks/status — check if microsocks is running in the pod
    app.get('/ue/:imsi/socks/status', authenticateToken, async (req, res) => {
      try {
        const { port = 1080 } = req.query;
        const p = parseInt(port) || 1080;
        const pod = await getUePod(req.params.imsi);
        const out = await execPodCmd(pod.metadata.name, pod.spec.containers[0].name,
          'ss -tlnp 2>/dev/null | grep -q ":' + p + ' " && echo "listening" || echo "not-listening"');
        const running = out.includes('listening');
        const tun = await getTunIface(req.params.imsi);
        res.json({ ok: true, running, output: out.trim(), tun, port: p,
          podName: pod.metadata.name });
      } catch (e) { res.status(500).json({ error: e.message }); }
    });

    // DELETE /ue/:imsi/socks/stop — kill microsocks in the pod
    app.delete('/ue/:imsi/socks/stop', authenticateToken, async (req, res) => {
      try {
        const pod = await getUePod(req.params.imsi);
        await execPodCmd(pod.metadata.name, pod.spec.containers[0].name,
          'pkill -f microsocks 2>/dev/null || true');
        res.json({ ok: true });
      } catch (e) { res.status(500).json({ error: e.message }); }
    });

    // GET /subscribers - List all subscribers with pagination/search
    app.get('/subscribers', authenticateToken, async (req, res) => {
      try {
        if (!db) return res.status(503).json({ error: 'MongoDB not connected' });

        const { search = '', page = 1, limit = 50 } = req.query;
        const skip = (parseInt(page) - 1) * parseInt(limit);

        const subscribers = db.collection('subscribers');

        // For non-admin users, restrict to their own IMSI block
        let scopeFilter = {};
        if (req.user.role !== 'admin') {
          const user = await db.collection('testbed_users').findOne({ username: req.user.username });
          if (user && user.imsiStart && user.imsiCount) {
            const imsiList = Array.from({ length: user.imsiCount }, (_, i) =>
              String(parseInt(user.imsiStart) + i).padStart(15, '0')
            );
            scopeFilter = { imsi: { $in: imsiList } };
          } else {
            // No IMSI block assigned — return empty
            return res.json({ status: 'ok', total: 0, page: 1, limit: parseInt(limit), pages: 0, data: [] });
          }
        }

        // Build query combining scope + search
        const searchFilter = search ? { imsi: { $regex: search, $options: 'i' } } : null;
        const query = searchFilter && Object.keys(scopeFilter).length
          ? { $and: [scopeFilter, searchFilter] }
          : searchFilter || scopeFilter;

        const data = await subscribers
          .find(query)
          .skip(skip)
          .limit(parseInt(limit))
          .toArray();

        const total = await subscribers.countDocuments(query);

        res.json({
          status: 'ok',
          total,
          page: parseInt(page),
          limit: parseInt(limit),
          pages: Math.ceil(total / parseInt(limit)),
          data: data.map(s => ({
            imsi: s.imsi,
            plmn: s.plmn || { mcc: '001', mnc: '01' },
            subscribed_rau_tau_timer: s.subscribed_rau_tau_timer || 12,
            slice: s.slice || [],
            ambr: s.ambr || { uplink: 1000000, downlink: 1000000 },
            security: s.security ? { k: s.security.k, opc: s.security.opc, amf: s.security.amf } : {},
            pdn: s.pdn || []
          }))
        });
      } catch (e) {
        res.status(500).json({ error: e.message });
      }
    });

    // POST /subscribers/export - Export subscribers as JSON
    app.get('/subscribers/export', authenticateToken, async (req, res) => {
