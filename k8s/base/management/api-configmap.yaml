        if (!db) return res.status(503).json({ error: 'MongoDB not connected' });
        const username = (req.user.role === 'admin' && req.body?.username) ? req.body.username : req.user.username;
        const user = await db.collection('testbed_users').findOne({ username });
        if (!user || !user.imsiStart) return res.status(400).json({ error: 'No IMSI block assigned' });
        const useHostNet = await resolveUeHostNetwork(username);
        const depName = `ue-${username}`, cmName = `ue-config-${username}`;
        const baseUe = { imsi: user.imsiStart, k: 'fec86ba6eb707ed08ce33ae45b4a0fba',
          opc: 'c42449363464e2e4fa8adca3063168ca', amf: '8000', dnn: 'internet', sst: 1 };
        const configMap = {
          apiVersion: 'v1', kind: 'ConfigMap',
          metadata: { name: cmName, namespace: ns, labels: { app: 'ueransim-ue', username } },
          data: { 'ue.yaml': buildUeYaml(baseUe) }
        };
        const deployment = {
          apiVersion: 'apps/v1', kind: 'Deployment',
          metadata: { name: depName, namespace: ns, labels: { app: 'ueransim-ue', username } },
          spec: {
            replicas: 1,
            selector: { matchLabels: { app: 'ueransim-ue', username } },
            template: {
              metadata: { labels: { app: 'ueransim-ue', username } },
              spec: {
                hostNetwork: useHostNet,
                dnsPolicy: useHostNet ? 'ClusterFirstWithHostNet' : 'ClusterFirst',
                containers: [{
                  name: 'ue', image: 'gradiant/ueransim:3.2.6',
                  command: ['nr-ue', '-c', '/etc/ueransim/ue.yaml', '-n', String(user.imsiCount || 1)],
                  securityContext: { privileged: true, capabilities: { add: ['NET_ADMIN', 'NET_RAW'] } },
                  volumeMounts: [
                    { name: 'config', mountPath: '/etc/ueransim', readOnly: true },
                    { name: 'dev-net-tun', mountPath: '/dev/net/tun' }
                  ],
                  resources: { requests: { cpu: '100m', memory: '128Mi' }, limits: { cpu: '500m', memory: '512Mi' } }
                }],
                volumes: [
                  { name: 'config', configMap: { name: cmName, items: [{ key: 'ue.yaml', path: 'ue.yaml' }] } },
                  { name: 'dev-net-tun', hostPath: { path: '/dev/net/tun' } }
                ]
              }
            }
          }
        };
        await k8sApi.createNamespacedConfigMap(ns, configMap);
        await appsApi.createNamespacedDeployment(ns, deployment);
        await db.collection('testbed_users').updateOne({ username }, { $set: { ueProvisioned: true, ueProvisionedAt: new Date().toISOString() } });
        res.json({ ok: true, podName: depName, imsiCount: user.imsiCount });
      } catch (e) { res.status(500).json({ error: e.message }); }
    });

    // DELETE /ue/deprovision — delete K8s Deployment+ConfigMap for user's block
    app.delete('/ue/deprovision', authenticateToken, async (req, res) => {
