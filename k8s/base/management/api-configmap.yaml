      }
    });

    // POST /subscribers/bulk-add - Add N sequential subscribers from startImsi
    app.post('/subscribers/bulk-add', authenticateToken, async (req, res) => {
      try {
        if (!db) return res.status(503).json({ error: 'MongoDB not connected' });
        const { startImsi, count, ...rest } = req.body;
        if (!startImsi) return res.status(400).json({ error: 'startImsi required' });
        if (!count || count < 1 || count > 1000) return res.status(400).json({ error: 'count must be 1–1000' });

        const subscribers = db.collection('subscribers');
        const results = [];
        let imsiNum = BigInt(startImsi);

        for (let i = 0; i < count; i++) {
          const imsi = imsiNum.toString().padStart(startImsi.length, '0');
          try {
            const existing = await subscribers.findOne({ imsi });
            if (existing) {
              results.push({ imsi, status: 'skipped', reason: 'already exists' });
            } else {
              await subscribers.insertOne(normalizeSubscriberDoc({ ...rest, imsi }));
              results.push({ imsi, status: 'success' });
            }
          } catch (err) {
            results.push({ imsi, status: 'failed', reason: err.message });
          }
          imsiNum++;
        }

        res.json({
          status: 'ok',
          created: results.filter(r => r.status === 'success').length,
          skipped: results.filter(r => r.status === 'skipped').length,
          failed: results.filter(r => r.status === 'failed').length,
          results
        });
      } catch (e) {
        res.status(500).json({ error: e.message });
      }
    });

    // UE routes above handle provisioning and operations

    // ============================================
    // AUTOSCALER (Phase 3)
    // ============================================

    const AUTOSCALER_URL = process.env.AUTOSCALER_URL || 'http://autoscaler.5g-testbed.svc.cluster.local:8080';
    const PROMETHEUS_URL_AS = process.env.PROMETHEUS_URL || 'http://prometheus.5g-testbed.svc.cluster.local:9090';

    async function prometheusScalar(query) {
      try {
        const r = await fetch(`${PROMETHEUS_URL_AS}/api/v1/query?query=${encodeURIComponent(query)}`, { signal: AbortSignal.timeout(5000) });
        const d = await r.json();
        if (d.status === 'success' && d.data.result.length > 0) return parseFloat(d.data.result[0].value[1]);
      } catch (_) {}
      return null;
    }

    // GET /autoscaler/status — autoscaler health + live per-NF metrics + replica counts
    app.get('/autoscaler/status', authenticateToken, requireAdmin, async (req, res) => {
      try {
        // Fetch autoscaler pod health
        let autoscalerHealth = null;
        try {
          const r = await fetch(`${AUTOSCALER_URL}/`, { signal: AbortSignal.timeout(3000) });
          autoscalerHealth = await r.json();
        } catch (_) {}

        // Read policies from ConfigMap
        let policies = [];
        try {
          const cm = await k8sApi.readNamespacedConfigMap('autoscaler-policies', ns);
          policies = JSON.parse(cm.body.data['policies.json']).policies || [];
        } catch (_) {}

        // Enrich each policy with live metric value + current replicas
        const enriched = await Promise.all(policies.map(async p => {
          const [metricValue, depInfo] = await Promise.all([
            prometheusScalar(p.prometheusQuery),
            appsApi.readNamespacedDeployment(p.deployment, ns).then(d => ({
              replicas: d.body.spec.replicas || 1,
              readyReplicas: d.body.status.readyReplicas || 0
            })).catch(() => ({ replicas: 1, readyReplicas: 0 }))
          ]);
          return {
            ...p,
            currentReplicas: depInfo.replicas,
            readyReplicas: depInfo.readyReplicas,
            metricValue,
            lastScale: autoscalerHealth?.policies?.find(ap => ap.name === p.name)?.lastScale || null
          };
        }));

        res.json({
          status: 'ok',
          autoscalerOnline: autoscalerHealth !== null,
          uptime: autoscalerHealth?.uptime || null,
          evaluationInterval: autoscalerHealth?.evaluationInterval || null,
          cooldownSeconds: autoscalerHealth?.cooldownSeconds || null,
          policies: enriched
        });
      } catch (e) {
        res.status(500).json({ error: e.message });
      }
    });

    // GET /autoscaler/policies — return the full policies.json from ConfigMap
    app.get('/autoscaler/policies', authenticateToken, requireAdmin, async (req, res) => {
      try {
        const cm = await k8sApi.readNamespacedConfigMap('autoscaler-policies', ns);
        const cfg = JSON.parse(cm.body.data['policies.json']);
        res.json({ status: 'ok', policies: cfg });
      } catch (e) {
        res.status(500).json({ error: e.message });
      }
    });

    // PUT /autoscaler/policies — update policies ConfigMap + restart autoscaler
    app.put('/autoscaler/policies', authenticateToken, requireAdmin, async (req, res) => {
      try {
        const cfg = req.body; // full policies object
        if (!cfg || !Array.isArray(cfg.policies)) return res.status(400).json({ error: 'policies array required' });

        const cm = await k8sApi.readNamespacedConfigMap('autoscaler-policies', ns);
        cm.body.data['policies.json'] = JSON.stringify(cfg, null, 2);
        await k8sApi.replaceNamespacedConfigMap('autoscaler-policies', ns, cm.body);

        // Restart autoscaler to pick up new config
        await rolloutRestart('autoscaler');

        res.json({ status: 'ok', message: 'Policies updated — autoscaler restarting' });
      } catch (e) {
        res.status(500).json({ error: e.message });
      }
    });

    // ============================================
    // PCAP TRACING (Traffic Capture)
    // ============================================

    const PCAP_DIR = '/tmp/pcaps';
    const MAX_SESSIONS_PER_TYPE = 10;
    let captureSessions = [];

    const { mkdirSync, createWriteStream, existsSync, unlinkSync } = require('fs');
    try { mkdirSync(PCAP_DIR, { recursive: true }); } catch (e) {}

    // Helper: start one tcpdump capture on a pod, throttle oldest completed if at limit
    async function startOneCapture(podName, containerName, iface, filter, duration, type) {
      const ofType = captureSessions.filter(s => s.type === type);
      if (ofType.length >= MAX_SESSIONS_PER_TYPE) {
        const oldest = ofType.find(s => s.status !== 'running');
        if (oldest) {
          if (oldest.timeout) clearTimeout(oldest.timeout);
          try { if (existsSync(oldest.filePath)) unlinkSync(oldest.filePath); } catch (e) {}
          captureSessions = captureSessions.filter(s => s.id !== oldest.id);
        }
      }
      const sessionId = Math.random().toString(36).substr(2, 9);
      const filePath = `${PCAP_DIR}/${sessionId}.pcap`;
      const session = {
        id: sessionId, type,
        pod: podName, container: containerName || '',
        interface: iface, filter,
        startTime: new Date().toISOString(),
        status: 'running', filePath,
      };
      captureSessions.push(session);

      const fileStream = createWriteStream(filePath);
      const cmd = ['tcpdump', '-i', iface, '-w', '-', '-U'];
      if (filter) cmd.push(...filter.trim().split(/\s+/).filter(Boolean));

      execApi.exec(ns, podName, containerName || undefined, cmd, fileStream, null, null, false,
        (status) => {
          fileStream.end();
          const s = captureSessions.find(s => s.id === sessionId);
          if (s) {
            s.status = status.status === 'Success' ? 'stopped' : 'error';
            s.stopTime = new Date().toISOString();
            if (status.message) s.error = status.message;
          }
        }
      ).then(ws => {
        const s = captureSessions.find(s => s.id === sessionId);
        if (s) {
          s.ws = ws;
          s.timeout = setTimeout(() => { try { ws.close(); } catch(e){} }, duration * 1000);
        }
      }).catch(e => {
        fileStream.end();
        const s = captureSessions.find(s => s.id === sessionId);
        if (s) { s.status = 'error'; s.error = e.message; }
      });

      return { id: sessionId, pod: podName, status: 'started' };
    }

    // GET /pcap/pods - List pods available for capture
    app.get('/pcap/pods', authenticateToken, async (req, res) => {
      try {
        const EXCLUDED = new Set(['grafana', 'prometheus', 'mongodb', 'open5gs-bsf',
          'testbed-api', 'testbed-ui', 'testbed-proxy']);
        const pods = await k8sApi.listNamespacedPod(ns);
        let result = pods.body.items
          .filter(p => p.status?.phase === 'Running')
          .filter(p => !EXCLUDED.has(p.metadata?.labels?.app))
          .map(p => ({
            name: p.metadata?.name,
            app: p.metadata?.labels?.app,
            username: p.metadata?.labels?.username || null,
            namespace: p.metadata?.namespace,
            podIP: p.status?.podIP,
            containers: p.spec?.containers?.map(c => c.name) || []
          }));
        // Non-admin: only show their own UE pod
        if (req.user.role !== 'admin')
          result = result.filter(p => p.app === 'ueransim-ue' && p.username === req.user.username);
        res.json(result);
      } catch (e) {
        res.status(500).json({ error: e.message });
      }
    });

    // GET /pcap/sessions - List sessions (filter by ?type=interface|pod)
    app.get('/pcap/sessions', authenticateToken, (req, res) => {
      const { type } = req.query;
      const result = type ? captureSessions.filter(s => s.type === type) : captureSessions;
      res.json({ sessions: result.map(({ ws, timeout, ...safe }) => safe) });
    });

    // POST /pcap/start - Start capture (single interface session or multiple pod sessions)
    app.post('/pcap/start', authenticateToken, async (req, res) => {
      try {
        let { type = 'pod', pod, container, pods: podsList,
              interface: iface = 'any', filter = '', duration = 60 } = req.body;

        // Interface Capture: auto-select AMF pod
        if (type === 'interface') {
          const amfPods = await k8sApi.listNamespacedPod(ns, undefined, undefined, undefined, undefined, 'app=open5gs-amf');
          const amfPod = amfPods.body.items.find(p => p.status?.phase === 'Running');
          if (!amfPod) return res.status(503).json({ error: 'AMF pod not ready' });
          const result = await startOneCapture(
            amfPod.metadata.name, amfPod.spec.containers[0].name,
            iface, filter, duration, 'interface'
          );
          return res.json({ sessions: [result], message: `Interface capture started on ${amfPod.metadata.name}` });
        }

        // Pod Capture: accept pods array or single pod (backward compat)
        const targets = podsList && podsList.length > 0
          ? podsList
          : (pod ? [{ pod, container }] : []);
        if (targets.length === 0) return res.status(400).json({ error: 'Select at least one pod' });

        const results = await Promise.all(
          targets.map(t => startOneCapture(t.pod, t.container || '', iface, filter, duration, 'pod'))
        );
        res.json({ sessions: results, message: `Started ${results.length} capture(s)` });
      } catch (e) {
        res.status(500).json({ error: e.message });
      }
    });

    // POST /pcap/stop/:id - Stop a capture session
    app.post('/pcap/stop/:id', authenticateToken, (req, res) => {
      const session = captureSessions.find(s => s.id === req.params.id);
      if (!session) return res.status(404).json({ error: 'Session not found' });
      try {
        if (session.timeout) clearTimeout(session.timeout);
        if (session.ws) session.ws.close();
        session.status = 'stopped';
        session.stopTime = new Date().toISOString();
        const { ws, timeout, ...safe } = session;
        res.json({ success: true, session: safe });
      } catch (e) {
        res.status(500).json({ error: e.message });
      }
    });

    // GET /pcap/download/:id - Download PCAP file
    app.get('/pcap/download/:id', authenticateToken, (req, res) => {
      const session = captureSessions.find(s => s.id === req.params.id);
      if (!session) return res.status(404).json({ error: 'Session not found' });
      if (!existsSync(session.filePath)) return res.status(404).json({ error: 'PCAP file not found' });
      res.download(session.filePath, `capture-${session.id}.pcap`);
    });

    // DELETE /pcap/sessions/:id - Delete a session
    app.delete('/pcap/sessions/:id', authenticateToken, (req, res) => {
      const session = captureSessions.find(s => s.id === req.params.id);
      if (!session) return res.status(404).json({ error: 'Session not found' });
      try {
        if (session.timeout) clearTimeout(session.timeout);
        if (session.ws) session.ws.close();
        try { if (existsSync(session.filePath)) unlinkSync(session.filePath); } catch (e) {}
        captureSessions = captureSessions.filter(s => s.id !== req.params.id);
        res.json({ success: true });
      } catch (e) {
        res.status(500).json({ error: e.message });
      }
    });

    // ============================================
    // NETWORK SLICING (Phase 4)
    // ============================================

    const ALL_SLICE_NFS = [
      'open5gs-nrf', 'open5gs-ausf', 'open5gs-udm', 'open5gs-udr',
      'open5gs-pcf', 'open5gs-nssf', 'open5gs-bsf',
      'open5gs-amf', 'open5gs-smf', 'open5gs-upf'
    ];

    function defaultNfAlloc(name) {
      const required = ['open5gs-nrf','open5gs-ausf','open5gs-udm','open5gs-udr',
                        'open5gs-pcf','open5gs-amf','open5gs-smf','open5gs-upf'];
      return {
        name, enabled: required.includes(name),
        cpu:    { request: '100m', limit: '500m' },
        memory: { request: '64Mi', limit: '256Mi' },
        replicas: 1
      };
    }

    // GET /slices — list all slices
    app.get('/slices', authenticateToken, async (req, res) => {
      try {
        const slices = await db.collection('slices').find({}).sort({ sst: 1, sd: 1 }).toArray();
        res.json(slices);
      } catch (e) { res.status(500).json({ error: e.message }); }
    });

    // GET /slices/:id
    app.get('/slices/:id', authenticateToken, async (req, res) => {
      try {
        const { ObjectId } = require('mongodb');
        const slice = await db.collection('slices').findOne({ _id: new ObjectId(req.params.id) });
        if (!slice) return res.status(404).json({ error: 'Slice not found' });
        res.json(slice);
      } catch (e) { res.status(500).json({ error: e.message }); }
    });

    // POST /slices — create slice (admin only)
    app.post('/slices', authenticateToken, requireAdmin, async (req, res) => {
      try {
        const b = req.body;
        const nfs = (b.networkFunctions && b.networkFunctions.length)
          ? b.networkFunctions
          : ALL_SLICE_NFS.map(defaultNfAlloc);
        const doc = {
          name:        b.name || '',
          description: b.description || '',
          sst:         parseInt(b.sst) || 1,
          sd:          b.sd || '',
          color:       b.color || '#3b82f6',
          status:      'draft',
          dnn:         b.dnn || 'internet',
          subnet:      b.subnet || '10.45.0.0/16',
          dns:         b.dns || ['8.8.8.8', '8.8.4.4'],
          ambr:        b.ambr || { downlink: { value: 1000, unit: 3 }, uplink: { value: 500, unit: 3 } },
          qos:         b.qos  || { index: 9, arp: { priority_level: 8, pre_emption_capability: 1, pre_emption_vulnerability: 1 } },
          mtu:         parseInt(b.mtu) || 1400,
          priority:    parseInt(b.priority) || 1,
          networkFunctions: nfs,
          createdAt: new Date(), updatedAt: new Date()
        };
        const result = await db.collection('slices').insertOne(doc);
        res.status(201).json({ ...doc, _id: result.insertedId });
      } catch (e) { res.status(400).json({ error: e.message }); }
    });

    // PUT /slices/:id — update slice (admin only)
    app.put('/slices/:id', authenticateToken, requireAdmin, async (req, res) => {
      try {
        const { ObjectId } = require('mongodb');
        const update = { ...req.body, updatedAt: new Date() };
        delete update._id;
        const result = await db.collection('slices').findOneAndUpdate(
          { _id: new ObjectId(req.params.id) },
          { $set: update },
          { returnDocument: 'after' }
        );
        if (!result) return res.status(404).json({ error: 'Slice not found' });
        res.json(result);
      } catch (e) { res.status(400).json({ error: e.message }); }
    });

    // DELETE /slices/:id (admin only)
    app.delete('/slices/:id', authenticateToken, requireAdmin, async (req, res) => {
      try {
        const { ObjectId } = require('mongodb');
        const result = await db.collection('slices').findOneAndDelete({ _id: new ObjectId(req.params.id) });
        if (!result) return res.status(404).json({ error: 'Slice not found' });
        res.json({ success: true });
      } catch (e) { res.status(500).json({ error: e.message }); }
    });

    // POST /slices/:id/apply — patch NF deployment resources/replicas (admin only)
    app.post('/slices/:id/apply', authenticateToken, requireAdmin, async (req, res) => {
      try {
        const { ObjectId } = require('mongodb');
        const slice = await db.collection('slices').findOne({ _id: new ObjectId(req.params.id) });
        if (!slice) return res.status(404).json({ error: 'Slice not found' });

        const results = [];
        for (const nfAlloc of (slice.networkFunctions || [])) {
          if (!nfAlloc.enabled) continue;
          try {
            const dep = await appsApi.readNamespacedDeployment(nfAlloc.name, ns);
            const containers = dep.body.spec?.template?.spec?.containers || [];
            if (containers.length === 0) {
              results.push({ nf: nfAlloc.name, status: 'skipped', error: 'no containers' }); continue;
            }
            containers[0].resources = {
              requests: { cpu: nfAlloc.cpu?.request || '100m', memory: nfAlloc.memory?.request || '64Mi' },
              limits:   { cpu: nfAlloc.cpu?.limit   || '500m', memory: nfAlloc.memory?.limit   || '256Mi' }
            };
            if (dep.body.spec) dep.body.spec.replicas = nfAlloc.replicas || 1;
            if (!dep.body.spec.template.metadata) dep.body.spec.template.metadata = {};
            if (!dep.body.spec.template.metadata.annotations) dep.body.spec.template.metadata.annotations = {};
            dep.body.spec.template.metadata.annotations['kubectl.kubernetes.io/restartedAt'] = new Date().toISOString();
            await appsApi.replaceNamespacedDeployment(nfAlloc.name, ns, dep.body);
            results.push({ nf: nfAlloc.name, status: 'applied' });
          } catch (e) {
            results.push({ nf: nfAlloc.name, status: 'error', error: e.message });
          }
        }

        await db.collection('slices').updateOne(
          { _id: new ObjectId(req.params.id) },
          { $set: { status: 'active', updatedAt: new Date() } }
        );
        res.json({ success: true, results });
      } catch (e) { res.status(500).json({ error: e.message }); }
    });

    // POST /slices/:id/deactivate (admin only)
    app.post('/slices/:id/deactivate', authenticateToken, requireAdmin, async (req, res) => {
      try {
        const { ObjectId } = require('mongodb');
        const result = await db.collection('slices').findOneAndUpdate(
          { _id: new ObjectId(req.params.id) },
          { $set: { status: 'inactive', updatedAt: new Date() } },
          { returnDocument: 'after' }
        );
        if (!result) return res.status(404).json({ error: 'Slice not found' });
        res.json({ success: true, slice: result });
      } catch (e) { res.status(500).json({ error: e.message }); }
    });

    // GET /slices/:id/nf-status — live K8s deployment status for each NF in this slice
    app.get('/slices/:id/nf-status', authenticateToken, async (req, res) => {
      try {
        const { ObjectId } = require('mongodb');
        const slice = await db.collection('slices').findOne({ _id: new ObjectId(req.params.id) });
        if (!slice) return res.status(404).json({ error: 'Slice not found' });

        const statuses = await Promise.all(
          (slice.networkFunctions || []).map(async (nf) => {
            try {
              const dep = await appsApi.readNamespacedDeployment(nf.name, ns);
              const ready   = dep.body.status?.readyReplicas || 0;
              const desired = dep.body.spec?.replicas || 1;
              return {
                name: nf.name,
                ready, desired,
                status: ready === desired ? 'Running' : ready === 0 ? 'Down' : 'Degraded',
                cpu:    dep.body.spec?.template?.spec?.containers?.[0]?.resources?.limits?.cpu,
                memory: dep.body.spec?.template?.spec?.containers?.[0]?.resources?.limits?.memory
              };
            } catch (_) {
              return { name: nf.name, ready: 0, desired: 0, status: 'Unknown' };
            }
          })
        );
        res.json(statuses);
      } catch (e) { res.status(500).json({ error: e.message }); }
    });

    // Health check
    app.get('/health', (req, res) => {
      res.json({ status: 'ok', timestamp: new Date().toISOString() });
    });

    const PORT = process.env.PORT || 5000;
    app.listen(PORT, () => {
      console.log(`[testbed-api] Listening on port ${PORT}`);
      console.log(`[testbed-api] K8s namespace: ${ns}`);
      console.log(`[testbed-api] Connected to K8s cluster`);
      console.log(`[testbed-api] UE management endpoints ready at /ue`);
    });

