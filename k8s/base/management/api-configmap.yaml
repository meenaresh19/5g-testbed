    // GET /ue — user's IMSI block (admin: all users; user: own block)
    app.get('/ue', authenticateToken, async (req, res) => {
      try {
        if (!db) return res.status(503).json({ error: 'MongoDB not connected' });
        const podsRes = await k8sApi.listNamespacedPod(ns, undefined, undefined, undefined, undefined, 'app=ueransim-ue');
        const pods = podsRes.body.items;
        const mongoImsis = new Set(
          (await db.collection('subscribers').find({}, { projection: { imsi: 1 } }).toArray()).map(s => s.imsi)
        );
        const usersQuery = req.user.role === 'admin'
          ? { imsiStart: { $ne: null } }
          : { _id: require('mongodb').ObjectId ? undefined : undefined, username: req.user.username };
        // For current user, get their own doc
        const userDocs = req.user.role === 'admin'
          ? await db.collection('testbed_users').find({ imsiStart: { $ne: null } }).toArray()
          : [await db.collection('testbed_users').findOne({ username: req.user.username })].filter(Boolean);

        const result = await Promise.all(userDocs.map(async u => {
          const pod = pods.find(p => p.metadata?.labels?.username === u.username);
          const podPhase = pod?.status?.phase || 'none';
          const podRunning = podPhase === 'Running' &&
            pod?.status?.conditions?.find(c => c.type === 'Ready')?.status === 'True';
          const tunIp = podRunning ? await getUeTunIp(pod.metadata.name, pod.spec.containers[0].name) : null;
          const imsis = u.imsiStart ? userImsiList(u) : [];
          const registeredCount = imsis.filter(i => mongoImsis.has(i.imsi)).length;
          const globalCfg = await getImsiConfig();
          const hostNetwork = u.hostNetwork !== undefined ? u.hostNetwork : globalCfg.hostNetwork === true;
          return {
            username: u.username, imsiStart: u.imsiStart, imsiCount: u.imsiCount || 0,
            ueRegistered: u.ueRegistered || false, ueProvisioned: u.ueProvisioned || false,
            registeredCount, podName: pod?.metadata?.name || null,
            podPhase, podRunning, tunIp, hasPduSession: !!tunIp, hostNetwork,
            imsis: imsis.map(i => ({ ...i, inMongo: mongoImsis.has(i.imsi) })),
          };
        }));
        res.json(req.user.role === 'admin' ? result : (result[0] || null));
      } catch (e) { res.status(500).json({ error: e.message }); }
    });

    // POST /ue/register — bulk-register all IMSIs in user's block
    app.post('/ue/register', authenticateToken, async (req, res) => {
      try {
        if (!db) return res.status(503).json({ error: 'MongoDB not connected' });
        const username = (req.user.role === 'admin' && req.body?.username) ? req.body.username : req.user.username;
        const user = await db.collection('testbed_users').findOne({ username });
        if (!user || !user.imsiStart) return res.status(400).json({ error: 'No IMSI block assigned to this user' });
        const subs = db.collection('subscribers');
        const imsis = userImsiList(user);
        let added = 0;
        for (const ue of imsis) {
          if (!await subs.findOne({ imsi: ue.imsi })) {
