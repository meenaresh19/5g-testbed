        const pod = await getUePod(req.params.imsi);
        let cmd = `ps-establish ${type}`;
        if (sst) cmd += ` --sst ${Number(sst)}`;
        if (sd)  cmd += ` --sd ${sd.replace(/^0x/i, '')}`;
        if (dnn) cmd += ` --dnn ${dnn}`;
        const output = await execPodCmd(pod.metadata.name, pod.spec.containers[0].name,
          `nr-cli imsi-${req.params.imsi} --exec '${cmd}' 2>&1 || true`);
