        await db.collection('testbed_users').updateOne({ username }, { $set: { ueRegistered: true, ueRegisteredAt: new Date().toISOString() } });
        res.json({ ok: true, registered: added, total: imsis.length, message: `Registered ${added} new IMSIs (${imsis.length - added} already existed)` });
