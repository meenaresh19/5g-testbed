---
# Testbed API Service (ClusterIP, internal only)
apiVersion: v1
kind: Service
metadata:
  name: testbed-api
  namespace: 5g-testbed
  labels:
    app: testbed-api
spec:
  type: ClusterIP
  selector:
    app: testbed-api
  ports:
  - name: http
    port: 5000
    targetPort: 5000
    protocol: TCP

---
# Testbed UI Service (ClusterIP, internal only)
apiVersion: v1
kind: Service
metadata:
  name: testbed-ui
  namespace: 5g-testbed
  labels:
    app: testbed-ui
spec:
  type: ClusterIP
  selector:
    app: testbed-ui
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP

---
# Nginx Reverse Proxy Service (NodePort - external access)
apiVersion: v1
kind: Service
metadata:
  name: testbed-proxy
  namespace: 5g-testbed
  labels:
    app: testbed-proxy
spec:
  type: NodePort
  selector:
    app: testbed-proxy
  ports:
  - name: http
    port: 80
    targetPort: 80
    nodePort: 30080  # Access via http://localhost:30080
    protocol: TCP

---
# Nginx Reverse Proxy Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: testbed-proxy
  namespace: 5g-testbed
  labels:
    app: testbed-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: testbed-proxy
  template:
    metadata:
      labels:
        app: testbed-proxy
    spec:
      containers:
      - name: nginx
        image: nginx:1.25-alpine
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 80
          name: http
          protocol: TCP

        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
          readOnly: true

        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi

        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 2

      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
          items:
          - key: nginx.conf
            path: nginx.conf

      dnsPolicy: ClusterFirst
      restartPolicy: Always
