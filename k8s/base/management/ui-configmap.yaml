apiVersion: v1
kind: ConfigMap
metadata:
  name: testbed-ui-config
  namespace: 5g-testbed
data:
  # Minimal nginx config for serving React SPA
  nginx-ui.conf: |
    server {
      listen 80;
      server_name _;
      root /usr/share/nginx/html;

      # SPA routing: try file first, fallback to index.html
      location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=3600";
      }

      # API proxy (in case needed from UI directly)
      location /api {
        proxy_pass http://testbed-api.5g-testbed.svc.cluster.local:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      }

      # Disable caching for dynamic files
      location ~* \.(?:manifest|appcache|html?)$ {
        expires -1;
      }

      # Cache static assets
      location ~* \.(?:js|css|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1d;
        add_header Cache-Control "public, immutable";
      }

      # Deny access to hidden files
      location ~ /\. {
        deny all;
      }
    }

  # Enhanced React SPA with UE Management, RAN, Core, and Monitoring sections
  # Full-featured dashboard for K8s-based 5G testbed control and observability

  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>5G Testbed Dashboard</title>
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
      <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
      <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
      <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
      <style>
        :root {
          --bg: #040810;
          --bg2: #070d1a;
          --bg3: #0a1525;
          --panel: #0d1b2e;
          --panel2: #0f2035;
          --border: #1a3a5c;
          --border2: #1f4a70;
          --accent: #00c8ff;
          --accent2: #0080c8;
          --accent3: #00ffc8;
          --warn: #ffb800;
          --danger: #ff3b5c;
          --success: #00e676;
          --muted: #4a7090;
          --text: #c8e8ff;
          --text2: #7aaccc;
          --text3: #3a6080;
          --glow: 0 0 20px rgba(0,200,255,0.3);
          --font-main: 'Exo 2', sans-serif;
          --font-mono: 'Share Tech Mono', monospace;
          --font-head: 'Orbitron', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-main); }
        #root { height: 100%; display: flex; flex-direction: column; overflow: hidden; }

        .app-container { display: flex; flex-direction: column; height: 100%; overflow: hidden; background: var(--bg); }
        .header { background: linear-gradient(to bottom, var(--bg2), var(--panel)); padding: 24px 32px; border-bottom: 1px solid var(--border); box-shadow: 0 4px 12px rgba(0,200,255,0.1); flex-shrink: 0; }
        .header h1 { font-size: 26px; font-family: var(--font-head); color: var(--accent); margin-bottom: 6px; letter-spacing: 0.5px; }
        .header .tagline { font-size: 13px; color: var(--text2); letter-spacing: 0.3px; }

        .tabs-wrapper { background: var(--bg2); border-bottom: 2px solid var(--border); flex-shrink: 0; overflow-x: auto; }
        .tabs-inner { max-width: 1400px; margin: 0 auto; width: 100%; }

        .content { flex: 1; overflow-y: auto; padding: 32px; max-width: 1400px; margin: 0 auto; width: 100%; }

        .tabs { display: flex; gap: 0; margin-bottom: 0; border-bottom: 2px solid var(--border); overflow-x: auto; background: var(--bg2); }
        .tab {
          padding: 16px 28px;
          cursor: pointer;
          font-size: 14px;
          font-weight: 600;
          color: var(--text2);
          border-bottom: 3px solid transparent;
          transition: all 0.3s ease;
          white-space: nowrap;
          margin-bottom: -2px;
          user-select: none;
        }
        .tab:hover {
          color: var(--accent);
          background: rgba(0,200,255,0.05);
        }
        .tab.active {
          color: var(--accent);
          border-bottom-color: var(--accent);
          background: rgba(0,200,255,0.1);
        }

        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
        .stat-card:hover { border-color: var(--accent); box-shadow: var(--glow); }
        .stat-label { font-size: 11px; color: var(--text2); text-transform: uppercase; margin-bottom: 8px; }
        .stat-value { font-size: 28px; font-family: var(--font-mono); color: var(--accent); font-weight: 600; }
        .stat-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }

        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
        .panel h3 { color: var(--accent); font-size: 14px; margin-bottom: 12px; }

        .list { display: flex; flex-direction: column; gap: 8px; }
        .list-item { background: var(--panel2); border: 1px solid var(--border); border-radius: 6px; padding: 12px; display: flex; justify-content: space-between; align-items: center; }
        .list-item.running { border-left: 3px solid var(--success); }
        .list-item.pending { border-left: 3px solid var(--warn); }
        .list-item.failed { border-left: 3px solid var(--danger); }

        .badge { display: inline-block; padding: 4px 8px; border-radius: 3px; font-size: 11px; font-weight: 600; }
        .badge.success { background: rgba(0,230,118,0.2); color: var(--success); }
        .badge.warn { background: rgba(255,184,0,0.2); color: var(--warn); }
        .badge.danger { background: rgba(255,59,92,0.2); color: var(--danger); }
        .badge.info { background: rgba(0,200,255,0.2); color: var(--accent); }

        .button { background: var(--accent); color: var(--bg); border: none; padding: 8px 14px; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 12px; transition: all 0.3s ease; }
        .button:hover { background: var(--accent3); }
        .button:disabled { background: var(--muted); cursor: not-allowed; opacity: 0.5; }
        .button.small { padding: 4px 8px; font-size: 10px; }
        .button.danger { background: var(--danger); }
        .button.danger:hover { background: #ff1a3a; }

        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
        .form-group input, .form-group select { width: 100%; padding: 8px; background: var(--bg3); border: 1px solid var(--border); color: var(--text); border-radius: 4px; font-family: var(--font-main); }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent); }

        .table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .table th { background: var(--bg3); padding: 8px; text-align: left; color: var(--text2); font-weight: 600; border-bottom: 1px solid var(--border); }
        .table td { padding: 8px; border-bottom: 1px solid var(--border2); }
        .table tr:hover { background: rgba(0,200,255,0.05); }

        .metric-box { background: var(--panel2); border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin-bottom: 12px; }
        .metric-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
        .metric-bar { background: var(--bg3); height: 20px; border-radius: 3px; overflow: hidden; position: relative; }
        .metric-fill { background: linear-gradient(90deg, var(--accent), var(--accent3)); height: 100%; transition: width 0.3s ease; display: flex; align-items: center; justify-content: flex-end; padding-right: 4px; color: var(--bg); font-size: 10px; font-weight: 600; }

        .info-box { background: rgba(0,200,255,0.05); border: 1px solid var(--accent); border-radius: 6px; padding: 12px; font-size: 12px; color: var(--text2); margin-bottom: 16px; }
        .info-box strong { color: var(--accent); }

        .loading, .error { padding: 16px; text-align: center; font-size: 12px; }
        .loading { color: var(--muted); }
        .error { color: var(--danger); background: rgba(255,59,92,0.1); border: 1px solid var(--danger); border-radius: 6px; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg3); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
      </style>
    </head>
    <body>
      <div id="root"></div>
      <script type="text/babel">
        const { useState, useEffect } = React;

        // Icon component
        const Icon = ({ name }) => {
          const icons = {
            server: '⚙️', database: '💾', network: '🌐', users: '👥',
            antenna: '📡', chart: '📊', alert: '⚠️', check: '✓',
            power: '⚡', cpu: '💻', memory: '🔋', play: '▶️', stop: '⏹️'
          };
          return <span>{icons[name] || '•'}</span>;
        };

        // Core section
        function CoreSection({ status }) {
          const nfs = status?.nfs || [];
          const coreNfs = nfs.filter(n => n.id.includes('open5gs'));
          const running = coreNfs.filter(n => n.status === 'Running').length;

          return (
            <div>
              <div className="stat-grid">
                <div className="stat-card">
                  <div className="stat-label">Core NFs</div>
                  <div className="stat-value">{coreNfs.length}</div>
                  <div className="stat-sub">Total deployed</div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">Running</div>
                  <div className="stat-value" style={{color: 'var(--success)'}}>{running}</div>
                  <div className="stat-sub">Ready NFs</div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">Uptime</div>
                  <div className="stat-value">✓</div>
                  <div className="stat-sub">All healthy</div>
                </div>
              </div>

              <div className="info-box">
                <Icon name="server" /> <strong>Core Network Functions:</strong> NRF, SCP, AMF, SMF, UPF, AUSF, UDM, UDR, PCF, BSF, NSSF, WebUI
              </div>

              <div className="panel">
                <h3><Icon name="server" /> NF Status</h3>
                <div className="list">
                  {coreNfs.map(nf => (
                    <div key={nf.id} className={`list-item ${nf.status.toLowerCase()}`}>
                      <div>
                        <div style={{fontWeight: 600, marginBottom: 4}}>{nf.id.replace('open5gs-', '')}</div>
                        <div style={{fontSize: 11, color: 'var(--text3)'}}>Replicas: {nf.ready}/{nf.replicas}</div>
                      </div>
                      <span className={`badge ${nf.status === 'Running' ? 'success' : nf.status === 'Pending' ? 'warn' : 'danger'}`}>
                        {nf.status}
                      </span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          );
        }

        // RAN section
        function RanSection({ status }) {
          const nfs = status?.nf || [];
          const ranNfs = nfs.filter(n => n.id.includes('ueransim'));
          const gnb = ranNfs.find(n => n.id.includes('gnb'));
          const ues = ranNfs.filter(n => n.id.includes('ue'));

          return (
            <div>
              <div className="stat-grid">
                <div className="stat-card">
                  <div className="stat-label">gNodeB</div>
                  <div className="stat-value">{gnb?.status === 'Running' ? '1' : '0'}</div>
                  <div className="stat-sub">{gnb?.status}</div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">Connected UEs</div>
                  <div className="stat-value">{ues.filter(u => u.status === 'Running').length}</div>
                  <div className="stat-sub">Active sessions</div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">N2 Link</div>
                  <div className="stat-value" style={{color: gnb?.status === 'Running' ? 'var(--success)' : 'var(--danger)'}}>
                    {gnb?.status === 'Running' ? '✓' : '✗'}
                  </div>
                  <div className="stat-sub">gNB ↔ AMF</div>
                </div>
              </div>

              <div className="info-box">
                <Icon name="antenna" /> <strong>RAN Simulators:</strong> UERANSIM gNB + User Equipment. Simulates 5G radio access.
              </div>

              <div className="grid-2">
                <div className="panel">
                  <h3><Icon name="antenna" /> gNodeB (gNB)</h3>
                  <div className="list">
                    <div className={`list-item ${gnb?.status === 'Running' ? 'running' : 'pending'}`}>
                      <div>
                        <div style={{fontWeight: 600}}>ueransim-gnb</div>
                        <div style={{fontSize: 11, color: 'var(--text3)', marginTop: 4}}>Band 78 (3.5 GHz) | 20 MHz BW</div>
                      </div>
                      <span className={`badge ${gnb?.status === 'Running' ? 'success' : 'warn'}`}>{gnb?.status}</span>
                    </div>
                  </div>
                </div>

                <div className="panel">
                  <h3><Icon name="users" /> User Equipment</h3>
                  <div className="list">
                    {ues.map(ue => (
                      <div key={ue.id} className={`list-item ${ue.status.toLowerCase()}`}>
                        <div>
                          <div style={{fontWeight: 600}}>{ue.id.replace('ueransim-', '')}</div>
                          <div style={{fontSize: 11, color: 'var(--text3)', marginTop: 4}}>IMSI: 001010000000{ue.id.endsWith('1') ? '001' : '002'}</div>
                        </div>
                        <span className={`badge ${ue.status === 'Running' ? 'success' : 'warn'}`}>{ue.status}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          );
        }

        // Full Subscriber Management Section
        function SubscriberManagement() {
          const [subscribers, setSubscribers] = useState([]);
          const [search, setSearch] = useState('');
          const [page, setPage] = useState(1);
          const [totalPages, setTotalPages] = useState(1);
          const [loading, setLoading] = useState(false);
          const [showModal, setShowModal] = useState(false);
          const [editingSubscriber, setEditingSubscriber] = useState(null);
          const [formData, setFormData] = useState({});
          const [importJson, setImportJson] = useState('');
          const importSectionRef = React.useRef(null);

          // Fetch subscribers list
          const fetchSubscribers = async (searchTerm = search, pageNum = 1) => {
            setLoading(true);
            try {
              const query = new URLSearchParams({ search: searchTerm, page: pageNum, limit: 25 });
              const res = await fetch(`/api/subscribers?${query}`);
              if (!res.ok) throw new Error('Failed to fetch');
              const data = await res.json();
              setSubscribers(data.data);
              setTotalPages(data.pages);
            } catch (e) {
              alert('Error: ' + e.message);
            } finally {
              setLoading(false);
            }
          };

          React.useEffect(() => {
            fetchSubscribers();
          }, []);

          const handleSearch = (e) => {
            setSearch(e.target.value);
            setPage(1);
            fetchSubscribers(e.target.value, 1);
          };

          const handleAdd = () => {
            setEditingSubscriber(null);
            setFormData({
              imsi: '',
              security: { k: 'fec86ba6eb707ed08ce33ae45b4a0fba', opc: 'c42449363464e2e4fa8adca3063168ca', amf: 'c3d4' },
              pdn: [{ type: 0, apn: 'internet', slice: [{ sst: 1, sd: '000000' }] }],
              slice: [{ sst: 1, sd: '000000' }],
              ambr: { uplink: 1000000, downlink: 1000000 },
              subscribed_rau_tau_timer: 12,
              plmn: { mcc: '001', mnc: '01' }
            });
            setShowModal(true);
          };

          const handleAddBulk = () => {
            setImportJson('');
            if (importSectionRef.current) {
              importSectionRef.current.scrollIntoView({ behavior: 'smooth', block: 'center' });
              setTimeout(() => {
                const textarea = importSectionRef.current.querySelector('textarea');
                if (textarea) textarea.focus();
              }, 300);
            }
          };

          const handleEdit = async (imsi) => {
            try {
              const res = await fetch(`/api/subscriber/${imsi}`);
              if (!res.ok) throw new Error('Failed to fetch');
              const data = await res.json();
              setEditingSubscriber(imsi);
              setFormData(data.subscriber);
              setShowModal(true);
            } catch (e) {
              alert('Error: ' + e.message);
            }
          };

          const handleSave = async () => {
            if (!formData.imsi) { alert('IMSI required'); return; }
            try {
              const method = editingSubscriber ? 'PUT' : 'POST';
              const url = editingSubscriber ? `/api/subscriber/${editingSubscriber}` : '/api/ue/add';
              const res = await fetch(url, {
                method,
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(formData)
              });
              if (!res.ok) throw new Error('Failed to save');
              setShowModal(false);
              fetchSubscribers(search, page);
            } catch (e) {
              alert('Error: ' + e.message);
            }
          };

          const handleDelete = async (imsi) => {
            if (!confirm(`Delete ${imsi}?`)) return;
            try {
              const res = await fetch(`/api/ue/delete?imsi=${imsi}`, {method: 'DELETE'});
              if (!res.ok) throw new Error('Failed to delete');
              fetchSubscribers(search, page);
            } catch (e) {
              alert('Error: ' + e.message);
            }
          };

          const handleExport = async () => {
            try {
              const res = await fetch('/api/subscribers/export');
              if (!res.ok) throw new Error('Failed to export');
              const blob = await res.blob();
              const url = window.URL.createObjectURL(blob);
              const a = document.createElement('a');
              a.href = url;
              a.download = 'subscribers.json';
              a.click();
            } catch (e) {
              alert('Error: ' + e.message);
            }
          };

          const handleImport = async () => {
            if (!importJson.trim()) { alert('JSON required'); return; }
            try {
              const subscribers = JSON.parse(importJson);
              const res = await fetch('/api/subscribers/import', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ subscribers: Array.isArray(subscribers) ? subscribers : [subscribers] })
              });
              if (!res.ok) throw new Error('Failed to import');
              const result = await res.json();
              alert(`Imported: ${result.imported}, Skipped: ${result.skipped}, Failed: ${result.failed}`);
              setImportJson('');
              fetchSubscribers(search, page);
            } catch (e) {
              alert('Error: ' + e.message);
            }
          };

          return (
            <div>
              <div className="stat-grid">
                <div className="stat-card">
                  <div className="stat-label">Total Subscribers</div>
                  <div className="stat-value">{subscribers.length > 0 ? subscribers[0]._id ? 'Loading...' : subscribers.length : 0}</div>
                  <div className="stat-sub">Registered in MongoDB</div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">Slices</div>
                  <div className="stat-value">1</div>
                  <div className="stat-sub">SST=1, SD=000000</div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">PLMN</div>
                  <div className="stat-value" style={{fontSize: 14}}>001-01</div>
                  <div className="stat-sub">MCC-MNC</div>
                </div>
              </div>

              <div className="info-box">
                <Icon name="database" /> <strong>Subscriber Management:</strong> Full Open5GS subscriber provisioning. Add, edit, delete, bulk import/export.
              </div>

              <div className="panel">
                <h3><Icon name="users" /> Subscribers</h3>
                <div style={{marginBottom: 16, display: 'flex', gap: 8, flexWrap: 'wrap'}}>
                  <input
                    type="text"
                    value={search}
                    onChange={handleSearch}
                    placeholder="Search by IMSI..."
                    style={{flex: 1, padding: '8px', borderRadius: '4px', border: '1px solid var(--border)', background: 'var(--bg3)', color: 'var(--text)', fontFamily: 'var(--font-main)'}}
                  />
                  <button className="button" onClick={handleAdd}><Icon name="check" /> Add Subscriber</button>
                  <button className="button" onClick={handleAddBulk} style={{background: 'var(--accent2)'}}>+ Add Bulk</button>
                  <button className="button" onClick={handleExport} style={{background: 'var(--accent2)'}}>Export</button>
                </div>

                {loading ? (
                  <div className="loading">Loading subscribers...</div>
                ) : subscribers.length === 0 ? (
                  <div style={{fontSize: 12, color: 'var(--text2)', padding: '16px', textAlign: 'center'}}>No subscribers found. Add one to get started.</div>
                ) : (
                  <>
                    <div style={{overflowX: 'auto'}}>
                      <table className="table">
                        <thead>
                          <tr>
                            <th>IMSI</th>
                            <th>K (Auth Key)</th>
                            <th>OPc</th>
                            <th>Slices</th>
                            <th>AMBR (Mbps)</th>
                            <th style={{textAlign: 'right'}}>Actions</th>
                          </tr>
                        </thead>
                        <tbody>
                          {subscribers.map(sub => (
                            <tr key={sub.imsi}>
                              <td><strong>{sub.imsi}</strong></td>
                              <td style={{fontSize: 10, fontFamily: 'var(--font-mono)', color: 'var(--text2)', maxWidth: 200, overflow: 'hidden', textOverflow: 'ellipsis'}}>{sub.security?.k}</td>
                              <td style={{fontSize: 10, fontFamily: 'var(--font-mono)', color: 'var(--text2)', maxWidth: 200, overflow: 'hidden', textOverflow: 'ellipsis'}}>{sub.security?.opc}</td>
                              <td>{sub.slice?.map(s => `SST=${s.sst} SD=${s.sd}`).join(', ')}</td>
                              <td>{sub.ambr ? `${sub.ambr.uplink / 1000 / 1000}/${sub.ambr.downlink / 1000 / 1000}` : 'N/A'}</td>
                              <td style={{textAlign: 'right'}}>
                                <button className="button small" onClick={() => handleEdit(sub.imsi)}>Edit</button>
                                <button className="button small danger" onClick={() => handleDelete(sub.imsi)} style={{marginLeft: 4}}>Delete</button>
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                    <div style={{marginTop: 12, display: 'flex', justifyContent: 'center', gap: 8}}>
                      <button className="button small" disabled={page === 1} onClick={() => { setPage(p => p - 1); fetchSubscribers(search, page - 1); }}>← Prev</button>
                      <span style={{padding: '4px 12px', alignSelf: 'center', fontSize: 12}}>Page {page} of {totalPages}</span>
                      <button className="button small" disabled={page >= totalPages} onClick={() => { setPage(p => p + 1); fetchSubscribers(search, page + 1); }}>Next →</button>
                    </div>
                  </>
                )}

                <div ref={importSectionRef} style={{marginTop: 24, paddingTop: 16, borderTop: '1px solid var(--border)'}}>
                  <h3 style={{marginBottom: 12}}><Icon name="database" /> Bulk Import</h3>
                  <textarea
                    value={importJson}
                    onChange={e => setImportJson(e.target.value)}
                    placeholder='Paste JSON array: [{"imsi":"001010000000002","k":"...","opc":"..."}]'
                    style={{width: '100%', height: 120, padding: '8px', background: 'var(--bg3)', border: '1px solid var(--border)', color: 'var(--text)', borderRadius: '4px', fontFamily: 'var(--font-mono)', fontSize: 11}}
                  />
                  <button className="button" onClick={handleImport} style={{marginTop: 8}}>Import Subscribers</button>
                </div>
              </div>

              {showModal && (
                <div style={{position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.7)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000}}>
                  <div style={{background: 'var(--panel)', border: '1px solid var(--border)', borderRadius: '8px', padding: '24px', maxWidth: 600, width: '90%', maxHeight: '80vh', overflowY: 'auto'}}>
                    <h2 style={{marginBottom: 16, color: 'var(--accent)'}}>{editingSubscriber ? 'Edit Subscriber' : 'Add Subscriber'}</h2>

                    <div className="form-group">
                      <label>IMSI</label>
                      <input type="text" value={formData.imsi || ''} onChange={e => setFormData({...formData, imsi: e.target.value})} placeholder="001010000000002" disabled={!!editingSubscriber} />
                    </div>

                    <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12}}>
                      <div className="form-group">
                        <label>K (Auth Key)</label>
                        <input type="text" value={formData.security?.k || ''} onChange={e => setFormData({...formData, security: {...formData.security, k: e.target.value}})} />
                      </div>
                      <div className="form-group">
                        <label>OPc</label>
                        <input type="text" value={formData.security?.opc || ''} onChange={e => setFormData({...formData, security: {...formData.security, opc: e.target.value}})} />
                      </div>
                      <div className="form-group">
                        <label>AMF</label>
                        <input type="text" value={formData.security?.amf || ''} onChange={e => setFormData({...formData, security: {...formData.security, amf: e.target.value}})} />
                      </div>
                      <div className="form-group">
                        <label>Timer (RAU/TAU)</label>
                        <input type="number" value={formData.subscribed_rau_tau_timer || 12} onChange={e => setFormData({...formData, subscribed_rau_tau_timer: parseInt(e.target.value)})} />
                      </div>
                    </div>

                    <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12}}>
                      <div className="form-group">
                        <label>UL AMBR (Mbps)</label>
                        <input type="number" value={(formData.ambr?.uplink || 0) / 1000 / 1000} onChange={e => setFormData({...formData, ambr: {...formData.ambr, uplink: parseInt(e.target.value) * 1000 * 1000}})} />
                      </div>
                      <div className="form-group">
                        <label>DL AMBR (Mbps)</label>
                        <input type="number" value={(formData.ambr?.downlink || 0) / 1000 / 1000} onChange={e => setFormData({...formData, ambr: {...formData.ambr, downlink: parseInt(e.target.value) * 1000 * 1000}})} />
                      </div>
                    </div>

                    <div style={{marginTop: 12}}>
                      <label style={{display: 'block', fontSize: 12, color: 'var(--text2)', marginBottom: 8, fontWeight: 600}}>PDN/APNs Configuration</label>
                      {(formData.pdn || []).map((pdn, idx) => (
                        <div key={idx} style={{background: 'var(--bg3)', padding: 12, borderRadius: 4, marginBottom: 8, border: '1px solid var(--border)'}}>
                          <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr 50px', gap: 8, marginBottom: 8}}>
                            <div>
                              <label style={{fontSize: 10, color: 'var(--text2)', display: 'block', marginBottom: 3}}>APN Name</label>
                              <input type="text" value={pdn.apn || ''} onChange={e => { const newPdn = [...formData.pdn]; newPdn[idx] = {...pdn, apn: e.target.value}; setFormData({...formData, pdn: newPdn}); }} placeholder="internet" style={{width: '100%', fontSize: 11}} />
                            </div>
                            <div>
                              <label style={{fontSize: 10, color: 'var(--text2)', display: 'block', marginBottom: 3}}>Type</label>
                              <select value={pdn.type || 0} onChange={e => { const newPdn = [...formData.pdn]; newPdn[idx] = {...pdn, type: parseInt(e.target.value)}; setFormData({...formData, pdn: newPdn}); }} style={{width: '100%', fontSize: 11, padding: '4px'}}>
                                <option value="0">IPv4</option>
                                <option value="1">IPv6</option>
                                <option value="2">IPv4v6</option>
                              </select>
                            </div>
                            <div style={{display: 'flex', alignItems: 'flex-end'}}>
                              <button className="button small danger" onClick={() => { const newPdn = formData.pdn.filter((_, i) => i !== idx); setFormData({...formData, pdn: newPdn}); }} style={{width: '100%'}}>×</button>
                            </div>
                          </div>
                          <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8, marginBottom: 8}}>
                            <div>
                              <label style={{fontSize: 10, color: 'var(--text2)', display: 'block', marginBottom: 3}}>5QI</label>
                              <input type="number" value={pdn.qos?.['5qi'] || 9} onChange={e => { const newPdn = [...formData.pdn]; newPdn[idx] = {...pdn, qos: {...pdn.qos, '5qi': parseInt(e.target.value)}}; setFormData({...formData, pdn: newPdn}); }} min="1" max="254" style={{width: '100%', fontSize: 11}} />
                            </div>
                            <div>
                              <label style={{fontSize: 10, color: 'var(--text2)', display: 'block', marginBottom: 3}}>Priority</label>
                              <input type="number" value={pdn.qos?.arp?.priority_level || 8} onChange={e => { const newPdn = [...formData.pdn]; newPdn[idx] = {...pdn, qos: {...pdn.qos, arp: {...pdn.qos?.arp, priority_level: parseInt(e.target.value)}}}; setFormData({...formData, pdn: newPdn}); }} min="1" max="15" style={{width: '100%', fontSize: 11}} />
                            </div>
                            <div>
                              <label style={{fontSize: 10, color: 'var(--text2)', display: 'block', marginBottom: 3}}>Preemption Cap</label>
                              <select value={pdn.qos?.arp?.preemption_cap || 'not-preempt'} onChange={e => { const newPdn = [...formData.pdn]; newPdn[idx] = {...pdn, qos: {...pdn.qos, arp: {...pdn.qos?.arp, preemption_cap: e.target.value}}}; setFormData({...formData, pdn: newPdn}); }} style={{width: '100%', fontSize: 11, padding: '4px'}}>
                                <option value="preempt">Preempt</option>
                                <option value="not-preempt">Not Preempt</option>
                              </select>
                            </div>
                          </div>
                          <div style={{marginTop: 8}}>
                            <label style={{fontSize: 10, color: 'var(--text2)', display: 'block', marginBottom: 4, fontWeight: 600}}>Slices (S-NSSAI)</label>
                            {(pdn.slice || []).map((slice, sidx) => (
                              <div key={sidx} style={{display: 'grid', gridTemplateColumns: '100px 100px 50px', gap: 6, marginBottom: 6}}>
                                <div>
                                  <label style={{fontSize: 9, color: 'var(--text3)', display: 'block', marginBottom: 2}}>SST</label>
                                  <input type="number" value={slice.sst || 1} onChange={e => { const newPdn = [...formData.pdn]; newPdn[idx].slice[sidx] = {...slice, sst: parseInt(e.target.value)}; setFormData({...formData, pdn: newPdn}); }} min="0" max="255" style={{width: '100%', fontSize: 10}} />
                                </div>
                                <div>
                                  <label style={{fontSize: 9, color: 'var(--text3)', display: 'block', marginBottom: 2}}>SD (hex)</label>
                                  <input type="text" value={slice.sd || '000000'} onChange={e => { const newPdn = [...formData.pdn]; newPdn[idx].slice[sidx] = {...slice, sd: e.target.value}; setFormData({...formData, pdn: newPdn}); }} placeholder="000000" style={{width: '100%', fontSize: 10}} />
                                </div>
                                <div style={{display: 'flex', alignItems: 'flex-end'}}>
                                  <button className="button small danger" onClick={() => { const newPdn = [...formData.pdn]; newPdn[idx].slice = pdn.slice.filter((_, s) => s !== sidx); setFormData({...formData, pdn: newPdn}); }} style={{width: '100%', fontSize: 9, padding: '2px'}}>×</button>
                                </div>
                              </div>
                            ))}
                            <button className="button small" onClick={() => { const newPdn = [...formData.pdn]; if (!newPdn[idx].slice) newPdn[idx].slice = []; newPdn[idx].slice.push({sst: 1, sd: '000000'}); setFormData({...formData, pdn: newPdn}); }} style={{width: '100%', fontSize: 9, marginTop: 4}}>+ Add Slice</button>
                          </div>
                        </div>
                      ))}
                      <button className="button small" onClick={() => { const newPdn = [...(formData.pdn || []), { type: 0, apn: '', slice: [{ sst: 1, sd: '000000' }], qos: { '5qi': 9, arp: { priority_level: 8, preemption_cap: 'not-preempt' } } }]; setFormData({...formData, pdn: newPdn}); }} style={{width: '100%', marginTop: 8}}>+ Add APN</button>
                    </div>

                    <div style={{display: 'flex', gap: 8, justifyContent: 'flex-end', marginTop: 20}}>
                      <button className="button" onClick={() => setShowModal(false)} style={{background: 'var(--muted)'}}>Cancel</button>
                      <button className="button" onClick={handleSave}><Icon name="check" /> Save</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        // UE Management section - UERANSIM instances
        function UEManagementSection() {
          const [ues, setUes] = useState([]);
          const [loading, setLoading] = useState(false);
          const [showAddModal, setShowAddModal] = useState(false);
          const [selectedUe, setSelectedUe] = useState(null);
          const [showDetailsModal, setShowDetailsModal] = useState(false);
          const [formData, setFormData] = useState({ imsi: '', k: '', opc: '' });
          const [ueDetails, setUeDetails] = useState(null);

          const fetchUEs = async () => {
            setLoading(true);
            try {
              const res = await fetch('/api/ue-management');
              if (!res.ok) throw new Error('Failed to fetch UEs');
              const data = await res.json();
              setUes(data.ues);
            } catch (e) {
              alert('Error: ' + e.message);
            } finally {
              setLoading(false);
            }
          };

          React.useEffect(() => {
            fetchUEs();
            const interval = setInterval(fetchUEs, 5000);
            return () => clearInterval(interval);
          }, []);

          const handleAddUE = async () => {
            if (!formData.imsi || !/^\d{15}$/.test(formData.imsi)) {
              alert('IMSI must be 15 digits');
              return;
            }
            try {
              const res = await fetch('/api/ue-management', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                  imsi: formData.imsi,
                  k: formData.k,
                  opc: formData.opc
                })
              });
              if (!res.ok) throw new Error('Failed to create UE');
              setShowAddModal(false);
              resetFormData();
              fetchUEs();
            } catch (e) {
              alert('Error: ' + e.message);
            }
          };

          const resetFormData = () => {
            setFormData({
              imsi: '',
              k: 'fec86ba6eb707ed08ce33ae45b4a0fba',
              opc: 'c42449363464e2e4fa8adca3063168ca',
              amf: 'c3d4',
              imei: '356938035643803',
              imeiSv: '8944',
              sst: 1,
              sd: '000000'
            });
          };

          const handleDeleteUE = async (imsi) => {
            if (!confirm(`Delete UE ${imsi}?`)) return;
            try {
              const res = await fetch(`/api/ue-management/${imsi}`, {method: 'DELETE'});
              if (!res.ok) throw new Error('Failed to delete UE');
              fetchUEs();
            } catch (e) {
              alert('Error: ' + e.message);
            }
          };

          const handleShowDetails = async (imsi) => {
            try {
              const [sessionsRes, nasRes] = await Promise.all([
                fetch(`/api/ue-management/${imsi}/sessions`),
                fetch(`/api/ue-management/${imsi}/nas-status`)
              ]);
              const sessions = await sessionsRes.json();
              const nas = await nasRes.json();
              setUeDetails({ imsi, sessions: sessions.sessions || [], nasStatus: nas.nasStatus || 'Unknown' });
              setShowDetailsModal(true);
            } catch (e) {
              alert('Error: ' + e.message);
            }
          };

          const openAddModal = () => {
            resetFormData();
            setShowAddModal(true);
          };

          const handleEstablishSession = async (imsi) => {
            try {
              const res = await fetch(`/api/ue-management/${imsi}/sessions`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ dnn: 'internet', sst: 1, sd: '000000' })
              });
              if (!res.ok) throw new Error('Failed to establish session');
              alert('PDU session established');
              handleShowDetails(imsi);
            } catch (e) {
              alert('Error: ' + e.message);
            }
          };

          const handleReleaseSession = async (imsi, psi) => {
            try {
              const res = await fetch(`/api/ue-management/${imsi}/sessions/${psi}`, {method: 'DELETE'});
              if (!res.ok) throw new Error('Failed to release session');
              handleShowDetails(imsi);
            } catch (e) {
              alert('Error: ' + e.message);
            }
          };

          const handleDeregister = async (imsi) => {
            try {
              const res = await fetch(`/api/ue-management/${imsi}/nas-deregister`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ method: 'normal' })
              });
              if (!res.ok) throw new Error('Failed to deregister');
              alert('UE deregistered');
              fetchUEs();
            } catch (e) {
              alert('Error: ' + e.message);
            }
          };

          return (
            <div>
              <div className="stat-grid">
                <div className="stat-card">
                  <div className="stat-label">Active UEs</div>
                  <div className="stat-value">{ues.length}</div>
                  <div className="stat-sub">Running pods</div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">Connected</div>
                  <div className="stat-value" style={{color: 'var(--success)'}}>{ues.filter(u => u.ready).length}</div>
                  <div className="stat-sub">Ready status</div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">Sessions</div>
                  <div className="stat-value">{ues.reduce((sum, u) => sum + u.sessions, 0)}</div>
                  <div className="stat-sub">PDU sessions</div>
                </div>
              </div>

              <div className="info-box">
                <Icon name="antenna" /> <strong>UE Management:</strong> Create, manage, and control UERANSIM UE instances. PDU sessions, NAS status, registration procedures.
              </div>

              <div className="panel">
                <h3><Icon name="antenna" /> UE Instances</h3>
                <button className="button" onClick={openAddModal} style={{marginBottom: 16}}><Icon name="check" /> + Add UE</button>

                {loading ? (
                  <div className="loading">Loading UEs...</div>
                ) : ues.length === 0 ? (
                  <div style={{fontSize: 12, color: 'var(--text2)', padding: '16px', textAlign: 'center'}}>No UEs running. Click "+ Add UE" to create.</div>
                ) : (
                  <div style={{overflowX: 'auto'}}>
                    <table className="table">
                      <thead>
                        <tr>
                          <th>IMSI</th>
                          <th>Pod Name</th>
                          <th>Status</th>
                          <th>NAS State</th>
                          <th>Sessions</th>
                          <th style={{textAlign: 'right'}}>Actions</th>
                        </tr>
                      </thead>
                      <tbody>
                        {ues.map(ue => (
                          <tr key={ue.podName}>
                            <td><strong>{ue.imsi}</strong></td>
                            <td style={{fontSize: 11, color: 'var(--text2)'}}>{ue.podName}</td>
                            <td><span className={`badge ${ue.ready ? 'success' : ue.status === 'Pending' ? 'warn' : 'danger'}`}>{ue.status}</span></td>
                            <td><span style={{fontSize: 11, color: 'var(--accent)'}}>{ue.nasState}</span></td>
                            <td>{ue.sessions} active</td>
                            <td style={{textAlign: 'right', display: 'flex', gap: 4, justifyContent: 'flex-end'}}>
                              <button className="button small" onClick={() => handleShowDetails(ue.imsi)}>Details</button>
                              <button className="button small" onClick={() => handleEstablishSession(ue.imsi)}>+ Session</button>
                              <button className="button small danger" onClick={() => handleDeleteUE(ue.imsi)}>Delete</button>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>

              {showAddModal && (
                <div style={{position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.7)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000}}>
                  <div style={{background: 'var(--panel)', border: '1px solid var(--border)', borderRadius: '8px', padding: '24px', maxWidth: 600, width: '90%', maxHeight: '80vh', overflowY: 'auto'}}>
                    <h2 style={{marginBottom: 16, color: 'var(--accent)'}}>Create New UE</h2>

                    <div style={{background: 'rgba(0,200,255,0.05)', padding: 12, borderRadius: 6, marginBottom: 16, border: '1px solid var(--accent)', fontSize: 11, color: 'var(--accent)'}}>
                      All fields have sensible defaults. Edit as needed.
                    </div>

                    <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 12}}>
                      <div className="form-group">
                        <label>IMSI (15 digits)</label>
                        <input type="text" value={formData.imsi} onChange={e => setFormData({...formData, imsi: e.target.value})} placeholder="001010000000099" />
                      </div>
                      <div className="form-group">
                        <label>IMEI</label>
                        <input type="text" value={formData.imei} onChange={e => setFormData({...formData, imei: e.target.value})} />
                      </div>
                    </div>

                    <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 12}}>
                      <div className="form-group">
                        <label>K (Auth Key)</label>
                        <input type="text" value={formData.k} onChange={e => setFormData({...formData, k: e.target.value})} style={{fontSize: 10, fontFamily: 'var(--font-mono)'}} />
                      </div>
                      <div className="form-group">
                        <label>OPc (Operator Key)</label>
                        <input type="text" value={formData.opc} onChange={e => setFormData({...formData, opc: e.target.value})} style={{fontSize: 10, fontFamily: 'var(--font-mono)'}} />
                      </div>
                    </div>

                    <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 12}}>
                      <div className="form-group">
                        <label>AMF</label>
                        <input type="text" value={formData.amf} onChange={e => setFormData({...formData, amf: e.target.value})} />
                      </div>
                      <div className="form-group">
                        <label>IMEI SV</label>
                        <input type="text" value={formData.imeiSv} onChange={e => setFormData({...formData, imeiSv: e.target.value})} />
                      </div>
                    </div>

                    <div style={{background: 'var(--bg3)', padding: 12, borderRadius: 6, marginBottom: 12, border: '1px solid var(--border)'}}>
                      <div style={{fontSize: 12, fontWeight: 600, marginBottom: 8, color: 'var(--accent)'}}>Network Slice (S-NSSAI)</div>
                      <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12}}>
                        <div className="form-group">
                          <label>SST (Slice Service Type)</label>
                          <select value={formData.sst} onChange={e => setFormData({...formData, sst: parseInt(e.target.value)})} style={{width: '100%', padding: '8px', borderRadius: '4px', border: '1px solid var(--border)', background: 'var(--bg)', color: 'var(--text)'}}>
                            <option value="1">1 (eMBB)</option>
                            <option value="2">2 (URLLC)</option>
                            <option value="3">3 (MMTC)</option>
                            <option value="4">4 (MPS)</option>
                          </select>
                        </div>
                        <div className="form-group">
                          <label>SD (Slice Differentiator)</label>
                          <input type="text" value={formData.sd} onChange={e => setFormData({...formData, sd: e.target.value})} placeholder="000000" maxLength="6" style={{fontSize: 11, fontFamily: 'var(--font-mono)'}} />
                        </div>
                      </div>
                    </div>

                    <div style={{fontSize: 10, color: 'var(--text3)', marginBottom: 16, padding: 12, background: 'var(--bg3)', borderRadius: 6}}>
                      <strong>SST Values:</strong> 1=eMBB (broadband), 2=URLLC (low latency), 3=MMTC (IoT), 4=MPS (public safety)
                      <br/><strong>SD:</strong> Hex differentiator (000000-FFFFFF)
                    </div>

                    <div style={{display: 'flex', gap: 8, justifyContent: 'flex-end'}}>
                      <button className="button" onClick={() => { setShowAddModal(false); resetFormData(); }} style={{background: 'var(--muted)'}}>Cancel</button>
                      <button className="button" onClick={handleAddUE}><Icon name="check" /> Create UE</button>
                    </div>
                  </div>
                </div>
              )}

              {showDetailsModal && ueDetails && (
                <div style={{position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.7)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000}}>
                  <div style={{background: 'var(--panel)', border: '1px solid var(--border)', borderRadius: '8px', padding: '24px', maxWidth: 700, width: '90%', maxHeight: '80vh', overflowY: 'auto'}}>
                    <h2 style={{marginBottom: 16, color: 'var(--accent)'}}>UE Details: {ueDetails.imsi}</h2>

                    <div style={{background: 'var(--bg3)', padding: 12, borderRadius: 6, marginBottom: 16}}>
                      <div style={{fontSize: 12, color: 'var(--text2)', marginBottom: 8}}>NAS Status:</div>
                      <div style={{fontSize: 11, fontFamily: 'var(--font-mono)', color: 'var(--accent)', whiteSpace: 'pre-wrap', wordBreak: 'break-word'}}>
                        {ueDetails.nasStatus || 'Fetching...'}
                      </div>
                    </div>

                    <div style={{marginBottom: 16}}>
                      <h3 style={{marginBottom: 8, fontSize: 14}}>PDU Sessions ({ueDetails.sessions.length})</h3>
                      {ueDetails.sessions.length === 0 ? (
                        <div style={{fontSize: 12, color: 'var(--text2)', padding: 8}}>No active sessions</div>
                      ) : (
                        <table className="table">
                          <thead>
                            <tr>
                              <th>PSI</th>
                              <th>State</th>
                              <th>Type</th>
                              <th>DNN</th>
                              <th>IP</th>
                              <th></th>
                            </tr>
                          </thead>
                          <tbody>
                            {ueDetails.sessions.map((s, idx) => (
                              <tr key={idx}>
                                <td>{s.psi || idx}</td>
                                <td><span className="badge success">{s.state}</span></td>
                                <td>{s.type}</td>
                                <td>{s.dnn}</td>
                                <td style={{fontSize: 10, fontFamily: 'var(--font-mono)'}}>{s.ip}</td>
                                <td><button className="button small danger" onClick={() => handleReleaseSession(ueDetails.imsi, s.psi)}>Release</button></td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      )}
                    </div>

                    <div style={{display: 'flex', gap: 8, justifyContent: 'flex-end'}}>
                      <button className="button" onClick={() => handleEstablishSession(ueDetails.imsi)}>+ Establish Session</button>
                      <button className="button" onClick={() => handleDeregister(ueDetails.imsi)} style={{background: 'var(--warn)'}}>Deregister</button>
                      <button className="button" onClick={() => setShowDetailsModal(false)} style={{background: 'var(--muted)'}}>Close</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        // Tracing section - PCAP capture
        function TracingSection() {
          const [tracingTab, setTracingTab] = useState('pod');  // 'pod' or 'interface'
          const [pods, setPods] = useState([]);
          const [sessions, setSessions] = useState([]);
          const [selectedPod, setSelectedPod] = useState('');
          const [selectedContainer, setSelectedContainer] = useState('');
          const [selectedIface, setSelectedIface] = useState('eth0');
          const [iface, setIface] = useState('any');
          const [filter, setFilter] = useState('');
          const [capturing, setCapturing] = useState(false);
          const [loading, setLoading] = useState(false);

          const fetchPods = async () => {
            try {
              const res = await fetch('/api/pcap/pods');
              if (!res.ok) throw new Error('Failed to fetch pods');
              const data = await res.json();
              setPods(data);
              if (data.length > 0 && !selectedPod) setSelectedPod(data[0].name);
            } catch (e) {
              console.error('Error fetching pods:', e);
            }
          };

          const fetchSessions = async () => {
            try {
              const res = await fetch('/api/pcap/sessions');
              if (!res.ok) throw new Error('Failed to fetch sessions');
              const data = await res.json();
              setSessions(data.sessions || []);
              setCapturing(data.sessions?.some(s => s.status === 'running') || false);
            } catch (e) {
              console.error('Error fetching sessions:', e);
            }
          };

          React.useEffect(() => {
            fetchPods();
            fetchSessions();
            const interval = setInterval(fetchSessions, 2000);
            return () => clearInterval(interval);
          }, []);

          const handleStartCapture = async () => {
            if (!selectedPod) { alert('Select a pod'); return; }
            setLoading(true);
            try {
              const res = await fetch('/api/pcap/start', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                  pod: selectedPod,
                  container: selectedContainer || undefined,
                  interface: iface,
                  filter
                })
              });
              if (!res.ok) throw new Error('Failed to start capture');
              setCapturing(true);
              fetchSessions();
            } catch (e) {
              alert('Error: ' + e.message);
            } finally {
              setLoading(false);
            }
          };

          const handleStopCapture = async (sessionId) => {
            setLoading(true);
            try {
              const res = await fetch(`/api/pcap/stop/${sessionId}`, {method: 'POST'});
              if (!res.ok) throw new Error('Failed to stop capture');
              setCapturing(false);
              fetchSessions();
            } catch (e) {
              alert('Error: ' + e.message);
            } finally {
              setLoading(false);
            }
          };

          const handleDownload = (sessionId) => {
            window.location.href = `/api/pcap/download/${sessionId}`;
          };

          const handleDeleteSession = async (sessionId) => {
            if (!confirm('Delete capture session?')) return;
            try {
              const res = await fetch(`/api/pcap/sessions/${sessionId}`, {method: 'DELETE'});
              if (!res.ok) throw new Error('Failed to delete session');
              fetchSessions();
            } catch (e) {
              alert('Error: ' + e.message);
            }
          };

          const selectedPodData = pods.find(p => p.name === selectedPod);
          const containers = selectedPodData?.containers || [];

          return (
            <div>
              <div className="stat-grid">
                <div className="stat-card">
                  <div className="stat-label">Active Captures</div>
                  <div className="stat-value" style={{color: capturing ? 'var(--danger)' : 'var(--text)'}}>{sessions.filter(s => s.status === 'running').length}</div>
                  <div className="stat-sub">{capturing ? 'Recording...' : 'Stopped'}</div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">Available Pods</div>
                  <div className="stat-value">{pods.length}</div>
                  <div className="stat-sub">For capture</div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">Sessions</div>
                  <div className="stat-value">{sessions.length}</div>
                  <div className="stat-sub">Total</div>
                </div>
              </div>

              <div className="info-box">
                <Icon name="network" /> <strong>PCAP Tracing:</strong> Capture network traffic from K8s pods. Download for analysis in Wireshark.
              </div>

              <div style={{marginBottom: 16, display: 'flex', gap: 0, borderBottom: '2px solid var(--border)'}}>
                <button onClick={() => setTracingTab('pod')} style={{flex: 1, padding: '12px', background: tracingTab === 'pod' ? 'rgba(0,200,255,0.1)' : 'transparent', borderBottom: tracingTab === 'pod' ? '3px solid var(--accent)' : 'none', color: tracingTab === 'pod' ? 'var(--accent)' : 'var(--text2)', cursor: 'pointer', fontWeight: 600, fontSize: 14, border: 'none', marginBottom: '-2px'}}>
                  Pod Capture
                </button>
                <button onClick={() => setTracingTab('interface')} style={{flex: 1, padding: '12px', background: tracingTab === 'interface' ? 'rgba(0,200,255,0.1)' : 'transparent', borderBottom: tracingTab === 'interface' ? '3px solid var(--accent)' : 'none', color: tracingTab === 'interface' ? 'var(--accent)' : 'var(--text2)', cursor: 'pointer', fontWeight: 600, fontSize: 14, border: 'none', marginBottom: '-2px'}}>
                  Interface Capture
                </button>
              </div>

              <div className="grid-2">
                {tracingTab === 'pod' && (
                  <div className="panel">
                    <h3><Icon name="network" /> Pod Capture</h3>

                    <div className="form-group">
                      <label>Pod</label>
                      <select value={selectedPod} onChange={e => { setSelectedPod(e.target.value); setSelectedContainer(''); }} disabled={capturing} style={{width: '100%', padding: '8px', borderRadius: '4px', border: '1px solid var(--border)', background: 'var(--bg3)', color: 'var(--text)'}}>
                        <option value="">-- Select Pod --</option>
                        {pods.map(p => (<option key={p.name} value={p.name}>{p.name} ({p.app})</option>))}
                      </select>
                    </div>

                    {containers.length > 0 && (
                      <div className="form-group">
                        <label>Container (optional)</label>
                        <select value={selectedContainer} onChange={e => setSelectedContainer(e.target.value)} disabled={capturing} style={{width: '100%', padding: '8px', borderRadius: '4px', border: '1px solid var(--border)', background: 'var(--bg3)', color: 'var(--text)'}}>
                          <option value="">-- Any Container --</option>
                          {containers.map(c => (<option key={c} value={c}>{c}</option>))}
                        </select>
                      </div>
                    )}

                    <div className="form-group">
                      <label>Interface</label>
                      <select value={iface} onChange={e => setIface(e.target.value)} disabled={capturing} style={{width: '100%', padding: '8px', borderRadius: '4px', border: '1px solid var(--border)', background: 'var(--bg3)', color: 'var(--text)'}}>
                        <option value="any">Any (all interfaces)</option>
                        <option value="eth0">eth0</option>
                        <option value="eth1">eth1</option>
                        <option value="lo">lo (localhost)</option>
                      </select>
                    </div>

                    <div className="form-group">
                      <label>Filter (tcpdump syntax, optional)</label>
                      <input type="text" value={filter} onChange={e => setFilter(e.target.value)} placeholder="e.g., 'tcp port 7777' or 'udp port 2152'" disabled={capturing} style={{width: '100%'}} />
                    </div>

                    <div style={{fontSize: 11, color: 'var(--text3)', marginBottom: 16}}>
                      Examples: tcp port 7777 | udp | ip.src==10.45.0.10 | port 5000
                    </div>

                    {!capturing ? (
                      <button className="button" onClick={handleStartCapture} disabled={!selectedPod || loading} style={{width: '100%'}}>
                        <Icon name="play" /> {loading ? 'Starting...' : 'Start Capture'}
                      </button>
                    ) : (
                      <button className="button danger" onClick={() => handleStopCapture(sessions[0]?.id)} disabled={loading} style={{width: '100%'}}>
                        <Icon name="stop" /> {loading ? 'Stopping...' : 'Stop Capture'}
                      </button>
                    )}
                  </div>
                )}

                {tracingTab === 'interface' && (
                  <div className="panel">
                    <h3><Icon name="network" /> Interface Capture</h3>

                    <div className="form-group">
                      <label>Interface</label>
                      <input type="text" value={selectedIface} onChange={e => setSelectedIface(e.target.value)} placeholder="eth0, eth1, any, lo" disabled={capturing} />
                    </div>

                    <div className="form-group">
                      <label>Filter (tcpdump syntax, optional)</label>
                      <input type="text" value={filter} onChange={e => setFilter(e.target.value)} placeholder="e.g., 'tcp port 7777' or 'udp port 2152'" disabled={capturing} style={{width: '100%'}} />
                    </div>

                    <div style={{fontSize: 11, color: 'var(--text3)', marginBottom: 16}}>
                      Common filters:
                      <div style={{marginTop: 8}}>
                        tcp port 7777 = SBI traffic
                        <br/>udp port 2152 = GTP-U traffic
                        <br/>icmp = Ping traffic
                        <br/>tcp.port == 5000 = testbed-api
                      </div>
                    </div>

                    {!capturing ? (
                      <button className="button" onClick={() => {
                        if (!selectedIface) { alert('Enter interface name'); return; }
                        setIface(selectedIface);
                        handleStartCapture();
                      }} disabled={loading} style={{width: '100%'}}>
                        <Icon name="play" /> {loading ? 'Starting...' : 'Start Capture'}
                      </button>
                    ) : (
                      <button className="button danger" onClick={() => handleStopCapture(sessions[0]?.id)} disabled={loading} style={{width: '100%'}}>
                        <Icon name="stop" /> {loading ? 'Stopping...' : 'Stop Capture'}
                      </button>
                    )}
                  </div>
                )}

                <div className="panel">
                  <h3><Icon name="database" /> Capture Sessions</h3>
                  {sessions.length === 0 ? (
                    <div style={{fontSize: 12, color: 'var(--text2)', padding: '16px'}}>No capture sessions. Start one to begin.</div>
                  ) : (
                    <div>
                      {sessions.map(session => (
                        <div key={session.id} style={{background: 'var(--bg3)', padding: 12, borderRadius: 6, marginBottom: 8, border: `1px solid ${session.status === 'running' ? 'var(--danger)' : 'var(--border)'}`}}>
                          <div style={{display: 'flex', justifyContent: 'space-between', marginBottom: 8}}>
                            <div>
                              <div style={{fontWeight: 600, fontSize: 12}}>{session.pod}</div>
                              <div style={{fontSize: 10, color: 'var(--text3)', marginTop: 4}}>
                                {session.interface} | {session.filter || 'no filter'} | {new Date(session.startTime).toLocaleTimeString()}
                              </div>
                            </div>
                            <span className={`badge ${session.status === 'running' ? 'danger' : 'success'}`}>{session.status}</span>
                          </div>
                          <div style={{display: 'flex', gap: 4}}>
                            <button className="button small" onClick={() => handleDownload(session.id)} disabled={session.status === 'running'}>Download</button>
                            <button className="button small danger" onClick={() => handleDeleteSession(session.id)}>Delete</button>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
        }

        // Monitoring section
        function MonitoringSection({ status }) {
          const [metrics, setMetrics] = useState({
            ue_count: 1,
            session_count: 1,
            upf_throughput_ul: 0,
            upf_throughput_dl: 0,
            amf_cpu: 15,
            smf_cpu: 12,
            upf_cpu: 25
          });

          useEffect(() => {
            const fetchMetrics = async () => {
              try {
                const res = await fetch('/api/metrics/query?query=up');
                if (res.ok) {
                  const data = await res.json();
                  setMetrics(prev => ({...prev, data}));
                }
              } catch (e) {
                console.error('Metrics fetch failed:', e);
              }
            };
            fetchMetrics();
            const interval = setInterval(fetchMetrics, 10000);
            return () => clearInterval(interval);
          }, []);

          return (
            <div>
              <div className="stat-grid">
                <div className="stat-card">
                  <div className="stat-label">Registered UEs</div>
                  <div className="stat-value">{metrics.ue_count}</div>
                  <div className="stat-sub">Connected to network</div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">Active Sessions</div>
                  <div className="stat-value">{metrics.session_count}</div>
                  <div className="stat-sub">PDU sessions</div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">UPF Throughput</div>
                  <div className="stat-value" style={{fontSize: 16}}>{metrics.upf_throughput_dl} Mbps</div>
                  <div className="stat-sub">DL rate</div>
                </div>
              </div>

              <div className="info-box">
                <Icon name="chart" /> <strong>Monitoring:</strong> Real-time metrics from Prometheus. CPU, memory, throughput, and KPIs.
              </div>

              <div className="grid-2">
                <div className="panel">
                  <h3><Icon name="cpu" /> NF CPU Usage</h3>
                  <div className="metric-box">
                    <div className="metric-label">AMF</div>
                    <div className="metric-bar">
                      <div className="metric-fill" style={{width: metrics.amf_cpu + '%'}}>{metrics.amf_cpu}%</div>
                    </div>
                  </div>
                  <div className="metric-box">
                    <div className="metric-label">SMF</div>
                    <div className="metric-bar">
                      <div className="metric-fill" style={{width: metrics.smf_cpu + '%'}}>{metrics.smf_cpu}%</div>
                    </div>
                  </div>
                  <div className="metric-box">
                    <div className="metric-label">UPF</div>
                    <div className="metric-bar">
                      <div className="metric-fill" style={{width: metrics.upf_cpu + '%'}}>{metrics.upf_cpu}%</div>
                    </div>
                  </div>
                </div>

                <div className="panel">
                  <h3><Icon name="chart" /> Throughput Metrics</h3>
                  <div className="metric-box">
                    <div className="metric-label">UPF Downlink</div>
                    <div style={{fontSize: 18, color: 'var(--accent)', fontWeight: 600}}>
                      {metrics.upf_throughput_dl} Mbps
                    </div>
                  </div>
                  <div className="metric-box">
                    <div className="metric-label">UPF Uplink</div>
                    <div style={{fontSize: 18, color: 'var(--accent3)', fontWeight: 600}}>
                      {metrics.upf_throughput_ul} Mbps
                    </div>
                  </div>
                  <div style={{fontSize: 11, color: 'var(--text2)', marginTop: 12}}>
                    Updated every 10 seconds. Configure refresh rate with HPA policies.
                  </div>
                </div>
              </div>
            </div>
          );
        }

        // Main App
        function App() {
          const [page, setPage] = useState('core');
          const [status, setStatus] = useState(null);
          const [loading, setLoading] = useState(true);
          const [error, setError] = useState(null);

          useEffect(() => {
            fetchStatus();
            const interval = setInterval(fetchStatus, 5000);
            return () => clearInterval(interval);
          }, []);

          async function fetchStatus() {
            try {
              const res = await fetch('/api/status');
              if (!res.ok) throw new Error(`HTTP ${res.status}`);
              const data = await res.json();
              setStatus(data);
              setError(null);
            } catch (e) {
              setError(e.message);
            } finally {
              setLoading(false);
            }
          }

          return (
            <div className="app-container">
              <div className="header">
                <h1><Icon name="network" /> 5G TESTBED DASHBOARD</h1>
                <div className="tagline">Kubernetes-based Open5GS + UERANSIM Management & Observability</div>
              </div>

              <div className="tabs-wrapper">
                <div className="tabs-inner">
                  <div className="tabs">
                    <div className={`tab ${page === 'core' ? 'active' : ''}`} onClick={() => setPage('core')} style={{cursor: 'pointer'}}>
                      <Icon name="server" /> Core Network
                    </div>
                    <div className={`tab ${page === 'ran' ? 'active' : ''}`} onClick={() => setPage('ran')} style={{cursor: 'pointer'}}>
                      <Icon name="antenna" /> RAN
                    </div>
                    <div className={`tab ${page === 'subscribers' ? 'active' : ''}`} onClick={() => setPage('subscribers')} style={{cursor: 'pointer'}}>
                      <Icon name="database" /> Subscribers
                    </div>
                    <div className={`tab ${page === 'ue-mgmt' ? 'active' : ''}`} onClick={() => setPage('ue-mgmt')} style={{cursor: 'pointer'}}>
                      <Icon name="antenna" /> UE Management
                    </div>
                    <div className={`tab ${page === 'tracing' ? 'active' : ''}`} onClick={() => setPage('tracing')} style={{cursor: 'pointer'}}>
                      <Icon name="network" /> Tracing
                    </div>
                    <div className={`tab ${page === 'monitoring' ? 'active' : ''}`} onClick={() => setPage('monitoring')} style={{cursor: 'pointer'}}>
                      <Icon name="chart" /> Monitoring
                    </div>
                  </div>
                </div>
              </div>

              <div className="content">
                {error && <div className="error"><Icon name="alert" /> Error: {error}</div>}
                {loading ? (
                  <div className="loading">Loading dashboard...</div>
                ) : status ? (
                  <>
                    <div className={`section ${page === 'core' ? 'active' : ''}`}>
                      <CoreSection status={status} />
                    </div>
                    <div className={`section ${page === 'ran' ? 'active' : ''}`}>
                      <RanSection status={status} />
                    </div>
                    <div className={`section ${page === 'subscribers' ? 'active' : ''}`}>
                      <SubscriberManagement />
                    </div>
                    <div className={`section ${page === 'ue-mgmt' ? 'active' : ''}`}>
                      <UEManagementSection />
                    </div>
                    <div className={`section ${page === 'tracing' ? 'active' : ''}`}>
                      <TracingSection />
                    </div>
                    <div className={`section ${page === 'monitoring' ? 'active' : ''}`}>
                      <MonitoringSection status={status} />
                    </div>
                  </>
                ) : null}
              </div>
            </div>
          );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
      </script>
    </body>
    </html>
