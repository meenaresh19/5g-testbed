apiVersion: v1
kind: ConfigMap
metadata:
  name: testbed-ui-config
  namespace: 5g-testbed
data:
  # Minimal nginx config for serving React SPA
  nginx-ui.conf: |
    server {
      listen 80;
      server_name _;
      root /usr/share/nginx/html;

      # SPA routing: try file first, fallback to index.html
      location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=3600";
      }

      # API proxy (in case needed from UI directly)
      location /api {
        proxy_pass http://testbed-api.5g-testbed.svc.cluster.local:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      }

      # Disable caching for dynamic files
      location ~* \.(?:manifest|appcache|html?)$ {
        expires -1;
      }

      # Cache static assets
      location ~* \.(?:js|css|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1d;
        add_header Cache-Control "public, immutable";
      }

      # Deny access to hidden files
      location ~ /\. {
        deny all;
      }
    }

  # Enhanced React SPA with UE Management, RAN, Core, and Monitoring sections
  # Full-featured dashboard for K8s-based 5G testbed control and observability

  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>5G Testbed Dashboard</title>
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
      <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
      <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
      <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
      <style>
        :root {
          --bg: #040810;
          --bg2: #070d1a;
          --bg3: #0a1525;
          --panel: #0d1b2e;
          --panel2: #0f2035;
          --border: #1a3a5c;
          --border2: #1f4a70;
          --accent: #00c8ff;
          --accent2: #0080c8;
          --accent3: #00ffc8;
          --warn: #ffb800;
          --danger: #ff3b5c;
          --success: #00e676;
          --muted: #4a7090;
          --text: #c8e8ff;
          --text2: #7aaccc;
          --text3: #3a6080;
          --glow: 0 0 20px rgba(0,200,255,0.3);
          --font-main: 'Exo 2', sans-serif;
          --font-mono: 'Share Tech Mono', monospace;
          --font-head: 'Orbitron', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-main); }
        #root { height: 100%; display: flex; flex-direction: column; overflow: hidden; }

        .app-container { display: flex; flex-direction: column; height: 100%; overflow: hidden; background: var(--bg); }
        .header { background: linear-gradient(to bottom, var(--bg2), var(--panel)); padding: 24px 32px; border-bottom: 1px solid var(--border); box-shadow: 0 4px 12px rgba(0,200,255,0.1); flex-shrink: 0; }
        .header h1 { font-size: 26px; font-family: var(--font-head); color: var(--accent); margin-bottom: 6px; letter-spacing: 0.5px; }
        .header .tagline { font-size: 13px; color: var(--text2); letter-spacing: 0.3px; }

        .tabs-wrapper { background: var(--bg2); border-bottom: 2px solid var(--border); flex-shrink: 0; overflow-x: auto; }
        .tabs-inner { max-width: 1400px; margin: 0 auto; width: 100%; }

        .content { flex: 1; overflow-y: auto; padding: 32px; max-width: 1400px; margin: 0 auto; width: 100%; }

        .tabs { display: flex; gap: 0; margin-bottom: 0; border-bottom: 2px solid var(--border); overflow-x: auto; background: var(--bg2); }
        .tab {
          padding: 16px 28px;
          cursor: pointer;
          font-size: 14px;
          font-weight: 600;
          color: var(--text2);
          border-bottom: 3px solid transparent;
          transition: all 0.3s ease;
          white-space: nowrap;
          margin-bottom: -2px;
          user-select: none;
        }
        .tab:hover {
          color: var(--accent);
          background: rgba(0,200,255,0.05);
        }
        .tab.active {
          color: var(--accent);
          border-bottom-color: var(--accent);
          background: rgba(0,200,255,0.1);
        }

        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
        .stat-card:hover { border-color: var(--accent); box-shadow: var(--glow); }
        .stat-label { font-size: 11px; color: var(--text2); text-transform: uppercase; margin-bottom: 8px; }
        .stat-value { font-size: 28px; font-family: var(--font-mono); color: var(--accent); font-weight: 600; }
        .stat-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }

        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
        .panel h3 { color: var(--accent); font-size: 14px; margin-bottom: 12px; }

        .list { display: flex; flex-direction: column; gap: 8px; }
        .list-item { background: var(--panel2); border: 1px solid var(--border); border-radius: 6px; padding: 12px; display: flex; justify-content: space-between; align-items: center; }
        .list-item.running { border-left: 3px solid var(--success); }
        .list-item.pending { border-left: 3px solid var(--warn); }
        .list-item.failed { border-left: 3px solid var(--danger); }

        .badge { display: inline-block; padding: 4px 8px; border-radius: 3px; font-size: 11px; font-weight: 600; }
        .badge.success { background: rgba(0,230,118,0.2); color: var(--success); }
        .badge.warn { background: rgba(255,184,0,0.2); color: var(--warn); }
        .badge.danger { background: rgba(255,59,92,0.2); color: var(--danger); }
        .badge.info { background: rgba(0,200,255,0.2); color: var(--accent); }

        .button { background: var(--accent); color: var(--bg); border: none; padding: 8px 14px; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 12px; transition: all 0.3s ease; }
        .button:hover { background: var(--accent3); }
        .button:disabled { background: var(--muted); cursor: not-allowed; opacity: 0.5; }
        .button.small { padding: 4px 8px; font-size: 10px; }
        .button.danger { background: var(--danger); }
        .button.danger:hover { background: #ff1a3a; }

        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
        .form-group input, .form-group select { width: 100%; padding: 8px; background: var(--bg3); border: 1px solid var(--border); color: var(--text); border-radius: 4px; font-family: var(--font-main); }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent); }

        .table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .table th { background: var(--bg3); padding: 8px; text-align: left; color: var(--text2); font-weight: 600; border-bottom: 1px solid var(--border); }
        .table td { padding: 8px; border-bottom: 1px solid var(--border2); }
        .table tr:hover { background: rgba(0,200,255,0.05); }

        .metric-box { background: var(--panel2); border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin-bottom: 12px; }
        .metric-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
        .metric-bar { background: var(--bg3); height: 20px; border-radius: 3px; overflow: hidden; position: relative; }
        .metric-fill { background: linear-gradient(90deg, var(--accent), var(--accent3)); height: 100%; transition: width 0.3s ease; display: flex; align-items: center; justify-content: flex-end; padding-right: 4px; color: var(--bg); font-size: 10px; font-weight: 600; }

        .info-box { background: rgba(0,200,255,0.05); border: 1px solid var(--accent); border-radius: 6px; padding: 12px; font-size: 12px; color: var(--text2); margin-bottom: 16px; }
        .info-box strong { color: var(--accent); }

        .loading, .error { padding: 16px; text-align: center; font-size: 12px; }
        .loading { color: var(--muted); }
        .error { color: var(--danger); background: rgba(255,59,92,0.1); border: 1px solid var(--danger); border-radius: 6px; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg3); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
      </style>
    </head>
    <body>
      <div id="root"></div>
      <script type="text/babel">
        const { useState, useEffect } = React;

        function apiFetch(url, opts = {}) {
          const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
          const t = window.__authToken;
          if (t) headers['Authorization'] = `Bearer ${t}`;
          return fetch(url, { ...opts, headers }).then(r => {
            if (r.status === 401 && window.__handleLogout) window.__handleLogout();
            return r;
          });
        }

        // Icon component
        const Icon = ({ name }) => {
          const icons = {
            server: '⚙️', database: '💾', network: '🌐', users: '👥',
            antenna: '📡', chart: '📊', alert: '⚠️', check: '✓',
            power: '⚡', cpu: '💻', memory: '🔋', play: '▶️', stop: '⏹️'
          };
          return <span>{icons[name] || '•'}</span>;
        };

        // Core section
        function CoreSection({ status }) {
          const nfs = status?.nfs || [];
          const coreNfs = nfs.filter(n => n.id.includes('open5gs'));
          const running = coreNfs.filter(n => n.status === 'Running').length;

          return (
            <div>
              <div className="stat-grid">
                <div className="stat-card">
                  <div className="stat-label">Core NFs</div>
                  <div className="stat-value">{coreNfs.length}</div>
                  <div className="stat-sub">Total deployed</div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">Running</div>
                  <div className="stat-value" style={{color: 'var(--success)'}}>{running}</div>
                  <div className="stat-sub">Ready NFs</div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">Uptime</div>
                  <div className="stat-value">✓</div>
                  <div className="stat-sub">All healthy</div>
                </div>
              </div>

              <div className="info-box">
                <Icon name="server" /> <strong>Core Network Functions:</strong> NRF, SCP, AMF, SMF, UPF, AUSF, UDM, UDR, PCF, BSF, NSSF, WebUI
              </div>

              <div className="panel">
                <h3><Icon name="server" /> NF Status</h3>
                <div className="list">
                  {coreNfs.map(nf => (
                    <div key={nf.id} className={`list-item ${nf.status.toLowerCase()}`}>
                      <div>
                        <div style={{fontWeight: 600, marginBottom: 4}}>{nf.id.replace('open5gs-', '')}</div>
                        <div style={{fontSize: 11, color: 'var(--text3)'}}>Replicas: {nf.ready}/{nf.replicas}</div>
                      </div>
                      <span className={`badge ${nf.status === 'Running' ? 'success' : nf.status === 'Pending' ? 'warn' : 'danger'}`}>
                        {nf.status}
                      </span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          );
        }

        // RAN section
        function RanSection({ status }) {
          const nfs = status?.nf || [];
          const ranNfs = nfs.filter(n => n.id.includes('ueransim'));
          const gnb = ranNfs.find(n => n.id.includes('gnb'));
          const ues = ranNfs.filter(n => n.id.includes('ue'));

          return (
            <div>
              <div className="stat-grid">
                <div className="stat-card">
                  <div className="stat-label">gNodeB</div>
                  <div className="stat-value">{gnb?.status === 'Running' ? '1' : '0'}</div>
                  <div className="stat-sub">{gnb?.status}</div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">Connected UEs</div>
                  <div className="stat-value">{ues.filter(u => u.status === 'Running').length}</div>
                  <div className="stat-sub">Active sessions</div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">N2 Link</div>
                  <div className="stat-value" style={{color: gnb?.status === 'Running' ? 'var(--success)' : 'var(--danger)'}}>
                    {gnb?.status === 'Running' ? '✓' : '✗'}
                  </div>
                  <div className="stat-sub">gNB ↔ AMF</div>
                </div>
              </div>

              <div className="info-box">
                <Icon name="antenna" /> <strong>RAN Simulators:</strong> UERANSIM gNB + User Equipment. Simulates 5G radio access.
              </div>

              <div className="grid-2">
                <div className="panel">
                  <h3><Icon name="antenna" /> gNodeB (gNB)</h3>
                  <div className="list">
                    <div className={`list-item ${gnb?.status === 'Running' ? 'running' : 'pending'}`}>
                      <div>
                        <div style={{fontWeight: 600}}>ueransim-gnb</div>
                        <div style={{fontSize: 11, color: 'var(--text3)', marginTop: 4}}>Band 78 (3.5 GHz) | 20 MHz BW</div>
                      </div>
                      <span className={`badge ${gnb?.status === 'Running' ? 'success' : 'warn'}`}>{gnb?.status}</span>
                    </div>
                  </div>
                </div>

                <div className="panel">
                  <h3><Icon name="users" /> User Equipment</h3>
                  <div className="list">
                    {ues.map(ue => (
                      <div key={ue.id} className={`list-item ${ue.status.toLowerCase()}`}>
                        <div>
                          <div style={{fontWeight: 600}}>{ue.id.replace('ueransim-', '')}</div>
                          <div style={{fontSize: 11, color: 'var(--text3)', marginTop: 4}}>IMSI: 001010000000{ue.id.endsWith('1') ? '001' : '002'}</div>
                        </div>
                        <span className={`badge ${ue.status === 'Running' ? 'success' : 'warn'}`}>{ue.status}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          );
        }

        // Full Subscriber Management Section
        function SubscriberManagement() {
          const [subscribers, setSubscribers] = useState([]);
          const [search, setSearch] = useState('');
          const [page, setPage] = useState(1);
          const [totalPages, setTotalPages] = useState(1);
          const [loading, setLoading] = useState(false);
          const [showModal, setShowModal] = useState(false);
          const [editingSubscriber, setEditingSubscriber] = useState(null);
          const [formData, setFormData] = useState({});
          const [importJson, setImportJson] = useState('');
          const importSectionRef = React.useRef(null);

          // Fetch subscribers list
          const fetchSubscribers = async (searchTerm = search, pageNum = 1) => {
            setLoading(true);
            try {
              const query = new URLSearchParams({ search: searchTerm, page: pageNum, limit: 25 });
              const res = await apiFetch(`/api/subscribers?${query}`);
              if (!res.ok) throw new Error('Failed to fetch');
              const data = await res.json();
              setSubscribers(data.data);
              setTotalPages(data.pages);
            } catch (e) {
              alert('Error: ' + e.message);
            } finally {
              setLoading(false);
            }
          };

          React.useEffect(() => {
            fetchSubscribers();
          }, []);

          const handleSearch = (e) => {
            setSearch(e.target.value);
            setPage(1);
            fetchSubscribers(e.target.value, 1);
          };

          const handleAdd = () => {
            setEditingSubscriber(null);
            setFormData({
              imsi: '',
              security: { k: 'fec86ba6eb707ed08ce33ae45b4a0fba', opc: 'c42449363464e2e4fa8adca3063168ca', amf: 'c3d4' },
              pdn: [{ type: 0, apn: 'internet', slice: [{ sst: 1, sd: '000000' }] }],
              slice: [{ sst: 1, sd: '000000' }],
              ambr: { uplink: 1000000, downlink: 1000000 },
              subscribed_rau_tau_timer: 12,
              plmn: { mcc: '001', mnc: '01' }
            });
            setShowModal(true);
          };

          const handleAddBulk = () => {
            setImportJson('');
            if (importSectionRef.current) {
              importSectionRef.current.scrollIntoView({ behavior: 'smooth', block: 'center' });
              setTimeout(() => {
                const textarea = importSectionRef.current.querySelector('textarea');
                if (textarea) textarea.focus();
              }, 300);
            }
          };

          const handleEdit = async (imsi) => {
            try {
              const res = await apiFetch(`/api/subscriber/${imsi}`);
              if (!res.ok) throw new Error('Failed to fetch');
              const data = await res.json();
              setEditingSubscriber(imsi);
              setFormData(data.subscriber);
              setShowModal(true);
            } catch (e) {
              alert('Error: ' + e.message);
            }
          };

          const handleSave = async () => {
            if (!formData.imsi) { alert('IMSI required'); return; }
            try {
              const method = editingSubscriber ? 'PUT' : 'POST';
              const url = editingSubscriber ? `/api/subscriber/${editingSubscriber}` : '/api/ue/add';
              const res = await apiFetch(url, {
                method,
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(formData)
              });
              if (!res.ok) throw new Error('Failed to save');
              setShowModal(false);
              fetchSubscribers(search, page);
            } catch (e) {
              alert('Error: ' + e.message);
            }
          };

          const handleDelete = async (imsi) => {
            if (!confirm(`Delete ${imsi}?`)) return;
            try {
              const res = await apiFetch(`/api/ue/delete?imsi=${imsi}`, {method: 'DELETE'});
              if (!res.ok) throw new Error('Failed to delete');
              fetchSubscribers(search, page);
            } catch (e) {
              alert('Error: ' + e.message);
            }
          };

          const handleExport = async () => {
            try {
              const res = await apiFetch('/api/subscribers/export');
              if (!res.ok) throw new Error('Failed to export');
              const blob = await res.blob();
              const url = window.URL.createObjectURL(blob);
              const a = document.createElement('a');
              a.href = url;
              a.download = 'subscribers.json';
              a.click();
            } catch (e) {
              alert('Error: ' + e.message);
            }
          };

          const handleImport = async () => {
            if (!importJson.trim()) { alert('JSON required'); return; }
            try {
              const subscribers = JSON.parse(importJson);
              const res = await apiFetch('/api/subscribers/import', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ subscribers: Array.isArray(subscribers) ? subscribers : [subscribers] })
              });
              if (!res.ok) throw new Error('Failed to import');
              const result = await res.json();
              alert(`Imported: ${result.imported}, Skipped: ${result.skipped}, Failed: ${result.failed}`);
              setImportJson('');
              fetchSubscribers(search, page);
            } catch (e) {
              alert('Error: ' + e.message);
            }
          };

          return (
            <div>
              <div className="stat-grid">
                <div className="stat-card">
                  <div className="stat-label">Total Subscribers</div>
                  <div className="stat-value">{subscribers.length > 0 ? subscribers[0]._id ? 'Loading...' : subscribers.length : 0}</div>
                  <div className="stat-sub">Registered in MongoDB</div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">Slices</div>
                  <div className="stat-value">1</div>
                  <div className="stat-sub">SST=1, SD=000000</div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">PLMN</div>
                  <div className="stat-value" style={{fontSize: 14}}>001-01</div>
                  <div className="stat-sub">MCC-MNC</div>
                </div>
              </div>

              <div className="info-box">
                <Icon name="database" /> <strong>Subscriber Management:</strong> Full Open5GS subscriber provisioning. Add, edit, delete, bulk import/export.
              </div>

              <div className="panel">
                <h3><Icon name="users" /> Subscribers</h3>
                <div style={{marginBottom: 16, display: 'flex', gap: 8, flexWrap: 'wrap'}}>
                  <input
                    type="text"
                    value={search}
                    onChange={handleSearch}
                    placeholder="Search by IMSI..."
                    style={{flex: 1, padding: '8px', borderRadius: '4px', border: '1px solid var(--border)', background: 'var(--bg3)', color: 'var(--text)', fontFamily: 'var(--font-main)'}}
                  />
                  <button className="button" onClick={handleAdd}><Icon name="check" /> Add Subscriber</button>
                  <button className="button" onClick={handleAddBulk} style={{background: 'var(--accent2)'}}>+ Add Bulk</button>
                  <button className="button" onClick={handleExport} style={{background: 'var(--accent2)'}}>Export</button>
                </div>

                {loading ? (
                  <div className="loading">Loading subscribers...</div>
                ) : subscribers.length === 0 ? (
                  <div style={{fontSize: 12, color: 'var(--text2)', padding: '16px', textAlign: 'center'}}>No subscribers found. Add one to get started.</div>
                ) : (
                  <>
                    <div style={{overflowX: 'auto'}}>
                      <table className="table">
                        <thead>
                          <tr>
                            <th>IMSI</th>
                            <th>K (Auth Key)</th>
                            <th>OPc</th>
                            <th>Slices</th>
                            <th>AMBR (Mbps)</th>
                            <th style={{textAlign: 'right'}}>Actions</th>
                          </tr>
                        </thead>
                        <tbody>
                          {subscribers.map(sub => (
                            <tr key={sub.imsi}>
                              <td><strong>{sub.imsi}</strong></td>
                              <td style={{fontSize: 10, fontFamily: 'var(--font-mono)', color: 'var(--text2)', maxWidth: 200, overflow: 'hidden', textOverflow: 'ellipsis'}}>{sub.security?.k}</td>
                              <td style={{fontSize: 10, fontFamily: 'var(--font-mono)', color: 'var(--text2)', maxWidth: 200, overflow: 'hidden', textOverflow: 'ellipsis'}}>{sub.security?.opc}</td>
                              <td>{sub.slice?.map(s => `SST=${s.sst} SD=${s.sd}`).join(', ')}</td>
                              <td>{sub.ambr ? `${sub.ambr.uplink / 1000 / 1000}/${sub.ambr.downlink / 1000 / 1000}` : 'N/A'}</td>
                              <td style={{textAlign: 'right'}}>
                                <button className="button small" onClick={() => handleEdit(sub.imsi)}>Edit</button>
                                <button className="button small danger" onClick={() => handleDelete(sub.imsi)} style={{marginLeft: 4}}>Delete</button>
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                    <div style={{marginTop: 12, display: 'flex', justifyContent: 'center', gap: 8}}>
                      <button className="button small" disabled={page === 1} onClick={() => { setPage(p => p - 1); fetchSubscribers(search, page - 1); }}>← Prev</button>
                      <span style={{padding: '4px 12px', alignSelf: 'center', fontSize: 12}}>Page {page} of {totalPages}</span>
                      <button className="button small" disabled={page >= totalPages} onClick={() => { setPage(p => p + 1); fetchSubscribers(search, page + 1); }}>Next →</button>
                    </div>
                  </>
                )}

                <div ref={importSectionRef} style={{marginTop: 24, paddingTop: 16, borderTop: '1px solid var(--border)'}}>
                  <h3 style={{marginBottom: 12}}><Icon name="database" /> Bulk Import</h3>
                  <textarea
                    value={importJson}
                    onChange={e => setImportJson(e.target.value)}
                    placeholder='Paste JSON array: [{"imsi":"001010000000002","k":"...","opc":"..."}]'
                    style={{width: '100%', height: 120, padding: '8px', background: 'var(--bg3)', border: '1px solid var(--border)', color: 'var(--text)', borderRadius: '4px', fontFamily: 'var(--font-mono)', fontSize: 11}}
                  />
                  <button className="button" onClick={handleImport} style={{marginTop: 8}}>Import Subscribers</button>
                </div>
              </div>

              {showModal && (
                <div style={{position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.7)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000}}>
                  <div style={{background: 'var(--panel)', border: '1px solid var(--border)', borderRadius: '8px', padding: '24px', maxWidth: 600, width: '90%', maxHeight: '80vh', overflowY: 'auto'}}>
                    <h2 style={{marginBottom: 16, color: 'var(--accent)'}}>{editingSubscriber ? 'Edit Subscriber' : 'Add Subscriber'}</h2>

                    <div className="form-group">
                      <label>IMSI</label>
                      <input type="text" value={formData.imsi || ''} onChange={e => setFormData({...formData, imsi: e.target.value})} placeholder="001010000000002" disabled={!!editingSubscriber} />
                    </div>

                    <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12}}>
                      <div className="form-group">
                        <label>K (Auth Key)</label>
                        <input type="text" value={formData.security?.k || ''} onChange={e => setFormData({...formData, security: {...formData.security, k: e.target.value}})} />
                      </div>
                      <div className="form-group">
                        <label>OPc</label>
                        <input type="text" value={formData.security?.opc || ''} onChange={e => setFormData({...formData, security: {...formData.security, opc: e.target.value}})} />
                      </div>
                      <div className="form-group">
                        <label>AMF</label>
                        <input type="text" value={formData.security?.amf || ''} onChange={e => setFormData({...formData, security: {...formData.security, amf: e.target.value}})} />
                      </div>
                      <div className="form-group">
                        <label>Timer (RAU/TAU)</label>
                        <input type="number" value={formData.subscribed_rau_tau_timer || 12} onChange={e => setFormData({...formData, subscribed_rau_tau_timer: parseInt(e.target.value)})} />
                      </div>
                    </div>

                    <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12}}>
                      <div className="form-group">
                        <label>UL AMBR (Mbps)</label>
                        <input type="number" value={(formData.ambr?.uplink || 0) / 1000 / 1000} onChange={e => setFormData({...formData, ambr: {...formData.ambr, uplink: parseInt(e.target.value) * 1000 * 1000}})} />
                      </div>
                      <div className="form-group">
                        <label>DL AMBR (Mbps)</label>
                        <input type="number" value={(formData.ambr?.downlink || 0) / 1000 / 1000} onChange={e => setFormData({...formData, ambr: {...formData.ambr, downlink: parseInt(e.target.value) * 1000 * 1000}})} />
                      </div>
                    </div>

                    <div style={{marginTop: 12}}>
                      <label style={{display: 'block', fontSize: 12, color: 'var(--text2)', marginBottom: 8, fontWeight: 600}}>PDN/APNs Configuration</label>
                      {(formData.pdn || []).map((pdn, idx) => (
                        <div key={idx} style={{background: 'var(--bg3)', padding: 12, borderRadius: 4, marginBottom: 8, border: '1px solid var(--border)'}}>
                          <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr 50px', gap: 8, marginBottom: 8}}>
                            <div>
                              <label style={{fontSize: 10, color: 'var(--text2)', display: 'block', marginBottom: 3}}>APN Name</label>
                              <input type="text" value={pdn.apn || ''} onChange={e => { const newPdn = [...formData.pdn]; newPdn[idx] = {...pdn, apn: e.target.value}; setFormData({...formData, pdn: newPdn}); }} placeholder="internet" style={{width: '100%', fontSize: 11}} />
                            </div>
                            <div>
                              <label style={{fontSize: 10, color: 'var(--text2)', display: 'block', marginBottom: 3}}>Type</label>
                              <select value={pdn.type || 0} onChange={e => { const newPdn = [...formData.pdn]; newPdn[idx] = {...pdn, type: parseInt(e.target.value)}; setFormData({...formData, pdn: newPdn}); }} style={{width: '100%', fontSize: 11, padding: '4px'}}>
                                <option value="0">IPv4</option>
                                <option value="1">IPv6</option>
                                <option value="2">IPv4v6</option>
                              </select>
                            </div>
                            <div style={{display: 'flex', alignItems: 'flex-end'}}>
                              <button className="button small danger" onClick={() => { const newPdn = formData.pdn.filter((_, i) => i !== idx); setFormData({...formData, pdn: newPdn}); }} style={{width: '100%'}}>×</button>
                            </div>
                          </div>
                          <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8, marginBottom: 8}}>
                            <div>
                              <label style={{fontSize: 10, color: 'var(--text2)', display: 'block', marginBottom: 3}}>5QI</label>
                              <input type="number" value={pdn.qos?.['5qi'] || 9} onChange={e => { const newPdn = [...formData.pdn]; newPdn[idx] = {...pdn, qos: {...pdn.qos, '5qi': parseInt(e.target.value)}}; setFormData({...formData, pdn: newPdn}); }} min="1" max="254" style={{width: '100%', fontSize: 11}} />
                            </div>
                            <div>
                              <label style={{fontSize: 10, color: 'var(--text2)', display: 'block', marginBottom: 3}}>Priority</label>
                              <input type="number" value={pdn.qos?.arp?.priority_level || 8} onChange={e => { const newPdn = [...formData.pdn]; newPdn[idx] = {...pdn, qos: {...pdn.qos, arp: {...pdn.qos?.arp, priority_level: parseInt(e.target.value)}}}; setFormData({...formData, pdn: newPdn}); }} min="1" max="15" style={{width: '100%', fontSize: 11}} />
                            </div>
                            <div>
                              <label style={{fontSize: 10, color: 'var(--text2)', display: 'block', marginBottom: 3}}>Preemption Cap</label>
                              <select value={pdn.qos?.arp?.preemption_cap || 'not-preempt'} onChange={e => { const newPdn = [...formData.pdn]; newPdn[idx] = {...pdn, qos: {...pdn.qos, arp: {...pdn.qos?.arp, preemption_cap: e.target.value}}}; setFormData({...formData, pdn: newPdn}); }} style={{width: '100%', fontSize: 11, padding: '4px'}}>
                                <option value="preempt">Preempt</option>
                                <option value="not-preempt">Not Preempt</option>
                              </select>
                            </div>
                          </div>
                          <div style={{marginTop: 8}}>
                            <label style={{fontSize: 10, color: 'var(--text2)', display: 'block', marginBottom: 4, fontWeight: 600}}>Slices (S-NSSAI)</label>
                            {(pdn.slice || []).map((slice, sidx) => (
                              <div key={sidx} style={{display: 'grid', gridTemplateColumns: '100px 100px 50px', gap: 6, marginBottom: 6}}>
                                <div>
                                  <label style={{fontSize: 9, color: 'var(--text3)', display: 'block', marginBottom: 2}}>SST</label>
                                  <input type="number" value={slice.sst || 1} onChange={e => { const newPdn = [...formData.pdn]; newPdn[idx].slice[sidx] = {...slice, sst: parseInt(e.target.value)}; setFormData({...formData, pdn: newPdn}); }} min="0" max="255" style={{width: '100%', fontSize: 10}} />
                                </div>
                                <div>
                                  <label style={{fontSize: 9, color: 'var(--text3)', display: 'block', marginBottom: 2}}>SD (hex)</label>
                                  <input type="text" value={slice.sd || '000000'} onChange={e => { const newPdn = [...formData.pdn]; newPdn[idx].slice[sidx] = {...slice, sd: e.target.value}; setFormData({...formData, pdn: newPdn}); }} placeholder="000000" style={{width: '100%', fontSize: 10}} />
                                </div>
                                <div style={{display: 'flex', alignItems: 'flex-end'}}>
                                  <button className="button small danger" onClick={() => { const newPdn = [...formData.pdn]; newPdn[idx].slice = pdn.slice.filter((_, s) => s !== sidx); setFormData({...formData, pdn: newPdn}); }} style={{width: '100%', fontSize: 9, padding: '2px'}}>×</button>
                                </div>
                              </div>
                            ))}
                            <button className="button small" onClick={() => { const newPdn = [...formData.pdn]; if (!newPdn[idx].slice) newPdn[idx].slice = []; newPdn[idx].slice.push({sst: 1, sd: '000000'}); setFormData({...formData, pdn: newPdn}); }} style={{width: '100%', fontSize: 9, marginTop: 4}}>+ Add Slice</button>
                          </div>
                        </div>
                      ))}
                      <button className="button small" onClick={() => { const newPdn = [...(formData.pdn || []), { type: 0, apn: '', slice: [{ sst: 1, sd: '000000' }], qos: { '5qi': 9, arp: { priority_level: 8, preemption_cap: 'not-preempt' } } }]; setFormData({...formData, pdn: newPdn}); }} style={{width: '100%', marginTop: 8}}>+ Add APN</button>
                    </div>

                    <div style={{display: 'flex', gap: 8, justifyContent: 'flex-end', marginTop: 20}}>
                      <button className="button" onClick={() => setShowModal(false)} style={{background: 'var(--muted)'}}>Cancel</button>
                      <button className="button" onClick={handleSave}><Icon name="check" /> Save</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        // UE Manager — 4-step workflow: Add → Register → Provision → Operate
        const C = { bg:'#0d1117', card:'#161b22', border:'#30363d', text:'#e6edf3', muted:'#8b949e', accent:'#00c896' };

        function UEManager() {
          // block data: null (loading), object (single user), array (admin all users)
          const [block, setBlock] = useState(null);
          const [loading, setLoading] = useState(false);
          const [busy, setBusy] = useState({});
          const [msg, setMsg] = useState({ text: '', ok: true });
          const [activeImsi, setActiveImsi] = useState(null);
          const [activePanel, setActivePanel] = useState(null); // 'view' | 'ops'
          const [detailData, setDetailData] = useState({});
          const [nasStates, setNasStates] = useState({}); // {imsi: rmState string}
          const [sessionForm, setSessionForm] = useState({ type: 'IPv4', dnn: 'internet', sst: 1 });
          const [pingForm, setPingForm] = useState({ target: '8.8.8.8', count: 4 });
          const [pingOut, setPingOut] = useState({});
          const [nasDeregType, setNasDeregType] = useState('switch-off');
          const isAdmin = window.__currentUser?.role === 'admin';

          const flash = (text, ok=true) => { setMsg({text,ok}); setTimeout(()=>setMsg({text:'',ok:true}),5000); };
          const setBusyK = (k,v) => setBusy(b=>({...b,[k]:v}));

          const fetchBlock = async () => {
            setLoading(true);
            try {
              const r = await apiFetch('/api/ue');
              if (r.ok) setBlock(await r.json());
            } finally { setLoading(false); }
          };

          React.useEffect(() => { fetchBlock(); }, []);

          const doRegister = async (username, isReg) => {
            setBusyK(`reg-${username}`, true);
            const method = isReg ? 'DELETE' : 'POST';
            const qs = (isReg && isAdmin) ? `?username=${username}` : '';
            const body = (!isReg && isAdmin) ? JSON.stringify({ username }) : undefined;
            const r = await apiFetch('/api/ue/register' + qs, { method, body });
            const d = await r.json();
            r.ok ? flash(`${username}: ${d.message || (isReg ? 'Deregistered' : 'Registered')}`) : flash(d.error || 'Failed', false);
            fetchBlock();
            setBusyK(`reg-${username}`, false);
          };

          const doProvision = async (username, isProv) => {
            setBusyK(`prov-${username}`, true);
            const url = isProv ? '/api/ue/deprovision' : '/api/ue/provision';
            const method = isProv ? 'DELETE' : 'POST';
            const qs = (isProv && isAdmin) ? `?username=${username}` : '';
            const body = (!isProv && isAdmin) ? JSON.stringify({ username }) : undefined;
            const r = await apiFetch(url + qs, { method, body });
            const d = await r.json();
            r.ok ? flash(`${username}: pod ${isProv ? 'removed' : 'created'} (ue-${username})`) : flash(d.error || 'Failed', false);
            fetchBlock();
            setBusyK(`prov-${username}`, false);
          };

          const fetchDetail = async (imsi) => {
            try {
              const [nasR, sessR] = await Promise.all([
                apiFetch(`/api/ue/${imsi}/nas-status`),
                apiFetch(`/api/ue/${imsi}/sessions`)
              ]);
              const nas = nasR.ok ? await nasR.json() : {};
              const sess = sessR.ok ? await sessR.json() : {};
              setDetailData(d => ({ ...d, [imsi]: { nas, sessions: sess.sessions || [] } }));
              if (nas?.parsed?.rmState) setNasStates(s => ({ ...s, [imsi]: nas.parsed.rmState }));
            } catch {}
          };

          const openPanel = async (imsi, panel) => {
            if (activeImsi === imsi && activePanel === panel) { setActiveImsi(null); setActivePanel(null); return; }
            setActiveImsi(imsi); setActivePanel(panel);
            fetchDetail(imsi);
          };

          const handleEstablish = async (imsi) => {
            const r = await apiFetch(`/api/ue/${imsi}/sessions`, { method: 'POST', body: JSON.stringify(sessionForm) });
            const d = await r.json();
            flash(d.ok ? `Session established for ${imsi}` : (d.error || 'Failed'), d.ok);
            fetchDetail(imsi);
          };

          const handleReleaseAll = async (imsi) => {
            const r = await apiFetch(`/api/ue/${imsi}/sessions`, { method: 'DELETE' });
            const d = await r.json(); flash(d.ok ? 'Sessions released' : (d.error||'Failed'), d.ok);
            fetchDetail(imsi);
          };

          const handleReleasePsi = async (imsi, psi) => {
            const r = await apiFetch(`/api/ue/${imsi}/sessions/${psi}`, { method: 'DELETE' });
            const d = await r.json(); flash(d.ok ? `PSI ${psi} released` : (d.error||'Failed'), d.ok);
            fetchDetail(imsi);
          };

          const handleNasDeregister = async (imsi) => {
            const r = await apiFetch(`/api/ue/${imsi}/nas-deregister`, { method: 'POST', body: JSON.stringify({ type: nasDeregType }) });
            const d = await r.json();
            flash(d.ok ? `Deregistered ${imsi} (${nasDeregType})` : (d.error||'Failed'), d.ok);
            if (d.ok && nasDeregType === 'switch-off') setNasStates(s => ({ ...s, [imsi]: 'RM-DEREGISTERED' }));
            setTimeout(() => fetchDetail(imsi), 1200);
          };

          const handlePing = async (imsi) => {
            const r = await apiFetch(`/api/ue/${imsi}/ping`, { method: 'POST', body: JSON.stringify(pingForm) });
            const d = await r.json();
            flash(d.ok ? `Ping to ${pingForm.target} done` : (d.error || 'Failed'), d.ok);
            setPingOut(o => ({ ...o, [imsi]: d.output || d.error || '' }));
          };

          // Normalize to array for rendering
          const blocks = block === null ? [] : Array.isArray(block) ? block : [block];
          const totalImsis = blocks.reduce((s, b) => s + (b.imsiCount || 0), 0);
          const totalReg = blocks.reduce((s, b) => s + (b.registeredCount || 0), 0);
          const totalPods = blocks.filter(b => b.ueProvisioned).length;

          const sel = (css) => ({ padding:'4px 8px', background:'var(--bg)', border:'1px solid var(--border)', color:'var(--text)', borderRadius:3, fontSize:11, ...css });

          // Per-IMSI card: 5 per row grid, color-coded by NAS state > mongo state
          const ImsiCard = ({ imsi, inMongo, provisioned }) => {
            const rmState = nasStates[imsi];
            const isNasReg = rmState && rmState.includes('REGISTERED') && !rmState.includes('DEREGISTERED');
            const isNasDereg = rmState && rmState.includes('DEREGISTERED');
            let bg, border, labelColor, stateLabel;
            if (isNasReg)        { bg='rgba(0,200,100,0.13)';  border='rgba(0,200,100,0.5)';  labelColor='var(--success)'; stateLabel='NAS: REG'; }
            else if (isNasDereg) { bg='rgba(255,80,80,0.10)';  border='rgba(255,80,80,0.45)'; labelColor='var(--danger)';  stateLabel='NAS: DEREG'; }
            else if (inMongo)    { bg='rgba(0,200,100,0.08)';  border='rgba(0,200,100,0.25)'; labelColor='var(--success)'; stateLabel='in-db'; }
            else                 { bg='rgba(100,100,100,0.06)';border='var(--border)';         labelColor='var(--text3)';   stateLabel='not registered'; }
            const isActive = activeImsi === imsi;
            return (
              <div style={{background:bg,border:`1px solid ${border}`,borderRadius:8,padding:'10px 10px 8px',
                boxShadow:isActive?`0 0 0 2px ${border}`:'none',transition:'box-shadow 0.15s'}}>
                <div style={{fontFamily:'var(--font-mono)',fontSize:13,fontWeight:600,color:labelColor,
                  letterSpacing:'0.02em',marginBottom:5,wordBreak:'break-all'}}>{imsi}</div>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <span style={{fontSize:10,color:labelColor}}>{stateLabel}</span>
                  {provisioned && (
                    <div style={{display:'flex',gap:3}}>
                      <button title="View status" onClick={()=>openPanel(imsi,'view')}
                        style={{background:activeImsi===imsi&&activePanel==='view'?'var(--accent)':'transparent',
                          border:'1px solid var(--border)',borderRadius:4,padding:'2px 5px',cursor:'pointer',
                          color:activeImsi===imsi&&activePanel==='view'?'#000':'var(--text2)',fontSize:13,lineHeight:1}}>
                        &#128065;
                      </button>
                      <button title="Operate" onClick={()=>openPanel(imsi,'ops')}
                        style={{background:activeImsi===imsi&&activePanel==='ops'?'var(--accent)':'transparent',
                          border:'1px solid var(--border)',borderRadius:4,padding:'2px 5px',cursor:'pointer',
                          color:activeImsi===imsi&&activePanel==='ops'?'#000':'var(--text2)',fontSize:13,lineHeight:1}}>
                        &#9881;
                      </button>
                    </div>
                  )}
                </div>
              </div>
            );
          };

          // View panel — read-only NAS status + sessions
          const ViewPanel = ({ imsi }) => (
            <div style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:8,padding:14,marginTop:10}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
                <span style={{fontFamily:'var(--font-mono)',fontSize:12,fontWeight:600,color:'var(--accent)'}}>{imsi}</span>
                <button className="button small" onClick={()=>fetchDetail(imsi)}>↻ Refresh</button>
              </div>
              <div style={{marginBottom:10}}>
                <div style={{fontSize:11,fontWeight:600,color:'var(--text2)',marginBottom:6}}>NAS Status</div>
                {detailData[imsi]?.nas?.parsed ? (
                  <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:6}}>
                    {[['CM State',detailData[imsi].nas.parsed.cmState],['MM State',detailData[imsi].nas.parsed.mmState],['RM State',detailData[imsi].nas.parsed.rmState]].map(([k,v])=>(
                      <div key={k} style={{background:'var(--bg)',borderRadius:6,padding:'6px 8px'}}>
                        <div style={{fontSize:9,color:'var(--text3)',marginBottom:2}}>{k}</div>
                        <div style={{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--text)',fontWeight:600}}>{v||'—'}</div>
                      </div>
                    ))}
                  </div>
                ) : <div style={{fontSize:11,color:'var(--text3)'}}>No data — click Refresh</div>}
              </div>
              <div>
                <div style={{fontSize:11,fontWeight:600,color:'var(--text2)',marginBottom:6}}>
                  PDU Sessions ({(detailData[imsi]?.sessions||[]).length})
                </div>
                {(detailData[imsi]?.sessions||[]).length === 0
                  ? <div style={{fontSize:11,color:'var(--text3)'}}>No active sessions</div>
                  : <table className="table" style={{fontSize:11}}>
                      <thead><tr><th>PSI</th><th>State</th><th>Type</th><th>DNN</th><th>IP</th></tr></thead>
                      <tbody>{(detailData[imsi]?.sessions||[]).map((s,idx)=>(
                        <tr key={idx}><td>{s.psi}</td><td><span className="badge success">{s.state}</span></td>
                          <td>{s.type}</td><td>{s.dnn}</td>
                          <td style={{fontFamily:'var(--font-mono)',fontSize:10}}>{s.ip}</td></tr>
                      ))}</tbody>
                    </table>}
              </div>
            </div>
          );

          // Ops panel — PDU/ping/deregister controls
          const OpsPanel = ({ imsi }) => (
            <div style={{background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:8,padding:14,marginTop:10}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
                <span style={{fontFamily:'var(--font-mono)',fontSize:12,fontWeight:600,color:'var(--accent)'}}>{imsi}</span>
                <div style={{display:'flex',gap:6,alignItems:'center'}}>
                  <span style={{fontSize:11,color:'var(--text2)'}}>Sessions ({(detailData[imsi]?.sessions||[]).length})</span>
                  <button className="button small danger" onClick={()=>handleReleaseAll(imsi)}>Release All</button>
                </div>
              </div>
              {(detailData[imsi]?.sessions||[]).length > 0 && (
                <table className="table" style={{fontSize:11,marginBottom:10}}>
                  <thead><tr><th>PSI</th><th>State</th><th>Type</th><th>DNN</th><th>IP</th><th></th></tr></thead>
                  <tbody>{(detailData[imsi]?.sessions||[]).map((s,idx)=>(
                    <tr key={idx}><td>{s.psi}</td><td><span className="badge success">{s.state}</span></td>
                      <td>{s.type}</td><td>{s.dnn}</td>
                      <td style={{fontFamily:'var(--font-mono)',fontSize:10}}>{s.ip}</td>
                      <td><button className="button small danger" onClick={()=>handleReleasePsi(imsi,s.psi)}>Release</button></td>
                    </tr>
                  ))}</tbody>
                </table>
              )}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
                <div style={{background:'var(--bg)',borderRadius:6,padding:10}}>
                  <div style={{fontSize:11,fontWeight:600,color:'var(--text2)',marginBottom:6}}>Establish Session</div>
                  <div style={{display:'flex',gap:4,flexWrap:'wrap',alignItems:'flex-end'}}>
                    <select value={sessionForm.type} onChange={e=>setSessionForm(f=>({...f,type:e.target.value}))} style={sel()}>
                      <option>IPv4</option><option>IPv6</option><option>IPv4v6</option>
                    </select>
                    <input placeholder="DNN" value={sessionForm.dnn} onChange={e=>setSessionForm(f=>({...f,dnn:e.target.value}))} style={sel({width:70})} />
                    <input type="number" placeholder="SST" value={sessionForm.sst} onChange={e=>setSessionForm(f=>({...f,sst:parseInt(e.target.value)||1}))} min="1" max="4" style={sel({width:44})} />
                    <button className="button small" onClick={()=>handleEstablish(imsi)}>Establish</button>
                  </div>
                </div>
                <div style={{background:'var(--bg)',borderRadius:6,padding:10}}>
                  <div style={{fontSize:11,fontWeight:600,color:'var(--text2)',marginBottom:6}}>Ping</div>
                  <div style={{display:'flex',gap:4,alignItems:'flex-end',flexWrap:'wrap'}}>
                    <input placeholder="8.8.8.8" value={pingForm.target} onChange={e=>setPingForm(f=>({...f,target:e.target.value}))} style={sel({width:100})} />
                    <input type="number" value={pingForm.count} onChange={e=>setPingForm(f=>({...f,count:parseInt(e.target.value)||4}))} min="1" max="10" style={sel({width:44})} />
                    <button className="button small" onClick={()=>handlePing(imsi)}>Ping</button>
                  </div>
                  {pingOut[imsi] && <pre style={{marginTop:5,fontSize:10,fontFamily:'var(--font-mono)',color:'var(--text2)',background:'var(--bg3)',padding:5,borderRadius:4,maxHeight:72,overflowY:'auto'}}>{pingOut[imsi]}</pre>}
                </div>
              </div>
              <div style={{background:'var(--bg)',borderRadius:6,padding:10}}>
                <div style={{fontSize:11,fontWeight:600,color:'var(--text2)',marginBottom:6}}>NAS Deregister</div>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  <select value={nasDeregType} onChange={e=>setNasDeregType(e.target.value)} style={sel()}>
                    <option value="switch-off">switch-off</option>
                    <option value="normal">re-register</option>
                  </select>
                  <button className="button small danger" onClick={()=>handleNasDeregister(imsi)}>Deregister</button>
                </div>
              </div>
            </div>
          );

          return (
            <div>
              <div className="stat-grid">
                <div className="stat-card">
                  <div className="stat-label">Total Allocated IMSIs</div>
                  <div className="stat-value">{totalImsis}</div>
                  <div className="stat-sub">Across {blocks.length} user(s)</div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">Registered in Core</div>
                  <div className="stat-value" style={{color:totalReg>0?'var(--success)':'var(--muted)'}}>{totalReg}</div>
                  <div className="stat-sub">In Open5GS MongoDB</div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">UERANSIM Pods</div>
                  <div className="stat-value" style={{color:totalPods>0?'var(--accent)':'var(--muted)'}}>{totalPods}</div>
                  <div className="stat-sub">Active K8s Deployments</div>
                </div>
              </div>

              {msg.text && (
                <div style={{background:msg.ok?'rgba(0,200,100,0.1)':'rgba(255,80,80,0.1)',border:`1px solid ${msg.ok?'var(--success)':'var(--danger)'}`,borderRadius:6,padding:'8px 14px',color:msg.ok?'var(--success)':'var(--danger)',fontSize:12,marginBottom:12}}>
                  {msg.text}
                </div>
              )}

              {loading && <div className="loading">Loading…</div>}

              {!loading && blocks.length === 0 && (
                <div style={{fontSize:12,color:'var(--text2)',padding:24,textAlign:'center',background:'var(--panel)',borderRadius:8}}>
                  {isAdmin ? 'No IMSI blocks allocated. Go to User Management to allocate blocks when creating users.' : 'No IMSI block assigned to your account. Contact an admin.'}
                </div>
              )}

              {!loading && blocks.map(b => (
                <div key={b.username} style={{background:'var(--panel)',border:'1px solid var(--border)',borderRadius:8,marginBottom:16,overflow:'hidden'}}>
                  {/* Block header */}
                  <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:14,fontWeight:700,color:'var(--text)'}}>
                        {isAdmin && <span style={{color:'var(--text2)',fontWeight:400,fontSize:12,marginRight:6}}>user:</span>}
                        {b.username}
                        <span style={{marginLeft:8,fontSize:11,padding:'2px 7px',borderRadius:12,background:'rgba(0,200,255,0.15)',color:'var(--accent)',fontWeight:600}}>
                          {b.imsiCount} UEs · ue-{b.username}
                        </span>
                      </div>
                      <div style={{fontSize:11,color:'var(--text2)',marginTop:2,fontFamily:'var(--font-mono)'}}>
                        {b.imsiStart} → {b.imsiStart ? String(parseInt(b.imsiStart)+b.imsiCount-1).padStart(15,'0') : '—'}
                      </div>
                    </div>
                    <div style={{display:'flex',gap:6,alignItems:'center'}}>
                      <div style={{textAlign:'center',padding:'4px 10px',background:'rgba(0,200,100,0.1)',borderRadius:6}}>
                        <div style={{fontSize:9,color:'var(--text2)'}}>Reg</div>
                        <div style={{fontSize:15,fontWeight:700,color:b.ueRegistered?'var(--success)':'var(--text3)'}}>{b.registeredCount}/{b.imsiCount}</div>
                      </div>
                      <div style={{textAlign:'center',padding:'4px 10px',background:'rgba(0,150,255,0.1)',borderRadius:6}}>
                        <div style={{fontSize:9,color:'var(--text2)'}}>Pod</div>
                        <div style={{fontSize:12,fontWeight:700,color:b.podRunning?'var(--accent)':'var(--text3)'}}>{b.podPhase||'none'}</div>
                      </div>
                    </div>
                    <div style={{display:'flex',gap:5}}>
                      <button className="button small" disabled={busy[`reg-${b.username}`]}
                        style={{background:b.ueRegistered?'rgba(255,150,0,0.8)':'var(--success)'}}
                        onClick={()=>doRegister(b.username, b.ueRegistered)}>
                        {busy[`reg-${b.username}`] ? '…' : b.ueRegistered ? 'Deregister All' : 'Register All'}
                      </button>
                      <button className="button small" disabled={busy[`prov-${b.username}`]}
                        style={{background:b.ueProvisioned?'var(--warn)':'var(--accent)'}}
                        onClick={()=>doProvision(b.username, b.ueProvisioned)}>
                        {busy[`prov-${b.username}`] ? '…' : b.ueProvisioned ? 'Deprovision' : 'Provision Pod'}
                      </button>
                    </div>
                  </div>
                  {/* IMSI grid: 5 per row */}
                  <div style={{padding:'12px 16px'}}>
                    <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:8}}>
                      {(b.imsis||[]).map(i => (
                        <ImsiCard key={i.imsi} imsi={i.imsi} inMongo={i.inMongo} provisioned={b.ueProvisioned} />
                      ))}
                    </div>
                    {/* Panel below grid — only for IMSIs in this block */}
                    {activeImsi && (b.imsis||[]).some(i => i.imsi === activeImsi) && (
                      activePanel === 'view' ? <ViewPanel imsi={activeImsi} /> : <OpsPanel imsi={activeImsi} />
                    )}
                  </div>
                </div>
              ))}
            </div>
          );
        }

        // Tracing section - PCAP capture
        function TracingSection() {
          const [tab, setTab] = useState('interface');
          const [pods, setPods] = useState([]);
          const [sessions, setSessions] = useState([]);
          const [selectedInterfaces, setSelectedInterfaces] = useState({ ngap: true, gtpu: false, pfcp: false, sbi: false, allSctp: false, ueSubnet: false });
          const [podForm, setPodForm] = useState({ interface: 'any', filter: '', duration: '60' });
          const [selectedPods, setSelectedPods] = useState([]);
          const [duration, setDuration] = useState('60');
          const [fileSize, setFileSize] = useState('50');
          const [starting, setStarting] = useState(false);
          const [loading, setLoading] = useState(false);

          const interfaceDefinitions = [
            { id: 'ngap', name: 'NGAP (N2)', protocol: 'SCTP:38412', code: 'AMF', desc: 'Control signalling between gNB and AMF (3GPP TS 38.413)', filter: 'sctp port 38412', color: 'rgba(0,150,255,0.1)', borderColor: '#0096ff' },
            { id: 'gtpu', name: 'GTP-U (N3)', protocol: 'UDP:2152', code: 'UPF', desc: 'User-plane tunnels between gNB and UPF (3GPP TS 29.281)', filter: 'udp port 2152', color: 'rgba(0,200,100,0.1)', borderColor: '#00c864' },
            { id: 'pfcp', name: 'PFCP (N4)', protocol: 'UDP:8805', code: 'SMF-UPF', desc: 'Session management between SMF and UPF (3GPP TS 29.244)', filter: 'udp port 8805', color: 'rgba(255,150,0,0.1)', borderColor: '#ff9600' },
            { id: 'sbi', name: 'SBI (NS-NB)', protocol: 'TCP:7777', code: 'NRF', desc: 'Service-Based Interface — HTTP/2 NF inter-communication', filter: 'tcp port 7777', color: 'rgba(150,100,255,0.1)', borderColor: '#9664ff' },
            { id: 'allSctp', name: 'All SCTP', protocol: 'SCTP:any', code: 'AMF/NRF', desc: 'Capture all SCTP traffic (NGAP + any other SCTP protocols)', filter: 'sctp', color: 'rgba(100,100,100,0.1)', borderColor: '#666666' },
            { id: 'ueSubnet', name: 'UE IP Subnet', protocol: 'any=UPF', code: 'UPF', desc: 'All traffic to/from the UE IP pool (data plane inspection)', filter: 'net 10.45.0.0/16', color: 'rgba(100,200,255,0.1)', borderColor: '#64c8ff' }
          ];

          const buildCombinedFilter = () => {
            const selected = [];
            if (selectedInterfaces.ngap) selected.push('sctp port 38412');
            if (selectedInterfaces.gtpu) selected.push('udp port 2152');
            if (selectedInterfaces.pfcp) selected.push('udp port 8805');
            if (selectedInterfaces.sbi) selected.push('tcp port 7777');
            if (selectedInterfaces.allSctp) selected.push('sctp');
            if (selectedInterfaces.ueSubnet) selected.push('net 10.45.0.0/16');
            return selected.join(' or ');
          };

          const fetchPods = async () => {
            try {
              const res = await apiFetch('/api/pcap/pods');
              if (!res.ok) throw new Error('Failed to fetch pods');
              const data = await res.json();
              setPods(data);
            } catch (e) {
              console.error('Error fetching pods:', e);
            }
          };

          const fetchSessions = async () => {
            try {
              const res = await apiFetch('/api/pcap/sessions');  // fetches all types
              if (!res.ok) throw new Error('Failed to fetch sessions');
              const data = await res.json();
              setSessions(data.sessions || []);
            } catch (e) {
              console.error('Error fetching sessions:', e);
            }
          };

          React.useEffect(() => {
            fetchPods();
            fetchSessions();
            const interval = setInterval(fetchSessions, 5000);
            return () => clearInterval(interval);
          }, []);

          const hasRunning = sessions.some(s => s.status === 'running');

          const handleStartInterfaceCapture = async () => {
            if (!Object.values(selectedInterfaces).some(v => v)) { alert('Select at least one interface'); return; }
            if (hasRunning) { alert('A capture is already in progress. Stop it before starting a new one.'); return; }
            setStarting(true);
            try {
              const res = await apiFetch('/api/pcap/start', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                  type: 'interface',
                  interfaces: selectedInterfaces,
                  filter: buildCombinedFilter(),
                  duration: Number(duration),
                  fileSize: Number(fileSize)
                })
              });
              if (!res.ok) throw new Error('Failed to start capture');
              setSelectedInterfaces({ ngap: true, gtpu: false, pfcp: false, sbi: false, allSctp: false, ueSubnet: false });
              fetchSessions();
            } catch (e) {
              alert('Error: ' + e.message);
            } finally {
              setStarting(false);
            }
          };

          const getPodCategory = (app) => {
            if (!app) return { label: 'System', color: 'rgba(100,100,100,0.1)', border: '#888888' };
            if (app.startsWith('open5gs-')) return { label: 'Core NF', color: 'rgba(0,150,255,0.1)', border: '#0096ff' };
            if (app.startsWith('ueransim-')) return { label: 'RAN', color: 'rgba(0,200,100,0.1)', border: '#00c864' };
            if (app === 'prometheus' || app === 'grafana') return { label: 'Observability', color: 'rgba(255,150,0,0.1)', border: '#ff9600' };
            return { label: 'System', color: 'rgba(150,100,255,0.1)', border: '#9664ff' };
          };

          const togglePodSelection = (podName) => {
            setSelectedPods(prev => prev.includes(podName) ? prev.filter(n => n !== podName) : [...prev, podName]);
          };

          const handleStartPodCapture = async () => {
            if (selectedPods.length === 0) { alert('Select at least one pod'); return; }
            if (hasRunning) { alert('A capture is already in progress. Stop it before starting a new one.'); return; }
            setStarting(true);
            try {
              const podTargets = selectedPods.map(name => {
                const p = pods.find(p => p.name === name);
                return { pod: name, container: p?.containers?.[0] || '' };
              });
              const res = await apiFetch('/api/pcap/start', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                  type: 'pod',
                  pods: podTargets,
                  interface: podForm.interface,
                  filter: podForm.filter,
                  duration: Number(podForm.duration),
                })
              });
              if (!res.ok) throw new Error('Failed to start capture');
              setSelectedPods([]);
              fetchSessions();
            } catch (e) {
              alert('Error: ' + e.message);
            } finally {
              setStarting(false);
            }
          };

          const handleStopCapture = async (id) => {
            setLoading(true);
            try {
              const res = await apiFetch(`/api/pcap/stop/${id}`, {method: 'POST'});
              if (!res.ok) throw new Error('Failed to stop capture');
              fetchSessions();
            } catch (e) {
              alert('Error: ' + e.message);
            } finally {
              setLoading(false);
            }
          };

          const handleDownload = (sessionId) => {
            window.location.href = `/api/pcap/download/${sessionId}`;
          };

          const handleDeleteSession = async (id) => {
            if (!confirm('Delete session?')) return;
            try {
              const res = await apiFetch(`/api/pcap/sessions/${id}`, {method: 'DELETE'});
              if (!res.ok) throw new Error('Failed to delete session');
              setSessions(s => s.filter(x => x.id !== id));
            } catch (e) {
              alert('Error: ' + e.message);
            }
          };

          return (
            <div>
              <div className="stat-grid">
                <div className="stat-card">
                  <div className="stat-label">Active Captures</div>
                  <div className="stat-value" style={{color: sessions.filter(s => s.status === 'running').length > 0 ? 'var(--danger)' : 'var(--text)'}}>{sessions.filter(s => s.status === 'running').length}</div>
                  <div className="stat-sub">{sessions.filter(s => s.status === 'running').length > 0 ? 'Recording...' : 'Idle'}</div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">Available Pods</div>
                  <div className="stat-value">{pods.length}</div>
                  <div className="stat-sub">For capture</div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">Sessions</div>
                  <div className="stat-value">{sessions.length}</div>
                  <div className="stat-sub">Total</div>
                </div>
              </div>

              <div className="info-box">
                <Icon name="network" /> <strong>PCAP Tracing:</strong> Multi-interface capture from 5G NF pods. Interface Capture mode selects predefined 5G interfaces; Pod Capture mode targets specific pods.
              </div>

              <div style={{display: 'flex', gap: 0, borderBottom: '2px solid var(--border)', marginBottom: 16}}>
                <button onClick={() => setTab('interface')} style={{flex: 1, padding: '14px', background: tab === 'interface' ? 'rgba(0,200,255,0.1)' : 'transparent', borderBottom: tab === 'interface' ? '3px solid var(--accent)' : 'none', color: tab === 'interface' ? 'var(--accent)' : 'var(--text2)', cursor: 'pointer', fontWeight: 600, fontSize: 14, border: 'none', marginBottom: '-2px', transition: 'all 0.2s'}}>
                  <Icon name="network" /> Interface Capture
                </button>
                <button onClick={() => setTab('pod')} style={{flex: 1, padding: '14px', background: tab === 'pod' ? 'rgba(0,200,255,0.1)' : 'transparent', borderBottom: tab === 'pod' ? '3px solid var(--accent)' : 'none', color: tab === 'pod' ? 'var(--accent)' : 'var(--text2)', cursor: 'pointer', fontWeight: 600, fontSize: 14, border: 'none', marginBottom: '-2px', transition: 'all 0.2s'}}>
                  <Icon name="server" /> Pod Capture
                </button>
              </div>

              {tab === 'interface' && (
                <div className="panel">
                  <h3><Icon name="network" /> New Interface Capture</h3>
                  <div style={{fontSize: 12, color: 'var(--text2)', textTransform: 'uppercase', marginBottom: 16, fontWeight: 600}}>Select 5G Interfaces to Capture</div>

                  <div style={{display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap: 12, marginBottom: 20}}>
                    {interfaceDefinitions.map(iface => (
                      <div key={iface.id} style={{padding: 16, background: selectedInterfaces[iface.id] ? iface.color : 'transparent', border: `2px solid ${selectedInterfaces[iface.id] ? iface.borderColor : 'var(--border)'}`, borderRadius: 8, cursor: 'pointer', transition: 'all 0.2s'}} onClick={() => setSelectedInterfaces(s => ({...s, [iface.id]: !s[iface.id]}))}>
                        <div style={{display: 'flex', alignItems: 'flex-start', gap: 8}}>
                          <input type="checkbox" checked={selectedInterfaces[iface.id]} onChange={() => {}} style={{marginTop: 4, cursor: 'pointer'}} />
                          <div style={{flex: 1}}>
                            <div style={{fontWeight: 600, fontSize: 13, color: 'var(--text)', marginBottom: 4}}>
                              <span style={{marginRight: 8}}>●</span>{iface.name}
                            </div>
                            <div style={{fontSize: 11, color: 'var(--text2)', marginBottom: 2}}>
                              {iface.protocol} <span style={{color: 'var(--text3)', marginLeft: 8}}>{iface.code}</span>
                            </div>
                            <div style={{fontSize: 10, color: 'var(--text3)', marginBottom: 8, lineHeight: 1.4}}>{iface.desc}</div>
                            <div style={{fontSize: 11, color: selectedInterfaces[iface.id] ? iface.borderColor : 'var(--text3)', fontFamily: 'var(--font-mono)', fontWeight: 600}}>{iface.filter}</div>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>

                  <div style={{display: 'grid', gridTemplateColumns: '100px 100px 1fr', gap: 12, marginBottom: 16}}>
                    <div className="form-group">
                      <label style={{fontSize: 11}}>Duration (sec)</label>
                      <input type="number" value={duration} onChange={e => setDuration(e.target.value)} min="1" max="3600" style={{width: '100%', padding: '8px', borderRadius: '4px', border: '1px solid var(--border)', background: 'var(--bg3)', color: 'var(--text)', fontFamily: 'var(--font-mono)'}} />
                    </div>
                    <div className="form-group">
                      <label style={{fontSize: 11}}>Max File Size (MB)</label>
                      <input type="number" value={fileSize} onChange={e => setFileSize(e.target.value)} min="1" max="5000" style={{width: '100%', padding: '8px', borderRadius: '4px', border: '1px solid var(--border)', background: 'var(--bg3)', color: 'var(--text)', fontFamily: 'var(--font-mono)'}} />
                    </div>
                    <div className="form-group">
                      <label style={{fontSize: 11}}>Combined BPF Filter (auto-built from selection)</label>
                      <div style={{width: '100%', padding: '8px', borderRadius: '4px', border: '1px solid var(--border)', background: 'var(--bg3)', color: 'var(--accent)', fontFamily: 'var(--font-mono)', fontSize: 11, wordBreak: 'break-all', lineHeight: 1.3}}>
                        {buildCombinedFilter() || 'Select interfaces above'}
                      </div>
                    </div>
                  </div>

                  <div style={{fontSize: 11, color: 'var(--text2)', marginBottom: 16, padding: '8px 0'}}>
                    Captures on eth0 of every selected NF pod simultaneously
                  </div>

                  {hasRunning && (
                    <div style={{marginBottom: 12, padding: '10px 14px', background: 'rgba(255,80,80,0.1)', border: '1px solid rgba(255,80,80,0.4)', borderRadius: 6, fontSize: 12, color: 'var(--danger)'}}>
                      ⚠ A capture is in progress. Stop it before starting a new one.
                    </div>
                  )}
                  <button className="button" onClick={handleStartInterfaceCapture} disabled={starting || hasRunning || !Object.values(selectedInterfaces).some(v => v)} style={{width: '100%'}}>
                    <Icon name="play" /> {starting ? 'Starting...' : 'Start Capture'}
                  </button>
                </div>
              )}

              {tab === 'pod' && (
                <div className="panel">
                  <h3><Icon name="server" /> New Pod Capture</h3>
                  <div style={{fontSize: 12, color: 'var(--text2)', textTransform: 'uppercase', marginBottom: 16, fontWeight: 600}}>
                    Select Pods to Capture ({selectedPods.length} selected)
                  </div>

                  <div style={{display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(220px, 1fr))', gap: 10, marginBottom: 20}}>
                    {pods.map(p => {
                      const cat = getPodCategory(p.app);
                      const sel = selectedPods.includes(p.name);
                      return (
                        <div key={p.name} onClick={() => togglePodSelection(p.name)}
                          style={{padding: 12, background: sel ? cat.color : 'transparent', border: `2px solid ${sel ? cat.border : 'var(--border)'}`, borderRadius: 8, cursor: 'pointer', transition: 'all 0.2s'}}>
                          <div style={{display: 'flex', alignItems: 'flex-start', gap: 8}}>
                            <input type="checkbox" checked={sel} onChange={() => {}} style={{marginTop: 3, cursor: 'pointer', flexShrink: 0}} />
                            <div style={{flex: 1, minWidth: 0}}>
                              <div style={{fontWeight: 600, fontSize: 12, color: sel ? cat.border : 'var(--text)', marginBottom: 2, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis'}}>
                                {p.app || p.name}
                              </div>
                              <div style={{fontSize: 10, color: 'var(--text3)', marginBottom: 2, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis'}}>{p.name}</div>
                              <div style={{fontSize: 10, color: sel ? cat.border : 'var(--accent)', fontFamily: 'var(--font-mono)'}}>{p.podIP}</div>
                              <div style={{marginTop: 4}}>
                                <span style={{fontSize: 9, padding: '1px 5px', borderRadius: 3, background: sel ? cat.border : 'var(--bg3)', color: sel ? '#fff' : 'var(--text3)', fontWeight: 600}}>{cat.label}</span>
                              </div>
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>

                  <div style={{display: 'grid', gridTemplateColumns: '100px 100px 1fr', gap: 12, marginBottom: 12}}>
                    <div className="form-group">
                      <label style={{fontSize: 11}}>Interface</label>
                      <input type="text" value={podForm.interface} onChange={e => setPodForm(f => ({...f, interface: e.target.value}))} placeholder="any" style={{width: '100%', padding: '8px', borderRadius: '4px', border: '1px solid var(--border)', background: 'var(--bg3)', color: 'var(--text)'}} />
                    </div>
                    <div className="form-group">
                      <label style={{fontSize: 11}}>Duration (sec)</label>
                      <input type="number" value={podForm.duration} onChange={e => setPodForm(f => ({...f, duration: e.target.value}))} min="1" max="3600" style={{width: '100%', padding: '8px', borderRadius: '4px', border: '1px solid var(--border)', background: 'var(--bg3)', color: 'var(--text)'}} />
                    </div>
                    <div className="form-group">
                      <label style={{fontSize: 11}}>BPF Filter</label>
                      <input type="text" value={podForm.filter} onChange={e => setPodForm(f => ({...f, filter: e.target.value}))} placeholder="e.g. sctp port 38412 (leave blank for all)" style={{width: '100%', padding: '8px', borderRadius: '4px', border: '1px solid var(--border)', background: 'var(--bg3)', color: 'var(--text)', fontFamily: 'var(--font-mono)', fontSize: 11}} />
                    </div>
                  </div>

                  <div style={{marginBottom: 16, padding: 10, background: 'var(--bg3)', borderRadius: 6}}>
                    <div style={{fontSize: 10, fontWeight: 600, color: 'var(--text2)', marginBottom: 6}}>Quick BPF presets</div>
                    <div style={{display: 'flex', gap: 6, flexWrap: 'wrap'}}>
                      {[['sctp port 38412','NGAP N2'],['udp port 2152','GTP-U N3'],['udp port 8805','PFCP N4'],['tcp port 7777','SBI'],['net 10.45.0.0/16','UE Subnet']].map(([f,l]) => (
                        <button key={f} onClick={() => setPodForm(p => ({...p, filter: f}))} style={{padding: '4px 8px', background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 4, cursor: 'pointer', color: 'var(--text2)', fontSize: 10, fontFamily: 'var(--font-mono)'}} onMouseEnter={e=>{e.target.style.borderColor='var(--accent)';e.target.style.color='var(--accent)'}} onMouseLeave={e=>{e.target.style.borderColor='var(--border)';e.target.style.color='var(--text2)'}}>{f}</button>
                      ))}
                    </div>
                  </div>

                  {hasRunning && (
                    <div style={{marginBottom: 12, padding: '10px 14px', background: 'rgba(255,80,80,0.1)', border: '1px solid rgba(255,80,80,0.4)', borderRadius: 6, fontSize: 12, color: 'var(--danger)'}}>
                      ⚠ A capture is in progress. Stop it before starting a new one.
                    </div>
                  )}
                  <button className="button" onClick={handleStartPodCapture} disabled={starting || hasRunning || selectedPods.length === 0} style={{width: '100%'}}>
                    <Icon name="play" /> {starting ? 'Starting...' : `Start Capture${selectedPods.length > 1 ? ` (${selectedPods.length} pods)` : ''}`}
                  </button>
                </div>
              )}

              <div className="panel">
                {(() => {
                  const tabSessions = sessions.filter(s => s.type === tab).slice(-10).reverse();
                  return (
                    <>
                      <h3><Icon name="database" /> {tab === 'interface' ? 'Interface' : 'Pod'} Capture History ({tabSessions.length}/10)</h3>
                      {tabSessions.length === 0 ? (
                        <div style={{fontSize: 12, color: 'var(--text2)', padding: '16px', textAlign: 'center'}}>No {tab} capture sessions yet</div>
                      ) : (
                        <div style={{overflowX: 'auto'}}>
                          <table className="table">
                            <thead>
                              <tr>
                                <th>Pod</th>
                                <th>BPF Filter</th>
                                <th>Started</th>
                                <th>Status</th>
                                <th style={{textAlign: 'right'}}>Actions</th>
                              </tr>
                            </thead>
                            <tbody>
                              {tabSessions.map(s => (
                                <tr key={s.id}>
                                  <td style={{fontSize: 11}}>{s.pod}</td>
                                  <td style={{fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--text2)'}}>{s.filter || '(all traffic)'}</td>
                                  <td style={{fontSize: 10, color: 'var(--text3)'}}>{new Date(s.startTime).toLocaleTimeString()}</td>
                                  <td><span className={`badge ${s.status === 'running' ? 'danger' : s.status === 'error' ? 'warn' : 'success'}`}>{s.status}</span></td>
                                  <td style={{textAlign: 'right', display: 'flex', gap: 4, justifyContent: 'flex-end', fontSize: 10}}>
                                    {s.status === 'running' && <button className="button small danger" onClick={() => handleStopCapture(s.id)} disabled={loading}>Stop</button>}
                                    {s.status === 'stopped' && <button className="button small" onClick={() => handleDownload(s.id)}>PCAP</button>}
                                    <button className="button small danger" onClick={() => handleDeleteSession(s.id)}>Del</button>
                                  </td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </div>
                      )}
                    </>
                  );
                })()}
              </div>
            </div>
          );
        }

        // Monitoring section
        function MonitoringSection({ status }) {
          const [metrics, setMetrics] = useState({
            ue_count: 1,
            session_count: 1,
            upf_throughput_ul: 0,
            upf_throughput_dl: 0,
            amf_cpu: 15,
            smf_cpu: 12,
            upf_cpu: 25
          });

          useEffect(() => {
            const fetchMetrics = async () => {
              try {
                const res = await apiFetch('/api/metrics/query?query=up');
                if (res.ok) {
                  const data = await res.json();
                  setMetrics(prev => ({...prev, data}));
                }
              } catch (e) {
                console.error('Metrics fetch failed:', e);
              }
            };
            fetchMetrics();
            const interval = setInterval(fetchMetrics, 10000);
            return () => clearInterval(interval);
          }, []);

          return (
            <div>
              <div className="stat-grid">
                <div className="stat-card">
                  <div className="stat-label">Registered UEs</div>
                  <div className="stat-value">{metrics.ue_count}</div>
                  <div className="stat-sub">Connected to network</div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">Active Sessions</div>
                  <div className="stat-value">{metrics.session_count}</div>
                  <div className="stat-sub">PDU sessions</div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">UPF Throughput</div>
                  <div className="stat-value" style={{fontSize: 16}}>{metrics.upf_throughput_dl} Mbps</div>
                  <div className="stat-sub">DL rate</div>
                </div>
              </div>

              <div className="info-box">
                <Icon name="chart" /> <strong>Monitoring:</strong> Real-time metrics from Prometheus. CPU, memory, throughput, and KPIs.
              </div>

              <div className="grid-2">
                <div className="panel">
                  <h3><Icon name="cpu" /> NF CPU Usage</h3>
                  <div className="metric-box">
                    <div className="metric-label">AMF</div>
                    <div className="metric-bar">
                      <div className="metric-fill" style={{width: metrics.amf_cpu + '%'}}>{metrics.amf_cpu}%</div>
                    </div>
                  </div>
                  <div className="metric-box">
                    <div className="metric-label">SMF</div>
                    <div className="metric-bar">
                      <div className="metric-fill" style={{width: metrics.smf_cpu + '%'}}>{metrics.smf_cpu}%</div>
                    </div>
                  </div>
                  <div className="metric-box">
                    <div className="metric-label">UPF</div>
                    <div className="metric-bar">
                      <div className="metric-fill" style={{width: metrics.upf_cpu + '%'}}>{metrics.upf_cpu}%</div>
                    </div>
                  </div>
                </div>

                <div className="panel">
                  <h3><Icon name="chart" /> Throughput Metrics</h3>
                  <div className="metric-box">
                    <div className="metric-label">UPF Downlink</div>
                    <div style={{fontSize: 18, color: 'var(--accent)', fontWeight: 600}}>
                      {metrics.upf_throughput_dl} Mbps
                    </div>
                  </div>
                  <div className="metric-box">
                    <div className="metric-label">UPF Uplink</div>
                    <div style={{fontSize: 18, color: 'var(--accent3)', fontWeight: 600}}>
                      {metrics.upf_throughput_ul} Mbps
                    </div>
                  </div>
                  <div style={{fontSize: 11, color: 'var(--text2)', marginTop: 12}}>
                    Updated every 10 seconds. Configure refresh rate with HPA policies.
                  </div>
                </div>
              </div>
            </div>
          );
        }

        // Main App
        function App() {
          const [page, setPage] = useState('core');
          const [token, setToken] = useState(() => localStorage.getItem('token'));
          const [currentUser, setCurrentUser] = useState(() => { try { return JSON.parse(localStorage.getItem('currentUser')); } catch { return null; } });
          const [showProfileMenu, setShowProfileMenu] = useState(false);
          const [showChangePw, setShowChangePw] = useState(false);
          const isAdmin = currentUser?.role === 'admin';

          const handleLogin = (data) => {
            localStorage.setItem('token', data.token);
            localStorage.setItem('currentUser', JSON.stringify(data.user));
            setToken(data.token);
            setCurrentUser(data.user);
          };

          const handleLogout = () => {
            localStorage.removeItem('token');
            localStorage.removeItem('currentUser');
            setToken(null);
            setCurrentUser(null);
          };

          // Make token available globally for child components
          window.__authToken = token;
          window.__handleLogout = handleLogout;

          const [status, setStatus] = useState(null);
          const [loading, setLoading] = useState(true);
          const [error, setError] = useState(null);

          useEffect(() => {
            fetchStatus();
            const interval = setInterval(fetchStatus, 5000);
            return () => clearInterval(interval);
          }, []);

          async function fetchStatus() {
            try {
              const res = await apiFetch('/api/status');
              if (!res.ok) throw new Error(`HTTP ${res.status}`);
              const data = await res.json();
              setStatus(data);
              setError(null);
            } catch (e) {
              setError(e.message);
            } finally {
              setLoading(false);
            }
          }

          if (!token) return <LoginPage onLogin={handleLogin} />;

          return (
            <div className="app-container">
              <div className="header" style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <div>
                  <h1><Icon name="network" /> 5G TESTBED DASHBOARD</h1>
                  <div className="tagline">Kubernetes-based Open5GS + UERANSIM Management & Observability</div>
                </div>
                <div style={{flex:1}}/>
                <div style={{position:'relative'}}>
                  <button onClick={() => setShowProfileMenu(p=>!p)} style={{padding:'6px 14px', background:'rgba(255,255,255,0.05)', border:'1px solid var(--border)', borderRadius:20, color:'var(--text)', cursor:'pointer', fontSize:12, display:'flex', alignItems:'center', gap:6}}>
                    <span style={{width:22,height:22,borderRadius:'50%',background:'var(--accent)',display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:'#000'}}>{currentUser?.username?.[0]?.toUpperCase()}</span>
                    {currentUser?.username} <span style={{fontSize:10,color:'var(--text3)'}}>▾</span>
                  </button>
                  {showProfileMenu && (
                    <div style={{position:'absolute',right:0,top:'110%',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8,padding:8,minWidth:160,zIndex:100,boxShadow:'0 4px 20px rgba(0,0,0,0.4)'}}>
                      <div style={{padding:'6px 10px',fontSize:11,color:'var(--text3)',borderBottom:'1px solid var(--border)',marginBottom:4}}>{currentUser?.role?.toUpperCase()}</div>
                      {isAdmin && <button onClick={()=>{setPage('users');setShowProfileMenu(false);}} style={{display:'block',width:'100%',padding:'7px 10px',background:'transparent',border:'none',color:'var(--text)',cursor:'pointer',textAlign:'left',fontSize:12,borderRadius:4}}>👥 Manage Users</button>}
                      <button onClick={()=>{setShowProfileMenu(false);setShowChangePw(true);}} style={{display:'block',width:'100%',padding:'7px 10px',background:'transparent',border:'none',color:'var(--text)',cursor:'pointer',textAlign:'left',fontSize:12,borderRadius:4}}>🔑 Change Password</button>
                      <div style={{borderTop:'1px solid var(--border)',marginTop:4,paddingTop:4}}>
                        <button onClick={handleLogout} style={{display:'block',width:'100%',padding:'7px 10px',background:'transparent',border:'none',color:'var(--danger)',cursor:'pointer',textAlign:'left',fontSize:12,borderRadius:4}}>⏻ Sign Out</button>
                      </div>
                    </div>
                  )}
                </div>
              </div>

              <div className="tabs-wrapper">
                <div className="tabs-inner">
                  <div className="tabs">
                    <div className={`tab ${page === 'core' ? 'active' : ''}`} onClick={() => setPage('core')} style={{cursor: 'pointer'}}>
                      <Icon name="server" /> Core Network
                    </div>
                    <div className={`tab ${page === 'ran' ? 'active' : ''}`} onClick={() => setPage('ran')} style={{cursor: 'pointer'}}>
                      <Icon name="antenna" /> RAN
                    </div>
                    <div className={`tab ${page === 'subscribers' ? 'active' : ''}`} onClick={() => setPage('subscribers')} style={{cursor: 'pointer'}}>
                      <Icon name="database" /> Subscribers
                    </div>
                    <div className={`tab ${page === 'ue-mgmt' ? 'active' : ''}`} onClick={() => setPage('ue-mgmt')} style={{cursor: 'pointer'}}>
                      <Icon name="antenna" /> UE Management
                    </div>
                    <div className={`tab ${page === 'tracing' ? 'active' : ''}`} onClick={() => setPage('tracing')} style={{cursor: 'pointer'}}>
                      <Icon name="network" /> Tracing
                    </div>
                    <div className={`tab ${page === 'monitoring' ? 'active' : ''}`} onClick={() => setPage('monitoring')} style={{cursor: 'pointer'}}>
                      <Icon name="chart" /> Monitoring
                    </div>
                    {isAdmin && <div className={`tab ${page === 'users' ? 'active' : ''}`} onClick={() => setPage('users')} style={{cursor: 'pointer'}}>
                      <Icon name="users" /> Users
                    </div>}
                  </div>
                </div>
              </div>

              <div className="content">
                {error && <div className="error"><Icon name="alert" /> Error: {error}</div>}
                {loading ? (
                  <div className="loading">Loading dashboard...</div>
                ) : status ? (
                  <>
                    <div className={`section ${page === 'core' ? 'active' : ''}`}>
                      <CoreSection status={status} />
                    </div>
                    <div className={`section ${page === 'ran' ? 'active' : ''}`}>
                      <RanSection status={status} />
                    </div>
                    <div className={`section ${page === 'subscribers' ? 'active' : ''}`}>
                      <SubscriberManagement />
                    </div>
                    <div className={`section ${page === 'ue-mgmt' ? 'active' : ''}`}>
                      <UEManager />
                    </div>
                    <div className={`section ${page === 'tracing' ? 'active' : ''}`}>
                      <TracingSection />
                    </div>
                    <div className={`section ${page === 'monitoring' ? 'active' : ''}`}>
                      <MonitoringSection status={status} />
                    </div>
                    {page === 'users' && isAdmin && <UsersPage />}
                  </>
                ) : null}
              </div>
              {showChangePw && <ChangePasswordModal onClose={() => setShowChangePw(false)} />}
            </div>
          );
        }

        function LoginPage({ onLogin }) {
          const [username, setUsername] = React.useState('');
          const [password, setPassword] = React.useState('');
          const [error, setError] = React.useState('');
          const [loading, setLoading] = React.useState(false);

          const handleSubmit = async (e) => {
            e.preventDefault();
            setError(''); setLoading(true);
            try {
              const res = await apiFetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
              });
              const data = await res.json();
              if (!res.ok) { setError(data.error || 'Login failed'); return; }
              onLogin(data);
            } catch (e) {
              setError('Connection error');
            } finally {
              setLoading(false);
            }
          };

          return (
            <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)'}}>
              <div style={{width:360,padding:40,background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:12,boxShadow:'0 8px 40px rgba(0,0,0,0.4)'}}>
                <div style={{textAlign:'center',marginBottom:32}}>
                  <div style={{fontSize:32,marginBottom:8}}>📡</div>
                  <h2 style={{margin:0,fontSize:22,color:'var(--accent)'}}>5G Testbed</h2>
                  <div style={{fontSize:12,color:'var(--text3)',marginTop:4}}>Sign in to continue</div>
                </div>
                <form onSubmit={handleSubmit}>
                  <div className="form-group" style={{marginBottom:16}}>
                    <label style={{fontSize:12}}>Username</label>
                    <input autoFocus value={username} onChange={e=>setUsername(e.target.value)} style={{width:'100%',padding:'10px 12px',borderRadius:6,border:'1px solid var(--border)',background:'var(--bg3)',color:'var(--text)',fontSize:14,boxSizing:'border-box'}} placeholder="admin" />
                  </div>
                  <div className="form-group" style={{marginBottom:24}}>
                    <label style={{fontSize:12}}>Password</label>
                    <input type="password" value={password} onChange={e=>setPassword(e.target.value)} style={{width:'100%',padding:'10px 12px',borderRadius:6,border:'1px solid var(--border)',background:'var(--bg3)',color:'var(--text)',fontSize:14,boxSizing:'border-box'}} placeholder="••••••••" />
                  </div>
                  {error && <div style={{padding:'8px 12px',background:'rgba(255,80,80,0.1)',border:'1px solid rgba(255,80,80,0.3)',borderRadius:6,color:'var(--danger)',fontSize:12,marginBottom:16}}>{error}</div>}
                  <button type="submit" className="button" style={{width:'100%',padding:'11px',fontSize:14}} disabled={loading}>
                    {loading ? 'Signing in...' : 'Sign In'}
                  </button>
                </form>
              </div>
            </div>
          );
        }

        function ChangePasswordModal({ onClose }) {
          const [form, setForm] = React.useState({ current: '', next: '', confirm: '' });
          const [error, setError] = React.useState('');
          const [success, setSuccess] = React.useState(false);

          const handleSubmit = async (e) => {
            e.preventDefault();
            setError('');
            if (form.next !== form.confirm) { setError('Passwords do not match'); return; }
            if (form.next.length < 6) { setError('Password must be at least 6 characters'); return; }
            const res = await apiFetch('/api/auth/password', {
              method: 'PUT',
              body: JSON.stringify({ currentPassword: form.current, newPassword: form.next })
            });
            const data = await res.json();
            if (!res.ok) { setError(data.error); return; }
            setSuccess(true);
            setTimeout(onClose, 1500);
          };

          return (
            <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.7)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}}>
              <div style={{width:380,padding:32,background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:12}}>
                <h3 style={{marginTop:0}}>Change Password</h3>
                {success ? <div style={{color:'var(--success)',padding:16,textAlign:'center'}}>✓ Password changed</div> : (
                  <form onSubmit={handleSubmit}>
                    {['current','next','confirm'].map(f => (
                      <div key={f} className="form-group" style={{marginBottom:14}}>
                        <label style={{fontSize:12}}>{f === 'current' ? 'Current Password' : f === 'next' ? 'New Password' : 'Confirm New Password'}</label>
                        <input type="password" value={form[f]} onChange={e=>setForm(p=>({...p,[f]:e.target.value}))} style={{width:'100%',padding:'9px 12px',borderRadius:6,border:'1px solid var(--border)',background:'var(--bg3)',color:'var(--text)',boxSizing:'border-box'}} />
                      </div>
                    ))}
                    {error && <div style={{color:'var(--danger)',fontSize:12,marginBottom:12}}>{error}</div>}
                    <div style={{display:'flex',gap:8,marginTop:8}}>
                      <button type="submit" className="button" style={{flex:1}}>Update Password</button>
                      <button type="button" className="button" style={{flex:1,background:'transparent'}} onClick={onClose}>Cancel</button>
                    </div>
                  </form>
                )}
              </div>
            </div>
          );
        }

        function UsersPage() {
          const [users, setUsers] = React.useState([]);
          const [loading, setLoading] = React.useState(true);
          const [showAdd, setShowAdd] = React.useState(false);
          const [form, setForm] = React.useState({ username: '', password: '', role: 'researcher', imsiStart: '', imsiCount: '5' });
          const [error, setError] = React.useState('');

          const fetchUsers = async () => {
            setLoading(true);
            try {
              const res = await apiFetch('/api/users');
              if (res.ok) setUsers(await res.json());
            } finally { setLoading(false); }
          };

          const openAddForm = async () => {
            // Auto-fill next IMSI from server
            try {
              const res = await apiFetch('/api/admin/next-imsi');
              if (res.ok) {
                const { nextImsi, defaultImsiCount } = await res.json();
                setForm(f => ({ ...f, imsiStart: nextImsi, imsiCount: String(defaultImsiCount) }));
              }
            } catch {}
            setShowAdd(true);
          };

          React.useEffect(() => { fetchUsers(); }, []);

          const handleAdd = async (e) => {
            e.preventDefault(); setError('');
            const res = await apiFetch('/api/users', { method: 'POST', body: JSON.stringify({
              ...form, imsiCount: parseInt(form.imsiCount) || 5
            }) });
            const data = await res.json();
            if (!res.ok) { setError(data.error); return; }
            setForm({ username: '', password: '', role: 'researcher', imsiStart: '', imsiCount: '5' });
            setShowAdd(false);
            fetchUsers();
          };

          const handleDelete = async (id) => {
            if (!confirm('Delete this user?')) return;
            await apiFetch(`/api/users/${id}`, { method: 'DELETE' });
            fetchUsers();
          };

          const inp = { width:'100%', padding:'8px', borderRadius:4, border:'1px solid var(--border)', background:'var(--bg3)', color:'var(--text)', boxSizing:'border-box' };

          return (
            <div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
                <h2 style={{margin:0}}>User Management</h2>
                <button className="button" onClick={openAddForm}>+ Add User</button>
              </div>

              {showAdd && (
                <div className="panel" style={{marginBottom:20}}>
                  <h3 style={{marginTop:0}}>New User</h3>
                  <form onSubmit={handleAdd}>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 140px',gap:12,marginBottom:12}}>
                      <div className="form-group">
                        <label style={{fontSize:11}}>Username</label>
                        <input value={form.username} onChange={e=>setForm(p=>({...p,username:e.target.value}))} style={inp} placeholder="username" required />
                      </div>
                      <div className="form-group">
                        <label style={{fontSize:11}}>Password</label>
                        <input type="password" value={form.password} onChange={e=>setForm(p=>({...p,password:e.target.value}))} style={inp} placeholder="password" required minLength={6} />
                      </div>
                      <div className="form-group">
                        <label style={{fontSize:11}}>Role</label>
                        <select value={form.role} onChange={e=>setForm(p=>({...p,role:e.target.value}))} style={inp}>
                          <option value="researcher">Researcher</option>
                          <option value="admin">Admin</option>
                        </select>
                      </div>
                    </div>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 120px auto',gap:12,alignItems:'flex-end'}}>
                      <div className="form-group" style={{margin:0}}>
                        <label style={{fontSize:11}}>Starting IMSI <span style={{color:'var(--text3)',fontWeight:400}}>(auto-filled from last allocation)</span></label>
                        <input value={form.imsiStart} onChange={e=>setForm(p=>({...p,imsiStart:e.target.value}))} style={inp} placeholder="001010000000001" pattern="\d{15}" title="15-digit IMSI" required />
                      </div>
                      <div className="form-group" style={{margin:0}}>
                        <label style={{fontSize:11}}># of IMSIs</label>
                        <input type="number" min={1} max={100} value={form.imsiCount} onChange={e=>setForm(p=>({...p,imsiCount:e.target.value}))} style={inp} />
                      </div>
                      <button type="submit" className="button" style={{alignSelf:'flex-end',marginBottom:1}}>Create</button>
                    </div>
                    {form.imsiStart && form.imsiCount && (
                      <div style={{fontSize:11,color:'var(--accent)',marginTop:8}}>
                        Allocated: {form.imsiStart} → {String(parseInt(form.imsiStart) + parseInt(form.imsiCount) - 1).padStart(15,'0')} ({form.imsiCount} UEs)
                      </div>
                    )}
                    {error && <div style={{color:'var(--danger)',fontSize:12,marginTop:8}}>{error}</div>}
                  </form>
                </div>
              )}

              <div className="panel">
                {loading ? <div style={{padding:20,textAlign:'center',color:'var(--text2)'}}>Loading...</div> : (
                  <table className="table">
                    <thead>
                      <tr>
                        <th>Username</th><th>Role</th>
                        <th>IMSI Block</th><th>UE Status</th>
                        <th>Created</th><th style={{textAlign:'right'}}>Actions</th>
                      </tr>
                    </thead>
                    <tbody>
                      {users.map(u => (
                        <tr key={u.id}>
                          <td style={{fontWeight:600}}>{u.username}</td>
                          <td><span style={{fontSize:11,padding:'2px 8px',borderRadius:12,background:u.role==='admin'?'rgba(255,150,0,0.2)':'rgba(0,200,255,0.2)',color:u.role==='admin'?'#ff9600':'var(--accent)',fontWeight:600}}>{u.role}</span></td>
                          <td style={{fontSize:11}}>
                            {u.imsiStart ? (
                              <span style={{color:'var(--text2)'}}>
                                {u.imsiStart}<br/>
                                <span style={{color:'var(--text3)'}}>+{u.imsiCount} UEs · pod: ue-{u.username}</span>
                              </span>
                            ) : <span style={{color:'var(--text3)'}}>—</span>}
                          </td>
                          <td style={{fontSize:11}}>
                            <span style={{color:u.ueRegistered?'var(--success)':'var(--text3)',marginRight:8}}>{u.ueRegistered?'✓ Reg':'○ Reg'}</span>
                            <span style={{color:u.ueProvisioned?'var(--accent)':'var(--text3)'}}>{u.ueProvisioned?'✓ Pod':'○ Pod'}</span>
                          </td>
                          <td style={{fontSize:11,color:'var(--text3)'}}>{u.createdAt ? new Date(u.createdAt).toLocaleDateString() : '—'}</td>
                          <td style={{textAlign:'right'}}>
                            {u.username !== 'admin' && <button className="button small danger" onClick={()=>handleDelete(u.id)}>Delete</button>}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                )}
              </div>
            </div>
          );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
      </script>
    </body>
    </html>
