apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: 5g-testbed
data:
  nginx.conf: |
    user nginx;
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /var/run/nginx.pid;

    events {
      worker_connections 1024;
    }

    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;

      log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

      access_log /var/log/nginx/access.log main;

      sendfile on;
      tcp_nopush on;
      tcp_nodelay on;
      keepalive_timeout 65;
      types_hash_max_size 2048;
      client_max_body_size 100M;

      gzip on;
      gzip_vary on;
      gzip_proxied any;
      gzip_comp_level 6;
      gzip_types text/plain text/css text/xml text/javascript
                 application/json application/javascript application/xml+rss
                 application/rss+xml font/truetype font/opentype
                 application/vnd.ms-fontobject image/svg+xml;

      upstream testbed_api {
        server testbed-api.5g-testbed.svc.cluster.local:5000;
      }

      upstream testbed_ui {
        server testbed-ui.5g-testbed.svc.cluster.local:80;
      }

      upstream open5gs_webui {
        server open5gs-webui.5g-testbed.svc.cluster.local:3000;
      }

      server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Root path → testbed-ui (React SPA)
        location / {
          proxy_pass http://testbed_ui;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_redirect off;

          # SPA routing: try file, fallback to index.html
          error_page 404 =200 /index.html;
        }

        # API routes → testbed-api
        location /api/ {
          proxy_pass http://testbed_api/;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_redirect off;

          # CORS headers
          add_header 'Access-Control-Allow-Origin' '*' always;
          add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
          add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;

          if ($request_method = 'OPTIONS') {
            return 204;
          }
        }

        # Open5GS WebUI → open5gs-webui
        location /open5gs/ {
          proxy_pass http://open5gs_webui/;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_redirect off;
        }

        # Health check endpoint
        location /health {
          access_log off;
          return 200 "healthy\n";
          add_header Content-Type text/plain;
        }

        # Deny access to hidden files
        location ~ /\. {
          deny all;
          access_log off;
          log_not_found off;
        }
      }
    }
