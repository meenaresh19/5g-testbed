apiVersion: v1
kind: ConfigMap
metadata:
  name: ueransim-config
  namespace: 5g-testbed
data:
  gnb.yaml: |
    mcc: '001'
    mnc: '01'
    nci: '0x000000010'
    idLength: 32
    linkIp: 127.0.0.1
    ngapIp: 0.0.0.0
    gtpIp: 0.0.0.0

    amfConfigs:
    - address: open5gs-amf.5g-testbed.svc.cluster.local
      port: 38412

    ignoreStreamIds: false

    slices:
    - sst: 1
      sd: '000000'

    gnbName: gNodeB-1

    gtpAdvertiseAddress: 192.168.70.20

    plmn:
    - mcc: '001'
      mnc: '01'

    tac: 1

    supportedAlgorithms:
      ciphering:
      - '128-EEA0'
      - '128-EEA2'
      integrity:
      - '128-EIA0'
      - '128-EIA2'

  ue.yaml: |
    # UERANSIM UE1 Configuration
    supi: imsi-001010000000001
    mcc: '001'
    mnc: '01'
    key: fec86ba6eb707ed08ce33ae45b4a0fba
    opc: c42449363464e2e4fa8adca3063168ca
    amf: c3d4
    imei: 356938035643800
    imeiSv: 4

    plmn:
    - mcc: '001'
      mnc: '01'

    ConfiguredNssai:
    - sst: 1
      sd: '000000'

    Snssai:
    - sst: 1
      sd: '000000'

    uacAic:
      mps: false
      mcs: false

    uacAcc:
      normalClass: 0
      classMarkb: 0

    sessionConfig:
    - type: IPv4
      apn: internet
      slice:
        sst: 1
        sd: '000000'

    deviceProperties:
      types:
      - IPv4
      ipVersion: 4

    defaultAs: 192.168.70.30

    linkIp: 127.0.0.1

    gnbSearchList:
    - 192.168.70.20

  ue2.yaml: |
    # UERANSIM UE2 Configuration
    supi: imsi-001010000000002
    mcc: '001'
    mnc: '01'
    key: fec86ba6eb707ed08ce33ae45b4a0fba
    opc: c42449363464e2e4fa8adca3063168ca
    amf: c3d4
    imei: 356938035643801
    imeiSv: 4

    plmn:
    - mcc: '001'
      mnc: '01'

    ConfiguredNssai:
    - sst: 1
      sd: '000000'

    Snssai:
    - sst: 1
      sd: '000000'

    sessionConfig:
    - type: IPv4
      apn: internet
      slice:
        sst: 1
        sd: '000000'

    deviceProperties:
      types:
      - IPv4
      ipVersion: 4

    defaultAs: 192.168.70.31

    linkIp: 127.0.0.1

    gnbSearchList:
    - 192.168.70.20
