---
# Open5GS WebUI
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open5gs-webui
  namespace: 5g-testbed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open5gs-webui
  template:
    metadata:
      labels:
        app: open5gs-webui
    spec:
      securityContext:
        seccompProfile:
          type: Unconfined
      initContainers:
      - name: wait-mongodb
        image: busybox:1.28
        command: ['sh', '-c', 'until nc -z mongodb.5g-testbed.svc.cluster.local 27017; do sleep 1; done']
      containers:
      - name: webui
        image: gradiant/open5gs-webui:2.7.0
        ports:
        - containerPort: 9999
          name: http
        env:
        - name: DB_URI
          value: mongodb://mongodb.5g-testbed.svc.cluster.local/open5gs
        - name: ADMIN_USER
          value: admin
        - name: ADMIN_PASS
          value: "1423"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 300m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /
            port: 9999
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 9999
          initialDelaySeconds: 20
          periodSeconds: 5
      volumes: []
---
# Service for Open5GS WebUI
apiVersion: v1
kind: Service
metadata:
  name: open5gs-webui
  namespace: 5g-testbed
spec:
  type: ClusterIP
  selector:
    app: open5gs-webui
  ports:
  - name: http
    port: 9999
    targetPort: 9999
    protocol: TCP
