---
# AUSF (Authentication Server Function)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open5gs-ausf
  namespace: 5g-testbed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open5gs-ausf
  template:
    metadata:
      labels:
        app: open5gs-ausf
    spec:
      securityContext:
        seccompProfile:
          type: Unconfined
      initContainers:
      - name: wait-nrf
        image: busybox:1.28
        command: ['sh', '-c', 'until nc -z open5gs-nrf.5g-testbed.svc.cluster.local 7777; do sleep 1; done']
      containers:
      - name: ausf
        image: gradiant/open5gs:2.7.0
        command: [/opt/open5gs/bin/open5gs-ausfd, -c, /etc/open5gs/ausf.yaml]
        ports:
        - containerPort: 7777
          name: sbi
        - containerPort: 9090
          name: metrics
        volumeMounts:
        - name: config
          mountPath: /etc/open5gs/ausf.yaml
          subPath: ausf.yaml
        env:
        - name: NRF_URI
          value: http://open5gs-nrf.5g-testbed.svc.cluster.local:7777
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 300m
            memory: 256Mi
      volumes:
      - name: config
        configMap:
          name: open5gs-config
