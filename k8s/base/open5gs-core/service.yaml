---
apiVersion: v1
kind: Service
metadata:
  name: open5gs-amf
  namespace: 5g-testbed
  labels:
    app: open5gs-amf
spec:
  type: ClusterIP
  selector:
    app: open5gs-amf
  ports:
  - name: sbi
    port: 7777
    targetPort: 7777
    protocol: TCP
  - name: ngap
    port: 38412
    targetPort: 38412
    protocol: SCTP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
---
# Headless service for AMF NGAP (SCTP) — bypasses Cilium eBPF proxy which drops SCTP handshakes
apiVersion: v1
kind: Service
metadata:
  name: open5gs-amf-ngap
  namespace: 5g-testbed
  labels:
    app: open5gs-amf
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: open5gs-amf
  ports:
  - name: ngap
    port: 38412
    targetPort: 38412
    protocol: SCTP
---
apiVersion: v1
