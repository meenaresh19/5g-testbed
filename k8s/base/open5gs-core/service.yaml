apiVersion: v1
kind: Service
metadata:
  name: open5gs-scp
  namespace: 5g-testbed
  labels:
    app: open5gs-scp
spec:
  type: ClusterIP
  selector:
    app: open5gs-scp
  ports:
  - name: sbi
    port: 7777
    targetPort: 7777
    protocol: TCP
---
apiVersion: v1
