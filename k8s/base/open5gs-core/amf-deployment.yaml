apiVersion: apps/v1
kind: Deployment
metadata:
  name: open5gs-amf
  namespace: 5g-testbed
  labels:
    app: open5gs-amf
spec:
  replicas: 1  # Will be scaled by HPA based on metrics
  selector:
    matchLabels:
      app: open5gs-amf
  template:
    metadata:
      labels:
        app: open5gs-amf
    spec:
      initContainers:
      - name: wait-nrf
        image: busybox:1.28
        command: ['sh', '-c', 'until nc -z open5gs-nrf.5g-testbed.svc.cluster.local 7777; do echo waiting for nrf; sleep 2; done']
      securityContext:
        seccompProfile:
          type: Unconfined
      containers:
      - name: amf
        image: gradiant/open5gs:2.7.0
        imagePullPolicy: IfNotPresent
        command:
        - /opt/open5gs/bin/open5gs-amfd
        - -c
        - /etc/open5gs/amf.yaml
        ports:
        - containerPort: 7777
          name: sbi
          protocol: TCP
        - containerPort: 38412
          name: ngap
          protocol: SCTP
        - containerPort: 9090
          name: metrics
          protocol: TCP
        volumeMounts:
        - name: config
          mountPath: /etc/open5gs/amf.yaml
          subPath: amf.yaml
          readOnly: true
        env:
        - name: NRF_URI
          value: http://open5gs-nrf.5g-testbed.svc.cluster.local:7777
        - name: SCP_URI
          value: http://open5gs-scp.5g-testbed.svc.cluster.local:7777
        - name: MONGODB_URL
          value: mongodb://mongodb.5g-testbed.svc.cluster.local:27017
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 800m
            memory: 1Gi
        livenessProbe:
          tcpSocket:
            port: 7777
          initialDelaySeconds: 40
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 7777
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 2
      volumes:
      - name: config
        configMap:
          name: open5gs-config
