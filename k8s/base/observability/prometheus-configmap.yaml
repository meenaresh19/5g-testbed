apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: 5g-testbed
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        monitor: '5g-testbed-monitor'

    scrape_configs:
    # Open5GS NRF
    - job_name: 'open5gs-nrf'
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - 5g-testbed
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: open5gs-nrf
      - source_labels: [__meta_kubernetes_pod_container_port_name]
        action: keep
        regex: metrics

    # Open5GS SCP
    - job_name: 'open5gs-scp'
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - 5g-testbed
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: open5gs-scp
      - source_labels: [__meta_kubernetes_pod_container_port_name]
        action: keep
        regex: metrics

    # Open5GS AMF
    - job_name: 'open5gs-amf'
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - 5g-testbed
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: open5gs-amf
      - source_labels: [__meta_kubernetes_pod_container_port_name]
        action: keep
        regex: metrics

    # Open5GS SMF
    - job_name: 'open5gs-smf'
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - 5g-testbed
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: open5gs-smf
      - source_labels: [__meta_kubernetes_pod_container_port_name]
        action: keep
        regex: metrics

    # Open5GS UPF
    - job_name: 'open5gs-upf'
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - 5g-testbed
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: open5gs-upf
      - source_labels: [__meta_kubernetes_pod_container_port_name]
        action: keep
        regex: metrics

    # Open5GS AUSF
    - job_name: 'open5gs-ausf'
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - 5g-testbed
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: open5gs-ausf
      - source_labels: [__meta_kubernetes_pod_container_port_name]
        action: keep
        regex: metrics

    # Open5GS UDM
    - job_name: 'open5gs-udm'
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - 5g-testbed
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: open5gs-udm
      - source_labels: [__meta_kubernetes_pod_container_port_name]
        action: keep
        regex: metrics

    # Kubernetes API Server
    - job_name: 'kubernetes-apiservers'
      kubernetes_sd_configs:
      - role: endpoints
      scheme: https
      tls_config:
        ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
      relabel_configs:
      - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
        action: keep
        regex: default;kubernetes;https

    # Kubernetes Nodes
    - job_name: 'kubernetes-nodes'
      kubernetes_sd_configs:
      - role: node
      scheme: https
      tls_config:
        ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
      relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)
      - target_label: __address__
        replacement: kubernetes.default.svc:443
      - source_labels: [__meta_kubernetes_node_name]
        regex: (.+)
        target_label: __metrics_path__
        replacement: /api/v1/nodes/${1}/proxy/metrics

    # Kubernetes Pods
    - job_name: 'kubernetes-pods'
      kubernetes_sd_configs:
      - role: pod
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: kubernetes_pod_name
