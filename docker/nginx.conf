server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Serve SPA — all unknown paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy to testbed API backend
    location /api/ {
        proxy_pass         http://testbed-api:5000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # Proxy to Open5GS WebUI (subscriber management)
    location /open5gs/ {
        proxy_pass         http://open5gs-webui:9999/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }

    # Proxy to Grafana (dashboards)
    # Grafana is configured with GF_SERVER_SERVE_FROM_SUB_PATH=true
    # Direct access also available on port 3001
    location /grafana/ {
        proxy_pass         http://grafana:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        # Required for Grafana live (WebSocket)
        proxy_buffering    off;
    }

    # Compression
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/html text/css text/javascript application/javascript
                    application/json text/plain text/xml;

    # Cache static assets
    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
