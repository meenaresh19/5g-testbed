            </div>
          )}
          {/* Response */}
          {apiResp !== null && (
            <div style={{background:'#0d1117', border:`1px solid ${C.border}`, borderRadius:6}}>
              <div style={{padding:'8px 14px', borderBottom:`1px solid ${C.border}`, fontSize:11, color:C.muted, fontWeight:700}}>Response</div>
              <pre style={{margin:0, padding:14, fontSize:11, color: C.accent, lineHeight:1.5, overflow:'auto', maxHeight:360, whiteSpace:'pre-wrap', wordBreak:'break-all'}}>
                {typeof apiResp === 'string' ? apiResp : JSON.stringify(apiResp, null, 2)}
              </pre>
            </div>
          )}
          {/* Endpoint reference */}
          <div style={{marginTop:14, background:C.card, border:`1px solid ${C.border}`, borderRadius:6, padding:14}}>
            <div style={{fontSize:11, color:C.muted, fontWeight:700, textTransform:'uppercase', marginBottom:10}}>Nnef Northbound API Reference</div>
            {[
              ['Event Exposure (TS 29.508)',   [
                ['GET',    '/nnef-eventexposure/v1/subscriptions',      'List subscriptions'],
                ['POST',   '/nnef-eventexposure/v1/subscriptions',      'Create subscription'],
                ['DELETE', '/nnef-eventexposure/v1/subscriptions/{id}', 'Delete subscription'],
              ]],
              ['PFD Management (TS 29.551)',    [
                ['GET',    '/nnef-pfdmanagement/v1/applications',          'List applications'],
                ['PUT',    '/nnef-pfdmanagement/v1/applications/{appId}',  'Create/update PFD'],
                ['DELETE', '/nnef-pfdmanagement/v1/applications/{appId}',  'Delete application'],
              ]],
              ['Traffic Influence (TS 29.522)', [
                ['GET',    '/nnef-trafficinfluence/v1/subscriptions',      'List subscriptions'],
                ['POST',   '/nnef-trafficinfluence/v1/subscriptions',      'Create subscription'],
                ['PUT',    '/nnef-trafficinfluence/v1/subscriptions/{id}', 'Update subscription'],
                ['DELETE', '/nnef-trafficinfluence/v1/subscriptions/{id}', 'Delete subscription'],
              ]],
            ].map(([section, routes]) => (
              <div key={section} style={{marginBottom:14}}>
                <div style={{fontSize:11, color:C.accent, fontWeight:700, marginBottom:6}}>{section}</div>
                {routes.map(([method, path, desc]) => (
                  <div key={path+method} onClick={()=>{ setApiMethod(method); setApiPath(path.replace(/{[^}]+}/g,'1')); setApiBody(''); }}
                    style={{display:'flex', gap:10, alignItems:'center', padding:'4px 0', cursor:'pointer',
                      borderBottom:`1px solid ${C.border}22`}}>
                    <span style={{width:52, fontSize:10, fontWeight:700, textAlign:'center', padding:'2px 0', borderRadius:2,
                      background: method==='GET'?'#1d3a6e': method==='POST'?'#1a3d2b': method==='DELETE'?'#3d1a1a':'#3d2d0a',
                      color: method==='GET'?'#60a5fa': method==='POST'?C.accent: method==='DELETE'?'#f87171':'#f59e0b',
                      flexShrink:0}}>
                      {method}
                    </span>
                    <code style={{fontSize:11, color:C.muted, flex:1}}>{path}</code>
                    <span style={{fontSize:11, color:'#555'}}>{desc}</span>
                  </div>
                ))}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

              <line x1="8" y1="12" x2="12" y2="14" stroke="var(--accent)" strokeWidth="1.5"/>
              <line x1="20" y1="18" x2="24" y2="20" stroke="var(--accent)" strokeWidth="1.5"/>
            </svg>
          </div>
          <span className="logo-text">5G TESTBED</span>
        </div>
        <div className="topbar-status">
          <div className="status-pill"><span className="status-dot"/>{runningCount}/{totalCount} NFs UP</div>
          <div className="status-pill"><span className="status-dot"/>{slices.filter(s=>s.active).length} Slices Active</div>
          <div className="status-pill"><span className={`status-dot ${nfStatus.gnb==='running'?'':'off'}`}/>gNB {nfStatus.gnb==='running'?'Online':'Offline'}</div>
          <div className="status-pill"><span className={`status-dot ${apiOk?'':'warn'}`}/>{apiOk?'Live':'Simulated'}</div>
          <div className="topbar-time">{time}</div>
        </div>
      </div>
      <div className="layout">
        <div className="sidebar">
          {Object.entries(groups).map(([gId, gLabel])=>{
            const items = nav.filter(n=>n.group===gId);
            if(!items.length) return null;
            return (
              <div key={gId} className="nav-section">
                <div className="nav-label">{gLabel}</div>
                {items.map(n=>(
                  <div key={n.id} className={`nav-item ${page===n.id?'active':''}`}
                    onClick={()=>{ if(n.external){ window.open(n.external,'_blank'); } else { setPage(n.id); } }}
                    title={n.external?`Open ${n.label} ↗`:''}
                  >
                    <span className="nav-icon"><Icon name={n.icon} size={15}/></span>
                    {n.label}{n.external && <span style={{fontSize:9,marginLeft:'auto',opacity:.5}}>↗</span>}
                  </div>
                ))}
              </div>
            );
          })}
          <div className="sidebar-footer">
            <div className="version-tag">OAI + Open5GS v2.7</div>
            <div className="version-tag" style={{marginTop:2}}>Docker / K3s</div>
          </div>
        </div>
        <div className="main">
          <div className="main-header">
            <div className="page-title">{(pageInfo[page]||[''])[0]}</div>
            <div className="page-sub">{(pageInfo[page]||['',''])[1]}</div>
          </div>
          <div className="main-content">
            {page === 'dashboard' && <Dashboard nfStatus={nfStatus}/>}
            {(page === 'core' || page === 'ran') && <CoreNFs nfStatus={nfStatus} setNfStatus={setNfStatus}/>}
            {page === 'slices'    && <SliceManager slices={slices} setSlices={setSlices}/>}
            {page === 'subs'      && <Subscriptions subs={subs} setSubs={setSubs}/>}
            {page === 'topo'      && <Topology nfStatus={nfStatus}/>}
            {page === 'tracing'    && <Tracing/>}
            {page === 'throughput' && <ThroughputTest/>}
            {page === 'logs'       && <LogsPage/>}
            {page === 'ids'        && <SecurityIDS/>}
            {page === 'nef'        && <NEFPage/>}
          </div>
        </div>
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
