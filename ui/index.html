<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>5G Testbed — Control Plane</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root {
  --bg: #040810;
  --bg2: #070d1a;
  --bg3: #0a1525;
  --panel: #0d1b2e;
  --panel2: #0f2035;
  --border: #1a3a5c;
  --border2: #1f4a70;
  --accent: #00c8ff;
  --accent2: #0080c8;
  --accent3: #00ffc8;
  --warn: #ffb800;
  --danger: #ff3b5c;
  --success: #00e676;
  --muted: #4a7090;
  --text: #c8e8ff;
  --text2: #7aaccc;
  --text3: #3a6080;
  --glow: 0 0 20px rgba(0,200,255,0.3);
  --glow2: 0 0 40px rgba(0,200,255,0.15);
  --font-main: 'Exo 2', sans-serif;
  --font-mono: 'Share Tech Mono', monospace;
  --font-head: 'Orbitron', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-main);overflow:hidden}
#root{height:100%;display:flex;flex-direction:column}

/* Scrollbars */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* Scanlines overlay */
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:9999}

/* Top bar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:52px;background:var(--bg2);border-bottom:1px solid var(--border);position:relative;flex-shrink:0}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:32px;height:32px;position:relative}
.logo-icon svg{width:100%;height:100%}
.logo-text{font-family:var(--font-head);font-size:13px;font-weight:700;letter-spacing:3px;color:var(--accent);text-shadow:var(--glow)}
.topbar-status{display:flex;align-items:center;gap:20px}
.status-pill{display:flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:11px;color:var(--text2)}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--success);box-shadow:0 0 8px var(--success);animation:pulse 2s infinite}
.status-dot.warn{background:var(--warn);box-shadow:0 0 8px var(--warn)}
.status-dot.off{background:var(--muted);box-shadow:none;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.topbar-time{font-family:var(--font-mono);font-size:11px;color:var(--muted)}

/* Layout */
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:200px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.nav-section{padding:16px 0 8px;border-bottom:1px solid var(--border)}
.nav-label{font-size:9px;font-weight:700;letter-spacing:3px;color:var(--muted);padding:0 16px 8px;text-transform:uppercase;font-family:var(--font-head)}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text2);transition:all .15s;letter-spacing:.5px;position:relative}
.nav-item:hover{color:var(--text);background:rgba(0,200,255,.05)}
.nav-item.active{color:var(--accent);background:rgba(0,200,255,.08)}
.nav-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--accent);box-shadow:0 0 8px var(--accent)}
.nav-icon{width:16px;height:16px;flex-shrink:0}
.sidebar-footer{margin-top:auto;padding:16px;border-top:1px solid var(--border)}
.version-tag{font-family:var(--font-mono);font-size:10px;color:var(--text3)}

/* Main content */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.main-header{padding:16px 24px 0;flex-shrink:0}
.page-title{font-family:var(--font-head);font-size:18px;font-weight:700;color:var(--accent);letter-spacing:2px;text-shadow:var(--glow)}
.page-sub{font-size:11px;color:var(--muted);margin-top:2px;letter-spacing:.5px}
.main-content{flex:1;overflow-y:auto;padding:16px 24px 24px}

/* Cards */
.card{background:var(--panel);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--bg3)}
.card-title{font-family:var(--font-head);font-size:11px;letter-spacing:2px;color:var(--text2);font-weight:400}
.card-body{padding:16px}

/* Grid */
.grid{display:grid;gap:16px}
.grid-2{grid-template-columns:1fr 1fr}
.grid-3{grid-template-columns:1fr 1fr 1fr}
.grid-4{grid-template-columns:1fr 1fr 1fr 1fr}

/* NF Status Cards */
.nf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.nf-card{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:12px 14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.nf-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--border2);transition:all .2s}
.nf-card.running::before{background:var(--success);box-shadow:0 0 10px var(--success)}
.nf-card.stopped::before{background:var(--danger)}
.nf-card.warn::before{background:var(--warn)}
.nf-card:hover{border-color:var(--border2);background:var(--panel2);transform:translateY(-1px)}
.nf-name{font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--text);margin-bottom:6px}
.nf-status{font-family:var(--font-mono);font-size:10px;display:flex;align-items:center;gap:5px}
.nf-status.running{color:var(--success)}
.nf-status.stopped{color:var(--danger)}
.nf-status.starting{color:var(--warn)}
.nf-meta{font-size:10px;color:var(--muted);margin-top:4px;font-family:var(--font-mono)}

/* Form elements */
.form-row{display:grid;gap:12px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;font-family:var(--font-head)}
.form-input{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:8px 12px;color:var(--text);font-family:var(--font-mono);font-size:12px;outline:none;transition:all .15s}
.form-input:focus{border-color:var(--accent2);box-shadow:0 0 0 2px rgba(0,128,200,.15)}
.form-input::placeholder{color:var(--text3)}
select.form-input option{background:var(--bg3)}
.form-textarea{resize:vertical;min-height:80px;font-size:11px;line-height:1.6}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:4px;border:none;cursor:pointer;font-family:var(--font-head);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;transition:all .15s}
.btn-primary{background:var(--accent2);color:white}
.btn-primary:hover{background:var(--accent);box-shadow:var(--glow)}
.btn-success{background:rgba(0,230,118,.15);color:var(--success);border:1px solid var(--success)}
.btn-success:hover{background:rgba(0,230,118,.25)}
.btn-danger{background:rgba(255,59,92,.15);color:var(--danger);border:1px solid var(--danger)}
.btn-danger:hover{background:rgba(255,59,92,.25)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.btn-sm{padding:4px 10px;font-size:9px}
.btn-xs{padding:3px 8px;font-size:9px}

/* Table */
.data-table,.table{width:100%;border-collapse:collapse}
.data-table th,.table th{text-align:left;font-family:var(--font-head);font-size:9px;letter-spacing:2px;color:var(--muted);padding:8px 12px;border-bottom:1px solid var(--border);background:var(--bg3)}
.data-table td,.table td{padding:9px 12px;font-family:var(--font-mono);font-size:11px;color:var(--text2);border-bottom:1px solid rgba(26,58,92,.5)}
.data-table tr:hover td,.table tr:hover td{background:rgba(0,200,255,.04);color:var(--text)}
.data-table tr:last-child td{border-bottom:none}

/* Badge */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;font-family:var(--font-mono)}
.badge-success{background:rgba(0,230,118,.12);color:var(--success);border:1px solid rgba(0,230,118,.3)}
.badge-warn{background:rgba(255,184,0,.12);color:var(--warn);border:1px solid rgba(255,184,0,.3)}
.badge-danger{background:rgba(255,59,92,.12);color:var(--danger);border:1px solid rgba(255,59,92,.3)}
.badge-info{background:rgba(0,200,255,.12);color:var(--accent);border:1px solid rgba(0,200,255,.3)}
.badge-muted{background:rgba(74,112,144,.12);color:var(--muted);border:1px solid rgba(74,112,144,.3)}

/* Metric widgets */
.metric{display:flex;flex-direction:column;gap:4px}
.metric-val{font-family:var(--font-head);font-size:24px;font-weight:700;color:var(--accent)}
.metric-label{font-size:10px;color:var(--muted);letter-spacing:1px;font-family:var(--font-mono)}
.metric-sub{font-family:var(--font-mono);font-size:11px;color:var(--text2)}

/* Slice card */
.slice-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px;position:relative;overflow:hidden;transition:all .2s}
.slice-card:hover{border-color:var(--border2)}
.slice-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.slice-name{font-family:var(--font-head);font-size:13px;font-weight:700;color:var(--text);letter-spacing:1px}
.slice-nssai{font-family:var(--font-mono);font-size:11px;color:var(--accent);margin-top:2px}
.slice-nfs{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.nf-chip{font-family:var(--font-mono);font-size:10px;padding:3px 8px;border-radius:3px;background:rgba(0,200,255,.08);color:var(--accent);border:1px solid rgba(0,200,255,.2)}
.nf-chip.up{background:rgba(0,230,118,.08);color:var(--success);border-color:rgba(0,230,118,.2)}
.slice-stripe{position:absolute;left:0;top:0;bottom:0;width:3px}
.slice-stripe.sst1{background:var(--accent)}
.slice-stripe.sst2{background:var(--accent3)}
.slice-stripe.sst3{background:var(--warn)}

/* Topology */
.topo-canvas{background:var(--bg3);border-radius:6px;border:1px solid var(--border);padding:20px;min-height:300px;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
.topo-node{position:absolute;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:all .2s}
.topo-node:hover .node-box{border-color:var(--accent);box-shadow:var(--glow)}
.node-box{width:56px;height:40px;border:1px solid var(--border2);border-radius:4px;background:var(--panel);display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-size:9px;font-weight:700;color:var(--accent);letter-spacing:1px;position:relative}
.node-box.active{border-color:var(--success);background:rgba(0,230,118,.06)}
.node-box.ue{border-color:var(--accent3);color:var(--accent3)}
.node-box.ran{border-color:var(--warn);color:var(--warn)}
.node-label{font-size:9px;color:var(--muted);font-family:var(--font-mono)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(4,8,16,.85);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:var(--panel);border:1px solid var(--border2);border-radius:8px;width:560px;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 0 60px rgba(0,200,255,.15)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);background:var(--bg3)}
.modal-title{font-family:var(--font-head);font-size:13px;letter-spacing:2px;color:var(--accent)}
.modal-body{overflow-y:auto;padding:20px;flex:1}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;background:var(--bg3)}

/* Tab bar */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab{padding:8px 18px;font-family:var(--font-head);font-size:10px;letter-spacing:1.5px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;text-transform:uppercase}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* Log viewer */
.log-viewer{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:12px;font-family:var(--font-mono);font-size:11px;height:200px;overflow-y:auto;color:var(--text2)}
.log-line{line-height:1.5;margin-bottom:1px}
.log-line.info{color:var(--text2)}
.log-line.warn{color:var(--warn)}
.log-line.err{color:var(--danger)}
.log-line.ok{color:var(--success)}
.log-ts{color:var(--text3);margin-right:8px}
.log-nf{color:var(--accent);margin-right:8px}

/* Tooltip */
.tip{position:relative}
.tip:hover .tip-content{opacity:1;pointer-events:auto;transform:translateY(0)}
.tip-content{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%) translateY(4px);background:var(--bg2);border:1px solid var(--border2);border-radius:4px;padding:6px 10px;font-size:10px;white-space:nowrap;opacity:0;pointer-events:none;transition:all .15s;z-index:100;color:var(--text2);font-family:var(--font-mono)}

/* Range slider */
.range-input{-webkit-appearance:none;appearance:none;width:100%;height:4px;background:var(--border2);border-radius:2px;outline:none}
.range-input::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 8px var(--accent)}

/* Toggle */
.toggle{position:relative;width:36px;height:20px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-track{position:absolute;inset:0;background:var(--border2);border-radius:10px;transition:.2s;cursor:pointer}
.toggle-track::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:var(--muted);top:3px;left:3px;transition:.2s}
.toggle input:checked + .toggle-track{background:var(--accent2)}
.toggle input:checked + .toggle-track::after{transform:translateX(16px);background:white}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes slideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn .2s ease}
.slide-in{animation:slideIn .15s ease}

/* Progress bar */
.progress{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;background:var(--accent);transition:width .5s}
.progress-fill.warn{background:var(--warn)}
.progress-fill.danger{background:var(--danger)}

/* Divider */
.divider{height:1px;background:var(--border);margin:16px 0}
.section-title{font-family:var(--font-head);font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:12px}

.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}
.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}
.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}.w-full{width:100%}
.text-xs{font-size:11px}.text-muted{color:var(--muted)}.text-accent{color:var(--accent)}.text-success{color:var(--success)}
.font-mono{font-family:var(--font-mono)}

/* ── Auth / Login ─────────────────────────────────── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg1)}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:40px 36px;width:360px;max-width:90vw}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.login-logo svg{width:36px;height:36px}
.login-logo-text{font-family:var(--font-head);font-size:18px;letter-spacing:3px;color:var(--accent)}
.login-title{font-family:var(--font-head);font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:24px}
.login-error{background:rgba(255,60,60,.12);border:1px solid rgba(255,60,60,.3);color:#ff6b6b;border-radius:4px;padding:8px 12px;font-size:12px;margin-bottom:16px}
.login-info{background:rgba(80,200,120,.12);border:1px solid rgba(80,200,120,.3);color:var(--success);border-radius:4px;padding:8px 12px;font-size:12px;margin-bottom:16px}

/* ── Profile button ───────────────────────────────── */
.profile-btn{position:relative;display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:12px;user-select:none}
.profile-btn:hover{border-color:var(--accent)}
.profile-avatar{width:26px;height:26px;border-radius:50%;background:var(--accent);color:#000;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:var(--font-head)}
.profile-dropdown{position:absolute;top:calc(100% + 6px);right:0;background:var(--bg2);border:1px solid var(--border);border-radius:6px;min-width:170px;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.profile-dropdown-header{padding:10px 14px;border-bottom:1px solid var(--border);font-size:11px;color:var(--muted)}
.profile-dropdown-header strong{display:block;color:var(--text);font-size:13px;margin-bottom:2px}
.profile-dropdown-item{padding:8px 14px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px}
.profile-dropdown-item:hover{background:var(--bg3);color:var(--accent)}
.profile-dropdown-item.danger:hover{color:#ff6b6b}

/* ── Modal overlay ────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9000;display:flex;align-items:center;justify-content:center}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:28px;min-width:340px;max-width:95vw}
.modal-title{font-family:var(--font-head);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:20px}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Config ───────────────────────────────────────────────
// API is proxied by nginx: /api/ → testbed-api:5000/
const API = '/api';

async function apiFetch(path, opts = {}) {
  try {
    const token = localStorage.getItem('token');
    const headers = { ...(opts.headers || {}) };
    if (token) headers['Authorization'] = `Bearer ${token}`;
    const r = await fetch(API + path, { ...opts, headers });
    if (r.status === 401) {
      localStorage.removeItem('token');
      localStorage.removeItem('currentUser');
      window.dispatchEvent(new Event('auth:expired'));
      return null;
    }
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return await r.json();
  } catch (e) {
    console.warn('[API]', path, e.message);
    return null;
  }
}

// ── Mock Data ────────────────────────────────────────────
const NF_DEFS = {
  core: [
    { id:'nrf',  name:'NRF',  ip:'10.45.0.10', desc:'Network Repository',   port:7777 },
    { id:'scp',  name:'SCP',  ip:'10.45.0.11', desc:'Service Comm Proxy',   port:7777 },
    { id:'amf',  name:'AMF',  ip:'10.45.0.12', desc:'Access & Mobility',    port:7777 },
    { id:'smf',  name:'SMF',  ip:'10.45.0.13', desc:'Session Management',   port:7777 },
    { id:'upf',  name:'UPF',  ip:'10.45.0.14', desc:'User Plane',           port:8805 },
    { id:'ausf', name:'AUSF', ip:'10.45.0.15', desc:'Auth Server',          port:7777 },
    { id:'udm',  name:'UDM',  ip:'10.45.0.16', desc:'Unified Data Mgmt',    port:7777 },
    { id:'udr',  name:'UDR',  ip:'10.45.0.17', desc:'Unified Data Repo',    port:7777 },
    { id:'pcf',  name:'PCF',  ip:'10.45.0.18', desc:'Policy Control',       port:7777 },
    { id:'bsf',  name:'BSF',  ip:'10.45.0.19', desc:'Binding Support',      port:7777 },
    { id:'nssf', name:'NSSF', ip:'10.45.0.20', desc:'Slice Selection',      port:7777 },

// ── Core NFs Page ──────────────────────────────────────────
function CoreNFs({ nfStatus, setNfStatus }) {
  const [selected, setSelected] = useState(null);
  const [editCfg, setEditCfg] = useState(false);
  const nf = selected ? [...NF_DEFS.core,...NF_DEFS.ran].find(n=>n.id===selected) : null;

  const toggle = async (id) => {
    const isRunning = nfStatus[id] === 'running';
    const action = isRunning ? 'stop' : 'start';
    // Optimistic UI update
    setNfStatus(s => ({...s, [id]: isRunning ? 'stopped' : 'starting'}));
    const result = await apiFetch(`/nf/${id}/${action}`, { method: 'POST' });
    // Refresh real status after 2 s regardless of result
    setTimeout(async () => {
      const data = await apiFetch('/status');
      if (data) setNfStatus(prev => ({...prev, ...data}));
    }, 2000);
  };

  return (
    <div className="fade-in">
      <div className="grid grid-2 mb-4">
        <div className="card">
          <div className="card-header"><span className="card-title">5G CORE — NETWORK FUNCTIONS</span></div>
          <div className="card-body" style={{padding:0}}>
            <table className="data-table w-full">
              <thead>
                <tr><th>NF</th><th>Description</th><th>IP Address</th><th>Port</th><th>State</th><th>Actions</th></tr>
              </thead>
              <tbody>
                {NF_DEFS.core.map(nf => (
                  <tr key={nf.id} style={{cursor:'pointer'}} onClick={()=>setSelected(nf.id)}>
                    <td><span style={{fontFamily:'var(--font-head)',color:'var(--accent)',fontSize:11}}>{nf.name}</span></td>
                    <td>{nf.desc}</td>
                    <td>{nf.ip}</td>
                    <td>{nf.port}</td>
                    <td>
                      <span className={`badge badge-${nfStatus[nf.id]==='running'?'success':nfStatus[nf.id]==='starting'?'warn':'danger'}`}>
                        {nfStatus[nf.id]}
                      </span>
                    </td>
                    <td>
                      <div className="flex gap-2" onClick={e=>e.stopPropagation()}>
                        <button className={`btn btn-xs ${nfStatus[nf.id]==='running'?'btn-danger':'btn-success'}`}
                          onClick={()=>toggle(nf.id)}>
                          {nfStatus[nf.id]==='running'?'Stop':'Start'}
                        </button>
                        <button className="btn btn-xs btn-ghost" onClick={()=>{setSelected(nf.id);setEditCfg(true)}}>
                          <Icon name="settings" size={10}/>
                        </button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>

        <div className="card">
          <div className="card-header"><span className="card-title">RAN — gNB + nrUE</span></div>
          <div className="card-body" style={{padding:0}}>
            <table className="data-table w-full">
              <thead>
                <tr><th>NF</th><th>Description</th><th>IP</th><th>State</th><th>Actions</th></tr>
              </thead>
              <tbody>
                {NF_DEFS.ran.map(nf => (
                  <tr key={nf.id} style={{cursor:'pointer'}} onClick={()=>setSelected(nf.id)}>
                    <td><span style={{fontFamily:'var(--font-head)',color:'var(--warn)',fontSize:11}}>{nf.name}</span></td>
                    <td>{nf.desc}</td>
                    <td>{nf.ip}</td>
                    <td>
                      <span className={`badge badge-${nfStatus[nf.id]==='running'?'success':'danger'}`}>

                      </span>
                    </td>
                    <td>
                      <div className="flex gap-2" onClick={e=>e.stopPropagation()}>

// ── Slices Page ───────────────────────────────────────────
function SliceManager({ slices, setSlices }) {

    name:'', sst:'1', sd:'', dnn:'internet', qos:'5QI-9',
    ul:'100', dl:'300', nfs:['amf','smf','upf','ausf','udm','udr','pcf'],

  const allNFs = NF_DEFS.core.map(n=>n.id);
  const sstColors = {'1':'sst1','2':'sst2','3':'sst3'};
  const sstNames  = {'1':'eMBB','2':'URLLC','3':'mMTC'};

  const createSlice = () => {
    const s = {
      id: `s${Date.now()}`,
      name: newSlice.name || `Slice-SST${newSlice.sst}`,
      sst: parseInt(newSlice.sst),
      sd: newSlice.sd || '000000',
      nfs: newSlice.nfs,
      dnn: newSlice.dnn,
      qos: newSlice.qos,
      ues: 0,
      ul: `${newSlice.ul} Mbps`,
      dl: `${newSlice.dl} Mbps`,
      active: true,
    };

    setShowCreate(false);
    setNewSlice({name:'',sst:'1',sd:'',dnn:'internet',qos:'5QI-9',ul:'100',dl:'300',nfs:['amf','smf','upf','ausf','udm','udr','pcf']});
  };

  const toggleNF = (id) => {
    setNewSlice(s => ({...s,
      nfs: s.nfs.includes(id) ? s.nfs.filter(n=>n!==id) : [...s.nfs,id]

  return (

        <button className="btn btn-primary" onClick={()=>setShowCreate(true)}>
          <Icon name="plus" size={12}/> Create Slice

              <div className="slice-name">{s.name}</div>
              <div className="slice-nssai">SST:{s.sst} {s.sd?`/ SD:${s.sd}`:''} — {sstNames[s.sst]||'Custom'}</div>

                <div style={{fontSize:18,fontFamily:'var(--font-head)',color:'var(--accent)'}}>{s.ues}</div>

              <span className={`badge ${s.active?'badge-success':'badge-muted'}`}>{s.active?'ACTIVE':'INACTIVE'}</span>

              <div key={l}>
                <div style={{fontSize:9,color:'var(--muted)',letterSpacing:1.5,fontFamily:'var(--font-head)',marginBottom:3}}>{l}</div>
                <div style={{fontSize:12,color:'var(--text)',fontFamily:'var(--font-mono)'}}>{v}</div>

// ── Subscriptions Page — real MongoDB CRUD ────────────────
function Subscriptions() {
  const BLANK = { imsi:'', key:'', opc:'', dnn:'internet', sst:'1', sd:'000000', ambrDl:'1024', ambrUl:'1024' };
  const [subs,       setSubs]       = useState([]);
  const [loading,    setLoading]    = useState(false);
  const [msg,        setMsg]        = useState(null);      // {text, ok}
  const [showAdd,    setShowAdd]    = useState(false);
  const [editSub,    setEditSub]    = useState(null);      // sub object being edited
  const [form,       setForm]       = useState(BLANK);
  const [busy,       setBusy]       = useState({});        // imsi → string | true
  const [delConfirm, setDelConfirm] = useState(null);      // imsi awaiting delete confirm

  const flash      = (text, ok=true) => { setMsg({text, ok}); setTimeout(()=>setMsg(null), 4500); };
  const setBusyKey = (k, v)          => setBusy(b=>({...b,[k]:v}));

  const loadSubs = async () => {
    setLoading(true);
    const d = await apiFetch('/subscribers');
    setLoading(false);
    if (Array.isArray(d)) setSubs(d);
    else flash('Failed to load subscribers from MongoDB', false);
  };
  useEffect(()=>{ loadSubs(); }, []);

  const genCreds = () => {
    const hex32 = ()=>[...Array(32)].map(()=>Math.floor(Math.random()*16).toString(16)).join('');
    setForm(f=>({...f, key:hex32(), opc:hex32()}));
  };

  const addSub = async () => {
    if (!/^\d{15}$/.test(form.imsi)) return flash('IMSI must be exactly 15 digits', false);
    if (!form.key  || form.key.length  !== 32) return flash('K must be 32 hex characters', false);
    if (!form.opc  || form.opc.length  !== 32) return flash('OPc must be 32 hex characters', false);
    setBusyKey('_add', true);
    const d = await apiFetch('/subscribers', {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(form) });
    setBusyKey('_add', false);
    if (d?.ok) { flash(`Subscriber ${form.imsi} provisioned in Open5GS`); setShowAdd(false); setForm(BLANK); await loadSubs(); }
    else flash(d?.error || 'Failed to add subscriber — IMSI may already exist', false);
  };

  const saveSub = async () => {
    if (!form.key  || form.key.length  !== 32) return flash('K must be 32 hex characters', false);
    if (!form.opc  || form.opc.length  !== 32) return flash('OPc must be 32 hex characters', false);
    const imsi = editSub.imsi;
    setBusyKey(imsi, 'save');
    const d = await apiFetch(`/subscribers/${imsi}`, {
      method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(form) });
    setBusyKey(imsi, null);
    if (d?.ok) { flash(`Subscriber ${imsi} updated`); setEditSub(null); setForm(BLANK); await loadSubs(); }
    else flash(d?.error || 'Failed to update subscriber', false);
  };

  const doDelete = async (imsi) => {
    setBusyKey(imsi, 'del');
    const d = await apiFetch(`/subscribers/${imsi}`, { method:'DELETE' });
    setBusyKey(imsi, null);
    setDelConfirm(null);
    if (d?.ok) { flash(`Subscriber ${imsi} removed from Open5GS`); await loadSubs(); }
    else flash(d?.error || 'Failed to delete subscriber', false);
  };

  const openEdit = (s) => {
    setEditSub(s);
    setForm({...s, sst:String(s.sst), ambrDl:String(s.ambrDl), ambrUl:String(s.ambrUl)});
  };
  const closeModal = () => { setShowAdd(false); setEditSub(null); setForm(BLANK); };

  const renderModal = (isEdit) => (
    <div className="modal-overlay" onClick={closeModal}>
      <div className="modal" style={{maxWidth:540}} onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <span className="modal-title">{isEdit ? `EDIT — ${editSub.imsi}` : 'ADD SUBSCRIBER'}</span>
          <button className="btn btn-ghost btn-sm" onClick={closeModal}><Icon name="close" size={14}/></button>
        </div>
        <div className="modal-body">
          {!isEdit && (
            <div className="form-group mb-3">
              <label className="form-label">IMSI (15 digits)</label>
              <input className="form-input" style={{fontFamily:'var(--font-mono)'}}
                placeholder="001010000000001" value={form.imsi}
                onChange={e=>setForm(f=>({...f,imsi:e.target.value}))}/>
            </div>
          )}
          <div className="form-row grid-3 mb-3">
            <div className="form-group">
              <label className="form-label">DNN</label>
              <input className="form-input" placeholder="internet" value={form.dnn}
                onChange={e=>setForm(f=>({...f,dnn:e.target.value}))}/>
            </div>
            <div className="form-group">
              <label className="form-label">SST</label>
              <select className="form-input" value={form.sst} onChange={e=>setForm(f=>({...f,sst:e.target.value}))}>
                <option value="1">1 — eMBB</option>
                <option value="2">2 — URLLC</option>
                <option value="3">3 — mMTC</option>
                <option value="4">4 — V2X</option>
              </select>
            </div>
            <div className="form-group">
              <label className="form-label">SD (hex)</label>
              <input className="form-input" placeholder="000000" value={form.sd}
                onChange={e=>setForm(f=>({...f,sd:e.target.value}))}/>
            </div>
          </div>
          <div className="form-row grid-2 mb-3">
            <div className="form-group">
              <label className="form-label">AMBR DL (Mbps)</label>
              <input className="form-input" type="number" min="1" max="10000" value={form.ambrDl}
                onChange={e=>setForm(f=>({...f,ambrDl:e.target.value}))}/>
            </div>
            <div className="form-group">
              <label className="form-label">AMBR UL (Mbps)</label>
              <input className="form-input" type="number" min="1" max="10000" value={form.ambrUl}
                onChange={e=>setForm(f=>({...f,ambrUl:e.target.value}))}/>
            </div>
          </div>
          <div className="flex justify-between items-center mb-2">
            <div style={{fontSize:10,fontFamily:'var(--font-mono)',color:'var(--text2)',letterSpacing:1}}>SECURITY CREDENTIALS</div>
            <button className="btn btn-ghost btn-sm" onClick={genCreds}>⚡ Auto-generate K / OPc</button>
          </div>
          <div className="form-group mb-2">
            <label className="form-label">K — Authentication Key (128-bit / 32 hex chars)</label>
            <input className="form-input" style={{fontFamily:'var(--font-mono)',fontSize:12}}
              placeholder="32 hex characters" value={form.key}
              onChange={e=>setForm(f=>({...f,key:e.target.value}))}/>
          </div>
          <div className="form-group">
            <label className="form-label">OPc — Operator Key (128-bit / 32 hex chars)</label>
            <input className="form-input" style={{fontFamily:'var(--font-mono)',fontSize:12}}
              placeholder="32 hex characters" value={form.opc}
              onChange={e=>setForm(f=>({...f,opc:e.target.value}))}/>
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={closeModal}>Cancel</button>
          <button className="btn btn-primary"
            disabled={!!(busy._add || (editSub && busy[editSub.imsi]))}
            onClick={isEdit ? saveSub : addSub}>
            {isEdit ? 'Save Changes' : 'Add Subscriber'}
          </button>
        </div>
      </div>
    </div>
  );

  return (
    <div className="fade-in">
      {msg && (
        <div style={{marginBottom:12,padding:'8px 14px',borderRadius:4,fontSize:12,
          fontFamily:'var(--font-mono)',
          background: msg.ok ? 'rgba(0,230,118,.08)' : 'rgba(255,59,92,.08)',
          border:`1px solid ${msg.ok ? 'var(--success)' : 'var(--danger)'}`,
          color: msg.ok ? 'var(--success)' : 'var(--danger)'}}>
          {msg.ok ? '✓' : '✗'} {msg.text}
        </div>
      )}

      <div className="flex justify-between items-center mb-3">
        <div style={{fontSize:11,color:'var(--muted)',fontFamily:'var(--font-mono)'}}>
          {loading ? 'Loading from MongoDB…' : `${subs.length} subscriber${subs.length!==1?'s':''} provisioned in Open5GS`}
        </div>
        <div className="flex gap-2">
          <button className="btn btn-ghost btn-sm" onClick={loadSubs} disabled={loading}>↻ Refresh</button>
          <button className="btn btn-primary" onClick={()=>{setForm(BLANK);setShowAdd(true);}}>
            <Icon name="plus" size={12}/> Add Subscriber
          </button>
        </div>
      </div>

      <div style={{marginBottom:12,padding:'8px 12px',background:'rgba(0,200,255,.04)',
        border:'1px solid var(--border)',borderRadius:4,fontSize:11,color:'var(--text2)'}}>
        ℹ Subscriber records are written directly to Open5GS MongoDB.
        UE authentication (5G-AKA) uses the K / OPc provisioned here — no additional registration step needed.
      </div>

      <div className="card">
        <div className="card-body" style={{padding:0}}>
          {!loading && subs.length === 0 ? (
            <div style={{padding:40,textAlign:'center',color:'var(--muted)',fontFamily:'var(--font-mono)',fontSize:12}}>
              No subscribers in MongoDB — click "Add Subscriber" to provision a UE in the 5G core
            </div>
          ) : (
            <table className="data-table w-full">
              <thead>
                <tr><th>IMSI</th><th>DNN</th><th>S-NSSAI</th><th>AMBR DL / UL</th><th>K / OPc</th><th>Actions</th></tr>
              </thead>
              <tbody>
                {subs.map(s=>(
                  <tr key={s.imsi}>
                    <td style={{color:'var(--accent)',fontFamily:'var(--font-mono)',letterSpacing:.5}}>{s.imsi}</td>
                    <td style={{color:'var(--text2)'}}>{s.dnn}</td>
                    <td>
                      <span className="badge badge-muted">SST:{s.sst}</span>
                      {s.sd && s.sd!=='000000' && <span className="badge badge-muted" style={{marginLeft:4}}>SD:{s.sd}</span>}
                    </td>
                    <td style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--text2)'}}>
                      ↓{s.ambrDl} / ↑{s.ambrUl} Mbps
                    </td>
                    <td style={{fontSize:10,fontFamily:'var(--font-mono)'}}>
                      <span style={{color:'var(--muted)'}}>K:</span> {(s.key||'').substring(0,8)}···
                      <span style={{color:'var(--muted)',marginLeft:8}}>OPc:</span> {(s.opc||'').substring(0,8)}···
                    </td>
                    <td>
                      <div className="flex gap-2">
                        <button className="btn btn-xs btn-ghost" title="Edit subscriber"
                          disabled={!!busy[s.imsi]} onClick={()=>openEdit(s)}>
                          <Icon name="edit" size={10}/>
                        </button>
                        <button className="btn btn-xs btn-danger" title="Delete subscriber"
                          disabled={!!busy[s.imsi]} onClick={()=>setDelConfirm(s.imsi)}>
                          <Icon name="trash" size={10}/>
                        </button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>
      </div>

      {delConfirm && (
        <div className="modal-overlay" onClick={()=>setDelConfirm(null)}>
          <div className="modal" style={{maxWidth:420}} onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <span className="modal-title" style={{color:'var(--danger)'}}>CONFIRM DELETE</span>
            </div>
            <div className="modal-body">
              <p style={{marginBottom:8}}>Delete subscriber <strong style={{fontFamily:'var(--font-mono)',color:'var(--accent)'}}>{delConfirm}</strong> from MongoDB?</p>
              <p style={{fontSize:11,color:'var(--warn)'}}>⚠ The UE will not be able to authenticate until re-provisioned.</p>
            </div>
            <div className="modal-footer">
              <button className="btn btn-ghost" onClick={()=>setDelConfirm(null)}>Cancel</button>
              <button className="btn btn-danger" disabled={!!busy[delConfirm]}
                onClick={()=>doDelete(delConfirm)}>
                {busy[delConfirm] ? 'Deleting…' : 'Delete'}
              </button>
            </div>
          </div>
        </div>
      )}

      {showAdd  && renderModal(false)}
      {editSub  && renderModal(true)}
    </div>
  );
}

// ── Topology Page ─────────────────────────────────────────
function Topology({ nfStatus }) {
  const nodes = [
    {id:'ue',   label:'UE',   x:50,  y:220, type:'ue',  running:nfStatus.nrue==='running'},
    {id:'gnb',  label:'gNB',  x:160, y:220, type:'ran', running:nfStatus.gnb==='running'},
    {id:'amf',  label:'AMF',  x:300, y:130, type:'cp',  running:nfStatus.amf==='running'},
    {id:'smf',  label:'SMF',  x:420, y:130, type:'cp',  running:nfStatus.smf==='running'},
    {id:'upf',  label:'UPF',  x:300, y:310, type:'up',  running:nfStatus.upf==='running'},
    {id:'ausf', label:'AUSF', x:520, y:60,  type:'cp',  running:nfStatus.ausf==='running'},
    {id:'udm',  label:'UDM',  x:620, y:60,  type:'cp',  running:nfStatus.udm==='running'},
    {id:'udr',  label:'UDR',  x:720, y:60,  type:'cp',  running:nfStatus.udr==='running'},
    {id:'pcf',  label:'PCF',  x:520, y:200, type:'cp',  running:nfStatus.pcf==='running'},
    {id:'nrf',  label:'NRF',  x:620, y:200, type:'cp',  running:nfStatus.nrf==='running'},
    {id:'nssf', label:'NSSF', x:720, y:200, type:'cp',  running:nfStatus.nssf==='running'},
    {id:'dn',   label:'DN',   x:300, y:400, type:'dn',  running:true},
  ];
  const edges = [
    {from:'ue',to:'gnb',label:'Uu'},
    {from:'gnb',to:'amf',label:'N2'},
    {from:'gnb',to:'upf',label:'N3'},
    {from:'amf',to:'smf',label:'N11'},
    {from:'smf',to:'upf',label:'N4'},
    {from:'upf',to:'dn', label:'N6'},
    {from:'amf',to:'ausf',label:'N12'},
    {from:'ausf',to:'udm',label:'N13'},
    {from:'udm',to:'udr', label:'N35'},
    {from:'amf',to:'pcf', label:'N15'},
    {from:'smf',to:'pcf', label:'N7'},
    {from:'amf',to:'nrf', label:'Nnrf'},
    {from:'smf',to:'nrf', label:'Nnrf'},
  ];

  const W=800,H=480;
  const getNode = id => nodes.find(n=>n.id===id);
  const typeColors = {ue:'var(--accent3)',ran:'var(--warn)',cp:'var(--accent)',up:'#a78bfa',dn:'var(--muted)'};

  return (
    <div className="fade-in">
      <div className="card">
        <div className="card-header"><span className="card-title">5G ARCHITECTURE — LIVE TOPOLOGY</span></div>
        <div className="card-body" style={{padding:12}}>
          <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto',background:'var(--bg3)',borderRadius:6}}>
            <defs>
              <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
                <polygon points="0 0, 8 3, 0 6" fill="var(--border2)"/>
              </marker>
            </defs>
            {edges.map((e,i)=>{
              const a=getNode(e.from),b=getNode(e.to);
              if(!a||!b)return null;
              const mx=(a.x+b.x)/2+28, my=(a.y+b.y)/2+20;
              return (
                <g key={i}>
                  <line x1={a.x+28} y1={a.y+20} x2={b.x+28} y2={b.y+20}
                    stroke="var(--border2)" strokeWidth="1" markerEnd="url(#arr)" opacity=".7"/>
                  <text x={mx} y={my} fill="var(--muted)" fontSize="9" fontFamily="var(--font-mono)"
                    textAnchor="middle">{e.label}</text>
                </g>
              );
            })}
            {nodes.map(n=>{
              const c = typeColors[n.type]||'var(--accent)';
              return (
                <g key={n.id} style={{cursor:'pointer'}}>
                  <rect x={n.x} y={n.y} width={56} height={36} rx={4}
                    fill={n.running?'rgba(10,21,37,0.9)':'rgba(10,21,37,0.5)'}
                    stroke={n.running?c:'var(--border)'}
                    strokeWidth={n.running?1.5:1}
                    style={{filter:n.running?`drop-shadow(0 0 6px ${c}44)`:'none'}}/>
                  <text x={n.x+28} y={n.y+22} fill={n.running?c:'var(--text3)'}
                    fontSize="10" fontFamily="var(--font-head)" fontWeight="700"
                    textAnchor="middle" letterSpacing="1">{n.label}</text>
                  {n.running && <circle cx={n.x+50} cy={n.y+6} r={3} fill="var(--success)"
                    style={{filter:'drop-shadow(0 0 4px var(--success))'}}/>}
                </g>
              );
            })}
          </svg>
        </div>
      </div>
      <div className="flex gap-3 mt-3" style={{flexWrap:'wrap'}}>
        {Object.entries({ue:'UE',ran:'RAN',cp:'Control Plane',up:'User Plane',dn:'Data Network'}).map(([k,l])=>(
          <div key={k} className="flex items-center gap-2">
            <div style={{width:12,height:12,borderRadius:2,background:typeColors[k]||'var(--accent)',opacity:.8}}/>
            <span style={{fontSize:10,color:'var(--muted)',fontFamily:'var(--font-mono)'}}>{l}</span>
          </div>
        ))}
      </div>
    </div>
  );
}
