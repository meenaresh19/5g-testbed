<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>5G Testbed — Control Plane</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root {
  --bg: #040810;
  --bg2: #070d1a;
  --bg3: #0a1525;
  --panel: #0d1b2e;
  --panel2: #0f2035;
  --border: #1a3a5c;
  --border2: #1f4a70;
  --accent: #00c8ff;
  --accent2: #0080c8;
  --accent3: #00ffc8;
  --warn: #ffb800;
  --danger: #ff3b5c;
  --success: #00e676;
  --muted: #4a7090;
  --text: #c8e8ff;
  --text2: #7aaccc;
  --text3: #3a6080;
  --glow: 0 0 20px rgba(0,200,255,0.3);
  --glow2: 0 0 40px rgba(0,200,255,0.15);
  --font-main: 'Exo 2', sans-serif;
  --font-mono: 'Share Tech Mono', monospace;
  --font-head: 'Orbitron', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-main);overflow:hidden}
#root{height:100%;display:flex;flex-direction:column}

/* Scrollbars */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* Scanlines overlay */
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:9999}

/* Top bar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:52px;background:var(--bg2);border-bottom:1px solid var(--border);position:relative;flex-shrink:0}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:32px;height:32px;position:relative}
.logo-icon svg{width:100%;height:100%}
.logo-text{font-family:var(--font-head);font-size:13px;font-weight:700;letter-spacing:3px;color:var(--accent);text-shadow:var(--glow)}
.topbar-status{display:flex;align-items:center;gap:20px}
.status-pill{display:flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:11px;color:var(--text2)}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--success);box-shadow:0 0 8px var(--success);animation:pulse 2s infinite}
.status-dot.warn{background:var(--warn);box-shadow:0 0 8px var(--warn)}
.status-dot.off{background:var(--muted);box-shadow:none;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.topbar-time{font-family:var(--font-mono);font-size:11px;color:var(--muted)}

/* Layout */
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:200px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.nav-section{padding:16px 0 8px;border-bottom:1px solid var(--border)}
.nav-label{font-size:9px;font-weight:700;letter-spacing:3px;color:var(--muted);padding:0 16px 8px;text-transform:uppercase;font-family:var(--font-head)}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text2);transition:all .15s;letter-spacing:.5px;position:relative}
.nav-item:hover{color:var(--text);background:rgba(0,200,255,.05)}
.nav-item.active{color:var(--accent);background:rgba(0,200,255,.08)}
.nav-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--accent);box-shadow:0 0 8px var(--accent)}
.nav-icon{width:16px;height:16px;flex-shrink:0}
.sidebar-footer{margin-top:auto;padding:16px;border-top:1px solid var(--border)}
.version-tag{font-family:var(--font-mono);font-size:10px;color:var(--text3)}

/* Main content */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.main-header{padding:16px 24px 0;flex-shrink:0}
.page-title{font-family:var(--font-head);font-size:18px;font-weight:700;color:var(--accent);letter-spacing:2px;text-shadow:var(--glow)}
.page-sub{font-size:11px;color:var(--muted);margin-top:2px;letter-spacing:.5px}
.main-content{flex:1;overflow-y:auto;padding:16px 24px 24px}

/* Cards */
.card{background:var(--panel);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--bg3)}
.card-title{font-family:var(--font-head);font-size:11px;letter-spacing:2px;color:var(--text2);font-weight:400}
.card-body{padding:16px}

/* Grid */
.grid{display:grid;gap:16px}
.grid-2{grid-template-columns:1fr 1fr}
.grid-3{grid-template-columns:1fr 1fr 1fr}
.grid-4{grid-template-columns:1fr 1fr 1fr 1fr}

/* NF Status Cards */
.nf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.nf-card{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:12px 14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.nf-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--border2);transition:all .2s}
.nf-card.running::before{background:var(--success);box-shadow:0 0 10px var(--success)}
.nf-card.stopped::before{background:var(--danger)}
.nf-card.warn::before{background:var(--warn)}
.nf-card:hover{border-color:var(--border2);background:var(--panel2);transform:translateY(-1px)}
.nf-name{font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--text);margin-bottom:6px}
.nf-status{font-family:var(--font-mono);font-size:10px;display:flex;align-items:center;gap:5px}
.nf-status.running{color:var(--success)}
.nf-status.stopped{color:var(--danger)}
.nf-status.starting{color:var(--warn)}
.nf-meta{font-size:10px;color:var(--muted);margin-top:4px;font-family:var(--font-mono)}

/* Form elements */
.form-row{display:grid;gap:12px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;font-family:var(--font-head)}
.form-input{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:8px 12px;color:var(--text);font-family:var(--font-mono);font-size:12px;outline:none;transition:all .15s}
.form-input:focus{border-color:var(--accent2);box-shadow:0 0 0 2px rgba(0,128,200,.15)}
.form-input::placeholder{color:var(--text3)}
select.form-input option{background:var(--bg3)}
.form-textarea{resize:vertical;min-height:80px;font-size:11px;line-height:1.6}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:4px;border:none;cursor:pointer;font-family:var(--font-head);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;transition:all .15s}
.btn-primary{background:var(--accent2);color:white}
.btn-primary:hover{background:var(--accent);box-shadow:var(--glow)}
.btn-success{background:rgba(0,230,118,.15);color:var(--success);border:1px solid var(--success)}
.btn-success:hover{background:rgba(0,230,118,.25)}
.btn-danger{background:rgba(255,59,92,.15);color:var(--danger);border:1px solid var(--danger)}
.btn-danger:hover{background:rgba(255,59,92,.25)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.btn-sm{padding:4px 10px;font-size:9px}
.btn-xs{padding:3px 8px;font-size:9px}

/* Table */
.data-table{width:100%;border-collapse:collapse}
.data-table th{text-align:left;font-family:var(--font-head);font-size:9px;letter-spacing:2px;color:var(--muted);padding:8px 12px;border-bottom:1px solid var(--border);background:var(--bg3)}
.data-table td{padding:9px 12px;font-family:var(--font-mono);font-size:11px;color:var(--text2);border-bottom:1px solid rgba(26,58,92,.5)}
.data-table tr:hover td{background:rgba(0,200,255,.04);color:var(--text)}
.data-table tr:last-child td{border-bottom:none}

/* Badge */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;font-family:var(--font-mono)}
.badge-success{background:rgba(0,230,118,.12);color:var(--success);border:1px solid rgba(0,230,118,.3)}
.badge-warn{background:rgba(255,184,0,.12);color:var(--warn);border:1px solid rgba(255,184,0,.3)}
.badge-danger{background:rgba(255,59,92,.12);color:var(--danger);border:1px solid rgba(255,59,92,.3)}
.badge-info{background:rgba(0,200,255,.12);color:var(--accent);border:1px solid rgba(0,200,255,.3)}
.badge-muted{background:rgba(74,112,144,.12);color:var(--muted);border:1px solid rgba(74,112,144,.3)}

/* Metric widgets */
.metric{display:flex;flex-direction:column;gap:4px}
.metric-val{font-family:var(--font-head);font-size:24px;font-weight:700;color:var(--accent)}
.metric-label{font-size:10px;color:var(--muted);letter-spacing:1px;font-family:var(--font-mono)}
.metric-sub{font-family:var(--font-mono);font-size:11px;color:var(--text2)}

/* Slice card */
.slice-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px;position:relative;overflow:hidden;transition:all .2s}
.slice-card:hover{border-color:var(--border2)}
.slice-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.slice-name{font-family:var(--font-head);font-size:13px;font-weight:700;color:var(--text);letter-spacing:1px}
.slice-nssai{font-family:var(--font-mono);font-size:11px;color:var(--accent);margin-top:2px}
.slice-nfs{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.nf-chip{font-family:var(--font-mono);font-size:10px;padding:3px 8px;border-radius:3px;background:rgba(0,200,255,.08);color:var(--accent);border:1px solid rgba(0,200,255,.2)}
.nf-chip.up{background:rgba(0,230,118,.08);color:var(--success);border-color:rgba(0,230,118,.2)}
.slice-stripe{position:absolute;left:0;top:0;bottom:0;width:3px}
.slice-stripe.sst1{background:var(--accent)}
.slice-stripe.sst2{background:var(--accent3)}
.slice-stripe.sst3{background:var(--warn)}

/* Topology */
.topo-canvas{background:var(--bg3);border-radius:6px;border:1px solid var(--border);padding:20px;min-height:300px;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
.topo-node{position:absolute;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:all .2s}
.topo-node:hover .node-box{border-color:var(--accent);box-shadow:var(--glow)}
.node-box{width:56px;height:40px;border:1px solid var(--border2);border-radius:4px;background:var(--panel);display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-size:9px;font-weight:700;color:var(--accent);letter-spacing:1px;position:relative}
.node-box.active{border-color:var(--success);background:rgba(0,230,118,.06)}
.node-box.ue{border-color:var(--accent3);color:var(--accent3)}
.node-box.ran{border-color:var(--warn);color:var(--warn)}
.node-label{font-size:9px;color:var(--muted);font-family:var(--font-mono)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(4,8,16,.85);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:var(--panel);border:1px solid var(--border2);border-radius:8px;width:560px;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 0 60px rgba(0,200,255,.15)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);background:var(--bg3)}
.modal-title{font-family:var(--font-head);font-size:13px;letter-spacing:2px;color:var(--accent)}
.modal-body{overflow-y:auto;padding:20px;flex:1}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;background:var(--bg3)}

/* Tab bar */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab{padding:8px 18px;font-family:var(--font-head);font-size:10px;letter-spacing:1.5px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;text-transform:uppercase}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* Log viewer */
.log-viewer{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:12px;font-family:var(--font-mono);font-size:11px;height:200px;overflow-y:auto;color:var(--text2)}
.log-line{line-height:1.5;margin-bottom:1px}
.log-line.info{color:var(--text2)}
.log-line.warn{color:var(--warn)}
.log-line.err{color:var(--danger)}
.log-line.ok{color:var(--success)}
.log-ts{color:var(--text3);margin-right:8px}
.log-nf{color:var(--accent);margin-right:8px}

/* Tooltip */
.tip{position:relative}
.tip:hover .tip-content{opacity:1;pointer-events:auto;transform:translateY(0)}
.tip-content{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%) translateY(4px);background:var(--bg2);border:1px solid var(--border2);border-radius:4px;padding:6px 10px;font-size:10px;white-space:nowrap;opacity:0;pointer-events:none;transition:all .15s;z-index:100;color:var(--text2);font-family:var(--font-mono)}

/* Range slider */
.range-input{-webkit-appearance:none;appearance:none;width:100%;height:4px;background:var(--border2);border-radius:2px;outline:none}
.range-input::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 8px var(--accent)}

/* Toggle */
.toggle{position:relative;width:36px;height:20px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-track{position:absolute;inset:0;background:var(--border2);border-radius:10px;transition:.2s;cursor:pointer}
.toggle-track::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:var(--muted);top:3px;left:3px;transition:.2s}
.toggle input:checked + .toggle-track{background:var(--accent2)}
.toggle input:checked + .toggle-track::after{transform:translateX(16px);background:white}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes slideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn .2s ease}
.slide-in{animation:slideIn .15s ease}

/* Progress bar */
.progress{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;background:var(--accent);transition:width .5s}
.progress-fill.warn{background:var(--warn)}
.progress-fill.danger{background:var(--danger)}

/* Divider */
.divider{height:1px;background:var(--border);margin:16px 0}
.section-title{font-family:var(--font-head);font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:12px}

.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}
.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}
.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}.w-full{width:100%}
.text-xs{font-size:11px}.text-muted{color:var(--muted)}.text-accent{color:var(--accent)}.text-success{color:var(--success)}
.font-mono{font-family:var(--font-mono)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Config ───────────────────────────────────────────────
// API is proxied by nginx: /api/ → testbed-api:5000/
const API = '/api';

async function apiFetch(path, opts) {
  try {
    const r = await fetch(API + path, opts);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return await r.json();
  } catch (e) {
    console.warn('[API]', path, e.message);
    return null;
  }
}

// ── Mock Data ────────────────────────────────────────────
const NF_DEFS = {
  core: [
    { id:'nrf',  name:'NRF',  ip:'10.45.0.10', desc:'Network Repository',   port:7777 },
    { id:'scp',  name:'SCP',  ip:'10.45.0.11', desc:'Service Comm Proxy',   port:7777 },
    { id:'amf',  name:'AMF',  ip:'10.45.0.12', desc:'Access & Mobility',    port:7777 },
    { id:'smf',  name:'SMF',  ip:'10.45.0.13', desc:'Session Management',   port:7777 },
    { id:'upf',  name:'UPF',  ip:'10.45.0.14', desc:'User Plane',           port:8805 },
    { id:'ausf', name:'AUSF', ip:'10.45.0.15', desc:'Auth Server',          port:7777 },
    { id:'udm',  name:'UDM',  ip:'10.45.0.16', desc:'Unified Data Mgmt',    port:7777 },
    { id:'udr',  name:'UDR',  ip:'10.45.0.17', desc:'Unified Data Repo',    port:7777 },
    { id:'pcf',  name:'PCF',  ip:'10.45.0.18', desc:'Policy Control',       port:7777 },
    { id:'bsf',  name:'BSF',  ip:'10.45.0.19', desc:'Binding Support',      port:7777 },
    { id:'nssf', name:'NSSF', ip:'10.45.0.20', desc:'Slice Selection',      port:7777 },
  ],
  ran: [
    { id:'gnb',  name:'gNB',  ip:'10.45.0.50', desc:'5G Base Station',  port:38412 },
    { id:'nrue', name:'nrUE', ip:'192.168.70.30', desc:'UE Simulator',  port:0    },
  ]
};

const INIT_STATUS = Object.fromEntries(
  [...NF_DEFS.core, ...NF_DEFS.ran].map(n => [n.id, 'running'])
);

const INIT_SLICES = [
  { id:'s1', name:'eMBB Default', sst:1, sd:'000000', nfs:['amf','smf','upf','ausf','udm','udr','pcf'],
    dnn:'internet', qos:'5QI-9', ues:3, ul:'50 Mbps', dl:'150 Mbps', active:true },
  { id:'s2', name:'URLLC',        sst:2, sd:'000001', nfs:['amf','smf','upf','pcf'],
    dnn:'urllc',    qos:'5QI-82', ues:1, ul:'10 Mbps', dl:'20 Mbps', active:true },
  { id:'s3', name:'mMTC / IoT',   sst:3, sd:'000001', nfs:['amf','smf','upf','udm','udr'],
    dnn:'iot',      qos:'5QI-65', ues:12, ul:'1 Mbps', dl:'1 Mbps', active:false },
];

const INIT_SUBS = [
  { imsi:'001010000000001', key:'fec86ba6eb707ed0', opc:'C42449363BBAD02B', dnn:'internet', sst:1, sd:'000000', state:'REGISTERED' },
  { imsi:'001010000000002', key:'0c0a34601d4f07677303652c0462535b', opc:'63bfa50ee6523365ff14c1f45f88737d', dnn:'urllc', sst:2, sd:'000001', state:'REGISTERED' },
  { imsi:'001010000000003', key:'465b5ce8b199b49faa5f0a2ee238a6bc', opc:'e8ed289deba952e4283b54e88e6183ca', dnn:'iot', sst:3, sd:'000001', state:'IDLE' },
];

const LOGS = [
  { ts:'10:42:33', nf:'AMF', msg:'UE registered IMSI=001010000000001 SST=1', lvl:'ok' },
  { ts:'10:42:34', nf:'SMF', msg:'PDU Session established DNN=internet QFI=1', lvl:'ok' },
  { ts:'10:42:35', nf:'UPF', msg:'GTP-U tunnel created TEID=0x00000001', lvl:'ok' },
  { ts:'10:42:38', nf:'gNB', msg:'NGAP: InitialContextSetup complete', lvl:'info' },
  { ts:'10:43:01', nf:'PCF', msg:'Policy rule applied 5QI=9 UL=50Mbps DL=150Mbps', lvl:'info' },
  { ts:'10:43:05', nf:'AMF', msg:'UE registered IMSI=001010000000002 SST=2', lvl:'ok' },
  { ts:'10:43:11', nf:'NRF', msg:'NF registration: SMF instance registered', lvl:'info' },
  { ts:'10:43:22', nf:'AUSF', msg:'5G-AKA authentication success', lvl:'ok' },
  { ts:'10:43:45', nf:'BSF', msg:'PCF binding: UE=001010000000001 PCF=10.45.0.18', lvl:'info' },
  { ts:'10:44:02', nf:'UPF', msg:'WARN: High throughput on N3 interface (89%)', lvl:'warn' },
];

// ── Components ────────────────────────────────────────────

// ── Core NFs Page ──────────────────────────────────────────
function CoreNFs({ nfStatus, setNfStatus }) {
  const [selected, setSelected] = useState(null);
  const [editCfg, setEditCfg] = useState(false);
  const nf = selected ? [...NF_DEFS.core,...NF_DEFS.ran].find(n=>n.id===selected) : null;

  const toggle = async (id) => {
    const isRunning = nfStatus[id] === 'running';
    const action = isRunning ? 'stop' : 'start';
    // Optimistic UI update
    setNfStatus(s => ({...s, [id]: isRunning ? 'stopped' : 'starting'}));
    const result = await apiFetch(`/nf/${id}/${action}`, { method: 'POST' });
    // Refresh real status after 2 s regardless of result
    setTimeout(async () => {
      const data = await apiFetch('/status');
      if (data) setNfStatus(prev => ({...prev, ...data}));
    }, 2000);
  };

  return (
    <div className="fade-in">
      <div className="grid grid-2 mb-4">
        <div className="card">
          <div className="card-header"><span className="card-title">5G CORE — NETWORK FUNCTIONS</span></div>
          <div className="card-body" style={{padding:0}}>
            <table className="data-table w-full">
              <thead>
                <tr><th>NF</th><th>Description</th><th>IP Address</th><th>Port</th><th>State</th><th>Actions</th></tr>
              </thead>
              <tbody>
                {NF_DEFS.core.map(nf => (
                  <tr key={nf.id} style={{cursor:'pointer'}} onClick={()=>setSelected(nf.id)}>
                    <td><span style={{fontFamily:'var(--font-head)',color:'var(--accent)',fontSize:11}}>{nf.name}</span></td>
                    <td>{nf.desc}</td>
                    <td>{nf.ip}</td>
                    <td>{nf.port}</td>
                    <td>
                      <span className={`badge badge-${nfStatus[nf.id]==='running'?'success':nfStatus[nf.id]==='starting'?'warn':'danger'}`}>
                        {nfStatus[nf.id]}
                      </span>
                    </td>
                    <td>
                      <div className="flex gap-2" onClick={e=>e.stopPropagation()}>
                        <button className={`btn btn-xs ${nfStatus[nf.id]==='running'?'btn-danger':'btn-success'}`}
                          onClick={()=>toggle(nf.id)}>
                          {nfStatus[nf.id]==='running'?'Stop':'Start'}
                        </button>
                        <button className="btn btn-xs btn-ghost" onClick={()=>{setSelected(nf.id);setEditCfg(true)}}>
                          <Icon name="settings" size={10}/>
                        </button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>

        <div className="card">
          <div className="card-header"><span className="card-title">RAN — gNB + nrUE</span></div>
          <div className="card-body" style={{padding:0}}>
            <table className="data-table w-full">
              <thead>
                <tr><th>NF</th><th>Description</th><th>IP</th><th>State</th><th>Actions</th></tr>
              </thead>
              <tbody>
                {NF_DEFS.ran.map(nf => (
                  <tr key={nf.id} style={{cursor:'pointer'}} onClick={()=>setSelected(nf.id)}>
                    <td><span style={{fontFamily:'var(--font-head)',color:'var(--warn)',fontSize:11}}>{nf.name}</span></td>
                    <td>{nf.desc}</td>
                    <td>{nf.ip}</td>
                    <td>
                      <span className={`badge badge-${nfStatus[nf.id]==='running'?'success':'danger'}`}>
                        {nfStatus[nf.id]}
                      </span>
                    </td>
                    <td>
                      <div className="flex gap-2" onClick={e=>e.stopPropagation()}>
                        <button className={`btn btn-xs ${nfStatus[nf.id]==='running'?'btn-danger':'btn-success'}`}
                          onClick={()=>toggle(nf.id)}>
                          {nfStatus[nf.id]==='running'?'Stop':'Start'}
                        </button>
                        <button className="btn btn-xs btn-ghost" onClick={()=>{setSelected(nf.id);setEditCfg(true)}}>
                          <Icon name="settings" size={10}/>

function SliceManager({ slices, setSlices }) {
  const [showCreate, setShowCreate] = useState(false);
  const [newSlice, setNewSlice] = useState({
    name:'', sst:'1', sd:'', dnn:'internet', qos:'5QI-9',
    ul:'100', dl:'300', nfs:['amf','smf','upf','ausf','udm','udr','pcf'],
  });

  const allNFs = NF_DEFS.core.map(n=>n.id);
  const sstColors = {'1':'sst1','2':'sst2','3':'sst3'};
  const sstNames  = {'1':'eMBB','2':'URLLC','3':'mMTC'};

  const createSlice = () => {
    const s = {
      id: `s${Date.now()}`,
      name: newSlice.name || `Slice-SST${newSlice.sst}`,
      sst: parseInt(newSlice.sst),
      sd: newSlice.sd || '000000',
      nfs: newSlice.nfs,
      dnn: newSlice.dnn,
      qos: newSlice.qos,
      ues: 0,
      ul: `${newSlice.ul} Mbps`,
      dl: `${newSlice.dl} Mbps`,
      active: true,
    };
    setSlices(sl => [...sl, s]);
    setShowCreate(false);
    setNewSlice({name:'',sst:'1',sd:'',dnn:'internet',qos:'5QI-9',ul:'100',dl:'300',nfs:['amf','smf','upf','ausf','udm','udr','pcf']});
  };

  const toggleNF = (id) => {
    setNewSlice(s => ({...s,
      nfs: s.nfs.includes(id) ? s.nfs.filter(n=>n!==id) : [...s.nfs,id]

    {from:'amf',to:'smf',label:'N11'},

    {from:'amf',to:'pcf', label:'N15'},

    {from:'amf',to:'nrf', label:'Nnrf'},
    {from:'smf',to:'nrf', label:'Nnrf'},

  const W=800,H=480;

                <polygon points="0 0, 8 3, 0 6" fill="var(--border2)"/>

              const mx=(a.x+b.x)/2+28, my=(a.y+b.y)/2+20;

            <span style={{fontSize:10,color:'var(--muted)',fontFamily:'var(--font-mono)'}}>{l}</span>

];

const LOG_NFS = ['nrf','scp','amf','smf','upf','ausf','udm','udr','pcf','bsf','nssf','gnb','nrue'];

function fmtBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}
function fmtElapsed(s) {
  return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}

function Tracing() {
  const [label,         setLabel]         = useState('');
  const [selIfaces,     setSelIfaces]     = useState(['n2','n3','n4']);
  const [customFilter,  setCustomFilter]  = useState('');
  const [activeSession, setActiveSession] = useState(null);
  const [sessions,      setSessions]      = useState([]);
  const [pcapFiles,     setPcapFiles]     = useState([]);
  const [elapsed,       setElapsed]       = useState(0);
  const [loading,       setLoading]       = useState(false);
  const [statusMsg,     setStatusMsg]     = useState('');

  // Elapsed timer while a session is active
  useEffect(() => {
    if (!activeSession) return;
    setElapsed(0);
    const t = setInterval(() => setElapsed(e => e + 1), 1000);
    return () => clearInterval(t);
  }, [activeSession]);

  // Refresh file list on load and after stop
  const refreshFiles = async () => {
    const data = await apiFetch('/trace/files');
    if (data) setPcapFiles(data);
  };
  useEffect(() => { refreshFiles(); }, []);

  const toggleIface = (id) => {
    if (activeSession) return;
    if (id === 'all') { setSelIfaces(s => s.includes('all') ? [] : ['all']); return; }
    setSelIfaces(s => {
      const without = s.filter(x => x !== 'all');
      return without.includes(id) ? without.filter(x => x !== id) : [...without, id];
    });
  };

  const startCapture = async () => {
    if (selIfaces.length === 0) { setStatusMsg('Select at least one interface.'); return; }
    setLoading(true);
    setStatusMsg('Starting capture — installing tcpdump if needed (~10s first run)…');
    const data = await apiFetch('/trace/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ label: label || `trace-${Date.now()}`, interfaces: selIfaces, filter: customFilter }),
    });
    setLoading(false);
    if (data && data.captures && data.captures.length > 0) {
      setActiveSession(data);
      setStatusMsg('');
    } else {
      setStatusMsg('Failed to start: ' + (data?.errors?.map(e => e.error).join(', ') || 'API unavailable'));
    }
  };

  const stopCapture = async () => {
    if (!activeSession) return;
    setLoading(true);
    setStatusMsg('Stopping — flushing PCAP buffer…');
    const data = await apiFetch(`/trace/stop/${activeSession.sessionId}`, { method: 'POST' });
    setLoading(false);
    setStatusMsg('');
    if (data) {
      setSessions(s => [data, ...s]);
      setActiveSession(null);
      await refreshFiles();
    }
  };

  const downloadFile  = (fn) => window.open(`/api/trace/download/${encodeURIComponent(fn)}`, '_blank');
  const downloadLogs  = (sid) => window.open(`/api/trace/logs/${encodeURIComponent(sid)}`, '_blank');
  const downloadAllLogs = () => window.open('/api/trace/logs/now', '_blank');

  const deleteFile = async (fn) => {
    await apiFetch(`/trace/files/${encodeURIComponent(fn)}`, { method: 'DELETE' });
    await refreshFiles();
  };

  // Style helpers
  const card    = {background:'var(--bg2)', border:'1px solid var(--border)', borderRadius:6, marginBottom:16};
  const cardHdr = {padding:'10px 16px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', justifyContent:'space-between'};
  const cardBdy = {padding:'16px'};
  const mono    = {fontFamily:'var(--font-mono)'};
  const head    = {fontFamily:'var(--font-head)', letterSpacing:1};

  return (
    <div className="fade-in">

      {/* ── Capture Controls ─────────────────────────────── */}
      <div style={card}>
        <div style={cardHdr}>
          <span style={{...head, fontSize:11, color:'var(--accent)'}}>PACKET CAPTURE</span>
          {activeSession && (
            <div className="flex items-center gap-2">
              <span style={{width:8, height:8, borderRadius:'50%', background:'var(--success)',
                display:'inline-block', animation:'pulse 1.2s ease-in-out infinite'}}/>
              <span style={{...mono, fontSize:11, color:'var(--success)'}}>
                CAPTURING — {fmtElapsed(elapsed)} — {activeSession.captures?.length} interface(s)
              </span>
            </div>
          )}
        </div>
        <div style={cardBdy}>

          {/* Session label */}
          <div className="form-group mb-4">
            <label className="form-label">Session Label</label>
            <input className="form-input" style={{maxWidth:320}}
              placeholder="e.g. ue-registration-test"
              value={label} onChange={e => setLabel(e.target.value)}
              disabled={!!activeSession || loading}/>
          </div>

          {/* Interface selection */}
          <div style={{...head, fontSize:9, color:'var(--muted)', letterSpacing:2, marginBottom:10}}>
            SELECT INTERFACES TO CAPTURE
          </div>
          <div style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:8, marginBottom:16}}>
            {IFACE_DEFS.map(iface => {
              const sel = selIfaces.includes(iface.id);
              return (
                <div key={iface.id} onClick={() => toggleIface(iface.id)} style={{
                  padding:'10px 14px', borderRadius:4,
                  cursor: (activeSession || loading) ? 'default' : 'pointer',
                  border:`1px solid ${sel ? iface.color : 'var(--border)'}`,
                  background: sel ? `color-mix(in srgb, ${iface.color} 8%, var(--bg3))` : 'var(--bg3)',
                  opacity: (activeSession || loading) ? 0.55 : 1,
                  transition:'all .15s',
                }}>
                  <div className="flex items-center gap-2" style={{marginBottom:4}}>
                    <div style={{width:8, height:8, borderRadius:2, flexShrink:0,
                      background: sel ? iface.color : 'var(--border2)', transition:'all .15s'}}/>
                    <span style={{...head, fontSize:10, color: sel ? iface.color : 'var(--text2)'}}>
                      {iface.label}
                    </span>
                  </div>
                  <div style={{...mono, fontSize:9, color:'var(--muted)', paddingLeft:16}}>
                    {iface.desc}
                  </div>
                </div>
              );
            })}
          </div>

          {/* Custom BPF filter */}
          <div className="form-group mb-4">
            <label className="form-label">
              Custom BPF Filter&nbsp;
              <span style={{color:'var(--muted)', fontWeight:'normal', fontSize:10}}>
                (optional — overrides interface defaults)
              </span>
            </label>
            <input className="form-input" style={{maxWidth:480, ...mono, fontSize:12}}
              placeholder="e.g. host 10.45.0.12 and port 7777"
              value={customFilter} onChange={e => setCustomFilter(e.target.value)}
              disabled={!!activeSession || loading}/>
          </div>

          {/* Buttons */}
          <div className="flex items-center gap-3">
            <button className="btn btn-success" style={{padding:'8px 22px'}}
              disabled={!!activeSession || loading || selIfaces.length === 0}
              onClick={startCapture}>
              <Icon name="play" size={13}/>&nbsp; Start Capture
            </button>
            <button className="btn btn-danger" style={{padding:'8px 22px'}}
              disabled={!activeSession || loading}
              onClick={stopCapture}>
              <Icon name="stop" size={13}/>&nbsp; Stop Capture
            </button>
            {loading && <span style={{...mono, fontSize:10, color:'var(--muted)'}}>Working…</span>}
          </div>

          {/* Status / error message */}
          {statusMsg && (
            <div style={{marginTop:12, padding:'8px 12px', borderRadius:4, ...mono, fontSize:11,
              background:'rgba(251,191,36,.08)', border:'1px solid rgba(251,191,36,.25)', color:'var(--warn)'}}>
              {statusMsg}
            </div>
          )}

          {/* Errors from last start */}
          {activeSession?.errors?.length > 0 && (
            <div style={{marginTop:10, padding:'8px 12px', borderRadius:4,
              background:'rgba(239,68,68,.08)', border:'1px solid rgba(239,68,68,.25)'}}>
              {activeSession.errors.map((e,i) => (
                <div key={i} style={{...mono, fontSize:10, color:'var(--danger)'}}>
                  ⚠ {e.iface} ({e.container}): {e.error}
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* ── Completed Session Downloads ───────────────────── */}
      {sessions.length > 0 && (
        <div style={card}>
          <div style={cardHdr}>
            <span style={{...head, fontSize:11, color:'var(--accent)'}}>CAPTURE SESSION FILES</span>
          </div>
          <div style={{padding:0}}>
            <table className="data-table w-full">
              <thead>
                <tr>
                  <th>Label</th><th>Started</th><th>Duration</th>
                  <th>PCAP Files</th><th>Logs</th>
                </tr>
              </thead>
              <tbody>
                {sessions.map((s,i) => (
                  <tr key={i}>
                    <td style={{color:'var(--accent)', ...mono}}>{s.label}</td>
                    <td style={{...mono, fontSize:11}}>{new Date(s.startTime).toLocaleTimeString()}</td>
                    <td style={{...mono, fontSize:11}}>{s.duration || '—'}</td>
                    <td>
                      <div className="flex gap-2" style={{flexWrap:'wrap'}}>
                        {(s.files||[]).map((f,j) => (
                          <button key={j} className="btn btn-xs btn-ghost"
                            onClick={() => downloadFile(f.filename)}
                            style={{...mono, fontSize:9}}>
                            <Icon name="download" size={10}/> {f.label}.pcap
                          </button>
                        ))}
                      </div>
                    </td>
                    <td>
                      <button className="btn btn-xs btn-ghost" onClick={() => downloadLogs(s.sessionId)}
                        style={{fontSize:10}}>
                        <Icon name="download" size={10}/> Logs bundle
                      </button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* ── All PCAP files on disk ────────────────────────── */}
      <div style={card}>
        <div style={cardHdr}>
          <span style={{...head, fontSize:11, color:'var(--accent)'}}>PCAP FILES ON DISK</span>
          <button className="btn btn-ghost btn-sm" onClick={refreshFiles} style={{fontSize:10}}>↻ Refresh</button>
        </div>
        {pcapFiles.length === 0
          ? <div style={{...cardBdy, ...mono, fontSize:11, color:'var(--muted)'}}>No PCAP files yet — start a capture above.</div>
          : (
            <div style={{padding:0}}>
              <table className="data-table w-full">
                <thead>
                  <tr><th>Filename</th><th>Size</th><th>Modified</th><th>Actions</th></tr>
                </thead>
                <tbody>
                  {pcapFiles.map((f,i) => (
                    <tr key={i}>
                      <td style={{...mono, fontSize:10, color:'var(--text2)'}}>{f.filename}</td>
                      <td style={{...mono, fontSize:11}}>{fmtBytes(f.size)}</td>
                      <td style={{...mono, fontSize:11}}>{new Date(f.mtime).toLocaleString()}</td>
                      <td>
                        <div className="flex gap-2">
                          <button className="btn btn-xs btn-ghost" onClick={() => downloadFile(f.filename)}>
                            <Icon name="download" size={10}/> Download
                          </button>
                          <button className="btn btn-xs btn-danger" onClick={() => deleteFile(f.filename)}>
                            <Icon name="trash" size={10}/>
                          </button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )
        }
      </div>

      {/* ── NF Log Downloads ─────────────────────────────── */}
      <div style={card}>
        <div style={cardHdr}>
          <span style={{...head, fontSize:11, color:'var(--accent)'}}>NF LOG DOWNLOAD</span>
        </div>
        <div style={cardBdy}>
          <div style={{...mono, fontSize:10, color:'var(--muted)', marginBottom:12}}>
            Download the current live logs from any NF container (last 500 lines).
          </div>
          <div className="flex gap-2 mb-4" style={{flexWrap:'wrap'}}>
            {LOG_NFS.map(nf => (
              <button key={nf} className="btn btn-ghost btn-sm"
                onClick={() => window.open(`/api/nf/${nf}/logs?download=1`, '_blank')}
                style={{...head, fontSize:10, letterSpacing:1}}>
                <Icon name="download" size={10}/> {nf.toUpperCase()}
              </button>
            ))}
          </div>
          <button className="btn btn-primary" onClick={downloadAllLogs}
            style={{fontSize:11}}>
            <Icon name="download" size={12}/>&nbsp; All NFs — Single Bundle (.txt)
          </button>
          <div style={{...mono, fontSize:9, color:'var(--muted)', marginTop:8}}>
            Bundle includes last 500 log lines from every NF. Open in any text editor or grep for NGAP/NAS/GTP keywords.
          </div>
        </div>
      </div>

    </div>
  );
}

// ── Throughput Test Page ───────────────────────────────────
function ThroughputTest() {
  const [ueStatus, setUeStatus]     = useState({ue1:{running:false,tunIp:null,ready:false},ue2:{running:false,tunIp:null,ready:false}});
  const [selUe, setSelUe]           = useState('ue1');
  const [direction, setDirection]   = useState('dl');
  const [duration, setDuration]     = useState(10);
  const [parallel, setParallel]     = useState(1);
  const [target, setTarget]         = useState('10.45.0.200');
  const [running, setRunning]       = useState(false);
  const [result, setResult]         = useState(null);
  const [error, setError]           = useState('');
  const [history, setHistory]       = useState([]);
  const [elapsed, setElapsed]       = useState(0);

  const mono = {fontFamily:'var(--font-mono)'};
  const head = {fontFamily:'var(--font-head)'};

  // Poll UE status every 5s
  React.useEffect(() => {
    const poll = () => apiFetch('/iperf3/status').then(d => d && setUeStatus(d)).catch(()=>{});
    poll();
    const iv = setInterval(poll, 5000);
    return ()=>clearInterval(iv);
  }, []);

  // Load history
  React.useEffect(() => {
    apiFetch('/iperf3/history').then(d => d && setHistory(d)).catch(()=>{});
  }, []);

  // Elapsed timer while test runs
  React.useEffect(() => {
    if (!running) { setElapsed(0); return; }
    const iv = setInterval(() => setElapsed(e => e + 1), 1000);
    return () => clearInterval(iv);
  }, [running]);

  function fmtBps(bps) {
    if (!bps) return '—';
    if (bps >= 1e9) return (bps/1e9).toFixed(2) + ' Gbps';
    if (bps >= 1e6) return (bps/1e6).toFixed(1) + ' Mbps';
    if (bps >= 1e3) return (bps/1e3).toFixed(0) + ' Kbps';
    return bps.toFixed(0) + ' bps';
  }

  function dirLabel(d) { return {dl:'DL ↓',ul:'UL ↑',bidir:'BiDir ↕'}[d] || d; }

  async function runTest() {
    setError(''); setResult(null); setRunning(true);
    try {
      const data = await apiFetch('/iperf3/run', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ ue: selUe, direction, duration: Number(duration), parallel: Number(parallel), target }),
      });
      if (data?.error) { setError(data.error); }
      else { setResult(data); setHistory(h => [data, ...h.slice(0,49)]); }
    } catch(e) { setError(e.message); }
    setRunning(false);
  }

  const ue = ueStatus[selUe] || {};
  const canRun = ue.ready && !running;

  const barMax = result ? Math.max(result.summary?.dl_bps||0, result.summary?.ul_bps||1) : 1;
  function barPct(bps) { return Math.min(100, Math.round(bps/barMax*100)); }

  return (
    <div className="fade-in" style={{padding:'0 0 32px'}}>

      {/* ── UE Status Banner ── */}
      <div className="grid grid-2 mb-4" style={{gap:12}}>
        {['ue1','ue2'].map(id=>{
          const u = ueStatus[id]||{};
          return (
            <div key={id} className="card" style={{cursor:'pointer', border: selUe===id?'1px solid var(--accent)':'1px solid var(--border)', background: selUe===id?'rgba(0,200,255,.05)':'var(--panel)'}}
              onClick={()=>setSelUe(id)}>
              <div className="card-body" style={{display:'flex',alignItems:'center',gap:12}}>
                <div className={`status-dot ${u.running?(u.ready?'':'warn'):'off'}`}/>
                <div>
                  <div style={{...head,fontSize:12,letterSpacing:2,color:'var(--accent)'}}>{id.toUpperCase()}</div>
                  <div style={{...mono,fontSize:10,color:'var(--text2)',marginTop:2}}>
                    {u.running ? (u.ready ? `PDU: ${u.tunIp}` : 'Registered — no PDU session') : 'Container stopped'}
                  </div>
                </div>
                <div style={{marginLeft:'auto'}}>
                  <span className={`badge ${u.ready?'badge-success':u.running?'badge-warn':'badge-muted'}`}>
                    {u.ready?'READY':u.running?'NO PDU':'DOWN'}
                  </span>
                </div>
              </div>
            </div>
          );
        })}
      </div>

      <div className="grid grid-2" style={{gap:16,alignItems:'start'}}>

        {/* ── Test Config Panel ── */}
        <div className="card">
          <div className="card-header">TEST CONFIGURATION</div>
          <div className="card-body">

            {/* Direction */}
            <div className="form-group mb-3">
              <label className="form-label">Direction</label>
              <div className="flex gap-2">
                {[['dl','▼ Downlink (DL)','Server → UE'],['ul','▲ Uplink (UL)','UE → Server'],['bidir','↕ BiDirectional','Both simultaneously']].map(([v,l,d])=>(
                  <div key={v} onClick={()=>setDirection(v)}
                    style={{flex:1,padding:'8px 10px',border:`1px solid ${direction===v?'var(--accent)':'var(--border)'}`,borderRadius:6,cursor:'pointer',
                      background:direction===v?'rgba(0,200,255,.1)':'var(--bg3)',textAlign:'center'}}>
                    <div style={{...head,fontSize:10,letterSpacing:1,color:direction===v?'var(--accent)':'var(--text2)'}}>{l}</div>
                    <div style={{...mono,fontSize:9,color:'var(--muted)',marginTop:3}}>{d}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Duration + Parallel */}
            <div className="form-row grid-2 mb-3">
              <div className="form-group">
                <label className="form-label">Duration (seconds)</label>
                <div className="flex gap-1">
                  {[5,10,30,60].map(d=>(
                    <button key={d} className={`btn btn-sm ${duration===d?'btn-primary':'btn-ghost'}`}
                      style={{flex:1,...mono,fontSize:11}} onClick={()=>setDuration(d)}>{d}s</button>
                  ))}
                </div>
              </div>
              <div className="form-group">
                <label className="form-label">Parallel Streams</label>
                <div className="flex gap-1">
                  {[1,2,4,8].map(p=>(
                    <button key={p} className={`btn btn-sm ${parallel===p?'btn-primary':'btn-ghost'}`}
                      style={{flex:1,...mono,fontSize:11}} onClick={()=>setParallel(p)}>{p}</button>
                  ))}
                </div>
              </div>
            </div>

            {/* Target + UE selector */}
            <div className="form-row grid-2 mb-3">
              <div className="form-group">
                <label className="form-label">Target (iPerf3 Server IP)</label>
                <input className="form-input" value={target} onChange={e=>setTarget(e.target.value)}
                  style={mono} placeholder="10.45.0.200"/>
              </div>
              <div className="form-group">
                <label className="form-label">Source UE</label>
                <div className="flex gap-2">
                  {['ue1','ue2'].map(id=>{
                    const u=ueStatus[id]||{};
                    return (
                      <button key={id} onClick={()=>setSelUe(id)}
                        className={`btn btn-sm ${selUe===id?'btn-primary':'btn-ghost'}`}
                        style={{flex:1,...mono,fontSize:11}} disabled={!u.running}>
                        {id.toUpperCase()} {u.ready?'✓':u.running?'⚠':'✗'}
                      </button>
                    );
                  })}
                </div>
              </div>
            </div>

            {/* Run button */}
            <button className="btn btn-success" style={{width:'100%',padding:'10px',fontSize:13,...head,letterSpacing:2}}
              disabled={!canRun} onClick={runTest}>
              {running ? `RUNNING… ${elapsed}/${duration}s` : <><Icon name="speed" size={14}/>&nbsp; RUN IPERF3 TEST</>}
            </button>
            {!ue.ready && !running && (
              <div style={{...mono,fontSize:10,color:'var(--warn)',marginTop:8,textAlign:'center'}}>
                {ue.running ? '⚠ UE is up but no PDU session — check subscriber config' : '✗ UE container is not running'}
              </div>
            )}
            {error && <div style={{...mono,fontSize:11,color:'var(--danger)',marginTop:8,padding:'8px',background:'rgba(255,59,92,.08)',borderRadius:4,wordBreak:'break-word'}}>{error}</div>}
          </div>
        </div>

        {/* ── Live Results Panel ── */}
        <div className="card">
          <div className="card-header">LAST TEST RESULT</div>
          <div className="card-body">
            {running && (
              <div style={{textAlign:'center',padding:'24px 0'}}>
                <div style={{...head,fontSize:13,color:'var(--accent)',letterSpacing:2,marginBottom:8}}>TEST IN PROGRESS</div>
                <div style={{...mono,fontSize:11,color:'var(--text2)'}}>Direction: {dirLabel(direction)} · Duration: {duration}s · UE: {selUe.toUpperCase()}</div>
                <div style={{height:4,background:'var(--border)',borderRadius:2,margin:'16px 0',overflow:'hidden'}}>
                  <div style={{height:'100%',background:'var(--accent)',width:`${Math.round(elapsed/duration*100)}%`,transition:'width 1s linear',borderRadius:2}}/>
                </div>
                <div style={{...mono,fontSize:11,color:'var(--muted)'}}>{elapsed}s / {duration}s</div>
              </div>
            )}
            {!running && result && (() => {
              const s = result.summary || {};
              const mainBps = direction==='ul' ? s.ul_bps : s.dl_bps;
              const mainMbps = direction==='ul' ? s.ul_mbps : s.dl_mbps;
              return (
                <div>
                  {/* Big throughput number */}
                  <div style={{textAlign:'center',padding:'8px 0 16px'}}>
                    <div style={{...head,fontSize:36,fontWeight:900,color:'var(--accent)',textShadow:'var(--glow)'}}>
                      {mainMbps || '0'}
                    </div>
                    <div style={{...head,fontSize:12,color:'var(--text2)',letterSpacing:2}}>Mbps · {dirLabel(direction)}</div>
                  </div>
                  {/* DL / UL bars */}
                  {(direction==='bidir' || direction==='dl') && (
                    <div className="mb-3">
                      <div className="flex justify-between mb-1">
                        <span style={{...mono,fontSize:10,color:'var(--accent3)'}}>▼ DL (Server→UE)</span>
                        <span style={{...mono,fontSize:10,color:'var(--accent3)'}}>{fmtBps(s.dl_bps)}</span>
                      </div>
                      <div style={{height:8,background:'var(--border)',borderRadius:4,overflow:'hidden'}}>
                        <div style={{height:'100%',width:`${barPct(s.dl_bps)}%`,background:'var(--accent3)',borderRadius:4,transition:'width .5s'}}/>
                      </div>
                    </div>
                  )}
                  {(direction==='bidir' || direction==='ul') && (
                    <div className="mb-3">
                      <div className="flex justify-between mb-1">
                        <span style={{...mono,fontSize:10,color:'var(--accent)'}}>▲ UL (UE→Server)</span>
                        <span style={{...mono,fontSize:10,color:'var(--accent)'}}>{fmtBps(s.ul_bps)}</span>
                      </div>
                      <div style={{height:8,background:'var(--border)',borderRadius:4,overflow:'hidden'}}>
                        <div style={{height:'100%',width:`${barPct(s.ul_bps)}%`,background:'var(--accent)',borderRadius:4,transition:'width .5s'}}/>
                      </div>
                    </div>
                  )}
                  {/* Stats grid */}
                  <div className="grid grid-4 mt-3" style={{gap:8}}>
                    {[['Retransmits',s.retransmits,'var(--warn)'],['CPU Host',`${s.cpu_host}%`,'var(--muted)'],['CPU Remote',`${s.cpu_remote}%`,'var(--muted)'],['UE TunIP',result.tunIp,'var(--text3)']].map(([l,v,c])=>(
                      <div key={l} style={{background:'var(--bg3)',borderRadius:6,padding:'8px 10px',textAlign:'center'}}>
                        <div style={{...mono,fontSize:16,fontWeight:700,color:c}}>{v}</div>
                        <div style={{...mono,fontSize:9,color:'var(--muted)',marginTop:2}}>{l}</div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })()}
            {!running && !result && (
              <div style={{textAlign:'center',padding:'40px 0',color:'var(--muted)'}}>
                <Icon name="speed" size={32}/>
                <div style={{...mono,fontSize:11,marginTop:12}}>No test run yet.<br/>Configure and click RUN IPERF3 TEST.</div>
              </div>
            )}
          </div>
        </div>
      </div>

      {/* ── Test History Table ── */}
      {history.length > 0 && (
        <div className="card mt-4">
          <div className="card-header">TEST HISTORY (last {history.length})</div>
          <div className="card-body" style={{padding:0}}>
            <table className="table">
              <thead><tr>
                <th>Time</th><th>UE</th><th>Dir</th><th>DL</th><th>UL</th><th>Retx</th><th>Duration</th><th>Parallel</th>
              </tr></thead>
              <tbody>
                {history.map((r,i)=>{
                  const s = r.summary||{};
                  return (
                    <tr key={r.id||i}>
                      <td style={{...mono,fontSize:10}}>{new Date(r.startTime).toLocaleTimeString()}</td>
                      <td><span className="badge badge-muted">{(r.ue||'').toUpperCase()}</span></td>
                      <td><span style={{...head,fontSize:10,color:'var(--accent)',letterSpacing:1}}>{dirLabel(r.direction)}</span></td>
                      <td style={{...mono,fontSize:11,color:'var(--accent3)'}}>{fmtBps(s.dl_bps)}</td>
                      <td style={{...mono,fontSize:11,color:'var(--accent)'}}>{fmtBps(s.ul_bps)}</td>
                      <td style={{...mono,fontSize:11,color:s.retransmits>0?'var(--warn)':'var(--text2)'}}>{s.retransmits}</td>
                      <td style={{...mono,fontSize:11}}>{r.duration}s</td>
                      <td style={{...mono,fontSize:11}}>{r.parallel}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* ── Quick reference ── */}
      <div className="card mt-4">
        <div className="card-header">HOW IT WORKS</div>
        <div className="card-body">
          <div className="grid grid-3" style={{gap:16}}>
            {[
              ['Data Path', 'UE → uesimtun0 → GTP-U → UPF N3 → iPerf3 server (10.45.0.200)'],
              ['UE2 Setup', 'Start UE2: make ue2-up  (adds 2nd subscriber, same IMSI 001010000000002)'],
              ['Manual CLI', 'docker exec ueransim-ue1 iperf3 -c 10.45.0.200 -t 10 -B $(tunIP)'],
            ].map(([t,d])=>(
              <div key={t} style={{padding:'12px',background:'var(--bg3)',borderRadius:6,borderLeft:'3px solid var(--accent2)'}}>
                <div style={{...head,fontSize:10,letterSpacing:2,color:'var(--accent)',marginBottom:6}}>{t}</div>
                <div style={{...mono,fontSize:10,color:'var(--text2)',lineHeight:1.6}}>{d}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── IDS Monitor Page ──────────────────────────────────────
function SecurityIDS() {
  const SEV_COLOR = {
    CRITICAL: 'var(--danger)',
    HIGH:     '#ff7020',
    MEDIUM:   'var(--warn)',
    LOW:      'var(--accent)',
    INFO:     'var(--muted)',
  };
  const SEV_RGB = { CRITICAL:'255,59,92', HIGH:'255,112,32', MEDIUM:'255,184,0', LOW:'0,200,255', INFO:'74,112,144' };

  const [engines, setEngines] = useState({
    'zeek-ids':  { label:'Zeek (Control Plane)',  running:false, status:'unknown', startedAt:null },
    'scapy-ids': { label:'Scapy (Data Plane)',    running:false, status:'unknown', startedAt:null },
  });
  const [totals,   setTotals]   = useState({ zeekAlerts:0, scapyAlerts:0, totalAlerts:0 });
  const [alerts,   setAlerts]   = useState([]);
  const [stats,    setStats]    = useState({ total:0, bySeverity:{}, byType:{} });
  const [sevFilter, setSevFilter] = useState('ALL');
  const [actionMsg, setActionMsg] = useState('');
  const [busy,     setBusy]     = useState(false);
  const [clearing, setClearing] = useState(false);

  const head = { fontFamily:'var(--font-head)', letterSpacing:2 };
  const mono = { fontFamily:'var(--font-mono)' };

  const fetchStatus = async () => {
    const d = await apiFetch('/ids/status');
    if (d) { setEngines(d.engines || {}); setTotals({ zeekAlerts:d.zeekAlerts||0, scapyAlerts:d.scapyAlerts||0, totalAlerts:d.totalAlerts||0 }); }
  };
  const fetchAlerts = async () => {
    const qs = sevFilter !== 'ALL' ? `?severity=${sevFilter}` : '';
    const d = await apiFetch(`/ids/alerts${qs}`);
    if (d) setAlerts(d);
  };
  const fetchStats = async () => {
    const d = await apiFetch('/ids/stats');
    if (d) setStats(d);
  };

  useEffect(() => {
    fetchStatus(); fetchAlerts(); fetchStats();
    const t = setInterval(() => { fetchStatus(); fetchAlerts(); fetchStats(); }, 5000);
    return () => clearInterval(t);
  }, [sevFilter]);

  const startIDS = async () => {
    setBusy(true); setActionMsg('Starting IDS engines...');
    await apiFetch('/ids/start', { method:'POST', headers:{'Content-Type':'application/json'}, body:'{}' });
    setTimeout(() => { setBusy(false); setActionMsg(''); fetchStatus(); }, 2500);
  };
  const stopIDS = async () => {
    setBusy(true); setActionMsg('Stopping IDS engines...');
    await apiFetch('/ids/stop', { method:'POST', headers:{'Content-Type':'application/json'}, body:'{}' });
    setTimeout(() => { setBusy(false); setActionMsg(''); fetchStatus(); }, 2500);
  };
  const clearAlerts = async () => {
    setClearing(true);
    await apiFetch('/ids/alerts', { method:'DELETE' });
    setAlerts([]); setStats({ total:0, bySeverity:{}, byType:{} });
    setTimeout(() => setClearing(false), 600);
  };

  const allRunning = Object.values(engines).length > 0 && Object.values(engines).every(e => e.running);
  const anyRunning = Object.values(engines).some(e => e.running);
  const maxTypeCnt = Math.max(1, ...Object.values(stats.byType || {}));

  return (
    <div style={{padding:'16px 24px',display:'flex',flexDirection:'column',gap:14,height:'100%',overflowY:'auto'}}>

      {/* ── Engine status cards ─────────────────────────── */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
        {Object.entries(engines).map(([id, eng]) => {
          const isZeek = id === 'zeek-ids';
          const color  = eng.running ? 'var(--success)' : 'var(--danger)';
          return (
            <div key={id} style={{padding:'14px 16px',background:'var(--panel)',border:`1px solid ${eng.running?'rgba(0,230,118,.3)':'var(--border)'}`,borderRadius:8,display:'flex',flexDirection:'column',gap:8,boxShadow:eng.running?'0 0 14px rgba(0,230,118,.1)':'none'}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <span style={{...head,fontSize:11,color:'var(--accent)'}}>
                  {isZeek ? 'ZEEK IDS' : 'SCAPY IDS'}
                </span>
                <span style={{...mono,fontSize:10,color,fontWeight:700}}>
                  {eng.running ? '● ACTIVE' : '○ STOPPED'}
                </span>
              </div>
              <div style={{...mono,fontSize:11,color:'var(--text2)'}}>{eng.label}</div>
              <div style={{display:'flex',alignItems:'center',gap:8,marginTop:2}}>
                <span style={{fontSize:9,color:'var(--muted)',...mono,textTransform:'uppercase'}}>
                  {isZeek ? 'SBI / N2' : 'N3 / N4'}
                </span>
                <span style={{fontSize:9,color:'var(--text3)',...mono}}>
                  {eng.status || '—'}
                </span>
              </div>
              {eng.startedAt && eng.running && (
                <div style={{...mono,fontSize:9,color:'var(--muted)'}}>
                  up since {new Date(eng.startedAt).toLocaleTimeString()}
                </div>
              )}
            </div>
          );
        })}

        {/* Stats card */}
        <div style={{padding:'14px 16px',background:'var(--panel)',border:'1px solid var(--border)',borderRadius:8,display:'flex',flexDirection:'column',gap:6}}>
          <div style={{...head,fontSize:10,color:'var(--accent)',marginBottom:2}}>ALERT COUNTS</div>
          {['CRITICAL','HIGH','MEDIUM','LOW','INFO'].map(s => (
            <div key={s} style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{...mono,fontSize:9,color:SEV_COLOR[s],minWidth:58}}>{s}</span>
              <div style={{flex:1,height:3,background:'var(--bg3)',borderRadius:2,overflow:'hidden'}}>
                <div style={{width:`${((stats.bySeverity[s]||0)/Math.max(1,stats.total))*100}%`,height:'100%',background:SEV_COLOR[s],borderRadius:2,transition:'width .4s'}}/>
              </div>
              <span style={{...mono,fontSize:10,color:'var(--text2)',minWidth:24,textAlign:'right',fontWeight:700}}>{stats.bySeverity[s]||0}</span>
            </div>
          ))}
          <div style={{...mono,fontSize:10,color:'var(--muted)',marginTop:4,borderTop:'1px solid var(--border)',paddingTop:4}}>
            Total: {stats.total} &nbsp;·&nbsp; Zeek: {totals.zeekAlerts} &nbsp;·&nbsp; Scapy: {totals.scapyAlerts}
          </div>
        </div>
      </div>

      {/* ── Controls row ───────────────────────────────────── */}
      <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
        <button onClick={startIDS} disabled={busy||allRunning}
          style={{padding:'7px 18px',background:allRunning?'var(--bg3)':'rgba(0,230,118,.1)',border:`1px solid ${allRunning?'var(--border)':'var(--success)'}`,borderRadius:6,color:allRunning?'var(--muted)':'var(--success)',cursor:busy||allRunning?'not-allowed':'pointer',...mono,fontSize:12,fontWeight:700,letterSpacing:1}}>
          ▶ Start IDS
        </button>
        <button onClick={stopIDS} disabled={busy||!anyRunning}
          style={{padding:'7px 18px',background:!anyRunning?'var(--bg3)':'rgba(255,59,92,.1)',border:`1px solid ${!anyRunning?'var(--border)':'var(--danger)'}`,borderRadius:6,color:!anyRunning?'var(--muted)':'var(--danger)',cursor:busy||!anyRunning?'not-allowed':'pointer',...mono,fontSize:12,fontWeight:700,letterSpacing:1}}>
          ■ Stop IDS
        </button>
        {actionMsg && <span style={{...mono,fontSize:11,color:'var(--accent)',marginLeft:4}}>{actionMsg}</span>}
        <div style={{flex:1}}/>
        <button onClick={clearAlerts} disabled={clearing||stats.total===0}
          style={{padding:'6px 14px',background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:6,color:stats.total===0?'var(--text3)':'var(--muted)',cursor:'pointer',...mono,fontSize:11}}>
          {clearing ? 'Clearing…' : 'Clear Alerts'}
        </button>
      </div>

      {/* ── Severity filter tabs ────────────────────────────── */}
      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
        {['ALL','CRITICAL','HIGH','MEDIUM','LOW','INFO'].map(s => {
          const active = sevFilter === s;
          const col    = SEV_COLOR[s] || 'var(--accent)';
          const rgb    = SEV_RGB[s]   || '0,200,255';
          return (
            <button key={s} onClick={() => setSevFilter(s)}
              style={{padding:'4px 13px',borderRadius:4,border:`1px solid ${active?col:'var(--border)'}`,background:active?`rgba(${rgb},.12)`:'transparent',color:active?col:'var(--muted)',cursor:'pointer',...mono,fontSize:11,fontWeight:active?700:400,transition:'all .15s'}}>
              {s}
              {s !== 'ALL' && (stats.bySeverity[s]||0) > 0 &&
                <span style={{marginLeft:5,background:`rgba(${rgb},.2)`,padding:'1px 5px',borderRadius:3}}>{stats.bySeverity[s]}</span>}
            </button>
          );
        })}
      </div>

      {/* ── Alert feed ─────────────────────────────────────── */}
      <div style={{flex:1,display:'flex',flexDirection:'column',gap:6,overflowY:'auto',minHeight:200}}>
        {alerts.length === 0 ? (
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',flex:1,gap:10,opacity:.4,padding:'40px 0'}}>
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" strokeWidth="1"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg>
            <div style={{...mono,fontSize:12,color:'var(--muted)'}}>{!anyRunning ? 'Start IDS engines to begin monitoring' : 'No alerts detected'}</div>
          </div>
        ) : alerts.map((a, i) => {
          const col = SEV_COLOR[a.severity] || 'var(--muted)';
          const rgb = SEV_RGB[a.severity]   || '74,112,144';
          return (
            <div key={a.id||i} style={{padding:'10px 14px',background:'var(--panel)',border:`1px solid rgba(${rgb},.2)`,borderLeft:`3px solid ${col}`,borderRadius:6,display:'flex',gap:12,alignItems:'flex-start'}}>
              {/* Severity badge */}
              <div style={{minWidth:64,paddingTop:2}}>
                <span style={{...mono,fontSize:9,background:`rgba(${rgb},.15)`,color:col,padding:'3px 7px',borderRadius:3,fontWeight:700,display:'block',textAlign:'center',letterSpacing:1}}>
                  {a.severity}
                </span>
              </div>
              {/* Content */}
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap',marginBottom:4}}>
                  <span style={{...mono,fontSize:10,background:'var(--bg3)',color:a.engine==='zeek'?'var(--accent)':'var(--accent3)',padding:'1px 7px',borderRadius:3,letterSpacing:.5}}>
                    {(a.engine||'').toUpperCase()}
                  </span>
                  <span style={{...head,fontSize:10,color:'var(--text2)',letterSpacing:1}}>{a.type}</span>
                  <span style={{...mono,fontSize:10,color:'var(--text3)',marginLeft:'auto'}}>{(a.timestamp||'').slice(11,19)} UTC</span>
                </div>
                <div style={{...mono,fontSize:11,color:'var(--text)',lineHeight:1.6}}>{a.message}</div>
                {a.source && a.source !== 'unknown' && (
                  <div style={{...mono,fontSize:10,color:'var(--text3)',marginTop:3}}>src: {a.source}</div>
                )}
                {a.details && Object.keys(a.details).filter(k => a.details[k] != null && a.details[k] !== '' && a.details[k] !== 0).length > 0 && (
                  <div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:5}}>
                    {Object.entries(a.details).filter(([,v]) => v != null && v !== '' && v !== 0).map(([k,v]) => (
                      <span key={k} style={{...mono,fontSize:9,background:'var(--bg3)',color:'var(--muted)',padding:'2px 7px',borderRadius:3}}>
                        {k}: {typeof v === 'object' ? JSON.stringify(v).slice(0,50) : String(v).slice(0,50)}
                      </span>
                    ))}
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>

      {/* ── Top alert types bar chart ──────────────────────── */}
      {Object.keys(stats.byType||{}).length > 0 && (
        <div style={{padding:'12px 16px',background:'var(--panel)',border:'1px solid var(--border)',borderRadius:8}}>
          <div style={{...head,fontSize:9,color:'var(--muted)',marginBottom:10}}>TOP ALERT TYPES</div>
          <div style={{display:'flex',flexDirection:'column',gap:5}}>
            {Object.entries(stats.byType||{}).sort(([,a],[,b])=>b-a).slice(0,6).map(([type,cnt]) => (
              <div key={type} style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{...mono,fontSize:10,color:'var(--text2)',minWidth:160,flexShrink:0}}>{type}</span>
                <div style={{flex:1,height:4,background:'var(--bg3)',borderRadius:2,overflow:'hidden'}}>
                  <div style={{width:`${(cnt/maxTypeCnt)*100}%`,height:'100%',background:'var(--accent2)',borderRadius:2,transition:'width .4s'}}/>
                </div>
                <span style={{...mono,fontSize:10,color:'var(--accent)',minWidth:24,textAlign:'right'}}>{cnt}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── Coverage info panel ────────────────────────────── */}
      <div style={{padding:'12px 16px',background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:8}}>
        <div style={{...head,fontSize:9,color:'var(--muted)',marginBottom:8}}>IDS COVERAGE</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          {[
            ['ZEEK — Control Plane (SBI / N2)',
             'SBI auth failures (HTTP 4xx bursts) · NRF registration floods · NF 5xx error spikes · N2 NGAP connection floods'],
            ['SCAPY — Data Plane (N3 / N4)',
             'GTP-U packet rate flood · High-volume GTP tunnel (>100 MB) · Inner-GTP port scan detection · PFCP session establishment floods'],
          ].map(([t,d]) => (
            <div key={t} style={{padding:10,background:'var(--bg3)',borderRadius:6,borderLeft:'2px solid var(--accent2)'}}>
              <div style={{...head,fontSize:9,color:'var(--accent)',marginBottom:4}}>{t}</div>
              <div style={{...mono,fontSize:10,color:'var(--text3)',lineHeight:1.6}}>{d}</div>
            </div>
          ))}
        </div>
        <div style={{...mono,fontSize:10,color:'var(--text3)',marginTop:10}}>
          Both engines run with <code style={{color:'var(--accent2)'}}>network_mode: host</code> to see all Docker bridge traffic.
          Start with <code style={{color:'var(--accent2)'}}>make ids-up</code> or the button above.
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// NEF PAGE — Free5GC Network Exposure Function
// Northbound API: event exposure, PFD mgmt, traffic influence
// ═══════════════════════════════════════════════════════════
function NEFPage() {
  const [status,    setStatus]    = useState({ running: false, reachable: false, container:'stopped' });
  const [tab,       setTab]       = useState('events');
  const [busy,      setBusy]      = useState(false);
  const [actionMsg, setActionMsg] = useState('');

  // Event Exposure
  const [evSubs,    setEvSubs]    = useState([]);
  const [evLoading, setEvLoading] = useState(false);
  const [newEvForm, setNewEvForm] = useState({ supi:'001010000000001', event:'CONNECTIVITY_STATE', notifUri:'http://10.45.0.100:5000/nef/callback' });

  // PFD Management
  const [pfdApps,   setPfdApps]   = useState([]);
  const [pfdLoading,setPfdLoading]= useState(false);
  const [newPfdForm,setNewPfdForm]= useState({ appId:'app-001', flowDesc:'permit out ip from any to assigned' });

  // Traffic Influence
  const [tiSubs,    setTiSubs]    = useState([]);
  const [tiLoading, setTiLoading] = useState(false);
  const [newTiForm, setNewTiForm] = useState({ supi:'001010000000001', dnn:'internet', sst:'1', dnai:'dnai-1', routeToLoc:'10.45.0.200' });

  // API Explorer
  const [apiPath,   setApiPath]   = useState('/nnef-eventexposure/v1/subscriptions');
  const [apiMethod, setApiMethod] = useState('GET');
  const [apiBody,   setApiBody]   = useState('');
  const [apiResp,   setApiResp]   = useState(null);
  const [apiLoading,setApiLoading]= useState(false);

  const NEF_TEMPLATES = [
    { label:'List Event Subscriptions',   method:'GET',    path:'/nnef-eventexposure/v1/subscriptions', body:'' },
    { label:'List PFD Applications',      method:'GET',    path:'/nnef-pfdmanagement/v1/applications',  body:'' },
    { label:'List Traffic Influence Subs',method:'GET',    path:'/nnef-trafficinfluence/v1/subscriptions', body:'' },
    { label:'Create Event Subscription',  method:'POST',   path:'/nnef-eventexposure/v1/subscriptions',
      body: JSON.stringify({ supi:'imsi-001010000000001', anyUeInd:false, eventsSubs:[{ event:'CONNECTIVITY_STATE' }],
        eventsNotification:{ notifId:'notif-001', notifEvents:[] }, notificationUri:'http://10.45.0.100:5000/nef/callback',
        supportedFeatures:'0' }, null, 2) },
    { label:'Create PFD Rule',            method:'PUT',    path:'/nnef-pfdmanagement/v1/applications/app-001',
      body: JSON.stringify({ externalAppId:'app-001', pfds:[{ pfdId:'pfd-1', flowDescriptions:['permit out ip from any to assigned'] }] }, null, 2) },
    { label:'Create Traffic Influence',   method:'POST',   path:'/nnef-trafficinfluence/v1/subscriptions',
      body: JSON.stringify({ afServiceId:'af-svc-01', supi:'imsi-001010000000001', dnn:'internet',
        snssai:{ sst:1 }, notificationDestination:'http://10.45.0.100:5000/nef/callback',
        trafficFilters:[{ flowId:1, flowDescriptions:['permit out ip from any to assigned'] }] }, null, 2) },
  ];

  const SEV_COLOR = { running:'#00c896', stopped:'#ef4444', starting:'#f59e0b' };

  const loadStatus = async () => {
    const d = await apiFetch('/nef/status');
    if (d) setStatus(d);
  };

  const loadTab = async (t) => {
    if (!status.reachable) return;
    if (t === 'events') {
      setEvLoading(true);
      const d = await apiFetch('/nef-api/nnef-eventexposure/v1/subscriptions');
      setEvSubs(Array.isArray(d) ? d : (d && typeof d === 'object' ? Object.values(d) : []));
      setEvLoading(false);
    } else if (t === 'pfd') {
      setPfdLoading(true);
      const d = await apiFetch('/nef-api/nnef-pfdmanagement/v1/applications');
      setPfdApps(Array.isArray(d) ? d : (d && typeof d === 'object' ? Object.values(d) : []));
      setPfdLoading(false);
    } else if (t === 'traffic') {
      setTiLoading(true);
      const d = await apiFetch('/nef-api/nnef-trafficinfluence/v1/subscriptions');
      setTiSubs(Array.isArray(d) ? d : (d && typeof d === 'object' ? Object.values(d) : []));
      setTiLoading(false);
    }
  };

  useEffect(() => {
    loadStatus();
    const t = setInterval(loadStatus, 5000);
    return () => clearInterval(t);
  }, []);

  useEffect(() => { loadTab(tab); }, [tab, status.reachable]);

  const startNEF = async () => {
    setBusy(true); setActionMsg('Starting NEF...');
    const r = await apiFetch('/nf/nef/start', { method:'POST' });
    setActionMsg(r ? 'NEF started — waiting for NRF registration...' : 'Failed to start NEF');
    setTimeout(() => { loadStatus(); setActionMsg(''); setBusy(false); }, 3000);
  };

  const stopNEF = async () => {
    setBusy(true); setActionMsg('Stopping NEF...');
    const r = await apiFetch('/nf/nef/stop', { method:'POST' });
    setActionMsg(r ? 'NEF stopped.' : 'Failed to stop NEF');
    setTimeout(() => { loadStatus(); setActionMsg(''); setBusy(false); }, 2000);
  };

  const createEvSub = async () => {
    const body = {
      supi: `imsi-${newEvForm.supi}`, anyUeInd: false,
      eventsSubs: [{ event: newEvForm.event }],
      eventsNotification: { notifId: `notif-${Date.now()}`, notifEvents: [] },
      notificationUri: newEvForm.notifUri, supportedFeatures: '0',
    };
    setEvLoading(true);
    await apiFetch('/nef-api/nnef-eventexposure/v1/subscriptions', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    loadTab('events');
  };

  const deleteEvSub = async (id) => {
    await apiFetch(`/nef-api/nnef-eventexposure/v1/subscriptions/${id}`, { method:'DELETE' });
    loadTab('events');
  };

  const createPfd = async () => {
    const body = { externalAppId: newPfdForm.appId, pfds: [{ pfdId:`pfd-${Date.now()}`, flowDescriptions:[newPfdForm.flowDesc] }] };
    setPfdLoading(true);
    await apiFetch(`/nef-api/nnef-pfdmanagement/v1/applications/${newPfdForm.appId}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    loadTab('pfd');
  };

  const deletePfd = async (appId) => {
    await apiFetch(`/nef-api/nnef-pfdmanagement/v1/applications/${appId}`, { method:'DELETE' });
    loadTab('pfd');
  };

  const createTiSub = async () => {
    const body = {
      afServiceId: `af-${Date.now()}`, supi: `imsi-${newTiForm.supi}`,
      dnn: newTiForm.dnn, snssai: { sst: parseInt(newTiForm.sst) },
      notificationDestination: `http://10.45.0.100:5000/nef/callback`,
      trafficFilters: [{ flowId:1, flowDescriptions:['permit out ip from any to assigned'] }],
      trafficRoutes: [{ dnai: newTiForm.dnai, routeToLocation: { transTunelServerEndPointList: [newTiForm.routeToLoc] } }],
    };
    setTiLoading(true);
    await apiFetch('/nef-api/nnef-trafficinfluence/v1/subscriptions', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    loadTab('traffic');
  };

  const deleteTiSub = async (id) => {
    await apiFetch(`/nef-api/nnef-trafficinfluence/v1/subscriptions/${id}`, { method:'DELETE' });
    loadTab('traffic');
  };

  const sendApiExplorer = async () => {
    setApiLoading(true); setApiResp(null);
    const opts = { method: apiMethod, headers:{'Content-Type':'application/json','Accept':'application/json'} };
    if (['POST','PUT','PATCH'].includes(apiMethod) && apiBody.trim()) opts.body = apiBody;
    const r = await apiFetch(`/nef-api${apiPath}`, opts);
    setApiResp(r);
    setApiLoading(false);
  };

  const C  = { bg:'#0d1117', card:'#161b22', border:'#30363d', text:'#e6edf3', muted:'#8b949e', accent:'#00c896' };
  const tabStyle = (t) => ({ padding:'6px 16px', borderRadius:4, cursor:'pointer', fontSize:12, fontWeight:600,
    background: tab===t ? C.accent : 'transparent', color: tab===t ? '#000' : C.muted, border:'none',
    transition:'all .15s', marginRight:4 });
  const inputSt = { background:'#0d1117', border:`1px solid ${C.border}`, borderRadius:4, color:C.text, padding:'6px 10px', fontSize:12, width:'100%', boxSizing:'border-box' };
  const btnPrimary = (disabled) => ({ padding:'6px 16px', background: disabled ? '#333' : C.accent, color: disabled ? C.muted : '#000',
    border:'none', borderRadius:4, cursor: disabled ? 'not-allowed' : 'pointer', fontSize:12, fontWeight:700 });
  const btnDanger = { padding:'4px 10px', background:'transparent', color:'#ef4444', border:'1px solid #ef4444', borderRadius:3, cursor:'pointer', fontSize:11 };

  const statusColor = status.running ? (status.reachable ? C.accent : '#f59e0b') : '#ef4444';
  const statusLabel = status.running ? (status.reachable ? 'Running & Registered' : 'Starting…') : 'Stopped';

  return (
    <div style={{color:C.text, fontSize:13}}>

              <div style={{fontSize:11, color:C.muted, marginBottom:4}}>Request Body (JSON)</div>
