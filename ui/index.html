                        </td>
                        <td style={{padding:'8px 12px'}}>
                          <div style={{display:'flex', gap:5, flexWrap:'nowrap'}}>
                            {!ue.registered
                              ? <button onClick={()=>register(ue.imsi)} disabled={!!busy[ue.imsi]} style={btnTiny('#00c896',!!busy[ue.imsi])}>
                                  {busy[ue.imsi]==='reg'?'…':'▶ Register'}
                                </button>
                              : <button onClick={()=>deregister(ue.imsi)} disabled={!!busy[ue.imsi]} style={btnTiny('#f59e0b',!!busy[ue.imsi])}>
                                  {busy[ue.imsi]==='dereg'?'…':'✕ Deregister'}
                                </button>
                            }
                            <button
                              onClick={()=>{if(!ue.registered){setEditUe(ue);setForm({key:ue.key,opc:ue.opc,dnn:ue.dnn,sst:ue.sst,sd:ue.sd,ambrDl:ue.ambrDl,ambrUl:ue.ambrUl});}}}
                              disabled={ue.registered || !!busy[ue.imsi]}
                              title={ue.registered?'Deregister from core first to edit':'Edit UE config'}
                              style={btnTiny('#60a5fa', ue.registered || !!busy[ue.imsi])}>Edit</button>
                            <button
                              onClick={()=>{if(!ue.registered)deleteUe(ue.imsi);}}
                              disabled={ue.registered || busy[ue.imsi]==='del'}
                              title={ue.registered?'Deregister from core first to delete':'Remove UE'}
                              style={btnTiny('#ef4444', ue.registered || !!busy[ue.imsi])}>Del</button>
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>

          {/* DNN & Slice defaults info */}
          <div style={{background:'#0d1c18', border:`1px solid ${C.accent}22`, borderRadius:6, padding:14}}>
            <div style={{fontSize:11, color:C.accent, fontWeight:700, marginBottom:10}}>Default DNN & Slice Configuration (auto-filled on Add)</div>
            <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(190px,1fr))', gap:8}}>
              {[['DNN','internet','Default APN — internet routing'],
                ['SST','1 — eMBB','Enhanced Mobile Broadband slice'],
                ['SD','000000','Slice Differentiator (hexadecimal)'],
                ['K / OPc','Test defaults','Change these for non-test environments'],
                ['AMBR ↓/↑','1024/1024 Mbps','Max aggregate bitrate per UE'],
                ['5QI','9 (Non-GBR)','Best-effort internet quality class'],
              ].map(([k,v,d])=>(
                <div key={k} style={{background:C.bg, border:`1px solid ${C.border}`, borderRadius:4, padding:'8px 10px'}}>
                  <div style={{fontSize:10, color:C.muted, marginBottom:2}}>{k}</div>
                  <div style={{fontSize:12, fontWeight:700, color:C.text}}>{v}</div>
                  <div style={{fontSize:10, color:'#555', marginTop:3}}>{d}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ─────────────── OPERATIONS TAB ─────────────── */}
      {tab==='ops' && (
        <div>
          {ues.length === 0 ? (
            <div style={{background:C.card, border:`1px solid ${C.border}`, borderRadius:6, padding:40, textAlign:'center', color:C.muted}}>
              No UEs configured yet.<br/>
              <span style={{fontSize:11}}>Go to the <strong style={{color:C.text}}>Config</strong> tab → <strong style={{color:'#60a5fa'}}>+ Add UE</strong> → Register → then Provision here.</span>
            </div>
          ) : (<>
            {/* Unprovisioned UEs — quick provision row */}
            {inventory.filter(u => !u.provisioned).length > 0 && (
              <div style={{background:'#1c1428', border:'1px solid #a78bfa33', borderRadius:6, padding:'10px 14px', marginBottom:14}}>
                <div style={{fontSize:11, color:'#a78bfa', fontWeight:700, marginBottom:8}}>
                  📦 Unprovisioned UEs — no UERANSIM container yet
                </div>
                {inventory.filter(u => !u.provisioned).map(inv => (
                  <div key={inv.imsi} style={{display:'flex', alignItems:'center', gap:10, marginBottom:6, flexWrap:'wrap'}}>
                    <span style={{fontFamily:'monospace', fontSize:12, color:'#e6edf3', fontWeight:600}}>{inv.imsi}</span>
                    {inv.label && <span style={{fontSize:10, color:'#a78bfa', background:'#a78bfa15', border:'1px solid #a78bfa33', padding:'1px 6px', borderRadius:3}}>{inv.label}</span>}
                    <span style={{fontSize:11, color:C.muted}}>{inv.inMongo ? '✓ in MongoDB' : '⚠ not in MongoDB'}</span>
                    <button
                      onClick={() => provision(inv.imsi)}
                      disabled={!!provBusy[inv.imsi] || !inv.key}
                      style={{padding:'5px 14px', background:inv.key?'#a78bfa':'#333', color:inv.key?'#fff':C.muted,
                        border:'none', borderRadius:4, cursor:inv.key?'pointer':'not-allowed', fontSize:11, fontWeight:700}}>
                      {provBusy[inv.imsi] ? '⏳ Provisioning…' : '⚡ Provision Container'}
                    </button>
                    {!inv.key && <span style={{fontSize:10, color:'#ef4444'}}>Add credentials in Config tab first</span>}
                  </div>
                ))}
              </div>
            )}

            {/* Ping target bar */}
            <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:14, background:C.card, border:`1px solid ${C.border}`, borderRadius:6, padding:'10px 14px'}}>
              <span style={{fontSize:12, color:C.muted, fontWeight:600, whiteSpace:'nowrap'}}>🏓 Ping target:</span>
              <input style={{...inputSt, width:170}} value={pingTarget} onChange={e=>setPingTarget(e.target.value)} placeholder="8.8.8.8"/>
              <span style={{fontSize:11, color:C.muted}}>Used by all UE ping tests below</span>
              <button onClick={loadInventory} style={{marginLeft:'auto', padding:'5px 12px', background:'transparent',
                border:`1px solid ${C.border}`, borderRadius:4, color:C.muted, cursor:'pointer', fontSize:11}}>↻ Refresh</button>
            </div>

            {inventory.filter(u => u.provisioned).map(inv => {
              const ue   = { ...inv, ...(ueStatus[inv.imsi] || {}) };
              const st   = ueStatus[ue.imsi]  || {};
              const ss   = sessions[ue.imsi]  || {};
              const ns   = nasStatus[ue.imsi] || {};
              const pr   = pingResult[ue.imsi];
              const open = expanded===ue.imsi;
              const cn        = ue.containerName || st.containerName || null;
              const hasCont   = !!cn;
              const isDynamic = ue.dynamic;
              const pduList   = ss.sessions || [];
              const pduF      = pduForm[showPduForm[ue.imsi] ? ue.imsi : ''] || {};
              const nasP      = ns.parsed || {};
              const cRunning  = ue.containerRunning || st.containerRunning;
              const stColor   = (ue.tunIp||st.hasPduSession) ? C.accent : cRunning ? '#f59e0b' : '#ef4444';
              const nasColor  = nasP.cmState?.includes('CONNECTED') ? C.accent
                              : nasP.mmState?.includes('REGISTERED') ? '#f59e0b' : C.muted;

              return (
                <div key={ue.imsi} style={{background:C.card, border:`1px solid ${C.border}`, borderRadius:6, marginBottom:14, overflow:'hidden'}}>

                  {/* ── Header row (always visible) ── */}
                  <div style={{display:'flex', alignItems:'center', gap:10, padding:'11px 16px', cursor:'pointer', flexWrap:'wrap'}}
                    onClick={()=>setExpanded(open?null:ue.imsi)}>
                    <span style={{width:10,height:10,borderRadius:'50%',flexShrink:0,background:stColor,boxShadow:`0 0 6px ${stColor}`}}/>
                    <span style={{fontFamily:'monospace',fontWeight:700,color:C.accent,fontSize:14,flex:'0 0 auto'}}>{ue.imsi}</span>
                    {/* Label */}
                    {ue.label && <span style={{fontSize:10,background:'#a78bfa15',color:'#a78bfa',border:'1px solid #a78bfa33',padding:'2px 6px',borderRadius:3,fontWeight:700,flexShrink:0}}>{ue.label}</span>}
                    {/* Core badge */}
                    {ue.inMongo && <span style={{fontSize:10,background:'#00c89615',color:'#00c896',border:'1px solid #00c89633',padding:'2px 7px',borderRadius:3,fontWeight:700,flexShrink:0}}>✓ Core</span>}
                    {/* Container state */}
                    {hasCont && <span style={{fontSize:10,background:cRunning?'#60a5fa15':'#ef444415',
                      color:cRunning?'#60a5fa':'#ef4444',
                      border:`1px solid ${cRunning?'#60a5fa33':'#ef444433'}`,
                      padding:'2px 7px',borderRadius:3,fontWeight:700,flexShrink:0}}>
                      {cn?.replace('ueransim-','')} · {ue.containerState||st.containerState}
                    </span>}
                    {/* NAS state */}
                    {nasP.cmState && <span style={{fontSize:10,color:nasColor,fontFamily:'monospace',flexShrink:0}}>{nasP.cmState}</span>}
                    {/* PDU sessions count */}
                    {pduList.length > 0
                      ? <span style={{fontSize:10,color:C.accent,fontFamily:'monospace',flexShrink:0}}>
                          ⇆ {pduList.length} PDU {pduList.length===1?'session':'sessions'}
                          {pduList[0]?.ip && ` · ${pduList[0].ip}`}
                        </span>
                      : <span style={{fontSize:10,color:'#f59e0b',flexShrink:0}}>○ No PDU session</span>
                    }
                    {/* Deprovision button for dynamic UEs (stop propagation so it doesn't toggle expand) */}
                    {isDynamic && cn && (
                      <button onClick={e=>{e.stopPropagation();deprovision(cn,ue.imsi);}}
                        style={{marginLeft:'auto',padding:'3px 10px',background:'#ef444415',color:'#ef4444',
                          border:'1px solid #ef444433',borderRadius:3,cursor:'pointer',fontSize:10,fontWeight:700,flexShrink:0}}>
                        ✕ Deprovision
                      </button>
                    )}
                    <span style={{marginLeft:isDynamic&&cn?'8px':'auto',fontSize:11,color:C.muted,flexShrink:0}}>{open?'▲':'▼'}</span>
                  </div>

                  {/* ── Expanded panel ── */}
                  {open && (
                    <div style={{borderTop:`1px solid ${C.border}`, padding:'16px'}}>

                      {/* ── Row 1: UE info + NAS status (2 col) ── */}
                      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:14, marginBottom:14}}>

                        {/* UE details */}
                        <div style={{background:C.bg, border:`1px solid ${C.border}`, borderRadius:5, padding:'12px 14px'}}>
                          <div style={{fontSize:10,color:C.muted,fontWeight:700,textTransform:'uppercase',letterSpacing:1,marginBottom:8}}>UE Details</div>
                          {[
                            ['IMSI',        ue.imsi,          true],
                            ['DNN',         ue.dnn,           false],
                            ['S-NSSAI',     `SST:${ue.sst} SD:${ue.sd}`, false],
                            ['AMBR',        `↓${ue.ambrDl} / ↑${ue.ambrUl} Mbps`, false],
                            ['Container',   st.containerName||'—',  true],
                            ['Registered',  ue.registeredAt ? new Date(ue.registeredAt).toLocaleString() : '—', false],
                            ['MongoDB',     st.inMongo ? '✓ Present' : '✗ Not found', false],
                          ].map(([k,v,mono])=>(
                            <div key={k} style={{display:'flex',gap:8,padding:'3px 0',borderBottom:`1px solid ${C.border}22`}}>
                              <span style={{fontSize:11,color:C.muted,width:90,flexShrink:0}}>{k}</span>
                              <span style={{fontSize:11,color:mono?C.accent:C.text,fontFamily:mono?'monospace':'inherit',wordBreak:'break-all'}}>{v}</span>
                            </div>
                          ))}
                        </div>

                        {/* NAS status */}
                        <div style={{background:C.bg, border:`1px solid ${C.border}`, borderRadius:5, padding:'12px 14px'}}>
                          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                            <div style={{fontSize:10,color:C.muted,fontWeight:700,textTransform:'uppercase',letterSpacing:1}}>NAS / CM State</div>
                            <button onClick={()=>loadNasStatus(ue.imsi)} style={btnTiny('#60a5fa')}>↺</button>
                          </div>
                          {ns.output ? (<>
                            {[
                              ['CM State',  nasP.cmState  || '—'],
                              ['5GMM State',nasP.mmState  || '—'],
                              ['RM State',  nasP.rmState  || '—'],
                            ].map(([k,v])=>(
                              <div key={k} style={{display:'flex',gap:8,padding:'3px 0',borderBottom:`1px solid ${C.border}22`}}>
                                <span style={{fontSize:11,color:C.muted,width:90,flexShrink:0}}>{k}</span>
                                <span style={{fontSize:11,color:
                                  v.includes('CONNECTED')||v.includes('REGISTERED') ? C.accent
                                  : v.includes('IDLE') ? '#f59e0b' : C.text,fontFamily:'monospace'}}>{v}</span>
                              </div>
                            ))}
                            {ns.output && (
                              <details style={{marginTop:8}}>
                                <summary style={{fontSize:10,color:C.muted,cursor:'pointer'}}>Raw nr-cli output</summary>
                                <pre style={{background:'#0d1117',borderRadius:4,padding:8,fontSize:10,color:C.muted,marginTop:4,overflow:'auto',maxHeight:100}}>{ns.output}</pre>
                              </details>
                            )}
                          </>) : (
                            <div style={{fontSize:11,color:C.muted,padding:'8px 0'}}>
                              {ns.error ? `⚠ ${ns.error}` : 'Click ↺ to fetch NAS state from nr-cli'}
                            </div>
                          )}
                        </div>
                      </div>

                      {/* ── Row 2: PDU Sessions ── */}
                      <div style={{background:C.bg, border:`1px solid ${C.border}`, borderRadius:5, padding:'12px 14px', marginBottom:14}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                          <div style={{fontSize:10,color:C.muted,fontWeight:700,textTransform:'uppercase',letterSpacing:1}}>
                            PDU Sessions {pduList.length > 0 && <span style={{color:C.accent,marginLeft:4}}>({pduList.length} active)</span>}
                          </div>
                          <div style={{display:'flex',gap:8}}>
                            <button onClick={()=>loadSessions(ue.imsi)} style={btnTiny('#60a5fa')}>↺ Refresh</button>
                            {pduList.length > 0 && (
                              <button onClick={()=>releaseAllSessions(ue.imsi)}
                                disabled={!!busy[`pdu-rel-all-${ue.imsi}`]}
                                style={btnTiny('#ef4444', !!busy[`pdu-rel-all-${ue.imsi}`])}>
                                ✕ Release All
                              </button>
                            )}
                            <button onClick={()=>setShowPduForm(s=>({...s,[ue.imsi]:!s[ue.imsi]}))}
                              style={btnTiny(C.accent)}>
                              {showPduForm[ue.imsi] ? '▲ Cancel' : '＋ Establish'}
                            </button>
                          </div>
                        </div>

                        {/* Establish PDU form */}
                        {showPduForm[ue.imsi] && (
                          <div style={{background:'#161b22',border:`1px solid ${C.border}`,borderRadius:5,padding:'10px 12px',marginBottom:10}}>
                            <div style={{fontSize:10,color:C.muted,marginBottom:8,fontWeight:700}}>NEW PDU SESSION</div>
                            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr auto',gap:8,alignItems:'flex-end'}}>
                              <div>
                                <div style={{fontSize:10,color:C.muted,marginBottom:3}}>DNN</div>
                                <input style={inputSt} placeholder="internet"
                                  value={pduForm[ue.imsi]?.dnn ?? ue.dnn ?? 'internet'}
                                  onChange={e=>setPduForm(f=>({...f,[ue.imsi]:{...f[ue.imsi]??{},dnn:e.target.value}}))}/>
                              </div>
                              <div>
                                <div style={{fontSize:10,color:C.muted,marginBottom:3}}>Type</div>
                                <select style={inputSt}
                                  value={pduForm[ue.imsi]?.type ?? 'IPv4'}
                                  onChange={e=>setPduForm(f=>({...f,[ue.imsi]:{...f[ue.imsi]??{},type:e.target.value}}))}>
                                  <option>IPv4</option>
                                  <option>IPv6</option>
                                  <option>IPv4v6</option>
                                </select>
                              </div>
                              <div>
                                <div style={{fontSize:10,color:C.muted,marginBottom:3}}>SST</div>
                                <select style={inputSt}
                                  value={pduForm[ue.imsi]?.sst ?? ue.sst ?? 1}
                                  onChange={e=>setPduForm(f=>({...f,[ue.imsi]:{...f[ue.imsi]??{},sst:e.target.value}}))}>
                                  <option value="1">1 — eMBB</option>
                                  <option value="2">2 — URLLC</option>
                                  <option value="3">3 — mMTC</option>
                                  <option value="4">4 — V2X</option>
                                </select>
                              </div>
                              <div>
                                <div style={{fontSize:10,color:C.muted,marginBottom:3}}>SD (hex)</div>
                                <input style={inputSt} placeholder="000000"
                                  value={pduForm[ue.imsi]?.sd ?? ue.sd ?? '000000'}
                                  onChange={e=>setPduForm(f=>({...f,[ue.imsi]:{...f[ue.imsi]??{},sd:e.target.value}}))}/>
                              </div>
                              <button onClick={()=>establishSession(ue.imsi)}
                                disabled={!!busy[`pdu-est-${ue.imsi}`]}
                                style={{...btnP(!!busy[`pdu-est-${ue.imsi}`]),padding:'7px 14px',height:34,alignSelf:'flex-end'}}>
                                {busy[`pdu-est-${ue.imsi}`] ? '⏳…' : '▶ Connect'}
                              </button>
                            </div>
                          </div>
                        )}

                        {/* Sessions table */}
                        {pduList.length === 0 ? (
                          <div style={{fontSize:11,color:C.muted,padding:'6px 0'}}>
                            {ss.output
                              ? (ss.output.includes('PDU Session') ? null : 'No active PDU sessions — use ＋ Establish to create one')
                              : 'Click ↺ Refresh to list active PDU sessions'}
                          </div>
                        ) : (
                          <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                            <thead>
                              <tr>{['PSI','State','Type','DNN','IP Address',''].map(h=>(
                                <th key={h} style={{padding:'5px 10px',textAlign:'left',fontSize:9,fontWeight:700,
                                  color:C.muted,letterSpacing:1,textTransform:'uppercase',borderBottom:`1px solid ${C.border}`}}>
                                  {h}
                                </th>
                              ))}</tr>
                            </thead>
                            <tbody>
                              {pduList.map(s=>(
                                <tr key={s.psi} style={{borderBottom:`1px solid ${C.border}22`}}>
                                  <td style={{padding:'6px 10px',fontFamily:'monospace',color:C.accent,fontWeight:700}}>{s.psi}</td>
                                  <td style={{padding:'6px 10px'}}>
                                    <span style={{fontSize:10,background:s.state==='Active'?'#00c89620':'#1c2128',
                                      color:s.state==='Active'?C.accent:C.muted,
                                      border:`1px solid ${s.state==='Active'?'#00c89644':C.border}`,
                                      padding:'2px 7px',borderRadius:3,fontWeight:700}}>{s.state||'—'}</span>
                                  </td>
                                  <td style={{padding:'6px 10px',color:C.text,fontSize:11}}>{s.type||'—'}</td>
                                  <td style={{padding:'6px 10px',color:C.text}}>{s.dnn||'—'}</td>
                                  <td style={{padding:'6px 10px',fontFamily:'monospace',color:C.accent}}>{s.ip||'—'}</td>
                                  <td style={{padding:'6px 10px'}}>
                                    <button onClick={()=>releaseSession(ue.imsi, s.psi)}
                                      disabled={!!busy[`pdu-rel-${ue.imsi}-${s.psi}`]}
                                      style={btnTiny('#ef4444', !!busy[`pdu-rel-${ue.imsi}-${s.psi}`])}>
                                      {busy[`pdu-rel-${ue.imsi}-${s.psi}`] ? '…' : 'Release'}
                                    </button>
                                  </td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        )}

                        {/* Raw output (if no parsed sessions but output exists) */}
                        {ss.output && pduList.length === 0 && (
                          <pre style={{background:'#0d1117',borderRadius:4,padding:'8px',fontSize:10,
                            color:C.muted,marginTop:8,overflow:'auto',maxHeight:120}}>{ss.output}</pre>
                        )}
                      </div>

                      {/* ── Row 3: Operations ── */}
                      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:12}}>

                        {/* Connectivity ops */}
                        <div style={{background:C.bg, border:`1px solid ${C.border}`, borderRadius:5, padding:'12px 14px'}}>

// ── Login Page ────────────────────────────────────────────
function LoginPage({ onLogin, expiredMsg }) {
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError]       = useState('');
  const [loading, setLoading]   = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    setError('');
    setLoading(true);
    try {
      const r = await fetch(API + '/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const data = await r.json();
      if (!r.ok) { setError(data.error || 'Login failed'); setLoading(false); return; }
      localStorage.setItem('token', data.token);
      localStorage.setItem('currentUser', JSON.stringify(data.user));
      onLogin(data.user);
    } catch {
      setError('Cannot reach API. Is the testbed running?');
      setLoading(false);
    }
  };

  return (
    <div className="login-wrap">
      <div className="login-box">
        <div className="login-logo">
          <svg viewBox="0 0 32 32" fill="none">
            <polygon points="16,2 30,10 30,22 16,30 2,22 2,10" stroke="var(--accent)" strokeWidth="1.5" fill="none"/>
            <circle cx="16" cy="16" r="4" fill="var(--accent)" opacity=".8"/>
          </svg>
          <span className="login-logo-text">5G TESTBED</span>
        </div>
        <div className="login-title">Sign in to continue</div>
        {expiredMsg && <div className="login-info">{expiredMsg}</div>}
        {error && <div className="login-error">{error}</div>}
        <form onSubmit={submit}>
          <div className="form-group">
            <label className="form-label">Username</label>
            <input className="form-input" value={username} onChange={e=>setUsername(e.target.value)}
              autoFocus autoComplete="username" required/>
          </div>
          <div className="form-group" style={{marginTop:12}}>
            <label className="form-label">Password</label>
            <input className="form-input" type="password" value={password} onChange={e=>setPassword(e.target.value)}
              autoComplete="current-password" required/>
          </div>
          <button className="btn btn-primary w-full" style={{marginTop:20}} disabled={loading}>
            {loading ? 'Signing in…' : 'Sign In'}
          </button>
        </form>
      </div>
    </div>
  );
}

// ── Change Password Modal ─────────────────────────────────
function ChangePasswordModal({ onClose }) {
  const [form, setForm]   = useState({ currentPassword:'', newPassword:'', confirm:'' });
  const [error, setError] = useState('');
  const [ok, setOk]       = useState(false);
  const [busy, setBusy]   = useState(false);

  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const submit = async (e) => {
    e.preventDefault();
    setError('');
    if (form.newPassword !== form.confirm) { setError('New passwords do not match'); return; }
    if (form.newPassword.length < 8) { setError('Password must be at least 8 characters'); return; }
    setBusy(true);
    const r = await apiFetch('/auth/password', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ currentPassword: form.currentPassword, newPassword: form.newPassword }),
    });
    setBusy(false);
    if (!r) { setError('Failed. Check current password and try again.'); return; }
    setOk(true);
    setTimeout(onClose, 1500);
  };

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-box">
        <div className="modal-title">Change Password</div>
        {ok && <div className="login-info">Password changed successfully!</div>}
        {error && <div className="login-error">{error}</div>}
        {!ok && <form onSubmit={submit}>
          <div className="form-group">
            <label className="form-label">Current Password</label>
            <input className="form-input" type="password" value={form.currentPassword}
              onChange={e=>set('currentPassword',e.target.value)} required autoFocus/>
          </div>
          <div className="form-group" style={{marginTop:12}}>
            <label className="form-label">New Password</label>
            <input className="form-input" type="password" value={form.newPassword}
              onChange={e=>set('newPassword',e.target.value)} required/>
          </div>
          <div className="form-group" style={{marginTop:12}}>
            <label className="form-label">Confirm New Password</label>
            <input className="form-input" type="password" value={form.confirm}
              onChange={e=>set('confirm',e.target.value)} required/>
          </div>
          <div className="modal-footer">
            <button type="button" className="btn btn-secondary" onClick={onClose}>Cancel</button>
            <button type="submit" className="btn btn-primary" disabled={busy}>
              {busy ? 'Saving…' : 'Save Password'}
            </button>
          </div>
        </form>}
      </div>
    </div>
  );
}

// ── Users Page (admin only) ───────────────────────────────
function UsersPage() {
  const [users, setUsers]       = useState([]);
  const [showAdd, setShowAdd]   = useState(false);
  const [resetTarget, setResetTarget] = useState(null);
  const [form, setForm]         = useState({ username:'', password:'', role:'researcher' });
  const [resetPw, setResetPw]   = useState('');
  const [error, setError]       = useState('');
  const [msg, setMsg]           = useState('');

  const load = () => apiFetch('/users').then(d => d && setUsers(d));
  useEffect(()=>{ load(); },[]);

  const setF = (k,v) => setForm(f=>({...f,[k]:v}));
  const notify = (m) => { setMsg(m); setTimeout(()=>setMsg(''),3000); };

  const addUser = async (e) => {
    e.preventDefault(); setError('');
    const r = await apiFetch('/users', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(form),
    });
    if (!r) { setError('Failed to create user'); return; }
    setShowAdd(false); setForm({ username:'', password:'', role:'researcher' });
    load(); notify(`User "${r.username}" created`);
  };

  const deleteUser = async (u) => {
    if (!confirm(`Delete user "${u.username}"?`)) return;
    const r = await apiFetch(`/users/${u.id}`, { method:'DELETE' });
    if (r) { load(); notify(`User "${u.username}" deleted`); }
  };

  const resetPassword = async (e) => {
    e.preventDefault(); setError('');
    const r = await apiFetch(`/users/${resetTarget.id}/password`, {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ newPassword: resetPw }),
    });
    if (!r) { setError('Failed to reset password'); return; }
    setResetTarget(null); setResetPw('');
    notify(`Password reset for "${resetTarget.username}"`);
  };

  const toggleRole = async (u) => {
    const newRole = u.role === 'admin' ? 'researcher' : 'admin';
    const r = await apiFetch(`/users/${u.id}`, {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ role: newRole }),
    });
    if (r) { load(); notify(`Role updated for "${u.username}"`); }
  };

  return (
    <div>
      {msg && <div className="login-info" style={{marginBottom:12}}>{msg}</div>}
      {error && <div className="login-error" style={{marginBottom:12}}>{error}</div>}
      <div className="flex justify-between items-center mb-4">
        <div className="section-title">User Accounts</div>
        <button className="btn btn-primary" onClick={()=>setShowAdd(!showAdd)}>
          {showAdd ? 'Cancel' : '+ Add User'}
        </button>
      </div>

      {showAdd && (
        <div className="card mb-4">
          <div className="card-title">New User</div>
          <form onSubmit={addUser}>
            <div className="flex gap-3">
              <div className="form-group" style={{flex:1}}>
                <label className="form-label">Username</label>
                <input className="form-input" value={form.username} onChange={e=>setF('username',e.target.value)}
                  placeholder="e.g. alice" pattern="[a-z0-9_.\-]{2,32}" required autoFocus/>
              </div>
              <div className="form-group" style={{flex:1}}>
                <label className="form-label">Password (min 8 chars)</label>
                <input className="form-input" type="password" value={form.password}
                  onChange={e=>setF('password',e.target.value)} required/>
              </div>
              <div className="form-group" style={{flex:'0 0 130px'}}>
                <label className="form-label">Role</label>
                <select className="form-input" value={form.role} onChange={e=>setF('role',e.target.value)}>
                  <option value="researcher">Researcher</option>
                  <option value="admin">Admin</option>
                </select>
              </div>
            </div>
            <div style={{marginTop:10,display:'flex',gap:10}}>
              <button type="submit" className="btn btn-primary">Create</button>
              <button type="button" className="btn btn-secondary" onClick={()=>setShowAdd(false)}>Cancel</button>
            </div>
          </form>
        </div>
      )}

      {resetTarget && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setResetTarget(null)}>
          <div className="modal-box">
            <div className="modal-title">Reset Password — {resetTarget.username}</div>
            {error && <div className="login-error">{error}</div>}
            <form onSubmit={resetPassword}>
              <div className="form-group">
                <label className="form-label">New Password (min 8 chars)</label>
                <input className="form-input" type="password" value={resetPw}
                  onChange={e=>setResetPw(e.target.value)} required autoFocus/>
              </div>
              <div className="modal-footer">
                <button type="button" className="btn btn-secondary" onClick={()=>setResetTarget(null)}>Cancel</button>
                <button type="submit" className="btn btn-primary">Reset</button>
              </div>
            </form>
          </div>
        </div>
      )}

      <div className="card">
        <table className="table w-full">
          <thead>
            <tr>
              <th>Username</th><th>Role</th><th>Created</th><th style={{textAlign:'right'}}>Actions</th>
            </tr>
          </thead>
          <tbody>
            {users.map(u=>(
              <tr key={u.id}>
                <td><span className="font-mono">{u.username}</span></td>
                <td>
                  <span className={`badge ${u.role==='admin'?'badge-running':'badge-stopped'}`}>{u.role}</span>
                </td>
                <td className="text-xs text-muted">{new Date(u.createdAt).toLocaleDateString()}</td>
                <td style={{textAlign:'right'}}>
                  <div className="flex gap-2" style={{justifyContent:'flex-end'}}>
                    {u.username !== 'admin' && (
                      <button className="btn btn-secondary" style={{fontSize:11,padding:'2px 8px'}}
                        onClick={()=>toggleRole(u)}>
                        → {u.role==='admin'?'Researcher':'Admin'}
                      </button>
                    )}
                    <button className="btn btn-secondary" style={{fontSize:11,padding:'2px 8px'}}
                      onClick={()=>{ setResetPw(''); setError(''); setResetTarget(u); }}>
                      Reset PW
                    </button>
                    {u.username !== 'admin' && (
                      <button className="btn btn-danger" style={{fontSize:11,padding:'2px 8px'}}
                        onClick={()=>deleteUser(u)}>
                        Delete
                      </button>
                    )}
                  </div>
                </td>
              </tr>
            ))}
            {users.length === 0 && (
              <tr><td colSpan={4} className="text-muted text-xs" style={{textAlign:'center',padding:20}}>No users</td></tr>
            )}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function App() {
  // ── Auth state ───────────────────────────────────────────
  const [currentUser, setCurrentUser] = useState(() => {
    try { return JSON.parse(localStorage.getItem('currentUser')); } catch { return null; }
  });
  const [token, setToken] = useState(() => localStorage.getItem('token'));
  const [expiredMsg, setExpiredMsg]   = useState('');
  const [showProfile, setShowProfile] = useState(false);
  const [showChangePw, setShowChangePw] = useState(false);

  // Listen for 401 / session expiry
  useEffect(() => {
    const handler = () => {
      setToken(null); setCurrentUser(null);
      setExpiredMsg('Your session has expired. Please sign in again.');
    };
    window.addEventListener('auth:expired', handler);
    return () => window.removeEventListener('auth:expired', handler);
  }, []);

  const handleLogin = (user) => {
    setToken(localStorage.getItem('token'));
    setCurrentUser(user);
    setExpiredMsg('');
  };

  const handleLogout = () => {
    localStorage.removeItem('token');
    localStorage.removeItem('currentUser');
    setToken(null); setCurrentUser(null); setShowProfile(false);
  };

  // Show login page if not authenticated
  if (!token || !currentUser) {
    return <LoginPage onLogin={handleLogin} expiredMsg={expiredMsg}/>;
  }

  // ── Main app state ───────────────────────────────────────
  const [page, setPage] = useState('dashboard');
  const [nfStatus, setNfStatus] = useState(INIT_STATUS);
  const [apiOk, setApiOk] = useState(false);
  const [slices, setSlices] = useState(INIT_SLICES);
  const [time, setTime] = useState(new Date().toLocaleTimeString());

  // Clock
  useEffect(()=>{
    const t = setInterval(()=>setTime(new Date().toLocaleTimeString()),1000);
    return ()=>clearInterval(t);
  },[]);

  // Poll real container status from API every 5 s
  useEffect(()=>{
    const poll = async () => {
      const data = await apiFetch('/status');
      if (data) {
        setApiOk(true);
        setNfStatus(prev => ({...prev, ...data}));
      } else {
        setApiOk(false);
      }
    };
    poll();
    const t = setInterval(poll, 5000);
    return ()=>clearInterval(t);
  },[]);

  const isAdmin = currentUser.role === 'admin';
  const runningCount = Object.values(nfStatus).filter(s=>s==='running').length;
  const totalCount = Object.keys(nfStatus).length;
  const initials = currentUser.username.slice(0,2).toUpperCase();

  const nav = [
    {id:'dashboard', label:'Dashboard',   icon:'dashboard', group:'overview'},
    {id:'core',      label:'Core NFs',    icon:'core',      group:'network'},
    {id:'ran',       label:'RAN',         icon:'ran',       group:'network'},
    {id:'uemanager', label:'UE Manager',  icon:'sim',       group:'network'},
    {id:'slices',    label:'Slices',      icon:'slice',     group:'network'},
    {id:'subs',      label:'Subscribers', icon:'sub',       group:'data'},
    {id:'topo',      label:'Topology',    icon:'topo',      group:'data'},
    {id:'tracing',    label:'Tracing',     icon:'trace',     group:'ops'},
    {id:'throughput', label:'Throughput',  icon:'speed',     group:'ops'},
    {id:'logs',       label:'Logs',        icon:'logs',      group:'ops'},
    {id:'grafana',    label:'Dashboards',  icon:'chart',     group:'obs', external: `http://${location.hostname}:3001`},
    {id:'ids',        label:'IDS Monitor', icon:'shield',    group:'security'},
    {id:'ddos',       label:'DDoS Attack', icon:'attack',    group:'security'},
    {id:'nef',        label:'NEF',         icon:'nef',       group:'security'},
    {id:'camara',     label:'CAMARA APIs', icon:'camara',    group:'security'},
    ...(isAdmin ? [{id:'users', label:'Users', icon:'shield', group:'admin'}] : []),
  ];

  const groups = {
    overview:'Overview', network:'Network', data:'Data Plane',
    ops:'Operations', obs:'Observability', security:'Security',
    ...(isAdmin ? {admin:'Administration'} : {}),
  };

  const pageInfo = {
    dashboard:  ['DASHBOARD',      'System overview and real-time metrics'],
    core:       ['CORE NETWORK',   'Open5GS NF management and configuration'],
    ran:        ['RAN / OAI',      'gNB and nrUE simulator control'],
    uemanager:  ['UE MANAGER',     'Configure simulated UEs · register in Open5GS · ping · PDU session status'],
    slices:     ['NETWORK SLICES', '5G slice management — create, configure, assign NFs'],
    subs:       ['SUBSCRIBERS',    'UE subscription data and credential management'],
    topo:       ['TOPOLOGY',       'Live 5G architecture visualization'],
    tracing:    ['TRACING',        'Packet capture (PCAP) + log download — start, stop, download'],
    throughput: ['THROUGHPUT TEST','iPerf3 DL / UL / BiDir tests through live PDU session'],
    logs:       ['SYSTEM LOGS',    'Aggregated logs from all NFs'],
    grafana:    ['GRAFANA',        'Opens Grafana dashboards in a new tab'],
    ids:        ['IDS MONITOR',    'Zeek intrusion detection — SBI/N2 control-plane anomaly detection'],
    ddos:       ['DDoS ATTACK',    'Scapy-based DDoS simulation — control-plane NGAP flood + data-plane GTP-U flood'],
    nef:        ['NEF — NETWORK EXPOSURE FUNCTION', 'Free5GC Northbound API — event exposure · PFD management · traffic influence'],
    camara:     ['CAMARA APIs', 'CAMARA-Project standardised APIs — device-status · QoD · location · reachability · edge discovery'],
    users:      ['USER MANAGEMENT','Manage researcher accounts and permissions'],
  };

  return (
    <React.Fragment>
      {showChangePw && <ChangePasswordModal onClose={()=>setShowChangePw(false)}/>}
      <div className="topbar">
        <div className="logo">
          <div className="logo-icon">
            <svg viewBox="0 0 32 32" fill="none">
              <polygon points="16,2 30,10 30,22 16,30 2,22 2,10" stroke="var(--accent)" strokeWidth="1.5" fill="none"/>
              <circle cx="16" cy="16" r="4" fill="var(--accent)" opacity=".8"/>
              <line x1="16" y1="8" x2="16" y2="12" stroke="var(--accent)" strokeWidth="1.5"/>
              <line x1="16" y1="20" x2="16" y2="24" stroke="var(--accent)" strokeWidth="1.5"/>
              <line x1="8" y1="12" x2="12" y2="14" stroke="var(--accent)" strokeWidth="1.5"/>
              <line x1="20" y1="18" x2="24" y2="20" stroke="var(--accent)" strokeWidth="1.5"/>
            </svg>
          </div>
          <span className="logo-text">5G TESTBED</span>
        </div>
        <div className="topbar-status">
          <div className="status-pill"><span className="status-dot"/>{runningCount}/{totalCount} NFs UP</div>
          <div className="status-pill"><span className="status-dot"/>{slices.filter(s=>s.active).length} Slices Active</div>
          <div className="status-pill"><span className={`status-dot ${nfStatus.gnb==='running'?'':'off'}`}/>gNB {nfStatus.gnb==='running'?'Online':'Offline'}</div>
          <div className="status-pill"><span className={`status-dot ${apiOk?'':'warn'}`}/>{apiOk?'Live':'Simulated'}</div>
          <div className="topbar-time">{time}</div>
          {/* Profile button */}
          <div style={{position:'relative'}} onBlur={e=>{ if(!e.currentTarget.contains(e.relatedTarget)) setShowProfile(false); }}>
            <div className="profile-btn" tabIndex={0} onClick={()=>setShowProfile(v=>!v)}>
              <div className="profile-avatar">{initials}</div>
              <span>{currentUser.username}</span>
              <span style={{opacity:.5,fontSize:10}}>▾</span>
            </div>
            {showProfile && (
              <div className="profile-dropdown">
                <div className="profile-dropdown-header">
                  <strong>{currentUser.username}</strong>
                  {currentUser.role}
                </div>
                <div className="profile-dropdown-item" onClick={()=>{ setShowChangePw(true); setShowProfile(false); }}>
                  🔑 Change Password
                </div>
                {isAdmin && (
                  <div className="profile-dropdown-item" onClick={()=>{ setPage('users'); setShowProfile(false); }}>
                    👥 Manage Users
                  </div>
                )}
                <div className="profile-dropdown-item danger" onClick={handleLogout}>
                  ⏻ Sign Out
                </div>
              </div>
            )}
          </div>
        </div>
      </div>
      <div className="layout">
        <div className="sidebar">
          {Object.entries(groups).map(([gId, gLabel])=>{
            const items = nav.filter(n=>n.group===gId);
            if(!items.length) return null;
            return (
              <div key={gId} className="nav-section">
                <div className="nav-label">{gLabel}</div>
                {items.map(n=>(
                  <div key={n.id} className={`nav-item ${page===n.id?'active':''}`}
                    onClick={()=>{ if(n.external){ window.open(n.external,'_blank'); } else { setPage(n.id); } }}
                    title={n.external?`Open ${n.label} ↗`:''}
                  >
                    <span className="nav-icon"><Icon name={n.icon} size={15}/></span>
                    {n.label}{n.external && <span style={{fontSize:9,marginLeft:'auto',opacity:.5}}>↗</span>}
                  </div>
                ))}
              </div>
            );
          })}
          <div className="sidebar-footer">
            <div className="version-tag">OAI + Open5GS v2.7</div>
            <div className="version-tag" style={{marginTop:2}}>Docker / K3s</div>
          </div>
        </div>
        <div className="main">
          <div className="main-header">
            <div className="page-title">{(pageInfo[page]||[''])[0]}</div>
            <div className="page-sub">{(pageInfo[page]||['',''])[1]}</div>
          </div>
          <div className="main-content">
            {page === 'dashboard' && <Dashboard nfStatus={nfStatus}/>}
            {(page === 'core' || page === 'ran') && <CoreNFs nfStatus={nfStatus} setNfStatus={setNfStatus}/>}
            {page === 'uemanager'  && <UEManager/>}
            {page === 'slices'    && <SliceManager slices={slices} setSlices={setSlices}/>}
            {page === 'subs'      && <Subscriptions/>}
            {page === 'topo'      && <Topology nfStatus={nfStatus}/>}
            {page === 'tracing'    && <Tracing/>}
            {page === 'throughput' && <ThroughputTest/>}
            {page === 'logs'       && <LogsPage/>}
            {page === 'ids'        && <ZeekIDS/>}
            {page === 'ddos'       && <DDoSAttack/>}
            {page === 'nef'        && <NEFPage/>}
            {page === 'camara'     && <CamaraAPIs/>}
            {page === 'users' && isAdmin && <UsersPage/>}
          </div>
        </div>
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
