    };
    setTiLoading(true);
    await apiFetch('/nef-api/nnef-trafficinfluence/v1/subscriptions', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    loadTab('traffic');
  };

  const deleteTiSub = async (id) => {
    await apiFetch(`/nef-api/nnef-trafficinfluence/v1/subscriptions/${id}`, { method:'DELETE' });
    loadTab('traffic');
  };

  const sendApiExplorer = async () => {
    setApiLoading(true); setApiResp(null);
    const opts = { method: apiMethod, headers:{'Content-Type':'application/json','Accept':'application/json'} };
    if (['POST','PUT','PATCH'].includes(apiMethod) && apiBody.trim()) opts.body = apiBody;
    const r = await apiFetch(`/nef-api${apiPath}`, opts);
    setApiResp(r);
    setApiLoading(false);
  };

  const C  = { bg:'#0d1117', card:'#161b22', border:'#30363d', text:'#e6edf3', muted:'#8b949e', accent:'#00c896' };
  const tabStyle = (t) => ({ padding:'6px 16px', borderRadius:4, cursor:'pointer', fontSize:12, fontWeight:600,
    background: tab===t ? C.accent : 'transparent', color: tab===t ? '#000' : C.muted, border:'none',
    transition:'all .15s', marginRight:4 });
  const inputSt = { background:'#0d1117', border:`1px solid ${C.border}`, borderRadius:4, color:C.text, padding:'6px 10px', fontSize:12, width:'100%', boxSizing:'border-box' };
  const btnPrimary = (disabled) => ({ padding:'6px 16px', background: disabled ? '#333' : C.accent, color: disabled ? C.muted : '#000',
    border:'none', borderRadius:4, cursor: disabled ? 'not-allowed' : 'pointer', fontSize:12, fontWeight:700 });
  const btnDanger = { padding:'4px 10px', background:'transparent', color:'#ef4444', border:'1px solid #ef4444', borderRadius:3, cursor:'pointer', fontSize:11 };

  const statusColor = status.running ? (status.reachable ? C.accent : '#f59e0b') : '#ef4444';
  const statusLabel = status.running ? (status.reachable ? 'Running & Registered' : 'Starting…') : 'Stopped';

  return (
    <div style={{color:C.text, fontSize:13}}>

      {/* ── Status row ── */}
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:12, marginBottom:16}}>
        {/* Container state */}
        <div style={{background:C.card, border:`1px solid ${C.border}`, borderRadius:6, padding:'14px 16px'}}>
          <div style={{fontSize:10, color:C.muted, fontWeight:700, textTransform:'uppercase', marginBottom:8}}>NEF Container</div>
          <div style={{display:'flex', alignItems:'center', gap:8}}>
            <span style={{width:10, height:10, borderRadius:'50%', background:statusColor, flexShrink:0, boxShadow:`0 0 6px ${statusColor}`}}/>
            <span style={{fontWeight:700, fontSize:14}}>{statusLabel}</span>
          </div>
          <div style={{marginTop:8, color:C.muted, fontSize:11}}>Image: {status.image || 'free5gc/nef:v3.4.3'}</div>
          <div style={{color:C.muted, fontSize:11}}>IP: {status.ip}:{status.port}</div>
        </div>
        {/* NRF */}
        <div style={{background:C.card, border:`1px solid ${C.border}`, borderRadius:6, padding:'14px 16px'}}>
          <div style={{fontSize:10, color:C.muted, fontWeight:700, textTransform:'uppercase', marginBottom:8}}>NRF Registration</div>
          <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:6}}>
            <span style={{width:10, height:10, borderRadius:'50%', background: status.reachable ? C.accent : '#ef4444', flexShrink:0}}/>
            <span style={{fontWeight:700}}>{status.reachable ? 'Registered' : 'Not Registered'}</span>
          </div>
          <div style={{color:C.muted, fontSize:11}}>NRF: {status.nrfUri || 'http://10.45.0.10:7777'}</div>
          <div style={{color:C.muted, fontSize:11}}>Protocol: HTTP/1.1 (SBI)</div>
        </div>
        {/* Services */}
        <div style={{background:C.card, border:`1px solid ${C.border}`, borderRadius:6, padding:'14px 16px'}}>
          <div style={{fontSize:10, color:C.muted, fontWeight:700, textTransform:'uppercase', marginBottom:8}}>Nnef Services</div>
          {(status.services||['nnef-pfdmanagement','nnef-eventexposure','nnef-trafficinfluence']).map(s=>(
            <div key={s} style={{display:'flex', alignItems:'center', gap:6, marginBottom:4}}>
              <span style={{width:6, height:6, borderRadius:'50%', background: status.reachable ? C.accent : C.border}}/>
              <span style={{fontSize:11, color: status.reachable ? C.text : C.muted}}>{s}</span>
            </div>
          ))}
        </div>
      </div>

      {/* ── Controls ── */}
      <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:16}}>
        <button onClick={startNEF} disabled={busy || status.running} style={btnPrimary(busy || status.running)}>
          ▶ Start NEF
        </button>
        <button onClick={stopNEF} disabled={busy || !status.running}
          style={{...btnPrimary(busy || !status.running), background: (busy||!status.running)?'#333':'#ef4444', color:(busy||!status.running)?C.muted:'#fff'}}>
          ■ Stop NEF
        </button>
        {actionMsg && <span style={{color: C.accent, fontSize:12}}>{actionMsg}</span>}
        {!status.running && (
          <span style={{color:'#f59e0b', fontSize:11, marginLeft:'auto'}}>
            ⚠ Run <code style={{background:'#1c2128', padding:'1px 5px', borderRadius:3}}>make nef-up</code> or click Start NEF
          </span>
        )}
      </div>

      {/* ── Tabs ── */}
      <div style={{display:'flex', marginBottom:14, borderBottom:`1px solid ${C.border}`, paddingBottom:8}}>
        {[['events','Event Exposure'],['pfd','PFD Management'],['traffic','Traffic Influence'],['explorer','API Explorer']].map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={tabStyle(id)}>{label}</button>
        ))}
      </div>

      {/* ── TAB: Event Exposure ── */}
      {tab === 'events' && (
        <div>
          {!status.reachable && (
            <div style={{background:'#1c1207', border:'1px solid #f59e0b44', borderRadius:6, padding:12, color:'#f59e0b', fontSize:12, marginBottom:12}}>
              NEF is not reachable. Start NEF first to manage event subscriptions.
            </div>
          )}
          {/* Create form */}
          <div style={{background:C.card, border:`1px solid ${C.border}`, borderRadius:6, padding:14, marginBottom:14}}>
            <div style={{fontSize:11, color:C.muted, fontWeight:700, textTransform:'uppercase', marginBottom:10}}>New Event Subscription</div>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr auto', gap:10, alignItems:'end'}}>
              <div>
                <div style={{fontSize:11, color:C.muted, marginBottom:4}}>SUPI (IMSI)</div>
                <input style={inputSt} value={newEvForm.supi} onChange={e=>setNewEvForm(p=>({...p,supi:e.target.value}))}/>
              </div>
              <div>
                <div style={{fontSize:11, color:C.muted, marginBottom:4}}>Event Type</div>
                <select style={inputSt} value={newEvForm.event} onChange={e=>setNewEvForm(p=>({...p,event:e.target.value}))}>
                  <option value="CONNECTIVITY_STATE">CONNECTIVITY_STATE</option>
                  <option value="REACHABILITY_FOR_DATA">REACHABILITY_FOR_DATA</option>
                  <option value="LOCATION_REPORTING">LOCATION_REPORTING</option>
                  <option value="PDU_SESSION_STATUS">PDU_SESSION_STATUS</option>
                  <option value="UE_LOSS_OF_CONNECTIVITY">UE_LOSS_OF_CONNECTIVITY</option>
                  <option value="UE_REACHABILITY_FOR_SMS">UE_REACHABILITY_FOR_SMS</option>
                </select>
              </div>
              <div>
                <div style={{fontSize:11, color:C.muted, marginBottom:4}}>Notification URI</div>
                <input style={inputSt} value={newEvForm.notifUri} onChange={e=>setNewEvForm(p=>({...p,notifUri:e.target.value}))}/>
              </div>
              <button onClick={createEvSub} disabled={!status.reachable || evLoading} style={btnPrimary(!status.reachable)}>
                + Subscribe
              </button>
            </div>
          </div>
          {/* Subscription list */}
          <div style={{background:C.card, border:`1px solid ${C.border}`, borderRadius:6}}>
            <div style={{padding:'10px 14px', borderBottom:`1px solid ${C.border}`, fontSize:11, color:C.muted, fontWeight:700, textTransform:'uppercase'}}>
              Active Subscriptions {evLoading && '(loading…)'}
            </div>
            {evSubs.length === 0 ? (
              <div style={{padding:24, textAlign:'center', color:C.muted, fontSize:12}}>
                {status.reachable ? 'No subscriptions yet. Create one above.' : 'Start NEF to view subscriptions.'}
              </div>
            ) : evSubs.map((sub,i) => (
              <div key={sub.subscriptionId||i} style={{padding:'10px 14px', borderBottom:`1px solid ${C.border}`, display:'flex', alignItems:'center', gap:12}}>
                <span style={{background:'#00c89620', color:C.accent, padding:'2px 8px', borderRadius:3, fontSize:10, fontWeight:700, flexShrink:0}}>
                  {sub.eventsSubs?.[0]?.event || 'EVENT'}
                </span>
                <span style={{color:C.muted, fontSize:11}}>SUPI: {sub.supi||sub.anyUeInd?'Any UE':'—'}</span>
                <span style={{color:C.muted, fontSize:11}}>ID: {sub.subscriptionId||'—'}</span>
                <span style={{color:C.muted, fontSize:11, flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
                  → {sub.notificationUri||'—'}
                </span>
                <button onClick={()=>deleteEvSub(sub.subscriptionId)} style={btnDanger}>Delete</button>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── TAB: PFD Management ── */}
      {tab === 'pfd' && (
        <div>
          {!status.reachable && (
            <div style={{background:'#1c1207', border:'1px solid #f59e0b44', borderRadius:6, padding:12, color:'#f59e0b', fontSize:12, marginBottom:12}}>
              NEF is not reachable. Start NEF first to manage PFD rules.
            </div>
          )}
          <div style={{background:C.card, border:`1px solid ${C.border}`, borderRadius:6, padding:14, marginBottom:14}}>
            <div style={{fontSize:11, color:C.muted, fontWeight:700, textTransform:'uppercase', marginBottom:10}}>New PFD Rule</div>
            <div style={{display:'grid', gridTemplateColumns:'160px 1fr auto', gap:10, alignItems:'end'}}>
              <div>
                <div style={{fontSize:11, color:C.muted, marginBottom:4}}>Application ID</div>
                <input style={inputSt} value={newPfdForm.appId} onChange={e=>setNewPfdForm(p=>({...p,appId:e.target.value}))}/>
              </div>
              <div>
                <div style={{fontSize:11, color:C.muted, marginBottom:4}}>Flow Description</div>
                <input style={inputSt} value={newPfdForm.flowDesc} onChange={e=>setNewPfdForm(p=>({...p,flowDesc:e.target.value}))}/>
              </div>
              <button onClick={createPfd} disabled={!status.reachable || pfdLoading} style={btnPrimary(!status.reachable)}>
                + Add Rule
              </button>
            </div>
          </div>
          <div style={{background:C.card, border:`1px solid ${C.border}`, borderRadius:6}}>
            <div style={{padding:'10px 14px', borderBottom:`1px solid ${C.border}`, fontSize:11, color:C.muted, fontWeight:700, textTransform:'uppercase'}}>
              PFD Applications {pfdLoading && '(loading…)'}
            </div>
            {pfdApps.length === 0 ? (
              <div style={{padding:24, textAlign:'center', color:C.muted, fontSize:12}}>
                {status.reachable ? 'No PFD rules yet.' : 'Start NEF to view PFD applications.'}
              </div>
            ) : pfdApps.map((app,i) => (
              <div key={app.externalAppId||i} style={{padding:'10px 14px', borderBottom:`1px solid ${C.border}`, display:'flex', alignItems:'center', gap:12}}>
                <span style={{background:'#7c3aed20', color:'#a78bfa', padding:'2px 8px', borderRadius:3, fontSize:10, fontWeight:700}}>APP</span>
                <span style={{fontWeight:600}}>{app.externalAppId}</span>
                <span style={{color:C.muted, fontSize:11, flex:1}}>
                  {app.pfds?.map(p => p.flowDescriptions?.join(', ')).join(' | ')}
                </span>
                <button onClick={()=>deletePfd(app.externalAppId)} style={btnDanger}>Delete</button>
              </div>
            ))}
          </div>
          {/* Info panel */}
          <div style={{marginTop:14, background:'#0d1c18', border:`1px solid ${C.accent}22`, borderRadius:6, padding:12}}>
            <div style={{fontSize:11, color:C.accent, fontWeight:700, marginBottom:6}}>About PFD Management (TS 29.551)</div>
            <div style={{fontSize:11, color:C.muted, lineHeight:1.7}}>
              Packet Flow Descriptions (PFDs) allow Application Functions to register traffic signatures for specific applications.
              The NEF stores these rules and exposes them to the SMF/UPF for traffic detection and policy enforcement.
              Flow descriptions use IETF-style access control rules (e.g., <code style={{background:'#1c2128', padding:'1px 4px', borderRadius:2}}>permit out ip from 8.8.8.8 to assigned</code>).
            </div>
          </div>
        </div>
      )}

      {/* ── TAB: Traffic Influence ── */}
      {tab === 'traffic' && (
        <div>
          {!status.reachable && (
            <div style={{background:'#1c1207', border:'1px solid #f59e0b44', borderRadius:6, padding:12, color:'#f59e0b', fontSize:12, marginBottom:12}}>
              NEF is not reachable. Start NEF first to manage traffic influence policies.
            </div>
          )}
          <div style={{background:C.card, border:`1px solid ${C.border}`, borderRadius:6, padding:14, marginBottom:14}}>
            <div style={{fontSize:11, color:C.muted, fontWeight:700, textTransform:'uppercase', marginBottom:10}}>New Traffic Influence Policy</div>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 80px 1fr 1fr auto', gap:10, alignItems:'end'}}>
              {[
                ['SUPI (IMSI)', 'supi'],
                ['DNN', 'dnn'],
                ['SST', 'sst'],
                ['DNAI', 'dnai'],
                ['Route Destination', 'routeToLoc'],
              ].map(([label, key]) => (
                <div key={key}>
                  <div style={{fontSize:11, color:C.muted, marginBottom:4}}>{label}</div>
                  <input style={inputSt} value={newTiForm[key]} onChange={e=>setNewTiForm(p=>({...p,[key]:e.target.value}))}/>
                </div>
              ))}
              <button onClick={createTiSub} disabled={!status.reachable || tiLoading} style={btnPrimary(!status.reachable)}>
                + Create
              </button>
            </div>
          </div>
          <div style={{background:C.card, border:`1px solid ${C.border}`, borderRadius:6}}>
            <div style={{padding:'10px 14px', borderBottom:`1px solid ${C.border}`, fontSize:11, color:C.muted, fontWeight:700, textTransform:'uppercase'}}>
              Traffic Influence Subscriptions {tiLoading && '(loading…)'}
            </div>
            {tiSubs.length === 0 ? (
              <div style={{padding:24, textAlign:'center', color:C.muted, fontSize:12}}>
                {status.reachable ? 'No traffic influence subscriptions yet.' : 'Start NEF to view subscriptions.'}
              </div>
            ) : tiSubs.map((sub,i) => (
              <div key={sub.afTransId||i} style={{padding:'10px 14px', borderBottom:`1px solid ${C.border}`, display:'flex', alignItems:'center', gap:12}}>
                <span style={{background:'#1d4ed820', color:'#60a5fa', padding:'2px 8px', borderRadius:3, fontSize:10, fontWeight:700}}>ROUTE</span>
                <span style={{color:C.muted, fontSize:11}}>SUPI: {sub.supi||'—'}</span>
                <span style={{color:C.muted, fontSize:11}}>DNN: {sub.dnn||'—'}</span>
                <span style={{color:C.muted, fontSize:11}}>SST: {sub.snssai?.sst||'—'}</span>
                <span style={{color:C.muted, fontSize:11, flex:1}}>ID: {sub.afTransId||sub.subscriptionId||'—'}</span>
                <button onClick={()=>deleteTiSub(sub.afTransId||sub.subscriptionId)} style={btnDanger}>Delete</button>
              </div>
            ))}
          </div>
          <div style={{marginTop:14, background:'#0d1419', border:'1px solid #60a5fa22', borderRadius:6, padding:12}}>
            <div style={{fontSize:11, color:'#60a5fa', fontWeight:700, marginBottom:6}}>About Traffic Influence (TS 29.522)</div>
            <div style={{fontSize:11, color:C.muted, lineHeight:1.7}}>
              The Nnef_TrafficInfluence API lets Application Functions request that specific UE traffic be routed to a particular
              Data Network Access Identifier (DNAI) or server endpoint. NEF translates these requests into PCF policies
              that influence the SMF/UPF traffic routing decisions.
            </div>
          </div>
        </div>
      )}

      {/* ── TAB: API Explorer ── */}
      {tab === 'explorer' && (
        <div>
          {/* Templates */}
          <div style={{marginBottom:12, display:'flex', alignItems:'center', gap:10, flexWrap:'wrap'}}>
            <span style={{fontSize:11, color:C.muted, flexShrink:0}}>Templates:</span>
            {NEF_TEMPLATES.map((t,i)=>(
              <button key={i} onClick={()=>{ setApiMethod(t.method); setApiPath(t.path); setApiBody(t.body); }}
                style={{padding:'4px 10px', background:C.card, color:C.muted, border:`1px solid ${C.border}`,
                  borderRadius:3, cursor:'pointer', fontSize:11, whiteSpace:'nowrap'}}>
                {t.label}
              </button>
            ))}
          </div>
          {/* Request bar */}
          <div style={{display:'flex', gap:8, marginBottom:10, alignItems:'center'}}>
            <select value={apiMethod} onChange={e=>setApiMethod(e.target.value)}
              style={{...inputSt, width:90, fontWeight:700,
                color: apiMethod==='GET'?'#60a5fa': apiMethod==='POST'?C.accent: apiMethod==='PUT'?'#f59e0b':'#ef4444'}}>
              {['GET','POST','PUT','PATCH','DELETE'].map(m=><option key={m} value={m}>{m}</option>)}
            </select>
            <input style={{...inputSt, flex:1}} value={apiPath} onChange={e=>setApiPath(e.target.value)}
              placeholder="/nnef-eventexposure/v1/subscriptions"/>
            <button onClick={sendApiExplorer} disabled={apiLoading} style={btnPrimary(apiLoading)}>
              {apiLoading ? 'Sending…' : '⚡ Send'}
            </button>
          </div>
          {/* Body */}
          {['POST','PUT','PATCH'].includes(apiMethod) && (
            <div style={{marginBottom:10}}>
              <div style={{fontSize:11, color:C.muted, marginBottom:4}}>Request Body (JSON)</div>
              <textarea value={apiBody} onChange={e=>setApiBody(e.target.value)} rows={8}
                style={{...inputSt, fontFamily:'monospace', fontSize:11, lineHeight:1.5, resize:'vertical'}}
                placeholder='{ "key": "value" }'/>
            </div>
          )}
          {/* Response */}
          {apiResp !== null && (
            <div style={{background:'#0d1117', border:`1px solid ${C.border}`, borderRadius:6}}>
              <div style={{padding:'8px 14px', borderBottom:`1px solid ${C.border}`, fontSize:11, color:C.muted, fontWeight:700}}>Response</div>
              <pre style={{margin:0, padding:14, fontSize:11, color: C.accent, lineHeight:1.5, overflow:'auto', maxHeight:360, whiteSpace:'pre-wrap', wordBreak:'break-all'}}>
                {typeof apiResp === 'string' ? apiResp : JSON.stringify(apiResp, null, 2)}
              </pre>
            </div>
          )}
          {/* Endpoint reference */}
          <div style={{marginTop:14, background:C.card, border:`1px solid ${C.border}`, borderRadius:6, padding:14}}>
            <div style={{fontSize:11, color:C.muted, fontWeight:700, textTransform:'uppercase', marginBottom:10}}>Nnef Northbound API Reference</div>
            {[
              ['Event Exposure (TS 29.508)',   [
                ['GET',    '/nnef-eventexposure/v1/subscriptions',      'List subscriptions'],
                ['POST',   '/nnef-eventexposure/v1/subscriptions',      'Create subscription'],
                ['DELETE', '/nnef-eventexposure/v1/subscriptions/{id}', 'Delete subscription'],
              ]],
              ['PFD Management (TS 29.551)',    [
                ['GET',    '/nnef-pfdmanagement/v1/applications',          'List applications'],
                ['PUT',    '/nnef-pfdmanagement/v1/applications/{appId}',  'Create/update PFD'],
                ['DELETE', '/nnef-pfdmanagement/v1/applications/{appId}',  'Delete application'],
              ]],
              ['Traffic Influence (TS 29.522)', [
                ['GET',    '/nnef-trafficinfluence/v1/subscriptions',      'List subscriptions'],
                ['POST',   '/nnef-trafficinfluence/v1/subscriptions',      'Create subscription'],
                ['PUT',    '/nnef-trafficinfluence/v1/subscriptions/{id}', 'Update subscription'],
                ['DELETE', '/nnef-trafficinfluence/v1/subscriptions/{id}', 'Delete subscription'],
              ]],
            ].map(([section, routes]) => (
              <div key={section} style={{marginBottom:14}}>
                <div style={{fontSize:11, color:C.accent, fontWeight:700, marginBottom:6}}>{section}</div>
                {routes.map(([method, path, desc]) => (
                  <div key={path+method} onClick={()=>{ setApiMethod(method); setApiPath(path.replace(/{[^}]+}/g,'1')); setApiBody(''); }}
                    style={{display:'flex', gap:10, alignItems:'center', padding:'4px 0', cursor:'pointer',
                      borderBottom:`1px solid ${C.border}22`}}>
                    <span style={{width:52, fontSize:10, fontWeight:700, textAlign:'center', padding:'2px 0', borderRadius:2,
                      background: method==='GET'?'#1d3a6e': method==='POST'?'#1a3d2b': method==='DELETE'?'#3d1a1a':'#3d2d0a',
                      color: method==='GET'?'#60a5fa': method==='POST'?C.accent: method==='DELETE'?'#f87171':'#f59e0b',
                      flexShrink:0}}>
                      {method}
                    </span>
                    <code style={{fontSize:11, color:C.muted, flex:1}}>{path}</code>
                    <span style={{fontSize:11, color:'#555'}}>{desc}</span>
                  </div>
                ))}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// CAMARA APIs PAGE  — CAMARA-Project standardised APIs
// device-status · location-verification · QoD · reachability
// ═══════════════════════════════════════════════════════════
function CamaraAPIs() {
  const [health,   setHealth]   = useState({ status:'DOWN', mgmtApiReachable:false, qodSessions:0, reachSubs:0 });
  const [tab,      setTab]      = useState('status');
  const [busy,     setBusy]     = useState(false);
  const [msg,      setMsg]      = useState('');

  // Device Status tab
  const [ueId,       setUeId]       = useState('ue1');
  const [connResult, setConnResult] = useState(null);
  const [connLoading, setConnLoading] = useState(false);
  const [roamResult, setRoamResult] = useState(null);
  const [locResult,  setLocResult]  = useState(null);
  const [locLoading, setLocLoading] = useState(false);
  const [locLat,     setLocLat]     = useState('48.8566');
  const [locLon,     setLocLon]     = useState('2.3522');
  const [locRadius,  setLocRadius]  = useState('50000');

  // QoD tab
  const [qodList,  setQodList]  = useState([]);
  const [qodForm,  setQodForm]  = useState({ ueId:'ue1', qosProfile:'QOS_M', duration:3600 });
  const [qodLoading, setQodLoading] = useState(false);

  // Subscriptions tab
  const [subList,  setSubList]  = useState([]);
  const [subForm,  setSubForm]  = useState({ ueId:'ue1', notifUrl:'http://10.45.0.30:8081/camara/callback' });
  const [subLoading, setSubLoading] = useState(false);

  // Notifications tab
  const [notifs,   setNotifs]   = useState([]);

  const QOS_LABELS = { QOS_E:'Best Effort', QOS_S:'Small ≥2 Mbps', QOS_M:'Medium ≥10 Mbps', QOS_L:'Large ≥20 Mbps', QOS_REAL_TIME_CONVERSATIONAL:'Real-Time' };
  const CONN_COLOR  = { CONNECTED_DATA:'#00c896', CONNECTED_SMS:'#f59e0b', NOT_CONNECTED:'#ef4444' };
  const QOS_COLOR   = { AVAILABLE:'#00c896', REQUESTED:'#f59e0b', UNAVAILABLE:'#ef4444' };

  const callCamara = (path, opts) => apiFetch(`/camara-api${path}`, opts);

  const loadHealth = async () => {
    const d = await callCamara('/camara/health');
    if (d) setHealth(d);
  };

  const loadQod = async () => {
    setQodLoading(true);
    const d = await callCamara('/qod/v0/sessions');
    if (Array.isArray(d)) setQodList(d);
    setQodLoading(false);
  };

  const loadSubs = async () => {
    setSubLoading(true);
    const d = await callCamara('/device-reachability/v0/subscriptions');
    if (Array.isArray(d)) setSubList(d);
    setSubLoading(false);
  };

  const loadNotifs = async () => {
    const d = await callCamara('/camara/notifications');
    if (Array.isArray(d)) setNotifs(d);
  };

  useEffect(() => {
    loadHealth();
    const t = setInterval(loadHealth, 5000);
    return () => clearInterval(t);
  }, []);

  useEffect(() => {
    if (tab === 'qod')   loadQod();
    if (tab === 'subs')  loadSubs();
    if (tab === 'notifs') { loadNotifs(); }
  }, [tab]);

  useEffect(() => {
    if (tab !== 'notifs') return;
    const t = setInterval(loadNotifs, 3000);
    return () => clearInterval(t);
  }, [tab]);

  const checkDeviceStatus = async () => {
    setConnLoading(true); setConnResult(null); setRoamResult(null);
    const [conn, roam] = await Promise.all([
      callCamara(`/device-status/v0/connectivity?ueId=${encodeURIComponent(ueId)}`),
      callCamara(`/device-status/v0/roaming?ueId=${encodeURIComponent(ueId)}`),
    ]);
    setConnResult(conn);
    setRoamResult(roam);
    setConnLoading(false);
  };

  const verifyLocation = async () => {
    setLocLoading(true); setLocResult(null);
    const body = {
      device: { networkAccessIdentifier: ueId },
      area: { areaType:'CIRCLE', center:{ latitude:parseFloat(locLat), longitude:parseFloat(locLon) }, radius:parseInt(locRadius) },
    };
    const d = await callCamara('/location-verification/v0/verify', {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body),
    });
    setLocResult(d);
    setLocLoading(false);
  };

  const createQodSession = async () => {
    setBusy(true); setMsg('Creating QoD session...');
    const body = {
      device: { networkAccessIdentifier: qodForm.ueId },
      qosProfile: qodForm.qosProfile,
      duration: parseInt(qodForm.duration),
    };
    const d = await callCamara('/qod/v0/sessions', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    if (d?.sessionId) setMsg(`Session created: ${d.sessionId}`);
    else setMsg('Failed to create session');
    await loadQod();
    setBusy(false);
    setTimeout(() => setMsg(''), 4000);
  };

  const deleteQodSession = async (id) => {
    await callCamara(`/qod/v0/sessions/${id}`, { method:'DELETE' });
    loadQod();
  };

  const createSub = async () => {
    setBusy(true); setMsg('Creating subscription...');
    const body = {
      device: { networkAccessIdentifier: subForm.ueId },
      webhook: { notificationUrl: subForm.notifUrl },
    };
    const d = await callCamara('/device-reachability/v0/subscriptions', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    if (d?.subscriptionId) setMsg(`Subscription created: ${d.subscriptionId}`);
    else setMsg('Failed to create subscription');
    await loadSubs();
    setBusy(false);
    setTimeout(() => setMsg(''), 4000);
  };

  const deleteSub = async (id) => {
    await callCamara(`/device-reachability/v0/subscriptions/${id}`, { method:'DELETE' });
    loadSubs();
  };

  const clearNotifs = async () => {
    await callCamara('/camara/notifications', { method:'DELETE' });
    setNotifs([]);
  };

  const startCamara = async () => {
    setBusy(true); setMsg('Starting CAMARA API server...');
    await apiFetch('/nf/camara-api/start', { method:'POST' });
    setTimeout(() => { loadHealth(); setMsg(''); setBusy(false); }, 3000);
  };

  const stopCamara = async () => {
    setBusy(true); setMsg('Stopping CAMARA API server...');
    await apiFetch('/nf/camara-api/stop', { method:'POST' });
    setTimeout(() => { loadHealth(); setMsg(''); setBusy(false); }, 2000);
  };

  const isUp      = health.status === 'UP';
  const C  = { bg:'#0d1117', card:'#161b22', border:'#30363d', text:'#e6edf3', muted:'#8b949e', accent:'#00c896' };
  const tabStyle = (t) => ({ padding:'9px 16px', cursor:'pointer', fontSize:12, fontWeight:600, background:'transparent',
    color: tab===t ? C.accent : C.muted, border:'none', borderBottom: tab===t ? `2px solid ${C.accent}` : '2px solid transparent',
    transition:'color .15s, border-color .15s', marginBottom:'-1px', marginRight:2 });
  const badge = (n, color) => n ? <span style={{marginLeft:5, background:(color||C.accent)+'33', color:color||C.accent, borderRadius:10, padding:'1px 7px', fontSize:9, fontWeight:700}}>{n}</span> : null;
  const inputSt  = { background:'#0d1117', border:`1px solid ${C.border}`, borderRadius:4, color:C.text, padding:'6px 10px', fontSize:12, width:'100%', boxSizing:'border-box' };
  const btnPrimary = (off) => ({ padding:'8px 18px', background: off ? '#1c2128' : C.accent, color: off ? C.muted : '#000', border: off ? `1px solid ${C.border}` : 'none', borderRadius:5, cursor: off ? 'not-allowed':'pointer', fontSize:12, fontWeight:700 });
  const btnDanger  = { padding:'4px 10px', background:'transparent', color:'#ef4444', border:'1px solid #ef4444', borderRadius:3, cursor:'pointer', fontSize:11 };

  const CAMARA_APIS = [
    { name:'Device Status',          spec:'device-status/v0.6',          ts:'TS 29.122',  color:'#60a5fa', desc:'UE connectivity & roaming detection' },
    { name:'Location Verification',  spec:'location-verification/v0.2',   ts:'TS 29.572',  color:'#a78bfa', desc:'Verify UE is within a geographic area' },
    { name:'Quality on Demand',      spec:'qod/v0.10',                    ts:'TS 29.522',  color:'#00c896', desc:'Create QoS sessions via NEF Traffic Influence' },
    { name:'Device Reachability',    spec:'device-reachability/v0',       ts:'TS 29.508',  color:'#f59e0b', desc:'Subscribe to UE reachability events via NEF' },
    { name:'Simple Edge Discovery',  spec:'simple-edge-discovery/v1',     ts:'MEC-003',    color:'#f87171', desc:'Discover available MEC platforms' },
  ];

  return (
    <div style={{color:C.text, fontSize:13}}>

      {/* Status row */}
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:12, marginBottom:16}}>
        <div style={{background:C.card, border:`1px solid ${C.border}`, borderRadius:6, padding:'14px 16px'}}>
          <div style={{fontSize:10, color:C.muted, fontWeight:700, textTransform:'uppercase', marginBottom:8}}>CAMARA API Server</div>
          <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:6}}>
            <span style={{width:10, height:10, borderRadius:'50%', background: isUp ? C.accent : '#ef4444', boxShadow:`0 0 6px ${isUp?C.accent:'#ef4444'}`}}/>
            <span style={{fontWeight:700, fontSize:14}}>{isUp ? 'Running' : 'Stopped'}</span>
          </div>
          <div style={{color:C.muted, fontSize:11}}>Port: 8080 (container) · 8081 (host)</div>
          <div style={{color:C.muted, fontSize:11}}>Mgmt API: {health.mgmtApiReachable ? '✓ Reachable' : '✗ Unreachable'}</div>
        </div>
        <div style={{background:C.card, border:`1px solid ${C.border}`, borderRadius:6, padding:'14px 16px'}}>
          <div style={{fontSize:10, color:C.muted, fontWeight:700, textTransform:'uppercase', marginBottom:8}}>Active Sessions</div>
          <div style={{display:'flex', gap:20, marginTop:4}}>
            <div><div style={{fontSize:24, fontWeight:700, color:C.accent}}>{health.qodSessions||0}</div><div style={{fontSize:10, color:C.muted}}>QoD Sessions</div></div>
            <div><div style={{fontSize:24, fontWeight:700, color:'#f59e0b'}}>{health.reachSubs||0}</div><div style={{fontSize:10, color:C.muted}}>Reachability Subs</div></div>
            <div><div style={{fontSize:24, fontWeight:700, color:'#a78bfa'}}>{health.notifications||0}</div><div style={{fontSize:10, color:C.muted}}>Notifications</div></div>
          </div>
        </div>
        <div style={{background:C.card, border:`1px solid ${C.border}`, borderRadius:6, padding:'14px 16px'}}>
          <div style={{fontSize:10, color:C.muted, fontWeight:700, textTransform:'uppercase', marginBottom:8}}>CAMARA APIs ({CAMARA_APIS.length})</div>
          {CAMARA_APIS.map(a => (
            <div key={a.name} style={{display:'flex', alignItems:'center', gap:6, marginBottom:3}}>
              <span style={{width:6, height:6, borderRadius:'50%', background: isUp ? a.color : C.border, flexShrink:0}}/>
              <span style={{fontSize:10, color: isUp ? C.text : C.muted}}>{a.spec}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Controls bar */}
      <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:16, padding:'12px 16px',
        background: isUp ? '#0d1c18' : '#1c1207', border:`1px solid ${isUp ? C.accent+'33' : '#f59e0b33'}`, borderRadius:6}}>
        <button onClick={startCamara} disabled={busy || isUp} style={btnPrimary(busy || isUp)}>▶ Start CAMARA</button>
        <button onClick={stopCamara}  disabled={busy || !isUp} style={{...btnPrimary(busy||!isUp), background:(busy||!isUp)?'#1c2128':'#ef4444', color:(busy||!isUp)?C.muted:'#fff', border:(busy||!isUp)?`1px solid ${C.border}`:'none'}}>■ Stop</button>
        <div style={{width:1, height:20, background:C.border, margin:'0 4px'}}/>
        <span style={{fontSize:11, color: isUp ? C.accent : '#f59e0b', fontWeight:600}}>
          {isUp ? '● CAMARA API Server running on :8081' : '○ CAMARA API Server stopped'}
        </span>
        {msg && <span style={{color:C.accent, fontSize:12, marginLeft:8}}>{msg}</span>}
        {!isUp && <span style={{color:'#f59e0b', fontSize:11, marginLeft:'auto'}}>
          ⚠ <code style={{background:'#0d1117', padding:'1px 6px', borderRadius:3}}>make camara-up</code>
        </span>}
      </div>

      {/* Tabs */}
      <div style={{display:'flex', marginBottom:16, borderBottom:`1px solid ${C.border}`}}>
        <button onClick={()=>setTab('status')} style={tabStyle('status')}>📶 Device Status</button>
        <button onClick={()=>setTab('qod')}    style={tabStyle('qod')}>
          ⚡ QoD Sessions{badge(qodList.length, '#00c896')}
        </button>
        <button onClick={()=>setTab('subs')}   style={tabStyle('subs')}>
          🔔 Reachability{badge(subList.length, '#f59e0b')}
        </button>
        <button onClick={()=>setTab('notifs')} style={tabStyle('notifs')}>
          📨 Notifications{badge(notifs.length, '#a78bfa')}
        </button>
        <button onClick={()=>setTab('catalog')} style={tabStyle('catalog')}>📋 API Catalog</button>
      </div>

      {/* ── TAB: Device Status ── */}
      {tab === 'status' && (
        <div style={{display:'flex', flexDirection:'column', gap:14}}>
          {/* Selector + Check button */}
          <div style={{background:C.card, border:`1px solid ${C.border}`, borderRadius:6, padding:14}}>
            <div style={{fontSize:11, color:C.muted, fontWeight:700, textTransform:'uppercase', letterSpacing:1, marginBottom:12}}>
              Device Status Check — CAMARA device-status v0.6
            </div>
            <div style={{display:'flex', gap:10, alignItems:'end', marginBottom: connResult ? 14 : 0}}>
              <div style={{flex:'0 0 260px'}}>
                <div style={{fontSize:11, color:C.muted, marginBottom:4}}>UE Identifier</div>
                <select style={inputSt} value={ueId} onChange={e=>{ setUeId(e.target.value); setConnResult(null); setRoamResult(null); }}>
                  <option value="ue1">ue1 — IMSI 001010000000001</option>
                  <option value="ue2">ue2 — IMSI 001010000000002</option>
                </select>
              </div>
              <button onClick={checkDeviceStatus} disabled={!isUp || connLoading} style={btnPrimary(!isUp || connLoading)}>
                {connLoading ? '⏳ Checking…' : '⚡ Check Status'}
              </button>
              {connResult && <button onClick={()=>{setConnResult(null);setRoamResult(null);}} style={{...btnDanger, marginLeft:'auto'}}>Clear</button>}
            </div>
            {connResult && (
              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:10}}>
                {/* Connectivity */}
                <div style={{background:'#0d1117', border:`1px solid ${CONN_COLOR[connResult.connectivityStatus]||'#555'}44`, borderRadius:6, padding:14}}>
                  <div style={{fontSize:10, color:C.muted, marginBottom:8, fontWeight:700, textTransform:'uppercase'}}>Connectivity</div>
                  <div style={{display:'flex', alignItems:'center', gap:8}}>
                    <span style={{width:12, height:12, borderRadius:'50%', background:CONN_COLOR[connResult.connectivityStatus]||'#555', flexShrink:0,
                      boxShadow:`0 0 8px ${CONN_COLOR[connResult.connectivityStatus]||'#555'}`}}/>
                    <span style={{fontSize:15, fontWeight:700, color:CONN_COLOR[connResult.connectivityStatus]||C.muted}}>
                      {connResult.connectivityStatus||'—'}
                    </span>
                  </div>
                  <div style={{marginTop:6, fontSize:10, color:C.muted}}>
                    {connResult.lastStatusTime ? new Date(connResult.lastStatusTime).toLocaleTimeString() : 'now'}
                  </div>
                </div>
                {/* Roaming */}
                <div style={{background:'#0d1117', border:`1px solid ${C.border}`, borderRadius:6, padding:14}}>
                  <div style={{fontSize:10, color:C.muted, marginBottom:8, fontWeight:700, textTransform:'uppercase'}}>Roaming</div>
                  {roamResult ? (<>
                    <div style={{display:'flex', alignItems:'center', gap:8}}>
                      <span style={{width:12, height:12, borderRadius:'50%', background: roamResult.roaming ? '#f59e0b' : '#00c896', flexShrink:0,
                        boxShadow:`0 0 8px ${roamResult.roaming ? '#f59e0b' : '#00c896'}`}}/>
                      <span style={{fontSize:15, fontWeight:700, color: roamResult.roaming ? '#f59e0b' : '#00c896'}}>
                        {roamResult.roaming ? 'ROAMING' : 'HOME'}
                      </span>
                    </div>
                    <div style={{marginTop:6, fontSize:10, color:C.muted}}>Country: {roamResult.countryCode||'001'} · MCC/MNC: 001/01</div>
                  </>) : <div style={{fontSize:11, color:C.muted}}>—</div>}
                </div>
                {/* Raw response */}
                <div style={{background:'#0d1117', border:`1px solid ${C.border}`, borderRadius:6, padding:14}}>
                  <div style={{fontSize:10, color:C.muted, marginBottom:6, fontWeight:700, textTransform:'uppercase'}}>API Response</div>
                  <code style={{fontSize:9.5, color:C.accent, lineHeight:1.6, whiteSpace:'pre-wrap', wordBreak:'break-all'}}>
                    {JSON.stringify(connResult, null, 2)}
                  </code>
                </div>
              </div>
            )}
          </div>

          {/* Location Verification */}
          <div style={{background:C.card, border:`1px solid ${C.border}`, borderRadius:6, padding:14}}>
            <div style={{fontSize:11, color:C.muted, fontWeight:700, textTransform:'uppercase', letterSpacing:1, marginBottom:12}}>
              Location Verification — CAMARA location-verification v0.2
            </div>
            <div style={{display:'grid', gridTemplateColumns:'1fr 120px 120px 120px auto', gap:10, alignItems:'end', marginBottom:locResult ? 12 : 0}}>
              <div>
                <div style={{fontSize:11, color:C.muted, marginBottom:4}}>Device (UE)</div>
                <select style={inputSt} value={ueId} onChange={e=>setUeId(e.target.value)}>
                  <option value="ue1">ue1</option><option value="ue2">ue2</option>
                </select>
              </div>
              <div><div style={{fontSize:11, color:C.muted, marginBottom:4}}>Latitude</div>
                <input style={inputSt} value={locLat} onChange={e=>setLocLat(e.target.value)}/></div>
              <div><div style={{fontSize:11, color:C.muted, marginBottom:4}}>Longitude</div>
                <input style={inputSt} value={locLon} onChange={e=>setLocLon(e.target.value)}/></div>
              <div><div style={{fontSize:11, color:C.muted, marginBottom:4}}>Radius (m)</div>
                <input style={inputSt} type="number" value={locRadius} onChange={e=>setLocRadius(e.target.value)}/></div>
              <button onClick={verifyLocation} disabled={!isUp||locLoading} style={btnPrimary(!isUp||locLoading)}>
                {locLoading ? '⏳ Verifying…' : '📍 Verify'}
              </button>
            </div>
            {locResult && (
              <div style={{display:'grid', gridTemplateColumns:'auto 1fr', gap:10}}>
                <div style={{background:'#0d1117', border:`1px solid #a78bfa44`, borderRadius:6, padding:14, minWidth:180}}>
                  <div style={{fontSize:10, color:C.muted, marginBottom:8, fontWeight:700, textTransform:'uppercase'}}>Verification Result</div>
                  <div style={{fontSize:18, fontWeight:700, color:'#a78bfa'}}>{locResult.verificationResult||'—'}</div>
                  <div style={{marginTop:6, fontSize:10, color:C.muted}}>Testbed returns UNKNOWN — no real GPS</div>
                </div>
                <div style={{background:'#0d1117', border:`1px solid ${C.border}`, borderRadius:6, padding:14}}>
                  <div style={{fontSize:10, color:C.muted, marginBottom:6, fontWeight:700, textTransform:'uppercase'}}>Request Sent</div>
                  <code style={{fontSize:9.5, color:C.accent, lineHeight:1.6, whiteSpace:'pre-wrap'}}>
{`POST /location-verification/v0/verify
→ device: { networkAccessIdentifier: "${ueId}" }
→ area: CIRCLE (${locLat}°, ${locLon}°) r=${locRadius}m
← ${JSON.stringify(locResult)}`}
                  </code>
                </div>
              </div>
            )}
          </div>

          {/* API reference */}
          <div style={{background:'#0d1c18', border:`1px solid ${C.accent}22`, borderRadius:6, padding:12}}>
            <div style={{fontSize:11, color:C.accent, fontWeight:700, marginBottom:8}}>Available Endpoints</div>
            {[
              ['GET',  '/device-status/v0/connectivity?ueId=',  'Returns CONNECTED_DATA | CONNECTED_SMS | NOT_CONNECTED'],
              ['GET',  '/device-status/v0/roaming?ueId=',       'Returns {roaming: false, countryCode: "001"} — always home'],
              ['POST', '/location-verification/v0/verify',      'Returns {verificationResult: "UNKNOWN"} — testbed has no GPS'],
            ].map(([m,p,d]) => (
              <div key={p} style={{display:'flex', gap:10, padding:'5px 0', borderBottom:`1px solid ${C.border}22`, alignItems:'center'}}>
                <span style={{width:40, fontSize:10, fontWeight:700, color: m==='GET'?'#60a5fa':'#f59e0b', flexShrink:0}}>{m}</span>
                <code style={{fontSize:10, color:C.text, flex:'0 0 360px'}}>{p}</code>
                <span style={{fontSize:10, color:C.muted}}>{d}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── TAB: QoD Sessions ── */}
      {tab === 'qod' && (
        <div>
          {!isUp && <div style={{background:'#1c1207', border:'1px solid #f59e0b44', borderRadius:6, padding:12, color:'#f59e0b', fontSize:12, marginBottom:12}}>Start CAMARA API server first.</div>}
          <div style={{background:C.card, border:`1px solid ${C.border}`, borderRadius:6, padding:14, marginBottom:14}}>
            <div style={{fontSize:11, color:C.muted, fontWeight:700, textTransform:'uppercase', marginBottom:10}}>Create QoD Session</div>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 120px auto', gap:10, alignItems:'end'}}>
              <div>
                <div style={{fontSize:11, color:C.muted, marginBottom:4}}>Device (UE)</div>
                <select style={inputSt} value={qodForm.ueId} onChange={e=>setQodForm(p=>({...p,ueId:e.target.value}))}>
                  <option value="ue1">ue1</option><option value="ue2">ue2</option>
                </select>
              </div>
              <div>
                <div style={{fontSize:11, color:C.muted, marginBottom:4}}>QoS Profile</div>
                <select style={inputSt} value={qodForm.qosProfile} onChange={e=>setQodForm(p=>({...p,qosProfile:e.target.value}))}>
                  {Object.entries(QOS_LABELS).map(([k,v])=><option key={k} value={k}>{k} — {v}</option>)}
                </select>
              </div>
              <div>
                <div style={{fontSize:11, color:C.muted, marginBottom:4}}>Duration (s)</div>
                <input style={inputSt} type="number" value={qodForm.duration} onChange={e=>setQodForm(p=>({...p,duration:e.target.value}))}/>
              </div>
              <button onClick={createQodSession} disabled={!isUp||busy} style={btnPrimary(!isUp||busy)}>+ Create</button>
            </div>
          </div>
          <div style={{background:C.card, border:`1px solid ${C.border}`, borderRadius:6}}>
            <div style={{padding:'10px 14px', borderBottom:`1px solid ${C.border}`, fontSize:11, color:C.muted, fontWeight:700, textTransform:'uppercase'}}>
              Active QoD Sessions {qodLoading && '(loading…)'}
            </div>
            {qodList.length === 0 ? (
              <div style={{padding:24, textAlign:'center', color:C.muted, fontSize:12}}>No QoD sessions. Create one above.</div>
            ) : qodList.map(s=>(
              <div key={s.sessionId} style={{padding:'10px 14px', borderBottom:`1px solid ${C.border}`, display:'flex', alignItems:'center', gap:10}}>
                <span style={{background: (QOS_COLOR[s.qosStatus]||'#555')+'22', color: QOS_COLOR[s.qosStatus]||'#555', padding:'2px 8px', borderRadius:3, fontSize:10, fontWeight:700}}>{s.qosStatus}</span>
                <span style={{fontWeight:600, fontSize:12}}>{s.qosProfile}</span>
                <span style={{color:C.muted, fontSize:11}}>{s.device?.networkAccessIdentifier||'—'}</span>
                <span style={{color:C.muted, fontSize:10, flex:1}}>ID: {s.sessionId}</span>
                <span style={{color:C.muted, fontSize:10}}>exp: {s.expiresAt ? new Date(s.expiresAt).toLocaleTimeString() : '—'}</span>
                {s.nefSubscriptionId && <span style={{color:C.accent, fontSize:10}}>NEF ✓</span>}
                <button onClick={()=>deleteQodSession(s.sessionId)} style={btnDanger}>Delete</button>
              </div>
            ))}
          </div>
          <div style={{marginTop:12, background:'#0d1c18', border:`1px solid ${C.accent}22`, borderRadius:6, padding:12}}>
            <div style={{fontSize:11, color:C.accent, fontWeight:700, marginBottom:6}}>QoD → NEF Mapping (CAMARA qod v0.10 · 3GPP TS 29.522)</div>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr 1fr 1fr', gap:8}}>
              {Object.entries(QOS_LABELS).map(([k,v])=>(
                <div key={k} style={{background:C.bg, border:`1px solid ${C.border}`, borderRadius:4, padding:8, textAlign:'center'}}>
                  <div style={{fontSize:11, fontWeight:700, color:C.accent}}>{k}</div>
                  <div style={{fontSize:10, color:C.muted, marginTop:2}}>{v}</div>
                  <div style={{fontSize:9, color:'#555', marginTop:4}}>→ NEF TrafficInfluence</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ── TAB: Reachability Subscriptions ── */}
      {tab === 'subs' && (
        <div>
          {!isUp && <div style={{background:'#1c1207', border:'1px solid #f59e0b44', borderRadius:6, padding:12, color:'#f59e0b', fontSize:12, marginBottom:12}}>Start CAMARA API server first.</div>}
          <div style={{background:C.card, border:`1px solid ${C.border}`, borderRadius:6, padding:14, marginBottom:14}}>
            <div style={{fontSize:11, color:C.muted, fontWeight:700, textTransform:'uppercase', marginBottom:10}}>New Reachability Subscription</div>
            <div style={{display:'grid', gridTemplateColumns:'1fr 2fr auto', gap:10, alignItems:'end'}}>
              <div>
                <div style={{fontSize:11, color:C.muted, marginBottom:4}}>Device (UE)</div>
                <select style={inputSt} value={subForm.ueId} onChange={e=>setSubForm(p=>({...p,ueId:e.target.value}))}>
                  <option value="ue1">ue1</option><option value="ue2">ue2</option>
                </select>
              </div>
              <div>
                <div style={{fontSize:11, color:C.muted, marginBottom:4}}>Notification URL (webhook)</div>
                <input style={inputSt} value={subForm.notifUrl} onChange={e=>setSubForm(p=>({...p,notifUrl:e.target.value}))}/>
              </div>
              <button onClick={createSub} disabled={!isUp||busy} style={btnPrimary(!isUp||busy)}>+ Subscribe</button>
            </div>
          </div>
          <div style={{background:C.card, border:`1px solid ${C.border}`, borderRadius:6}}>
            <div style={{padding:'10px 14px', borderBottom:`1px solid ${C.border}`, fontSize:11, color:C.muted, fontWeight:700, textTransform:'uppercase'}}>
              Active Subscriptions {subLoading && '(loading…)'}
            </div>
            {subList.length === 0 ? (
              <div style={{padding:24, textAlign:'center', color:C.muted, fontSize:12}}>No subscriptions yet.</div>
            ) : subList.map(s=>(
              <div key={s.subscriptionId} style={{padding:'10px 14px', borderBottom:`1px solid ${C.border}`, display:'flex', alignItems:'center', gap:10}}>
                <span style={{background:'#f59e0b20', color:'#f59e0b', padding:'2px 8px', borderRadius:3, fontSize:10, fontWeight:700}}>REACHABILITY</span>
                <span style={{color:C.muted, fontSize:11}}>UE: {s.device?.networkAccessIdentifier||'—'}</span>
                <span style={{color:C.muted, fontSize:10, flex:1}}>ID: {s.subscriptionId}</span>
                <span style={{color:C.muted, fontSize:10, overflow:'hidden', textOverflow:'ellipsis', maxWidth:200}}>{s.webhook?.notificationUrl}</span>
                {s.nefSubscriptionId && <span style={{color:C.accent, fontSize:10}}>NEF ✓</span>}
                <button onClick={()=>deleteSub(s.subscriptionId)} style={btnDanger}>Delete</button>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── TAB: Notifications ── */}
      {tab === 'notifs' && (
        <div>
          <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10}}>
            <span style={{fontSize:12, color:C.muted}}>Live feed — auto-refreshes every 3s</span>
            <button onClick={clearNotifs} style={{...btnDanger, border:'none', color:C.muted, fontSize:11}}>Clear All</button>
          </div>
          <div style={{background:C.card, border:`1px solid ${C.border}`, borderRadius:6}}>
            {notifs.length === 0 ? (
              <div style={{padding:32, textAlign:'center', color:C.muted, fontSize:12}}>
                No notifications received yet.<br/>
                <span style={{fontSize:11}}>Notifications arrive when NEF sends reachability events to the CAMARA callback URL.</span>
              </div>
            ) : notifs.map((n,i)=>(
              <div key={i} style={{padding:'10px 14px', borderBottom:`1px solid ${C.border}`, display:'flex', alignItems:'flex-start', gap:10}}>
                <span style={{background:'#a78bfa20', color:'#a78bfa', padding:'2px 8px', borderRadius:3, fontSize:10, fontWeight:700, flexShrink:0}}>
                  {n.type||'EVENT'}
                </span>
                <span style={{fontSize:10, color:C.muted, flexShrink:0}}>{n.receivedAt ? new Date(n.receivedAt).toLocaleTimeString() : '—'}</span>
                <pre style={{margin:0, fontSize:10, color:C.text, flex:1, whiteSpace:'pre-wrap', wordBreak:'break-all', lineHeight:1.4}}>
                  {typeof n.data === 'object' ? JSON.stringify(n.data, null, 2) : String(n.data)}
                </pre>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── TAB: API Catalog ── */}
      {tab === 'catalog' && (
        <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(340px,1fr))', gap:12}}>
          {CAMARA_APIS.map(api=>(
            <div key={api.name} style={{background:C.card, border:`1px solid ${C.border}`, borderRadius:6, padding:16}}>
              <div style={{display:'flex', alignItems:'center', gap:8, marginBottom:8}}>
                <span style={{width:10, height:10, borderRadius:'50%', background: isUp ? api.color : C.border}}/>
                <span style={{fontWeight:700, fontSize:13}}>{api.name}</span>
                <span style={{marginLeft:'auto', fontSize:10, color:C.muted, background:'#1c2128', padding:'2px 6px', borderRadius:3}}>{api.ts}</span>
              </div>
              <div style={{fontSize:11, color:C.muted, marginBottom:8}}>{api.desc}</div>
              <div style={{fontSize:10, color: api.color, fontFamily:'monospace', background:'#0d1117', padding:'6px 8px', borderRadius:3}}>{api.spec}</div>
              <a href={`https://github.com/camaraproject/${api.name.replace(/ /g,'')}`} target="_blank" rel="noreferrer"
                style={{display:'block', marginTop:8, fontSize:10, color:C.muted, textDecoration:'none'}}>
                ↗ CAMARA GitHub spec
              </a>
            </div>
          ))}
          {/* Simple Edge Discovery demo */}
          <div style={{background:C.card, border:`1px solid ${C.border}`, borderRadius:6, padding:16, gridColumn:'1 / -1'}}>
            <div style={{fontSize:11, color:C.muted, fontWeight:700, textTransform:'uppercase', marginBottom:8}}>Simple Edge Discovery — MEC Platforms</div>
            <div style={{fontSize:11, color:C.muted, marginBottom:8}}>
              <code style={{background:'#0d1117', padding:'2px 6px', borderRadius:3}}>GET /simple-edge-discovery/v1/mec-platforms</code>
              {' '}→ Returns the testbed's iPerf3 server (10.45.0.200:5201) as a MEC platform.
            </div>
            {isUp && (
              <button onClick={async()=>{ const d=await callCamara('/simple-edge-discovery/v1/mec-platforms'); setMsg(JSON.stringify(d,null,2)); }}
                style={{...btnPrimary(false), fontSize:11}}>
                ⚡ Discover MEC Platforms
              </button>
            )}
            {msg && msg.startsWith('[') && (
              <pre style={{marginTop:10, background:'#0d1117', padding:10, borderRadius:4, fontSize:11, color:C.accent, overflow:'auto', maxHeight:200}}>
                {msg}
              </pre>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ── UE Manager ────────────────────────────────────────────
function UEManager() {
  const C = { bg:'#0d1117', card:'#161b22', border:'#30363d', text:'#e6edf3', muted:'#8b949e', accent:'#00c896' };
  const [tab,         setTab]         = useState('config');
  const [ues,         setUes]         = useState([]);
  const [busy,        setBusy]        = useState({});
  const [msg,         setMsg]         = useState({ text:'', ok:true });
  // Config tab
  const [showAdd,     setShowAdd]     = useState(false);
  const [editUe,      setEditUe]      = useState(null);
  const [newImsi,     setNewImsi]     = useState('');
  const [form,        setForm]        = useState({});
  // Ops tab
  const [ueStatus,    setUeStatus]    = useState({});
  const [sessions,    setSessions]    = useState({});   // imsi → {output, sessions:[]}
  const [nasStatus,   setNasStatus]   = useState({});   // imsi → {output, parsed:{}}
  const [pingResult,  setPingResult]  = useState({});
  const [pingTarget,  setPingTarget]  = useState('8.8.8.8');
  const [expanded,    setExpanded]    = useState(null);
  const [pduForm,     setPduForm]     = useState({});   // imsi → {dnn,sst,type}
  const [showPduForm, setShowPduForm] = useState({});   // imsi → bool
  // Lifecycle
  const [inventory,   setInventory]   = useState([]);   // from /ue/inventory
  const [provBusy,    setProvBusy]    = useState({});   // imsi → bool

  const DEF = { key:'fec86ba6eb707ed08905757b1bb44b8f', opc:'C42449363BBAD02B66D16BC975D77CC1',
    dnn:'internet', sst:1, sd:'000000', ambrDl:1024, ambrUl:1024 };

  const flash = (text, ok=true) => { setMsg({ text, ok }); setTimeout(()=>setMsg({text:'',ok:true}), 5000); };
  const setBusyKey = (k, v) => setBusy(b=>({...b,[k]:v}));

  const loadUes = async () => { const d = await apiFetch('/ue'); if (Array.isArray(d)) setUes(d); };
  const loadStatus = async (imsi) => {
    const d = await apiFetch(`/ue/${imsi}/status`);
    if (d && !d.error) setUeStatus(p=>({...p,[imsi]:d}));
  };
  const loadSessions = async (imsi) => {
    const d = await apiFetch(`/ue/${imsi}/sessions`);
    if (d && !d.error) setSessions(p=>({...p,[imsi]:d}));
  };
  const loadNasStatus = async (imsi) => {
    const d = await apiFetch(`/ue/${imsi}/nas-status`);
    if (d && !d.error) setNasStatus(p=>({...p,[imsi]:d}));
  };
  const refreshAll = async (imsi) => {
    await Promise.all([loadStatus(imsi), loadSessions(imsi), loadNasStatus(imsi)]);
  };

  const loadInventory = async () => {
    const d = await apiFetch('/ue/inventory');
    if (Array.isArray(d)) setInventory(d);
  };

  const provision = async (imsi) => {
    setProvBusy(p=>({...p,[imsi]:true}));
    const d = await apiFetch('/ue/provision', { method:'POST',
      headers:{'Content-Type':'application/json'}, body:JSON.stringify({imsi}) });
    if (d?.ok) {
      flash(`✓ Container ${d.containerName} created for ${imsi}`);
      await Promise.all([loadUes(), loadInventory()]);
    } else { flash(d?.error || 'Provision failed', false); }
    setProvBusy(p=>({...p,[imsi]:false}));
  };

  const deprovision = async (containerName, imsi) => {
    if (!confirm(`Remove container ${containerName}?\nThe UE credentials stay in the store — you can re-provision later.`)) return;
    const d = await apiFetch(`/ue/${containerName}/deprovision`, { method:'DELETE' });
    if (d?.ok) {
      flash(`✓ Container ${containerName} removed`);
      await Promise.all([loadUes(), loadInventory()]);
    } else { flash(d?.error || 'Deprovision failed', false); }
  };

  useEffect(() => { loadUes(); loadInventory(); }, []);
  useEffect(() => {
    if (tab !== 'ops') return;
    loadInventory();
    const provisioned = inventory.filter(u => u.provisioned);
    provisioned.forEach(u => refreshAll(u.imsi));
    const t = setInterval(() => {
      loadInventory();
      inventory.filter(u => u.provisioned).forEach(u => loadStatus(u.imsi));
    }, 5000);
    return () => clearInterval(t);
  }, [tab, inventory.length]);

  const genCreds = () => {
    const hex32 = ()=>[...Array(32)].map(()=>Math.floor(Math.random()*16).toString(16)).join('');
    setForm(f=>({...f, key:hex32(), opc:hex32()}));
  };

  const addUe = async (andRegister=false) => {
    if (!/^\d{15}$/.test(newImsi)) { flash('IMSI must be exactly 15 digits', false); return; }
    setBusyKey('add', true);
    const d = await apiFetch('/ue', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ imsi:newImsi, ...DEF, ...form }) });
    if (d?.imsi) {
      setShowAdd(false); setNewImsi(''); setForm({}); await loadUes();
      if (andRegister) {
        flash(`UE ${d.imsi} added — registering in Open5GS…`);
        const r = await apiFetch(`/ue/${d.imsi}/register`, { method:'POST' });
        if (r?.ok) { await loadUes(); flash(`✓ UE ${d.imsi} added and registered in Open5GS`); }
        else flash(`UE added but registration failed: ${r?.error||'unknown error'}`, false);
      } else {
        flash(`UE ${d.imsi} added — click ▶ Register to push to Open5GS`);
      }
    } else { flash(d?.error || 'Failed to add UE', false); }
    setBusyKey('add', false);
  };

  const updateUe = async () => {
    const d = await apiFetch(`/ue/${editUe.imsi}`, { method:'PUT',
      headers:{'Content-Type':'application/json'}, body:JSON.stringify(form) });
    if (d?.imsi) { setEditUe(null); setForm({}); await loadUes(); flash('UE updated'); }
    else flash(d?.error || 'Update failed', false);
  };

  const deleteUe = async (imsi) => {
    if (!window.confirm(`Delete UE ${imsi} from local store?`)) return;
    setBusyKey(imsi, 'del');
    await apiFetch(`/ue/${imsi}`, { method:'DELETE' });
    await loadUes();
    setBusyKey(imsi, null);
  };

  const register = async (imsi) => {
    setBusyKey(imsi, 'reg'); flash(`Registering ${imsi} in Open5GS…`);
    const d = await apiFetch(`/ue/${imsi}/register`, { method:'POST' });
    if (d?.ok) { flash(`✓ ${imsi} registered in Open5GS MongoDB`); await loadUes(); }
    else flash(`✗ ${d?.error || 'Registration failed'}`, false);
    setBusyKey(imsi, null);
  };

  const deregister = async (imsi) => {
    setBusyKey(imsi, 'dereg');
    const d = await apiFetch(`/ue/${imsi}/register`, { method:'DELETE' });
    if (d?.ok) { flash(`${imsi} removed from Open5GS`); await loadUes(); }
    else flash(d?.error || 'Deregister failed', false);
    setBusyKey(imsi, null);
  };

  const doPing = async (imsi) => {
    setBusyKey(`ping-${imsi}`, true); setPingResult(p=>({...p,[imsi]:null}));
    const d = await apiFetch(`/ue/${imsi}/ping`, { method:'POST',
      headers:{'Content-Type':'application/json'}, body:JSON.stringify({target:pingTarget, count:4}) });
    setPingResult(p=>({...p,[imsi]:d}));
    setBusyKey(`ping-${imsi}`, false);
  };

  const establishSession = async (imsi) => {
    const f = pduForm[imsi] || {};
    setBusyKey(`pdu-est-${imsi}`, true);
    flash(`Establishing PDU session for ${imsi}…`);
    const d = await apiFetch(`/ue/${imsi}/sessions`, { method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ type: f.type||'IPv4', dnn: f.dnn||'internet',
        sst: f.sst ? parseInt(f.sst) : undefined }) });
    setBusyKey(`pdu-est-${imsi}`, false);
    if (d?.ok) {
      flash(`✓ PDU session established for ${imsi}`);
      setShowPduForm(s=>({...s,[imsi]:false}));
      await refreshAll(imsi);
    } else flash(d?.error || 'Failed to establish PDU session', false);
  };

  const releaseSession = async (imsi, psi) => {
    setBusyKey(`pdu-rel-${imsi}-${psi}`, true);
    const d = await apiFetch(`/ue/${imsi}/sessions/${psi}`, { method:'DELETE' });
    setBusyKey(`pdu-rel-${imsi}-${psi}`, false);
    if (d?.ok) { flash(`PDU session [${psi}] released`); await refreshAll(imsi); }
    else flash(d?.error || 'Failed to release session', false);
  };

  const releaseAllSessions = async (imsi) => {
    setBusyKey(`pdu-rel-all-${imsi}`, true);
    const d = await apiFetch(`/ue/${imsi}/sessions`, { method:'DELETE' });
    setBusyKey(`pdu-rel-all-${imsi}`, false);
    if (d?.ok) { flash(`All PDU sessions released for ${imsi}`); await refreshAll(imsi); }
    else flash(d?.error || 'Failed to release sessions', false);
  };

  const nasDeregister = async (imsi, type='normal') => {
    setBusyKey(`nas-dereg-${imsi}`, true);
    flash(`NAS de-registering ${imsi} (${type})…`);
    const d = await apiFetch(`/ue/${imsi}/nas-deregister`, { method:'POST',
      headers:{'Content-Type':'application/json'}, body: JSON.stringify({ type }) });
    setBusyKey(`nas-dereg-${imsi}`, false);
    if (d?.ok) { flash(`✓ ${imsi} NAS de-registered (${type})`); await refreshAll(imsi); }
    else flash(d?.error || 'NAS de-register failed', false);
  };

  const regCount = ues.filter(u=>u.registered).length;

  const tabSt = (t) => ({ padding:'9px 18px', cursor:'pointer', fontSize:13, fontWeight:600, background:'transparent',
    color:tab===t?C.accent:C.muted, border:'none', borderBottom:tab===t?`2px solid ${C.accent}`:'2px solid transparent',
    transition:'color .15s, border-color .15s', marginBottom:'-1px' });
  const inputSt = { background:'#0d1117', border:`1px solid ${C.border}`, borderRadius:4, color:C.text,
    padding:'7px 10px', fontSize:12, width:'100%', boxSizing:'border-box' };
  const btnP = (off) => ({ padding:'7px 16px', background:off?'#1c2128':C.accent, color:off?C.muted:'#000',
    border:off?`1px solid ${C.border}`:'none', borderRadius:4, cursor:off?'not-allowed':'pointer', fontSize:12, fontWeight:700 });
  const btnTiny = (color, off) => ({ padding:'4px 11px', background:`${color}22`, color:off?C.muted:color,
    border:`1px solid ${off?C.border:color+'55'}`, borderRadius:3, cursor:off?'not-allowed':'pointer', fontSize:11, fontWeight:600 });
  const modalBox = { position:'fixed', inset:0, background:'#000c', display:'flex', alignItems:'center',
    justifyContent:'center', zIndex:9999 };
  const modal = { background:'#161b22', border:`1px solid ${C.border}`, borderRadius:8, width:500, maxHeight:'88vh', overflowY:'auto' };

  return (
    <div style={{color:C.text, fontSize:13}}>

      {/* Stats row */}
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:12, marginBottom:16}}>
        <div style={{background:C.card, border:`1px solid ${C.border}`, borderRadius:6, padding:'14px 16px'}}>
          <div style={{fontSize:10, color:C.muted, fontWeight:700, textTransform:'uppercase', marginBottom:8}}>Configured UEs</div>
          <div style={{fontSize:28, fontWeight:700, color:C.accent}}>{ues.length}</div>
          <div style={{fontSize:11, color:C.muted}}>Locally defined simulated devices</div>
        </div>
        <div style={{background:C.card, border:`1px solid ${C.border}`, borderRadius:6, padding:'14px 16px'}}>
          <div style={{fontSize:10, color:C.muted, fontWeight:700, textTransform:'uppercase', marginBottom:8}}>Registered in Core</div>
          <div style={{fontSize:28, fontWeight:700, color:regCount>0?C.accent:C.muted}}>{regCount}</div>
          <div style={{fontSize:11, color:C.muted}}>Subscriber entries in Open5GS MongoDB</div>
        </div>
        <div style={{background:C.card, border:`1px solid ${C.border}`, borderRadius:6, padding:'14px 16px'}}>
          <div style={{fontSize:10, color:C.muted, fontWeight:700, textTransform:'uppercase', marginBottom:4}}>UERANSIM Containers</div>
          <div style={{fontSize:11, color:C.muted, marginBottom:8}}>{inventory.filter(u=>u.provisioned).length} provisioned · {inventory.filter(u=>!u.provisioned).length} not yet</div>
          <div style={{display:'flex', gap:12, flexWrap:'wrap', marginTop:4}}>
            {inventory.length === 0
              ? <span style={{fontSize:11,color:C.muted}}>Loading…</span>
              : inventory.map(inv => {
                  const st    = ueStatus[inv.imsi] || {};
                  const color = !inv.provisioned ? C.muted
                    : (st.hasPduSession || inv.tunIp) ? C.accent
                    : inv.containerRunning ? '#f59e0b' : '#ef4444';
                  const lbl   = inv.label || inv.imsi.slice(-4);
                  return (
                    <div key={inv.imsi} style={{textAlign:'center'}}>
                      <div style={{width:10,height:10,borderRadius:'50%',background:color,margin:'0 auto 4px',
                        boxShadow:inv.provisioned&&inv.containerRunning?`0 0 6px ${color}`:undefined}}/>
                      <div style={{fontSize:10,fontWeight:700,color}}>{lbl}</div>
                      <div style={{fontSize:9,color:C.muted}}>
                        {!inv.provisioned ? 'no container'
                          : (st.hasPduSession||inv.tunIp) ? 'PDU up'
                          : inv.containerRunning ? 'running'
                          : inv.containerState === 'none' ? 'not created'
                          : inv.containerState}
                      </div>
                    </div>
                  );
                })
            }
          </div>
        </div>
      </div>

      {/* Feedback banner */}
      {msg.text && (
        <div style={{background:msg.ok?'#0d1c18':'#1c0707', border:`1px solid ${msg.ok?C.accent+'44':'#ef444444'}`,
          borderRadius:6, padding:'9px 14px', color:msg.ok?C.accent:'#ef4444', fontSize:12, marginBottom:12}}>
          {msg.text}
        </div>
      )}

      {/* Tab bar */}
      <div style={{display:'flex', borderBottom:`1px solid ${C.border}`, marginBottom:16}}>
        <button onClick={()=>setTab('config')} style={tabSt('config')}>🔧 Config</button>
        <button onClick={()=>setTab('ops')} style={tabSt('ops')}>
          ⚙ Operations
          {inventory.filter(u=>u.provisioned).length > 0 && (
            <span style={{marginLeft:6, background:C.accent+'33', color:C.accent, borderRadius:10, padding:'1px 7px', fontSize:9, fontWeight:700}}>
              {inventory.filter(u=>u.provisioned).length}
            </span>
          )}
        </button>
      </div>

      {/* ─────────────── CONFIG TAB ─────────────── */}
      {tab==='config' && (
        <div>
          {/* Workflow note */}
          <div style={{background:'#0d1117', border:`1px solid ${C.border}`, borderRadius:6, padding:'10px 14px', marginBottom:12, display:'flex', gap:16, alignItems:'center', flexWrap:'wrap'}}>
            <div style={{display:'flex', alignItems:'center', gap:8}}>
              <span style={{background:'#60a5fa22', color:'#60a5fa', border:'1px solid #60a5fa44', borderRadius:3, padding:'2px 8px', fontSize:10, fontWeight:700}}>① ADD</span>
              <span style={{fontSize:11, color:C.muted}}>Create UE config (store)</span>
            </div>
            <span style={{color:C.border, fontSize:14}}>→</span>
            <div style={{display:'flex', alignItems:'center', gap:8}}>
              <span style={{background:'#00c89622', color:'#00c896', border:'1px solid #00c89644', borderRadius:3, padding:'2px 8px', fontSize:10, fontWeight:700}}>② REGISTER</span>
              <span style={{fontSize:11, color:C.muted}}>Push to Open5GS MongoDB</span>
            </div>
            <span style={{color:C.border, fontSize:14}}>→</span>
            <div style={{display:'flex', alignItems:'center', gap:8}}>
              <span style={{background:'#a78bfa22', color:'#a78bfa', border:'1px solid #a78bfa44', borderRadius:3, padding:'2px 8px', fontSize:10, fontWeight:700}}>③ PROVISION</span>
              <span style={{fontSize:11, color:C.muted}}>Ops tab → create UERANSIM container</span>
            </div>
            <span style={{color:C.border, fontSize:14}}>→</span>
            <div style={{display:'flex', alignItems:'center', gap:8}}>

              <span style={{fontSize:11, color:C.muted}}>PDU sessions, NAS, ping</span>
            </div>
          </div>

          {/* UE table */}
          <div style={{background:C.card, border:`1px solid ${C.border}`, borderRadius:6, marginBottom:14}}>
            <div style={{padding:'12px 16px', borderBottom:`1px solid ${C.border}`, display:'flex', alignItems:'center', justifyContent:'space-between'}}>

                Configured UEs ({ues.length})
              </span>

            </div>

            {ues.length===0 ? (

                <span style={{fontSize:11}}>Click <strong style={{color:C.text}}>+ Add UE</strong>, enter an IMSI — all other fields auto-fill from defaults.</span>
              </div>
            ) : (
              <div style={{overflowX:'auto'}}>
                <table style={{width:'100%', borderCollapse:'collapse', fontSize:12}}>
                  <thead>
                    <tr style={{borderBottom:`1px solid ${C.border}`}}>
                      {['IMSI','K','OPc','DNN','S-NSSAI','AMBR ↓/↑','Core','Actions'].map(h=>(
                        <th key={h} style={{padding:'8px 12px', textAlign:'left', fontSize:10, color:C.muted, fontWeight:700, textTransform:'uppercase', whiteSpace:'nowrap'}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {ues.map(ue=>(
                      <tr key={ue.imsi} style={{borderBottom:`1px solid ${C.border}22`}}>
                        <td style={{padding:'10px 12px', fontFamily:'monospace', color:C.accent, fontWeight:600}}>{ue.imsi}</td>
                        <td style={{padding:'10px 12px', fontFamily:'monospace', color:C.muted, fontSize:11}}>{(ue.key||'').slice(0,8)}···</td>
                        <td style={{padding:'10px 12px', fontFamily:'monospace', color:C.muted, fontSize:11}}>{(ue.opc||'').slice(0,8)}···</td>
                        <td style={{padding:'10px 12px'}}>{ue.dnn}</td>
                        <td style={{padding:'10px 12px', color:C.muted, fontSize:11, whiteSpace:'nowrap'}}>SST:{ue.sst} SD:{ue.sd}</td>
                        <td style={{padding:'10px 12px', color:C.muted, fontSize:11, whiteSpace:'nowrap'}}>{ue.ambrDl||1024}/{ue.ambrUl||1024} Mbps</td>
                        <td style={{padding:'10px 12px'}}>
                          <span style={{background:ue.registered?'#00c89620':'#ef444420', color:ue.registered?'#00c896':'#ef4444',
                            border:`1px solid ${ue.registered?'#00c89644':'#ef444444'}`, padding:'2px 8px', borderRadius:3, fontSize:10, fontWeight:700, whiteSpace:'nowrap'}}>
                            {ue.registered?'✓ In Core':'Not Registered'}
